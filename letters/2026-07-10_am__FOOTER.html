<!-- money-letter 2026-07-10 am FOOTER · scripts=1 · dcl-guarded=0 -->
<script>
(function(){
 if(window.__mlV4)return;window.__mlV4=1;
 var d=document,root=d.documentElement;root.classList.add('js');
 var rm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
 var hh=d.getElementById('hh');
 if(hh){[].slice.call(hh.querySelectorAll('.w')).forEach(function(w,i){w.style.setProperty('--i',i);});
   setTimeout(function(){hh.classList.add('in');},80);}
 function fire(el){
   el.classList.add('in');
   [].slice.call(el.querySelectorAll('.mbar i,.sb i')).concat(el.matches&&el.matches('.mbar i,.sb i')?[el]:[]).forEach(function(b){b.style.width=b.getAttribute('data-w')+'%';});
   [].slice.call(el.querySelectorAll('.cnt')).forEach(function(c){
     if(c.__done)return;c.__done=1;
     var to=parseFloat(c.getAttribute('data-to')),txt=c.textContent,dec=(txt.split('.')[1]||'').length,t0=null;
     if(rm||!isFinite(to))return;
     function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/900,1),e=1-Math.pow(1-p,3);
       c.textContent=(to*e).toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
       if(p<1)requestAnimationFrame(s);else c.textContent=txt;}
     requestAnimationFrame(s);});
 }
 var els=[].slice.call(d.querySelectorAll('.wv,.wstag,.wline,.sec'));
 if(rm||!('IntersectionObserver'in window)){els.forEach(fire);}
 else{var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){fire(en.target);io.unobserve(en.target);}});},{threshold:.12,rootMargin:'0px 0px -7% 0px'});
   els.forEach(function(e){io.observe(e);});}
 function heatColor(v){var up=v>=0,a=Math.min(Math.abs(v)/2.1,1),base=up?[232,91,74]:[74,125,232],bg=[251,243,238];
   return 'rgb('+Math.round(bg[0]+(base[0]-bg[0])*a)+','+Math.round(bg[1]+(base[1]-bg[1])*a)+','+Math.round(bg[2]+(base[2]-bg[2])*a)+')';}
 [].slice.call(d.querySelectorAll('.heat .hcell')).forEach(function(c){
   var v=parseFloat(c.getAttribute('data-v'));if(isNaN(v))return;var a=Math.min(Math.abs(v)/2.1,1);
   c.style.background=heatColor(v);
   if(a>0.6){c.style.color='#fff';var hn=c.querySelector('.hn'),hv=c.querySelector('.hv');if(hn)hn.style.color='rgba(255,255,255,.92)';if(hv)hv.style.color='#fff';}
 });
 var chaps=[].slice.call(d.querySelectorAll('.chap')),sfill=d.getElementById('sfill'),sns=[].slice.call(d.querySelectorAll('.sn'));
 if(chaps.length&&sfill){
   var seen=-1;
   function mark(i){if(i<=seen)return;seen=i;sfill.style.width=((i+1)/chaps.length*100)+'%';sns.forEach(function(a,j){a.classList.toggle('on',j===i);});}
   if(!('IntersectionObserver'in window)){mark(chaps.length-1);}
   else{var io2=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){mark(chaps.indexOf(en.target));}});},{threshold:.35});
     chaps.forEach(function(c){io2.observe(c);});}
 }
 var secs=[].slice.call(d.querySelectorAll('.sec[id]'));
 var rtoc=[].slice.call(d.querySelectorAll('#rtoc a'));
 var chips=[].slice.call(d.querySelectorAll('.chipnav a'));
 var pg=d.getElementById('pg'),tp=d.getElementById('top'),tick=false;
 function onScroll(){tick=false;
   var h=root,max=h.scrollHeight-h.clientHeight,st=h.scrollTop||d.body.scrollTop||0;
   if(pg)pg.style.width=(max>0?st/max*100:0)+'%';
   if(tp)tp.classList.toggle('on',st>560);
   var cur='';
   secs.forEach(function(s){if(s.getBoundingClientRect().top<=innerHeight*0.42)cur=s.id;});
   if(cur){rtoc.forEach(function(a){a.classList.toggle('on',a.getAttribute('href')==='#'+cur);});
     chips.forEach(function(a){a.classList.toggle('on',a.getAttribute('href')==='#'+cur);});}
 }
 addEventListener('scroll',function(){if(!tick){tick=true;requestAnimationFrame(onScroll);}},{passive:true});
 addEventListener('resize',function(){if(!tick){tick=true;requestAnimationFrame(onScroll);}},{passive:true});
 onScroll();
 if(tp)tp.addEventListener('click',function(){scrollTo({top:0,behavior:rm?'auto':'smooth'});});
 (function(){
   var wrap=d.getElementById('sparklive');if(!wrap||!window.fetch)return;
   var figs=[].slice.call(wrap.querySelectorAll('.slfig[data-series]'));if(!figs.length)return;
   fetch('https://raw.githubusercontent.com/dongeunbubu/bubulab-site/main/letters/history.json',{cache:'no-store'})
     .then(function(r){return r.ok?r.json():null;}).then(function(j){
     if(!j)return;var arr=j.series||j.letters||[];if(!arr.length)return;
     arr=arr.slice().sort(function(a,b){return (a.date||'')<(b.date||'')?-1:1;});
     var any=false;
     figs.forEach(function(fig){
       var key=fig.getAttribute('data-series'),lab=fig.getAttribute('data-label')||'';
       var pts=[];arr.forEach(function(e){var v=e[key];if(typeof v==='number'&&isFinite(v))pts.push([e.date,v]);});
       pts=pts.slice(-14);
       if(pts.length<3){fig.style.display='none';return;}
       draw(fig,lab,pts);any=true;
     });
     if(any){wrap.removeAttribute('hidden');wrap.classList.add('in');}
   }).catch(function(){});
   function draw(fig,lab,pts){
     var vals=pts.map(function(p){return p[1];});
     var lo=Math.min.apply(null,vals),hi=Math.max.apply(null,vals),rng=(hi-lo)||1;
     var W=300,Hh=68,pad=8,n=pts.length;
     var xs=pts.map(function(_,i){return pad+i*(W-2*pad)/(n-1);});
     var ys=vals.map(function(v){return Hh-pad-(v-lo)/rng*(Hh-2*pad);});
     var poly=xs.map(function(x,i){return x.toFixed(1)+','+ys[i].toFixed(1);}).join(' ');
     var up=vals[n-1]>=vals[0],col=up?'#E85B4A':'#4A7DE8';
     function fn(v){return v>=1000?Math.round(v).toLocaleString('ko-KR'):(Math.round(v*100)/100).toLocaleString('ko-KR');}
     fig.innerHTML='<figcaption>'+lab+' 최근 흐름</figcaption>'+
       '<svg viewBox="0 0 '+W+' '+Hh+'" role="img" aria-label="'+lab+' 최근 추이"><polyline class="spl" points="'+poly+'" style="stroke:'+col+'"/>'+
       '<circle cx="'+xs[n-1].toFixed(1)+'" cy="'+ys[n-1].toFixed(1)+'" r="3.2" fill="'+col+'"/></svg>'+
       '<div class="spx"><span>'+pts[0][0].slice(5)+' '+fn(vals[0])+'</span><b style="color:'+col+'">'+pts[n-1][0].slice(5)+' '+fn(vals[n-1])+'</b></div>';
   }
 })();
 var tip=d.getElementById('tip');
 if(tip){
   function hide(){tip.classList.remove('on');}
   function show(t){
     tip.innerHTML='';
     var b=d.createElement('b');b.textContent=t.getAttribute('data-t');
     var s=d.createElement('span');s.textContent=t.getAttribute('data-d');
     var a=d.createElement('a');a.href=t.getAttribute('href');a.textContent='용어사전에서 자세히 →';
     tip.appendChild(b);tip.appendChild(s);tip.appendChild(a);
     var r=t.getBoundingClientRect(),sy=window.pageYOffset||d.documentElement.scrollTop,sx=window.pageXOffset||d.documentElement.scrollLeft;
     tip.classList.add('on');
     var tw=tip.offsetWidth,lx=Math.max(10,Math.min(r.left+sx,d.documentElement.clientWidth-tw-10));
     tip.style.left=lx+'px';tip.style.top=(r.bottom+sy+8)+'px';
   }
   d.addEventListener('click',function(e){
     var t=e.target.closest&&e.target.closest('a.term');
     if(t){e.preventDefault();if(tip.classList.contains('on')&&tip.__for===t){hide();tip.__for=null;}
       else{show(t);tip.__for=t;}}
     else if(!tip.contains(e.target)){hide();tip.__for=null;}
   });
   d.addEventListener('keydown',function(e){if(e.key==='Escape'){hide();tip.__for=null;}});
   addEventListener('scroll',function(){if(tip.classList.contains('on')&&tip.__for){var r=tip.__for.getBoundingClientRect();if(r.bottom<0||r.top>innerHeight)hide();}},{passive:true});
 }
})();
</script>
