<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
function countUp(el,to,dur,pre,suf,dec){to=+to;dur=dur||1000;pre=pre||'';suf=suf||'';dec=+dec||0;var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);var val=to*e;el.textContent=pre+(dec?val.toFixed(dec):Math.round(val).toLocaleString('ko-KR'))+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);}
function runStats(box){box.querySelectorAll('[data-count]').forEach(function(el){countUp(el,el.getAttribute('data-count'),1100,el.getAttribute('data-pre')||'',el.getAttribute('data-suf')||'',el.getAttribute('data-dec')||0);});}
function runBars(box){box.querySelectorAll('.rfill').forEach(function(el){el.style.width=el.getAttribute('data-w')+'%';});}
var slI=d.getElementById('slInfl'),slD=d.getElementById('slDep');
function calc(){var inf=+slI.value,dep=+slD.value;
 var real=dep-inf;
 var half=inf>0?(72/inf):Infinity;
 var v10=1000*Math.pow((1+dep/100)/(1+inf/100),10);
 slI.style.setProperty('--p',((inf-1)/5*100)+'%');
 slD.style.setProperty('--p',(dep/6*100)+'%');
 d.getElementById('oInf').textContent=inf.toFixed(1)+'%';
 d.getElementById('oDep').textContent='연 '+dep.toFixed(1)+'%';
 var rEl=d.getElementById('oReal');
 rEl.textContent=(real>=0?'+':'−')+Math.abs(real).toFixed(1)+'%p';
 rEl.parentElement.style.setProperty('--ac',real>=0?'var(--sage)':'var(--down)');
 d.getElementById('oHalf').textContent=isFinite(half)?half.toFixed(1)+'년':'—';
 d.getElementById('oV10').textContent=Math.round(v10).toLocaleString('ko-KR')+'만원';
 var msg;
 if(real<0){msg='지금처럼 예금 이자(연 '+dep.toFixed(1)+'%)가 물가('+inf.toFixed(1)+'%)보다 낮으면, 통장 숫자는 늘어도 살 수 있는 건 줄어드는 구간이에요. 10년 두면 1,000만원의 실질 가치가 약 '+Math.round(v10).toLocaleString('ko-KR')+'만원이 돼요.';}
 else if(real<1){msg='간신히 물가를 따라잡는 정도예요. 세금(이자소득세 15.4%)까지 빼면 실질은 다시 마이너스로 내려갈 수 있어요.';}
 else{msg='이자가 물가를 넉넉히 앞서는 드문 구간이에요. 이럴 땐 예금만으로도 실질 구매력이 늘어요. 다만 이런 고금리가 늘 이어지진 않아요.';}
 d.getElementById('oNote').textContent=msg;
}
if(slI&&slD){slI.addEventListener('input',calc);slD.addEventListener('input',calc);calc();}
if('IntersectionObserver'in window){
 var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');
   if(e.target.classList.contains('hstats')&&!e.target.dataset.done){e.target.dataset.done=1;runStats(e.target);}
   if(e.target.classList.contains('recov')&&!e.target.dataset.done){e.target.dataset.done=1;runBars(e.target);}
 }else{e.target.classList.remove('in');}});},{threshold:.14});
 d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});
}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});d.querySelectorAll('.hstats').forEach(runStats);d.querySelectorAll('.recov').forEach(runBars);}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
</script>
<script>
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var dr=document.createElement('div'); dr.className='navDrawer';
 dr.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>부부연구소</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(dr);
 function op(){dr.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){dr.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){dr.classList.contains('on')?cl():op();});
 dr.addEventListener('click',function(e){var t=e.target;if(t===dr||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
