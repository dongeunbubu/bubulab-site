<!-- [letter-evening] BODY = 전체너비 코드위젯 · 머니레터 로더 쉘 v2(공통헤더+와이드+아카이브버튼+속보스트립→CDN 로드) · 2026-07-10 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--bg:#FDFBF7;--bg2:#FBF3EE;--card:#fff;--ink:#3E2F29;--ink2:#5C4B43;--mut:#8A7B72;--pink:#D67A89;--pinkSoft:#F8E8EA;--pinkSoft2:#FCEEF1;--border:#EAD7D3;--rose:#B85060;--sage:#5E8C7F;--gold:#C9A84C;--up:#E85B4A;--down:#4A7DE8;--maxw:1180px;--ease:cubic-bezier(.16,1,.3,1)}
/* ===== 사이트 공통 헤더 (home #hdr 재사용 · 시각 CSS만 · 레이아웃은 전역 SEO [C] #hdr 규칙과 정합) ===== */
.topbar{background:var(--rose);color:#fff;font-size:13px;display:flex;align-items:center;gap:16px;justify-content:center;padding:9px 16px;flex-wrap:wrap;position:relative;z-index:2;overflow:hidden}
.topbar::before{content:"";position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.22),transparent);transform:skewX(-20deg);animation:bblshim 6s ease-in-out infinite}
@keyframes bblshim{0%,60%{left:-30%}100%{left:130%}}
.topbar span{position:relative;z-index:1}
.topbar a{position:relative;z-index:1;background:#fff;color:var(--rose);padding:5px 14px;border-radius:100px;font-weight:800;font-size:12.5px;text-decoration:none;transition:transform .2s}
.topbar a:hover{transform:translateY(-1px)}
#hdr{position:sticky;top:0;z-index:60;background:rgba(253,251,247,.82);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--border)}
#hdr .wrap{max-width:var(--maxw,1180px);margin:0 auto;padding:0 22px}
#hdr .nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:64px;gap:16px}
#hdr .nav>*{min-width:0}
#hdr .logo{justify-self:start;font-weight:800;font-size:20px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px;color:var(--ink);white-space:nowrap}
#hdr .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 4px var(--pinkSoft)}
#hdr .menu-main{justify-self:center}
#hdr .menu{display:flex;gap:24px;font-size:15px;font-weight:600;color:var(--ink2)}
#hdr .menu a{position:relative;padding:4px 0;text-decoration:none;color:inherit}
#hdr .menu a:hover{color:var(--pink)}
#hdr .navright{justify-self:end;display:flex;align-items:center;gap:18px;flex-wrap:nowrap}
#hdr .menu-sub{gap:16px}
#hdr .menu-sub a{font-size:13px;color:var(--mut);font-weight:600}
#hdr .menu-sub a:hover{color:var(--pink)}
#hdr .cta{background:var(--rose);color:#fff;padding:10px 20px;border-radius:100px;font-weight:700;font-size:14px;text-decoration:none;white-space:nowrap;transition:transform .2s,background .2s}
#hdr .cta:hover{background:#A03F4D;transform:translateY(-1px)}
@media(max-width:1180px){#hdr .navright{gap:12px}#hdr .menu{gap:18px}}
@media(max-width:860px){#hdr .menu-main,#hdr .menu-sub{display:none}}
@media(max-width:700px){#hdr .wrap{padding:0 14px}}
/* ===== 보조 바(지난 레터 보기) + 속보 스트립 + 로딩 래퍼 공통 컨테이너 ===== */
.bbl-cw{max-width:var(--maxw,1180px);margin:0 auto;padding:0 clamp(16px,3.5vw,26px)}
.bbl-subbar{padding:14px 0 0}
.bbl-subbar .bbl-cw{display:flex;justify-content:flex-end}
.bbl-archbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--rose);background:#fff;border:1.5px solid var(--rose);border-radius:100px;padding:8px 16px;text-decoration:none;transition:background .2s,color .2s,transform .2s}
.bbl-archbtn:hover{background:var(--rose);color:#fff;transform:translateY(-1px)}
.bbl-archbtn i{font-style:normal;transition:transform .2s}
.bbl-archbtn:hover i{transform:translateX(3px)}
.bbl-updates{padding:12px 0 0}
.bu-strip{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FFF6EE,var(--pinkSoft2));border:1px solid var(--border);border-left:3px solid var(--rose);border-radius:12px;padding:9px 14px;font-size:13px;line-height:1.5}
.bu-strip .bu-tag{flex:none;font-size:11px;font-weight:800;letter-spacing:.02em;color:#fff;background:var(--rose);border-radius:6px;padding:3px 8px}
.bu-strip .bu-items{color:var(--ink);font-weight:700;min-width:0}
.bu-strip .bu-sep{color:var(--mut);margin:0 8px;font-weight:600}
/* ===== 로더 쉘(와이드: 콘텐츠 자체 그리드가 폭을 결정) ===== */
.bbl-shell{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
.bbl-shell *{box-sizing:border-box}
#bblLoadWrap{padding-top:clamp(18px,4vw,34px)}
.bbl-status{margin:0 0 16px;background:var(--pinkSoft2);border:1px solid var(--border);border-radius:12px;padding:11px 15px;font-size:13px;font-weight:700;color:var(--rose);line-height:1.55}
.bbl-skel .skmast{padding:8px 0 6px}
.skbrand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;color:var(--ink)}
.skdot{width:11px;height:11px;border-radius:50%}
.skpill{margin-left:auto;font-size:11.5px;font-weight:800;border-radius:100px;padding:5px 12px}
.skdate{height:70px;width:min(58%,320px);margin:20px 0 18px}
.skh1{height:26px;width:92%;margin:10px 0}
.skh1.short{width:64%}
.skcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
@media(max-width:640px){.skcards{grid-template-columns:1fr}}
.skcard{height:104px}
.skload{margin-top:26px;text-align:center;font-size:13.5px;font-weight:700;color:var(--mut)}
.sk{position:relative;overflow:hidden;background:#F1E4E0;border-radius:12px}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.62),transparent);animation:bblsh 1.45s infinite}
@keyframes bblsh{100%{transform:translateX(100%)}}
.bbl-err{max-width:520px;margin:20px auto;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:34px 26px;box-shadow:0 4px 18px rgba(190,80,96,.07)}
.bbl-err .ei{font-size:40px;line-height:1}
.bbl-err .et{font-size:18px;font-weight:800;margin-top:14px;color:var(--ink)}
.bbl-err .ed{font-size:14px;color:var(--ink2);margin-top:9px;line-height:1.7}
.bbl-err .ebtn{display:inline-flex;align-items:center;gap:6px;margin-top:18px;min-height:46px;padding:12px 22px;border-radius:12px;background:var(--rose);color:#fff;font-size:14px;font-weight:800;text-decoration:none}
.bbl-nojs{max-width:520px;margin:20px auto;text-align:center;background:var(--card);border:1px dashed var(--border);border-radius:16px;padding:26px 22px;font-size:14px;color:var(--ink2);line-height:1.7}
.bbl-nojs a{color:var(--rose);font-weight:800}
@media(prefers-reduced-motion:reduce){.sk::after{animation:none;background:none}.topbar::before{animation:none}}
</style>
