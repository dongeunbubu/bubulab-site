<!-- [letter-evening] BODY = 전체너비 코드위젯 · 머니레터 로더 쉘(스켈레톤→CDN 로드) · 2026-07-08 -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--bg:#FDFBF7;--bg2:#FBF3EE;--card:#fff;--ink:#3E2F29;--ink2:#5C4B43;--mut:#8A7B72;--pink:#D67A89;--pinkSoft:#F8E8EA;--pinkSoft2:#FCEEF1;--border:#EAD7D3;--rose:#B85060;--sage:#5E8C7F;--gold:#C9A84C;--up:#E85B4A;--down:#4A7DE8;--ease:cubic-bezier(.16,1,.3,1)}
.bbl-shell{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;color:var(--ink);background:var(--bg2);max-width:920px;margin:0 auto;padding:clamp(20px,5vw,44px) clamp(16px,4.5vw,32px);line-height:1.7;-webkit-font-smoothing:antialiased}
.bbl-shell *{box-sizing:border-box}
.bbl-status{margin:0 0 16px;background:var(--pinkSoft2);border:1px solid var(--border);border-radius:12px;padding:11px 15px;font-size:13px;font-weight:700;color:var(--rose);line-height:1.55}
.bbl-skel .skmast{padding:8px 0 6px}
.skbrand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;color:var(--ink)}
.skdot{width:11px;height:11px;border-radius:50%}
.skpill{margin-left:auto;font-size:11.5px;font-weight:800;border-radius:100px;padding:5px 12px}
.skdate{height:70px;width:min(58%,320px);margin:20px 0 18px}
.skh1{height:26px;width:92%;margin:10px 0}
.skh1.short{width:64%}
.skcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
@media(max-width:640px){.skcards{grid-template-columns:1fr}}
.skcard{height:104px}
.skload{margin-top:26px;text-align:center;font-size:13.5px;font-weight:700;color:var(--mut)}
.sk{position:relative;overflow:hidden;background:#F1E4E0;border-radius:12px}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.62),transparent);animation:bblsh 1.45s infinite}
@keyframes bblsh{100%{transform:translateX(100%)}}
.bbl-err{max-width:520px;margin:20px auto;text-align:center;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:34px 26px;box-shadow:0 4px 18px rgba(190,80,96,.07)}
.bbl-err .ei{font-size:40px;line-height:1}
.bbl-err .et{font-size:18px;font-weight:800;margin-top:14px;color:var(--ink)}
.bbl-err .ed{font-size:14px;color:var(--ink2);margin-top:9px;line-height:1.7}
.bbl-err .ebtn{display:inline-flex;align-items:center;gap:6px;margin-top:18px;min-height:46px;padding:12px 22px;border-radius:12px;background:var(--rose);color:#fff;font-size:14px;font-weight:800;text-decoration:none}
.bbl-nojs{max-width:520px;margin:20px auto;text-align:center;background:var(--card);border:1px dashed var(--border);border-radius:16px;padding:26px 22px;font-size:14px;color:var(--ink2);line-height:1.7}
.bbl-nojs a{color:var(--rose);font-weight:800}
@media(prefers-reduced-motion:reduce){.sk::after{animation:none;background:none}}
</style>
<div class="bbl-shell" id="bblShell">
  <div class="bbl-status" id="bblStatus" hidden></div>
  <div class="bbl-skel" id="bblSkel">
    <div class="skmast">
      <div class="skbrand"><span class="skdot" style="background:var(--pink)"></span>동은부부 머니레터<span class="skpill" style="background:var(--pinkSoft);color:var(--rose)">매일 저녁 5시</span></div>
      <div class="sk skdate"></div>
      <div class="sk skh1"></div><div class="sk skh1 short"></div>
      <div class="skcards"><div class="sk skcard"></div><div class="sk skcard"></div><div class="sk skcard"></div></div>
    </div>
    <div class="skload">저녁 레터를 불러오는 중이에요…</div>
  </div>
  <div id="bblLetter" hidden></div>
  <noscript><div class="bbl-nojs">이 레터는 자바스크립트가 켜져 있어야 보여요. <a href="/letter-archive">아카이브에서 지난 레터 보기 →</a></div></noscript>
</div>
