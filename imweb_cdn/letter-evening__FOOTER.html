<!-- [letter-evening] FOOTER = 페이지별 푸터 · 로더(index.json→최신 pm 주입, ?d=YYYYMMDD&e=pm 지원) · 2026-07-08 -->
<script>
(function(){
  var RAW='https://raw.githubusercontent.com/dongeunbubu/bubulab-site/main/letters/';
  var DEFAULT_ED='pm';
  var LSKEY='bbl_letter_'+DEFAULT_ED;
  var TIMEOUT=10000;
  var shell=document.getElementById('bblShell');
  if(!shell)return;
  var skel=document.getElementById('bblSkel');
  var host=document.getElementById('bblLetter');
  var statusEl=document.getElementById('bblStatus');
  function qp(k){try{return new URLSearchParams(location.search).get(k);}catch(e){return null;}}
  function fmtEd(ed){return ed==='am'?'아침판':'저녁판';}
  function fetchText(url){
    if(!window.fetch)return Promise.reject(new Error('no-fetch'));
    var ctl=('AbortController'in window)?new AbortController():null;
    var to=ctl?setTimeout(function(){ctl.abort();},TIMEOUT):null;
    return fetch(url,{cache:'no-store',signal:ctl?ctl.signal:undefined}).then(function(r){
      if(to)clearTimeout(to);
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.text();
    });
  }
  function runScripts(html){
    var tmp=document.createElement('div');tmp.innerHTML=html;
    var list=tmp.getElementsByTagName('script');var arr=[];
    for(var i=0;i<list.length;i++)arr.push(list[i]);
    arr.forEach(function(old){
      var s=document.createElement('script');
      for(var j=0;j<old.attributes.length;j++){var a=old.attributes[j];s.setAttribute(a.name,a.value);}
      s.textContent=old.textContent||old.innerHTML;
      document.body.appendChild(s);
    });
  }
  function inject(body,footer){
    host.innerHTML=body;host.hidden=false;
    if(skel)skel.style.display='none';
    runScripts(footer);
  }
  function stamp(dateStr,ed,cached,savedAt){
    if(!statusEl)return;
    if(!cached){statusEl.hidden=true;return;}
    var when='';
    try{if(savedAt)when=' · '+new Date(savedAt).toLocaleString('ko-KR')+' 저장';}catch(e){}
    statusEl.textContent='최신 레터를 불러오지 못해 저장해 둔 '+dateStr+' '+fmtEd(ed)+'을 보여드리고 있어요'+when+'.';
    statusEl.hidden=false;
  }
  function showError(){
    if(!skel)return;
    skel.innerHTML='<div class="bbl-err"><div class="ei">🌥️</div><div class="et">레터를 불러오지 못했어요</div><div class="ed">잠깐 사이 연결이 고르지 못했나 봐요. 잠시 후 새로고침해 주세요. 지난 레터는 아카이브에서 보실 수 있어요.</div><a class="ebtn" href="/letter-archive">아카이브로 가기 →</a></div>';
    skel.style.display='';
  }
  function fromCache(){try{var r=localStorage.getItem(LSKEY);return r?JSON.parse(r):null;}catch(e){return null;}}
  function toCache(o){try{localStorage.setItem(LSKEY,JSON.stringify(o));}catch(e){}}
  function pick(idx){
    var d=qp('d'),e=qp('e'),L=idx.letters||[];
    if(d&&e){
      var dash=(/^\d{8}$/.test(d))?(d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8)):d;
      for(var i=0;i<L.length;i++){if(L[i].date===dash&&L[i].edition===e)return L[i];}
    }
    for(var k=0;k<L.length;k++){if(L[k].edition===DEFAULT_ED)return L[k];}
    return L[0]||null;
  }
  function boot(){
    fetchText(RAW+'index.json?_t='+Date.now()).then(function(t){
      var idx=JSON.parse(t);var tgt=pick(idx);
      if(!tgt)throw new Error('no-letter');
      return Promise.all([fetchText(RAW+tgt.body),fetchText(RAW+tgt.footer)]).then(function(bf){
        inject(bf[0],bf[1]);stamp(tgt.date,tgt.edition,false);
        toCache({body:bf[0],footer:bf[1],date:tgt.date,edition:tgt.edition,savedAt:Date.now()});
      });
    }).catch(function(){
      var c=fromCache();
      if(c&&c.body&&c.footer){inject(c.body,c.footer);stamp(c.date,c.edition,true,c.savedAt);}
      else{showError();}
    });
  }
  boot();
})();
</script>
