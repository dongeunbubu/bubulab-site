<!-- [콘텐츠_부동산_등기부등본읽는법_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
/* reveal */
(function(){
 var io=new IntersectionObserver(function(es){
  es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
 },{threshold:.12});
 document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
})();
/* (개선38) 죽은 크롬 제거: 허브 rehdr 주입으로 자체 header/readbar/top 미사용 — 진행바·맨위로는 pagedynjs가 생성 */
/* register viewer */
(function(){
 var tabs=Array.prototype.slice.call(document.querySelectorAll('.vtab'));
 var secs=Array.prototype.slice.call(document.querySelectorAll('.docsec'));
 var rows=Array.prototype.slice.call(document.querySelectorAll('.drow'));
 var exp=document.getElementById('vexp'), eTit=document.getElementById('expTitle'), eMean=document.getElementById('expMean');
 var tagCls={d:'d',w:'w',i:'i',k:'k'};
 function showSec(sec){
  tabs.forEach(function(t){t.setAttribute('aria-selected', t.dataset.sec===sec?'true':'false');});
  secs.forEach(function(s){ if(s.dataset.sec===sec){s.removeAttribute('hidden');} else {s.setAttribute('hidden','');} });
 }
 tabs.forEach(function(t){ t.addEventListener('click',function(){ showSec(t.dataset.sec); }); });
 rows.forEach(function(r){
  r.addEventListener('click',function(){
   rows.forEach(function(x){x.classList.remove('cur');});
   r.classList.add('cur');
   exp.classList.remove('empty');
   var tag=r.dataset.tag||'i', tagt=r.dataset.tagt||'';
   eTit.innerHTML=esc(r.dataset.title||'')+(tagt?' <span class="tag '+(tagCls[tag]||'i')+'">'+esc(tagt)+'</span>':'');
   eMean.textContent=r.dataset.mean||'';
  });
 });
 function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
})();
/* calculator */
(function(){
 var iMax=document.getElementById('iMax'), iDep=document.getElementById('iDep'), iMkt=document.getElementById('iMkt');
 var oLoan=document.getElementById('oLoan'), oSum=document.getElementById('oSum'), oRate=document.getElementById('oRate');
 var oBar=document.getElementById('oBar'), oVer=document.getElementById('oVerdict');
 var ratio=1.2;
 var segs=Array.prototype.slice.call(document.querySelectorAll('#segRatio button'));
 segs.forEach(function(b){ b.addEventListener('click',function(){
  segs.forEach(function(x){x.setAttribute('aria-pressed','false');});
  b.setAttribute('aria-pressed','true'); ratio=parseFloat(b.dataset.r); calc();
 }); });
 function num(el){ var v=(el.value||'').replace(/[^0-9]/g,''); return v?parseInt(v,10):0; }
 function won(man){ // man = 만원 → 보기 좋은 한글 단위
  if(!man) return '—';
  var eok=Math.floor(man/10000), rest=man%10000;
  var s='';
  if(eok>0) s+=eok+'억';
  if(rest>0) s+=(eok>0?' ':'')+rest.toLocaleString()+'만';
  return (s||'0')+'원';
 }
 [iMax,iDep,iMkt].forEach(function(el){
  el.addEventListener('input',function(){
   var raw=el.value.replace(/[^0-9]/g,'');
   el.value=raw?parseInt(raw,10).toLocaleString():'';
   calc();
  });
 });
 function calc(){
  var max=num(iMax), dep=num(iDep), mkt=num(iMkt);
  var loan=max?Math.round(max/ratio):0;
  oLoan.innerHTML= loan? won(loan)+' <small>안팎</small>' : '—';
  var sum=max+dep;
  oSum.textContent= (max||dep)? won(sum) : '—';
  if(mkt>0 && (max||dep)){
   var rate=Math.round(sum/mkt*100);
   oRate.textContent=rate+'%';
   oBar.style.width=Math.min(rate,100)+'%';
   var cls,msg,col;
   if(rate>=80){ cls='hi'; col='#D8584E';
    msg='<b>부담이 큰 편이에요.</b> 경매 낙찰가는 보통 시세의 70~90%라, 선순위 빚이 시세의 80%를 넘으면 보증금을 다 못 건질 수 있어요. 보증보험 가입 여부·선순위 정확액을 꼭 확인하세요.';
   } else if(rate>=60){ cls='mid'; col='#C9912E';
    msg='<b>주의 구간이에요.</b> 시세·선순위 금액을 정확히 다시 확인하고, 전세보증금 반환보증(HUG·SGI) 가입이 가능한지 따져 보세요.';
   } else { cls='lo'; col='#5E8C7F';
    msg='<b>상대적으로 여유 있는 편</b>이지만, 숫자는 가정값이에요. 등기부 실수치·실제 시세로 다시 점검하고 안전장치(확정일자·보증보험)는 그래도 챙기세요.';
   }
   oBar.style.background=col;
   oVer.className='bverdict '+cls; oVer.innerHTML=msg;
  } else {
   oRate.textContent='—'; oBar.style.width='0'; oBar.style.background='#5E8C7F';
   oVer.className='bverdict'; oVer.textContent='시세까지 넣으면 부담률 감을 보여드려요. (참고용)';
  }
 }
 calc();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','메뉴 열기');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
