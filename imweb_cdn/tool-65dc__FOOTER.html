(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});}

window.countUp=function(el,to,dur,suf){to=+to;dur=dur||700;suf=suf||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

 {c:'dream',q:'아이 계획이 있다면(혹은 없다면), 돈 그림은 어떻게 달라질까요?',n:'큰 결정일수록 숫자를 같이 봐야 해요. 정답이 아니라 "우리 답"을 찾는 거예요.'},
 {c:'dream',q:'지금 우리 재무 상태, 100점 중 몇 점쯤 줄까요?',n:'각자 매긴 점수가 다르면 그 차이가 대화 주제가 돼요. 점수보다 이유가 중요해요:)'},
 {c:'dream',q:'오늘 이 대화 끝에, 같이 시작해볼 작은 약속 하나는?',n:'거창하지 않아도 돼요. 작은 약속 하나가 1년 뒤 큰 차이를 만들어요. 옆에서 같이 응원할게요!'}
];

var $=function(id){return document.getElementById(id);};
var FKEY='bbl_moneydate_fav_v1', SKEY='bbl_moneydate_seen_v1';
var cat='all',queue=[],cur=-1,drawn=0,favs=[],seen={};

function loadFav(){try{var r=localStorage.getItem(FKEY);favs=r?JSON.parse(r):[];if(!Array.isArray(favs))favs=[];}catch(e){favs=[];}}
function saveFav(){try{localStorage.setItem(FKEY,JSON.stringify(favs));}catch(e){}}

function loadSeen(){try{var r=localStorage.getItem(SKEY);var a=r?JSON.parse(r):[];seen={};if(Array.isArray(a)){a.forEach(function(i){i=+i;if(i>=0&&i<CARDS.length)seen[i]=true;});}}catch(e){seen={};}}
function saveSeen(){try{var a=[];for(var k in seen){if(seen[k])a.push(+k);}localStorage.setItem(SKEY,JSON.stringify(a));}catch(e){}}
function seenCount(){var n=0;for(var k in seen){if(seen[k])n++;}return n;}
function markSeen(i){if(i>=0&&i<CARDS.length&&!seen[i]){seen[i]=true;saveSeen();}}
function renderProg(){var T=CARDS.length,n=seenCount(),pct=T>0?Math.round(n/T*100):0;
 $('seenN').textContent=n;$('seenT').textContent=T;
 $('pgfill').style.width=pct+'%';$('pgbar').setAttribute('aria-valuenow',pct);
 var box=$('deckprog'),msg=$('pgmsg'),done=(T>0&&n>=T);
 box.classList.toggle('done',done);
 if(done)msg.innerHTML='🎉 '+T+'장을 모두 펼쳤어요 — 우리 부부 머니 대화 <b>풀코스 완주</b>예요! 마음에 남은 질문은 ♡로 다시 꺼내봐요.';
 else if(n===0)msg.textContent='카드를 한 장씩 펼치다 보면 여기가 채워져요. 한 번에 다 안 해도 괜찮아요 :)';
 else msg.innerHTML='남은 <b>'+(T-n)+'장</b>도 천천히 — 한 주에 한두 장이면 충분해요.';
}

function pool(){var a=[];for(var i=0;i<CARDS.length;i++){if(cat==='all'||CARDS[i].c===cat)a.push(i);}return a;}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function refillQueue(){queue=shuffle(pool());if(queue.length>1&&queue[0]===cur){queue.push(queue.shift());}}

function render(){
 var card=CARDS[cur],m=CATS[card.c];
 $('card').style.setProperty('--cc',m.color);
 $('fEmo').textContent=m.emoji;$('bEmo').textContent=m.emoji;$('fCat').textContent=m.name;
 $('fQ').textContent=card.q;$('bQ').textContent=card.q;$('bNote').textContent=card.n;
 var on=favs.indexOf(cur)>-1;var ht=$('heart');
 ht.classList.toggle('on',on);ht.setAttribute('aria-pressed',on?'true':'false');ht.textContent=on?'♥':'♡';
}
function deal(){var w=$('cardwrap');w.classList.remove('deal');void w.offsetWidth;w.classList.add('deal');}
function draw(){
 if(!queue.length)refillQueue();
 cur=queue.shift();
 $('card').classList.remove('flipped');
 render();deal();
 drawn++;window.countUp($('drawn'),drawn,500,'');
 markSeen(cur);renderProg();
}
function flip(){$('card').classList.toggle('flipped');}

function renderFav(){
 var box=$('favlist'),empty=$('favempty');box.innerHTML='';
 $('favn').textContent=favs.length;
 if(!favs.length){empty.style.display='';return;}
 empty.style.display='none';
 favs.forEach(function(id){var c=CARDS[id],m=CATS[c.c];
  var row=document.createElement('div');row.className='fav';row.style.setProperty('--cc',m.color);
  row.innerHTML='<span class="fc">'+m.emoji+' '+m.name+'</span><span class="ft2">'+c.q+'</span>';
  var rm=document.createElement('button');rm.className='rm';rm.type='button';rm.setAttribute('aria-label','담은 카드 빼기');rm.textContent='×';
  rm.addEventListener('click',function(){var k=favs.indexOf(id);if(k>-1)favs.splice(k,1);saveFav();renderFav();if(id===cur)render();});
  row.appendChild(rm);box.appendChild(row);});
}
function toggleFav(){var k=favs.indexOf(cur);if(k>-1)favs.splice(k,1);else favs.push(cur);saveFav();render();renderFav();}

$('card').addEventListener('click',function(e){if(e.target.closest('.heart'))return;flip();});
$('card').addEventListener('keydown',function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}});
$('heart').addEventListener('click',function(e){e.stopPropagation();toggleFav();});
$('next').addEventListener('click',draw);
$('shuffle').addEventListener('click',function(){var dk=$('deck');dk.classList.remove('shake');void dk.offsetWidth;dk.classList.add('shake');refillQueue();draw();});
$('copy').addEventListener('click',function(){var c=CARDS[cur];var txt='💬 머니 데이트 카드 ['+CATS[c.c].name+'] "'+c.q+'" — 부부연구소 자료실';if(navigator.clipboard)navigator.clipboard.writeText(txt);var b=$('copy');var o=b.textContent;b.textContent='복사됐어요!';setTimeout(function(){b.textContent=o;},1500);});
$('clearfav').addEventListener('click',function(){if(!favs.length)return;favs=[];saveFav();renderFav();render();});
Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(ch){ch.addEventListener('click',function(){
 cat=ch.getAttribute('data-c');
 document.querySelectorAll('.chip').forEach(function(x){var on=x===ch;x.classList.toggle('on',on);x.setAttribute('aria-pressed',on?'true':'false');});
 refillQueue();draw();
});});

$('total').textContent=CARDS.length;
(function(){var rb=$('pgReset'),armed=false,tmr=null,orig=rb.textContent;
 rb.addEventListener('click',function(){
  if(!seenCount()){return;}
  if(!armed){armed=true;rb.textContent='정말 초기화?';rb.style.color='var(--rose)';tmr=setTimeout(function(){armed=false;rb.textContent=orig;rb.style.color='';},3000);return;}
  clearTimeout(tmr);armed=false;rb.textContent=orig;rb.style.color='';
  seen={};saveSeen();renderProg();
 });
})();
loadFav();loadSeen();renderFav();renderProg();refillQueue();draw();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
