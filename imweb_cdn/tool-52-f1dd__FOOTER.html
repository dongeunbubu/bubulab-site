<!-- [도구_52주적금챌린지_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>
(function(){var d=document;
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countNum=function(el,to,dur,dec,suf){if(!el)return;to=+to;dur=dur||900;dec=dec||0;suf=suf||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);var v=to*e;el.textContent=(dec?v.toFixed(dec):Math.round(v).toLocaleString('ko-KR'))+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
var LS='bbl_52week_v1';
var done={};
var settings={base:5000,pattern:'up',rate:3.0,start:''};
var PATLAB={up:'📈 점점 늘리기',down:'📉 점점 줄이기',flat:'➖ 매주 같은 금액'};

function loadLS(){try{var r=localStorage.getItem(LS);if(r){var o=JSON.parse(r);if(o&&typeof o==='object'){if(o.s){['base','pattern','rate','start'].forEach(function(k){if(o.s[k]!==undefined&&o.s[k]!==null)settings[k]=o.s[k];});}if(o.d&&o.d.length){o.d.forEach(function(k){k=+k;if(k>=1&&k<=52)done[k]=true;});}}}}catch(e){}}
function saveLS(){try{var arr=[];for(var k in done){if(done[k])arr.push(+k);}localStorage.setItem(LS,JSON.stringify({s:settings,d:arr}));}catch(e){}}

function weekAmt(k){var b=settings.base;if(settings.pattern==='down')return b*(53-k);if(settings.pattern==='flat')return b*26;return b*k;}
function nextWeek(){for(var k=1;k<=52;k++){if(!done[k])return k;}return 0;}
function doneCount(){var n=0;for(var k=1;k<=52;k++){if(done[k])n++;}return n;}

function curWeek(){var s=settings.start;if(!s)return 0;var sd=new Date(s+'T00:00:00');if(isNaN(sd.getTime()))return 0;var now=new Date();now.setHours(0,0,0,0);return Math.floor((now-sd)/(7*864e5))+1;}

function renderGrid(){var g=$('grid');var html='';for(var k=1;k<=52;k++){html+='<button class="cell" type="button" data-w="'+k+'" aria-label="'+k+'주차 체크" aria-pressed="false"><span class="cw">'+k+'</span><span class="ca"></span></button>';}g.innerHTML=html;
 g.querySelectorAll('.cell').forEach(function(c){c.addEventListener('click',function(){var k=+c.getAttribute('data-w');if(done[k])delete done[k];else done[k]=true;saveLS();paintCells();refresh(false);});});}

function paintCells(){var cw=curWeek();var cells=$('grid').querySelectorAll('.cell');for(var i=0;i<cells.length;i++){var c=cells[i];var k=+c.getAttribute('data-w');var on=!!done[k];c.classList.toggle('done',on);c.setAttribute('aria-pressed',on?'true':'false');c.querySelector('.ca').textContent=(weekAmt(k)/1000).toLocaleString('ko-KR');c.classList.toggle('now',k===cw);}}

function buildPath(arr,maxV){var x0=46,x1=606,y0=22,y1=232,N=arr.length-1,pts=[];for(var k=0;k<arr.length;k++){var x=x0+(x1-x0)*(N>0?k/N:0);var y=y1-(y1-y0)*(maxV>0?arr[k]/maxV:0);pts.push([x,y]);}return pts;}
function toD(pts){return pts.map(function(p,j){return (j?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}

function todayMsg(){var cw=curWeek();var el=$('todayline');if(!settings.start){el.textContent='';return;}
 if(cw<1){el.textContent='⏳ 곧 시작이에요. 1주차가 되면 첫 칸을 채워봐요.';}
 else if(cw>52){el.textContent='🎉 52주 기간이 끝났어요. 완주를 축하해요!';}
 else{el.innerHTML='📅 오늘은 <b>'+cw+'주차</b>예요. 이번 칸을 채워볼까요?';}}

function refresh(animate){
 var cw=curWeek();
 // schedule
 var plan=[0],act=[0],cp=0,ca=0,bonus=0;
 for(var k=1;k<=52;k++){var a=weekAmt(k);cp+=a;plan.push(cp);ca+=done[k]?a:0;act.push(ca);bonus+=a*(settings.rate/100)*((53-k)/52);}
 var target=cp;var saved=ca;var dc=doneCount();var remain=Math.max(0,target-saved);var pct=target>0?saved/target*100:0;var avg=target/52;
 var nw=nextWeek();

 $('patlab').textContent=PATLAB[settings.pattern];
 $('ratev').textContent=settings.rate.toFixed(1)+'%';
 $('targetq').textContent=window.fmtWon(target)+' 원';
 $('dcount').textContent=dc;
 $('pctxt').textContent=pct.toFixed(0)+'%';
 $('remain').textContent=window.fmtWon(remain);
 $('pfill').style.width=Math.min(100,pct)+'%';
 var pb=$('pbar');if(pb){pb.setAttribute('aria-valuenow',Math.min(100,Math.round(pct)));pb.setAttribute('aria-valuetext',pct.toFixed(0)+'% 달성 — 모은 돈 '+window.fmtWon(saved)+'원, 목표 '+window.fmtWon(target)+'원');}
 $('nextlab').textContent=nw?nw+'주차':'완주!';
 $('nextamt').textContent=nw?window.fmtWon(weekAmt(nw))+'원':'🎉';

 if(animate){window.countNum($('target'),target,1000,0);window.countNum($('sAvg'),avg,900,0);window.countNum($('sBonus'),bonus,900,0);}
 else{$('target').textContent=window.fmtWon(target);$('sAvg').textContent=window.fmtWon(avg);$('sBonus').textContent=window.fmtWon(bonus);}
 var bn=$('sBonusNet');if(bn)bn.textContent=bonus>0?'세후 약 '+window.fmtWon(bonus*(1-0.154))+'원':'';
 $('saved').textContent=window.fmtWon(saved)+' 원';
 $('sNext').textContent=nw?window.fmtWon(weekAmt(nw)):'완주';
 $('bighint').innerHTML=settings.pattern==='flat'
   ? '매주 <b>'+window.fmtWon(weekAmt(1))+'원</b>씩, 한 주 한 칸이면 1년에 이만큼이 돼요.'
   : '1주차 <b>'+window.fmtWon(weekAmt(settings.pattern==='down'?52:1))+'원</b>으로 시작해 한 주 한 칸씩, 부담 없이 1년이면 이만큼이에요.';

 // chart
 var maxV=(target>0?target:1)*1.06;
 var planPts=buildPath(plan,maxV),actPts=buildPath(act,maxV);
 $('plan').setAttribute('d',toD(planPts));
 $('vpath').setAttribute('d',toD(actPts));
 $('area').setAttribute('d','M46,232 '+toD(actPts).replace(/^M/,'L')+' L606,232 Z');
 var last=actPts[actPts.length-1];$('dot').setAttribute('cx',last[0]);$('dot').setAttribute('cy',last[1]);
 var gr=$('grid2');gr.innerHTML='';for(var q=0;q<=4;q++){var y=22+(232-22)*q/4;gr.innerHTML+='<line x1="46" y1="'+y+'" x2="606" y2="'+y+'" stroke="#EAD7D3" stroke-width="1"/>';}
 var ch=$('chart');if(ch){ch.setAttribute('aria-label','계획 대비 모은 돈 누적 곡선 차트: 1년 목표 '+window.fmtWon(target)+'원 중 지금까지 '+window.fmtWon(saved)+'원('+pct.toFixed(0)+'%) 모았고, 52칸 중 '+dc+'칸 완료'+(nw?'. 다음 칸은 '+nw+'주차 '+window.fmtWon(weekAmt(nw))+'원이에요':'. 52칸 완주예요')+'.');}
 if(animate){var vp=$('vpath');vp.style.transition='none';vp.style.strokeDasharray='1';vp.style.strokeDashoffset='1';vp.getBoundingClientRect();vp.style.transition='stroke-dashoffset 1.1s var(--ease)';vp.style.strokeDashoffset='0';
   var ar=$('area');ar.style.transition='none';ar.style.opacity='0';ar.getBoundingClientRect();ar.style.transition='opacity .9s var(--ease) .25s';ar.style.opacity='.9';}

 // feel
 var f;
 if(dc===0)f='💡 아직 첫 칸이 비어 있어요. 이번 주, 둘이 같이 한 칸을 채워볼까요?';
 else if(pct>=100)f='🎉 52칸을 모두 채웠어요 — 완주 축하해요! 모은 <b>'+window.fmtWon(saved)+'원</b>, 이제 어떻게 굴릴지 둘이 의논해봐요.';
 else if(pct<25)f='💡 시작이 반이에요. 지금 이 페이스만 지키면 충분히 완주할 수 있어요 :)';
 else if(pct<50)f='💪 벌써 4분의 1을 넘었어요. 한 주 한 칸씩만, 무리 말고 꾸준히!';
 else if(pct<75)f='🔥 절반을 넘었어요! 여기서부터는 모이는 속도가 눈에 보여요.';
 else f='🏁 거의 다 왔어요. 남은 <b>'+(52-dc)+'칸</b>만 더 채우면 둘이 함께 완주예요!';
 $('feel').innerHTML=f;
 renderPace(dc,plan,saved);
 todayMsg();
}

function renderPace(dc,plan,saved){
 var el=$('pace');if(!el)return;
 var ico=$('paceIco'),hd=$('paceH'),sb=$('paceS'),chip=$('paceChip');
 function set(cls,emoji,h,s,c){el.className='pace '+cls;ico.textContent=emoji;hd.innerHTML=h;sb.innerHTML=s;if(c){chip.hidden=false;chip.textContent=c;}else{chip.hidden=true;}}
 if(!settings.start){set('neutral','📅','시작일을 정하면 지금 페이스를 봐드려요','왼쪽에서 시작일을 고르면, 이번 주 기준으로 몇 칸 앞섰는지·밀렸는지 콕 짚어드려요.','');return;}
 var cw=curWeek();
 if(cw<1){set('neutral','⏳','아직 시작 전이에요','1주차까지 <b>D-'+((1-cw)*7)+'</b>일쯤 남았어요. 시작일이 되면 우리 페이스를 봐드릴게요.','');return;}
 if(cw>52){
  if(dc>=52){set('ahead','🎉','52칸 완주 — 기간도 끝났어요!','1년 약속을 끝까지 지켰어요. 모은 돈, 이제 어떻게 굴릴지 둘이 의논해봐요 :)','완주 52/52');}
  else{var miss=52-dc;set('slight','🏁','기간은 끝났지만, 마저 채울 수 있어요','52주가 지났고 <b>'+miss+'칸</b>이 남았어요. 늦더라도 끝까지 채우면 목표 금액은 그대로예요.','남은 '+miss+'칸');}
  return;
 }
 var exp=cw>52?52:cw;
 var diff=dc-exp;
 var planNow=(plan&&plan[exp])||0;
 var surplus=Math.max(0,saved-planNow);
 var shortfall=Math.max(0,planNow-saved);
 if(diff>=1){set('ahead','🚀','계획보다 <b>'+diff+'칸</b> 앞서가요',exp+'주차에 벌써 '+dc+'칸을 채웠어요'+(surplus>0?' — 약 <b>'+window.fmtWon(surplus)+'원</b> 빠른 페이스예요':'')+'. 이 기세 그대로 가요!','+'+diff+'칸 빠름');}
 else if(diff===0){set('onpace','🎯','딱 페이스대로예요',exp+'주차에 정확히 '+dc+'칸 — 한 주 한 칸, 완벽한 리듬이에요 :)',dc+' / '+exp+'주차');}
 else if(diff>=-3){set('slight','📈',(-diff)+'칸만 따라잡으면 돼요',exp+'주차인데 '+dc+'칸이에요. 이번 주에 <b>'+(-diff)+'칸</b>'+(shortfall>0?'(약 '+window.fmtWon(shortfall)+'원)':'')+'만 몰아서 채우면 페이스를 회복해요.','−'+(-diff)+'칸');}
 else{set('behind','🔥','조금 밀렸어요 — 천천히 따라잡아요',exp+'주차에 '+dc+'칸이에요. 한꺼번에 말고 <b>매주 +1칸씩</b> 더 채우면 부담 없이 따라잡을 수 있어요'+(shortfall>0?' (지금 격차 약 '+window.fmtWon(shortfall)+'원)':'')+'.','−'+(-diff)+'칸');}
}
function setBase(v){v=Math.round(v/1000)*1000;if(v<1000)v=1000;settings.base=v;$('base').value=v.toLocaleString('ko-KR');
 document.querySelectorAll('#bchips button').forEach(function(b){b.classList.toggle('on',+b.dataset.v===v);});}

function init(){
 loadLS();
 setBase(settings.base);
 $('rate').value=settings.rate;
 document.querySelectorAll('#rchips button').forEach(function(b){b.classList.toggle('on',+b.dataset.v===+settings.rate);});
 document.querySelectorAll('#modes button').forEach(function(b){b.classList.toggle('on',b.dataset.m===settings.pattern);});
 if(settings.start)$('start').value=settings.start;
 renderGrid();paintCells();refresh(true);
}

// events
$('base').addEventListener('input',function(){var v=Math.max(0,+($('base').value.replace(/[^0-9]/g,''))||0);$('base').value=v?v.toLocaleString('ko-KR'):'';settings.base=v<1000?1000:Math.round(v/1000)*1000;document.querySelectorAll('#bchips button').forEach(function(b){b.classList.toggle('on',+b.dataset.v===settings.base);});paintCells();refresh(false);});
$('base').addEventListener('change',function(){setBase(settings.base);saveLS();paintCells();refresh(true);});
document.querySelectorAll('#bchips button').forEach(function(b){b.addEventListener('click',function(){setBase(+b.dataset.v);saveLS();paintCells();refresh(true);});});

document.querySelectorAll('#modes button').forEach(function(b){b.addEventListener('click',function(){settings.pattern=b.dataset.m;document.querySelectorAll('#modes button').forEach(function(x){x.classList.toggle('on',x===b);});saveLS();paintCells();refresh(true);});});

$('rate').addEventListener('input',function(){settings.rate=+$('rate').value;$('ratev').textContent=settings.rate.toFixed(1)+'%';document.querySelectorAll('#rchips button').forEach(function(b){b.classList.toggle('on',+b.dataset.v===+settings.rate);});refresh(false);});
$('rate').addEventListener('change',function(){saveLS();refresh(true);});
document.querySelectorAll('#rchips button').forEach(function(b){b.addEventListener('click',function(){settings.rate=+b.dataset.v;$('rate').value=settings.rate;$('ratev').textContent=settings.rate.toFixed(1)+'%';document.querySelectorAll('#rchips button').forEach(function(x){x.classList.toggle('on',x===b);});saveLS();refresh(true);});});

$('start').addEventListener('change',function(){settings.start=$('start').value||'';saveLS();paintCells();refresh(false);});

$('btnNext').addEventListener('click',function(){var k=nextWeek();if(!k)return;done[k]=true;saveLS();paintCells();refresh(false);});
$('btnClear').addEventListener('click',function(){if(confirm('체크한 칸을 모두 비울까요? (이 기기 저장 기록도 초기화돼요)')){done={};saveLS();paintCells();refresh(true);}});

init();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*alanejs — 계산 실행 CTA 와이어링(추가 전용, 기존 엔진 무접촉)*/
(function(){var b=document.getElementById('calcGo');if(!b)return;
b.addEventListener('click',function(){
 if(typeof refresh==='function')refresh(true);
 var r=document.querySelector('.bigout');
 if(r&&matchMedia('(max-width:840px)').matches){var rm=matchMedia('(prefers-reduced-motion:reduce)').matches;r.scrollIntoView({behavior:rm?'auto':'smooth',block:'center'});}
});
})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
