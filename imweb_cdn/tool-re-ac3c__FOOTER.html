<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});

/* 월별 입주 단지 상세(예시 데이터) */
var DATA=[
 {t:'1월',sum:'1,240',cls:'mid',lab:'보통',rows:[['○○숲자이','59·84㎡',720],['△△리버파크','74·84㎡',520]]},
 {t:'2월',sum:'880',cls:'small',lab:'소규모',rows:[['□□센트럴','59·84㎡',880]]},
 {t:'3월',sum:'2,100',cls:'big',lab:'대규모 입주장',rows:[['○○포레나','59·84·101㎡',980],['△△아이파크','74·84㎡',720],['◇◇캐슬','59㎡',400]]},
 {t:'4월',sum:'1,560',cls:'mid',lab:'보통',rows:[['○○트인시티','59·84㎡',900],['△△루체하임','84·101㎡',660]]},
 {t:'5월',sum:'640',cls:'small',lab:'소규모',rows:[['□□더샵','59·84㎡',640]]},
 {t:'6월',sum:'3,200',cls:'big',lab:'대규모 입주장',rows:[['○○자이프레지던스','59·84·114㎡',1240],['△△e편한세상','74·84㎡',880],['◇◇푸르지오','59·84㎡',680],['☆☆데시앙','59㎡',400]]},
 {t:'7월',sum:'1,100',cls:'mid',lab:'보통',rows:[['○○롯데캐슬','84·101㎡',700],['△△한라비발디','59·84㎡',400]]},
 {t:'8월',sum:'720',cls:'small',lab:'소규모',rows:[['□□스카이뷰','59·84㎡',720]]},
 {t:'9월',sum:'2,400',cls:'big',lab:'대규모 입주장',rows:[['○○메트로팰리스','59·84㎡',1100],['△△센트레빌','74·84㎡',800],['◇◇아너스빌','59㎡',500]]},
 {t:'10월',sum:'1,800',cls:'mid',lab:'보통',rows:[['○○파크리오','59·84·114㎡',1000],['△△호반써밋','84㎡',800]]},
 {t:'11월',sum:'980',cls:'small',lab:'소규모',rows:[['□□더테라스','59·84㎡',980]]},
 {t:'12월',sum:'1,420',cls:'mid',lab:'보통',rows:[['○○그랑시티','59·84㎡',900],['△△리슈빌','74·84㎡',520]]}
];
function fnum(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function paint(i){
  var o=DATA[i];if(!o)return;
  d.getElementById('mdT').textContent=o.t+' 입주 단지 (예시)';
  d.getElementById('mdS').textContent='합계 '+o.sum+'세대 · '+o.lab;
  var b='';for(var k=0;k<o.rows.length;k++){var r=o.rows[k];
    b+='<tr><td><b>'+r[0]+'</b></td><td>'+r[1]+'</td><td class="r">'+fnum(r[2])+'세대</td></tr>';}
  d.getElementById('mdB').innerHTML=b;
  var bars=d.querySelectorAll('.mbar');for(var j=0;j<bars.length;j++){bars[j].classList.toggle('active',j===i);}
}
var cal=d.getElementById('cal');
if(cal){cal.addEventListener('click',function(e){var btn=e.target.closest('.mbar');if(btn)paint(+btn.dataset.i);});}

/* reveal + 막대 채우기 */
function fillBars(){d.querySelectorAll('.mbar i').forEach(function(b){b.style.height=b.parentElement.dataset.w+'%';});}
if('IntersectionObserver'in window){
  var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.12});
  d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});
  var io2=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){fillBars();io2.unobserve(e.target);}});},{threshold:.2});
  var cw=d.querySelector('.calwrap');if(cw)io2.observe(cw);
}else{
  d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});
  fillBars();
}
paint(5); /* 기본: 6월(대규모 입주장) 펼침 */
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>부부연구소</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
