/* ---------- STATE ---------- */
var mode = "jeonse";
var checked = { jeonse:{}, maemae:{} };

/* ---------- RENDER: checklist ---------- */
function esc(s){return s;}
function renderChecklist(){
 var wrap = document.getElementById("checklist");
 var steps = DATA[mode].steps;
 var html = "";
 for(var s=0;s<steps.length;s++){
  var st = steps[s];
  var total = st.items.length;
  html += '<div class="stage">';
  html += '<div class="stagehd"><span class="n">'+(s+1)+'</span><h3>'+st.stage+'</h3><span class="cnt" id="cnt-'+s+'">0/'+total+'</span></div>';
  html += '<div class="clist">';
  for(var i=0;i<st.items.length;i++){
   var it = st.items[i];
   var id = mode+"-"+s+"-"+i;
   var on = checked[mode][id] ? "true":"false";
   html += '<button class="ci" type="button" role="checkbox" aria-pressed="'+on+'" data-id="'+id+'" data-stage="'+s+'">';
   html += '<span class="cx"></span><span class="cbody"><span class="chead"><span class="ctt">'+it.t+'</span>'+(it.must?'<span class="must">필수</span>':'')+'</span><span class="cd">'+it.d+'</span></span>';
   html += '</button>';
  }
  html += '</div></div>';
 }
 wrap.innerHTML = html;
 // bind
 var btns = wrap.querySelectorAll(".ci");
 for(var b=0;b<btns.length;b++){ btns[b].addEventListener("click", onToggle); }
 updateProgress();
}
function onToggle(e){
 var el = e.currentTarget;
 var id = el.getAttribute("data-id");
 var now = !checked[mode][id];
 checked[mode][id] = now;
 el.setAttribute("aria-pressed", now?"true":"false");
 updateProgress();
}
function updateProgress(){
 var steps = DATA[mode].steps;
 var total=0, done=0, critTotal=0, critDone=0;
 for(var s=0;s<steps.length;s++){
  var stDone=0;
  for(var i=0;i<steps[s].items.length;i++){
   var it=steps[s].items[i];
   var id=mode+"-"+s+"-"+i;
   total++;
   if(it.must) critTotal++;
   if(checked[mode][id]){ done++; stDone++; if(it.must) critDone++; }
  }
  var cnt=document.getElementById("cnt-"+s);
  if(cnt) cnt.textContent = stDone+"/"+steps[s].items.length;
 }
 var pct = total? Math.round(done/total*100):0;
 document.getElementById("progPct").textContent = pct;
 document.getElementById("progDone").textContent = done;
 document.getElementById("progTotal").textContent = total;
 document.getElementById("progFill").style.width = pct+"%";
 var critLeft = critTotal-critDone;
 var cb=document.getElementById("progCrit");
 if(critLeft<=0){ cb.textContent="필수 항목 완료 ✓"; cb.classList.add("ok"); }
 else { cb.textContent="필수 "+critLeft+" 남음"; cb.classList.remove("ok"); }
}

/* ---------- RENDER: clauses ---------- */
function renderClauses(){
 var wrap=document.getElementById("clauseWrap");
 var list=CLAUSES[mode];
 var html="";
 for(var i=0;i<list.length;i++){
  var c=list[i];
  var safe = c.text.replace(/〔/g,'<span class="ph">').replace(/〕/g,'</span>').replace(/\(○[^)]*\)/g, function(m){return '<span class="ph">'+m+'</span>';});
  html += '<div class="clause">';
  html += '<div class="ch"><span class="cnum">'+(mode==="jeonse"?"J":"M")+(i+1)+'</span><span class="cname">'+c.name+'</span></div>';
  html += '<div class="why">'+c.why+'</div>';
  html += '<div class="clausebox"><p>'+safe+'</p></div>';
  html += '<button class="copyb" type="button" data-idx="'+i+'"><span class="ico">📋</span> 문구 복사</button>';
  html += '</div>';
 }
 wrap.innerHTML=html;
 var cbs=wrap.querySelectorAll(".copyb");
 for(var b=0;b<cbs.length;b++){ cbs[b].addEventListener("click", onCopy); }
}
function onCopy(e){
 var btn=e.currentTarget;
 var idx=parseInt(btn.getAttribute("data-idx"),10);
 var raw=CLAUSES[mode][idx].text.replace(/〔/g,"[").replace(/〕/g,"]");
 var done=function(){
  btn.classList.add("done");
  btn.innerHTML='<span class="ico">✓</span> 복사됨';
  document.getElementById("liveStatus").textContent="특약 문구가 복사되었어요.";
  setTimeout(function(){ btn.classList.remove("done"); btn.innerHTML='<span class="ico">📋</span> 문구 복사'; },1800);
 };
 if(navigator.clipboard && navigator.clipboard.writeText){
  navigator.clipboard.writeText(raw).then(done, function(){ fallbackCopy(raw, done); });
 } else { fallbackCopy(raw, done); }
}
function fallbackCopy(text, cb){
 try{
  var ta=document.createElement("textarea");
  ta.value=text; ta.setAttribute("readonly","");
  ta.style.position="absolute"; ta.style.left="-9999px";
  document.body.appendChild(ta); ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  cb();
 }catch(err){ /* no-op */ }
}

/* ---------- MODE switch ---------- */
function setMode(m){
 mode=m;
 var btns=document.querySelectorAll(".modeb");
 for(var i=0;i<btns.length;i++){
  var on=btns[i].getAttribute("data-mode")===m;
  btns[i].setAttribute("aria-selected", on?"true":"false");
 }
 renderChecklist();
 renderClauses();
}
var modeBtns=document.querySelectorAll(".modeb");
for(var mi=0; mi<modeBtns.length; mi++){
 modeBtns[mi].addEventListener("click", function(e){ setMode(e.currentTarget.getAttribute("data-mode")); });
}
document.getElementById("resetBtn").addEventListener("click", function(){
 checked[mode]={};
 renderChecklist();
 document.getElementById("liveStatus").textContent="체크리스트를 초기화했어요.";
});
