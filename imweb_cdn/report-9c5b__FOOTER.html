<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};


var io2=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){
  e.target.querySelectorAll('.vbar').forEach(function(b){b.style.height=b.dataset.h+'%';});
  e.target.querySelectorAll('.hbar,.wbar,.sbar').forEach(function(b){b.style.width=b.dataset.w+'%';});
  e.target.querySelectorAll('.mlpoly').forEach(function(p){p.classList.add('draw');});
  io2.unobserve(e.target);}});},{threshold:.2});
document.querySelectorAll('.chartcard,.macro,.codeep').forEach(function(el){io2.observe(el);});
</script>

<script>/*cmpjs*/
(function(){
 var D={
  '매출성장':{u:'%',hi:true,n:85.2,p:84.7,t:15.8,note:'세 기업 다 AI 테마지만, 엔비디아·팔란티어는 +85% 안팎 폭발 성장, 테슬라는 +16%로 사실상 정체예요.'},
  '영업이익률':{u:'%',hi:true,n:65.6,p:46.2,t:4.2,note:'엔비디아 65.6%는 압도적. 테슬라 4.2%는 가격 경쟁에 눌린 본업 마진이에요.'},
  'ROE':{u:'%',hi:true,n:114,p:32.6,t:4.9,note:'자기자본 대비 이익 — 엔비디아가 114%로 자본효율 최상위예요.'},
  'FCF마진':{u:'%',hi:true,n:18.3,p:33.6,t:5.4,note:'실제 남는 현금 비율은 의외로 팔란티어가 1위(33.6%) — 소수정예 고마진 구조예요.'},
  'PER':{u:'배',hi:false,n:33.7,p:179,t:388,note:'주가가 이익의 몇 배인지. 낮을수록 부담이 덜해요 — 엔비디아 34배 vs 테슬라 388배.'},
  'PEG':{u:'',hi:false,n:0.65,p:2.24,t:6.0,note:'성장까지 감안한 밸류. 1 미만이면 성장 대비 싸다는 신호 — 엔비디아 0.65가 유일해요.'}
 };
 var rows={n:document.querySelector('.cmprow[data-co=\u0022n\u0022]'),p:document.querySelector('.cmprow[data-co=\u0022p\u0022]'),t:document.querySelector('.cmprow[data-co=\u0022t\u0022]')};
 if(!rows.n)return;
 function fmt(v,u){return u==='배'?(v+'배'):(u==='%'?(v+'%'):v);}
 function render(m){
  var d=D[m];if(!d)return;var max=Math.max(d.n,d.p,d.t)||1;
  var best=d.hi?Math.max(d.n,d.p,d.t):Math.min(d.n,d.p,d.t);
  [['n',d.n],['p',d.p],['t',d.t]].forEach(function(x){var r=rows[x[0]],v=x[1];
   r.querySelector('.cf').style.width=(Math.abs(v)/max*100).toFixed(1)+'%';
   r.querySelector('.cv').textContent=fmt(v,d.u)+(v===best?' 👑':'');
   r.classList.toggle('win',v===best);});
  document.getElementById('cmpnote').innerHTML='<b>'+(d.hi?'높을수록 좋아요':'낮을수록 좋아요')+'</b> · '+d.note;
 }
 document.querySelectorAll('.cmpb').forEach(function(b){b.addEventListener('click',function(){
  document.querySelectorAll('.cmpb').forEach(function(x){x.classList.remove('on');});b.classList.add('on');render(b.getAttribute('data-m'));});});
 render('매출성장');
})();
</script>

<script>/*fxkrw*//*fxkrw-v2*/
(function(){
  if(document.documentElement.getAttribute('data-fxk'))return;
  document.documentElement.setAttribute('data-fxk','1');
  var FALLBACK=1525, rate=FALLBACK, live=false;
  try{var _c=JSON.parse(sessionStorage.getItem('bblfx')||'0');if(_c&&_c.r&&(Date.now()-_c.t)<43200000){rate=_c.r;live=true;}}catch(e){}
  function f(x){return x>=100?Math.round(x).toLocaleString('ko-KR'):(Math.round(x*10)/10).toLocaleString('ko-KR');}
  function fmt(won){
    if(won>=1e12)return f(won/1e12)+'조원';
    if(won>=1e8)return f(won/1e8)+'억원';
    if(won>=1e4)return f(won/1e4)+'만원';
    return Math.round(won).toLocaleString('ko-KR')+'원';
  }
  var MU={'십억':1e9,'백만':1e6,'조':1e12,'억':1e8,'만':1e4,'bn':1e9,'mn':1e6,'B':1e9,'M':1e6,'T':1e12};
  var RE=/\$([0-9][0-9,]*(?:\.[0-9]+)?)(십억|백만|조|억|만|bn|mn|B|M|T)?/;
  function mag(str,suf){var n=parseFloat(str.replace(/,/g,''));return n*(suf&&MU[suf]?MU[suf]:1);}
  function wrap(){
    var sk={SCRIPT:1,STYLE:1,NOSCRIPT:1,TEXTAREA:1};
    var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:function(node){
      if(!node.nodeValue||node.nodeValue.indexOf('$')<0)return 2;
      var p=node.parentNode;
      while(p&&p!==document.body){
        if(sk[p.nodeName])return 2;
        var c=p.className?(''+p.className):'';
        if(c.indexOf('fxk')>=0||c.indexOf('fxbadge')>=0)return 2;
        p=p.parentNode;
      }
      return RE.test(node.nodeValue)?1:2;
    }});
    var nodes=[],n;while(n=w.nextNode())nodes.push(n);
    var G=new RegExp(RE.source,'g');
    nodes.forEach(function(node){
      var txt=node.nodeValue, frag=document.createDocumentFragment(), last=0, m; G.lastIndex=0;
      while(m=G.exec(txt)){
        frag.appendChild(document.createTextNode(txt.slice(last,m.index+m[0].length)));
        var usd=mag(m[1],m[2]);
        var sp=document.createElement('span'); sp.className='fxk'; sp.setAttribute('data-usd',usd);
        sp.textContent='(약 '+fmt(usd*rate)+')';
        frag.appendChild(sp);
        last=m.index+m[0].length;
      }
      frag.appendChild(document.createTextNode(txt.slice(last)));
      node.parentNode.replaceChild(frag,node);
    });
  }
  function apply(){
    var els=document.querySelectorAll('.fxk[data-usd]');
    for(var i=0;i<els.length;i++){var u=parseFloat(els[i].getAttribute('data-usd'));els[i].textContent='(약 '+fmt(u*rate)+')';}
    var b=document.getElementById('fxbadge');
    if(b){b.querySelector('.rt').textContent='$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원';
          b.querySelector('.lb').textContent=live?'실시간':'기준';}
  }
  function badge(){
    var d=document.createElement('div'); d.id='fxbadge'; d.className='fxbadge';
    d.innerHTML='<span class="dot"></span><span class="rt">$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원</span><span class="lb">기준</span>';
    document.body.appendChild(d);
  }
  function start(){
    wrap(); badge();
    try{fetch('https://api.frankfurter.dev/v1/latest?from=USD&to=KRW')
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.rates&&j.rates.KRW){rate=j.rates.KRW;live=true;apply();try{sessionStorage.setItem('bblfx',JSON.stringify({r:rate,t:Date.now()}))}catch(e){}}})
      .catch(function(){});}catch(e){}
  }
  if(document.readyState!=='loading')start();else document.addEventListener('DOMContentLoaded',start);
})();
</script>
