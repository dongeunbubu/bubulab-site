<!-- [도구_전세매매월세_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.fmtEok=function(n){var neg=n<0;n=Math.abs(Math.round(n));var eok=Math.floor(n/100000000),man=Math.round((n%100000000)/10000);var s='';if(eok>0)s+=eok+'억';if(man>0)s+=(eok>0?' ':'')+man.toLocaleString('ko-KR')+'만';if(!s)s='0';return (neg?'-':'')+s+'원';};
window.countWon=function(el,to,dur){to=+to;dur=dur||1000;var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=Math.round(to*e).toLocaleString('ko-KR')+'원';if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
function num(id){return Math.max(0,+($(id).value.replace(/[^0-9]/g,''))||0);}
function rate(id){return Math.max(0,+($(id).value.replace(/[^0-9.]/g,''))||0);}
var R={yrs:4,r:4,g:2};
var COL={w:'var(--gold)',j:'var(--lav)',m:'var(--rose)'};
var HEX={w:'#C9A84C',j:'#9C6BA8',m:'#B85060'};
var NAME={w:'월세',j:'전세',m:'매매'};

// 누적 총비용을 거주연수 t에서 계산 (낮을수록 유리)
function costsAt(t){
 var rr=R.r/100, g=R.g/100;
 var oppT=Math.pow(1+rr,t)-1;
 // 월세
 var Dw=num('wDep'),M=num('wRent');
 var w=Dw*oppT + M*12*t;
 // 전세
 var Dj=num('jDep'),Lj=Math.min(num('jLoan'),num('jDep')),ij=rate('jRate')/100;
 var Ej=Math.max(0,Dj-Lj);
 var j=Ej*oppT + Lj*ij*t;
 // 매매
 var P=num('mPrice'),Lb=Math.min(num('mLoan'),num('mPrice')),ib=rate('mRate')/100;
 var Eb=Math.max(0,P-Lb);
 var acq=P*(0.011+0.004);
 var Psell=P*Math.pow(1+g,t);
 var sellFee=Psell*0.004;
 var gain=P*(Math.pow(1+g,t)-1);
 var hold=P*0.001*t;
 var m=acq + Eb*oppT + Lb*ib*t + hold + sellFee - gain;
 return {w:w,j:j,m:m};
}
// 매매 상세 분해 (배지/카드용)
function parts(t){
 var rr=R.r/100, g=R.g/100, oppT=Math.pow(1+rr,t)-1;
 var Dw=num('wDep'),M=num('wRent');
 var Dj=num('jDep'),Lj=Math.min(num('jLoan'),num('jDep')),ij=rate('jRate')/100,Ej=Math.max(0,Dj-Lj);
 var P=num('mPrice'),Lb=Math.min(num('mLoan'),num('mPrice')),ib=rate('mRate')/100,Eb=Math.max(0,P-Lb);
 return {
  w:[['보증금 기회비용',Dw*oppT,0],['월세 총액 ('+t+'년)',M*12*t,0]],
  j:[['자기자본 기회비용',Ej*oppT,0],['전세대출 이자',Lj*ij*t,0]],
  m:[['취득세·중개보수',P*(0.011+0.004),0],['자기자본 기회비용',Eb*oppT,0],['주담대 이자',Lb*ib*t,0],['재산세 등 보유',P*0.001*t,0],['매도 중개보수',P*Math.pow(1+g,t)*0.004,0],['집값 상승분',-(P*(Math.pow(1+g,t)-1)),1]]
 };
}

function renderBars(c,animate){
 var box=$('optbars');box.innerHTML='';
 var keys=['w','j','m'];
 var winner=keys.reduce(function(a,b){return c[b]<c[a]?b:a;});
 var maxAbs=Math.max(Math.abs(c.w),Math.abs(c.j),Math.abs(c.m),1);
 keys.forEach(function(k){
   var v=c[k];var win=(k===winner);
   var row=document.createElement('div');row.className='optrow'+(win?' win':'');
   var pincol=HEX[k];
   var ovTxt=(v<0?'+'+window.fmtWon(Math.abs(v)):window.fmtWon(v))+'원';
   row.innerHTML='<div class="ol"><span class="pin" style="background:'+pincol+'"></span>'+(win?'👑 ':'')+NAME[k]+'</div>'+
     '<div class="optbar"><i></i></div>'+
     '<div class="ov" style="color:'+(v<0?'var(--sage)':'var(--ink)')+'">'+ovTxt+'</div>';
   box.appendChild(row);
   var bar=row.querySelector('.optbar i');
   var wpct=Math.max(2,Math.abs(v)/maxAbs*100);
   bar.style.background=(v<0?'var(--sage)':pincol);
   (function(b,p){if(animate){requestAnimationFrame(function(){b.style.width=p+'%';});}else{b.style.width=p+'%';}})(bar,wpct);
 });
}

function renderBreakdown(t){
 var pp=parts(t);var c=costsAt(t);var box=$('bd');box.innerHTML='';
 var keys=['w','j','m'];
 keys.forEach(function(k){
   var lines=pp[k].map(function(x){return '<div class="ln'+(x[2]?' minus':'')+'"><span class="k">'+x[0]+'</span><span class="v">'+(x[2]?'-':'')+window.fmtWon(Math.abs(x[1]))+'원</span></div>';}).join('');
   var card=document.createElement('div');card.className='bdc t-'+k;
   card.innerHTML='<h5><span class="pin" style="width:11px;height:11px;border-radius:4px;background:'+HEX[k]+';display:inline-block"></span>'+NAME[k]+' · '+t+'년 총비용</h5>'+lines+
     '<div class="tot"><span class="k">합계</span><span class="v" style="color:'+(c[k]<0?'var(--sage)':'var(--rose)')+'">'+(c[k]<0?'+':'')+window.fmtWon(Math.abs(c[k]))+'원</span></div>';
   box.appendChild(card);
 });
}

// 크로스오버 곡선
function renderChart(animate){
 var N=R.yrs;var grid=$('costGrid'),paths=$('costPaths'),dots=$('costDots'),axis=$('costAxis');
 grid.innerHTML='';paths.innerHTML='';dots.innerHTML='';axis.innerHTML='';
 var X0=52,X1=694,Y0=20,Y1=274;
 var series={w:[],j:[],m:[]};var lo=0,hi=1;
 for(var t=0;t<=N;t++){var c=costsAt(t);series.w.push(c.w);series.j.push(c.j);series.m.push(c.m);
   lo=Math.min(lo,c.w,c.j,c.m);hi=Math.max(hi,c.w,c.j,c.m);}
 var span=(hi-lo)||1;hi+=span*0.06;lo-=span*0.04;span=hi-lo;
 function px(t){return X0+(N<=0?0:t/N)*(X1-X0);}
 function py(v){return Y1-((v-lo)/span)*(Y1-Y0);}
 // grid + y labels (0,중간,최대)
 var ylabs=[hi,(hi+lo)/2,lo,0];var seen={};
 [hi,lo,(hi+lo)/2].concat(lo<0&&hi>0?[0]:[]).forEach(function(v){
   var key=Math.round(v/1000);if(seen[key])return;seen[key]=1;
   var y=py(v);
   grid.innerHTML+='<line x1="'+X0+'" y1="'+y.toFixed(1)+'" x2="'+X1+'" y2="'+y.toFixed(1)+'" stroke="'+(Math.abs(v)<1?'#D9C7C1':'#EEE0DB')+'" stroke-width="1" stroke-dasharray="'+(Math.abs(v)<1?'1 0':'2 4')+'"/>';
   axis.innerHTML+='<text x="'+(X0-8)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="#8A7B72" font-weight="700">'+(Math.abs(v)<1?'0':window.fmtEok(v))+'</text>';
 });
 // x labels
 var step=N<=8?1:(N<=16?2:5);
 for(var xt=0;xt<=N;xt+=step){axis.innerHTML+='<text x="'+px(xt).toFixed(1)+'" y="'+(Y1+20)+'" text-anchor="middle" font-size="11" fill="#8A7B72" font-weight="700">'+xt+'년</text>';}
 if((N%step)!==0){axis.innerHTML+='<text x="'+px(N).toFixed(1)+'" y="'+(Y1+20)+'" text-anchor="middle" font-size="11" fill="#8A7B72" font-weight="700">'+N+'년</text>';}
 // paths
 var keys=['w','j','m'];
 keys.forEach(function(k){
   var dd=series[k].map(function(v,i){return (i?'L':'M')+px(i).toFixed(1)+' '+py(v).toFixed(1);}).join(' ');
   var p=document.createElementNS('http://www.w3.org/2000/svg','path');
   p.setAttribute('d',dd);p.setAttribute('stroke',HEX[k]);p.setAttribute('opacity','.95');
   paths.appendChild(p);
   var len=p.getTotalLength?p.getTotalLength():1200;
   if(animate){p.style.strokeDasharray=len;p.style.strokeDashoffset=len;requestAnimationFrame(function(){p.style.strokeDashoffset=0;});}
   else{p.style.strokeDasharray='none';p.style.strokeDashoffset=0;}
   // end dot + label
   var ex=px(N),ey=py(series[k][N]);
   dots.innerHTML+='<circle cx="'+ex.toFixed(1)+'" cy="'+ey.toFixed(1)+'" r="4" fill="'+HEX[k]+'"/>'+
     '<text x="'+(ex-8).toFixed(1)+'" y="'+(ey-8).toFixed(1)+'" text-anchor="end" font-size="11.5" font-weight="800" fill="'+HEX[k]+'">'+NAME[k]+'</text>';
 });
 // 크로스오버: 매매가 전세보다 싸지는 첫 해
 var cross=-1;
 for(var tt=1;tt<=N;tt++){var a=costsAt(tt);if(a.m<=a.j){cross=tt;break;}}
 var cl=$('crossLab');var cN=costsAt(N);
 var winN=keys.reduce(function(a,b){return cN[b]<cN[a]?b:a;});
 if(cross>0&&cross<=N){
   cl.innerHTML='이 조건에선 <b>'+cross+'년차부터 매매가 전세보다 누적비용이 적어져요.</b> '+R.yrs+'년 살 계획이라면 '+(R.yrs>=cross?'매매 쪽이 유리한 구간':'아직 전세가 유리한 구간')+'에 있어요.';
 }else{
   cl.innerHTML='이 조건(집값 상승률 '+(R.g>=0?'+':'')+R.g.toFixed(1)+'%)에선 <b>'+R.yrs+'년 안엔 매매가 전세보다 싸지지 않아요.</b> 집값이 더 오른다고 보면 슬라이더를 올려 언제 역전되는지 확인해 보세요.';
 }
 $('chSpan').textContent='0~'+N+'년';
}

function renderReco(c){
 var keys=['w','j','m'];
 var sorted=keys.slice().sort(function(a,b){return c[a]-c[b];});
 var win=sorted[0],second=sorted[1];
 var gap=c[second]-c[win];
 var emoji={w:'🔑',j:'🏠',m:'🏡'};
 $('recoCrown').textContent=emoji[win];
 $('recoK').textContent=R.yrs+'년 거주 기준 · 총비용이 가장 적은 선택';
 $('recoG').innerHTML='<span style="color:'+COL[win]+'">'+NAME[win]+'</span>가(이) 가장 적게 들어요';
 var winV=c[win];
 var p='지금 조건으로 '+R.yrs+'년을 살면 '+NAME[win]+'의 총 주거비용이 '+(winV<0?'<b>오히려 '+window.fmtEok(Math.abs(winV))+' 이득</b>':'약 <b>'+window.fmtEok(winV)+'</b>')+'이에요. 2위 '+NAME[second]+'보다 <b>'+window.fmtEok(gap)+'</b>만큼 유리해요. 단, 집값 상승률을 바꾸면 순위가 쉽게 뒤집히니 여러 시나리오로 꼭 비교해 보세요.';
 $('recoP').innerHTML=p;
}

function compute(animate){
 var c=costsAt(R.yrs);
 renderReco(c);
 renderBars(c,animate);
 renderChart(animate);
 renderBreakdown(R.yrs);
}

// ── 이벤트 배선 ──
// 슬라이더 (거주기간/수익률/상승률)
$('yrsR').addEventListener('input',function(){R.yrs=+this.value;$('yrsV').textContent=R.yrs;compute(false);});
$('rR').addEventListener('input',function(){R.r=+this.value;$('rV').textContent=R.r.toFixed(1);syncChips('rChips',R.r);compute(false);});
$('gR').addEventListener('input',function(){R.g=+this.value;$('gV').textContent=(R.g>=0?'+':'')+R.g.toFixed(1);syncChips('gChips',R.g);compute(false);});
['yrsR','rR','gR'].forEach(function(id){$(id).addEventListener('change',function(){compute(true);});});
function syncChips(box,val){document.querySelectorAll('#'+box+' .chip').forEach(function(ch){ch.classList.toggle('on',+ch.dataset.v===val);});}
document.querySelectorAll('#rChips .chip').forEach(function(ch){ch.addEventListener('click',function(){R.r=+ch.dataset.v;$('rR').value=R.r;$('rV').textContent=R.r.toFixed(1);syncChips('rChips',R.r);compute(true);});});
document.querySelectorAll('#gChips .chip').forEach(function(ch){ch.addEventListener('click',function(){R.g=+ch.dataset.v;$('gR').value=R.g;$('gV').textContent=(R.g>=0?'+':'')+R.g.toFixed(1);syncChips('gChips',R.g);compute(true);});});
// 금액 입력 (콤마 자동)
['wDep','wRent','jDep','jLoan','mPrice','mLoan'].forEach(function(id){
  var f=$(id);
  f.addEventListener('input',function(){var v=Math.max(0,+(f.value.replace(/[^0-9]/g,''))||0);f.value=v?v.toLocaleString('ko-KR'):'';compute(false);});
  f.addEventListener('blur',function(){compute(true);});
});
// 금리 입력 (소수 허용)
['jRate','mRate'].forEach(function(id){
  var f=$(id);
  f.addEventListener('input',function(){compute(false);});
  f.addEventListener('blur',function(){var v=rate(id);f.value=v.toFixed(1);compute(true);});
});
compute(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
