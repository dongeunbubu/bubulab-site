<!-- [도구_가드레일동적인출Pro_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>/*calcengine*/
(function(){
"use strict";
var $=function(id){return document.getElementById(id);};

/* ---------- state ---------- */
var S={p0:5e8, retAge:60, life:90, r:0.06, g:0.025, vol:0.13, band:0.20, rate:0.045};

/* ---------- format helpers ---------- */
function fmtEokMan(won){
 won=Math.round(won);
 if(won<=0) return "0원";
 var eok=Math.floor(won/1e8);
 var man=Math.round((won-eok*1e8)/1e4);
 if(eok>0){ return eok+"억"+(man>0?(" "+man.toLocaleString()+"만"):""); }
 return man.toLocaleString()+"만원";
}
function fmtMonMan(wonYear){
 var m=wonYear/12/1e4; m=Math.round(m*10)/10;
 return m.toLocaleString()+"만원";
}
function fmtManDelta(wonYear){ /* monthly delta in 만원 */
 var m=wonYear/12/1e4; m=Math.round(m*10)/10; return m.toLocaleString()+"만원";
}
function fmtAge(a){ return (Math.round(a*10)/10).toLocaleString()+"세"; }

/* ---------- reproducible market path (mean=r exact, std=vol exact) ---------- */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function genPath(N,r,vol){
 var rnd=mulberry32(1234567); var z=[];
 for(var i=0;i<N;i++){ var u1=Math.max(rnd(),1e-12), u2=rnd();
  z.push(Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2)); }
 var mean=0; for(i=0;i<N;i++) mean+=z[i]; mean/=N;
 var sd=0; for(i=0;i<N;i++) sd+=(z[i]-mean)*(z[i]-mean); sd=Math.sqrt(sd/(N>1?N-1:1))||1;
 var ret=[]; for(i=0;i<N;i++){ var rr=r+vol*((z[i]-mean)/sd); if(rr<-0.85) rr=-0.85; ret.push(rr); }
 return ret;
}

/* ---------- simulations on a shared path ---------- */
/* 4%rule: inflation-linked fixed real */
function simReal(p0,N,g,rate,ret){
 var W1=rate*p0, bal=p0, bals=[p0], wdNom=[], wdReal=[], deplAge=null;
 for(var t=1;t<=N;t++){ var w=W1*Math.pow(1+g,t-1);
  if(bal<w){ if(deplAge===null){ var frac=(w>0?bal/w:0); deplAge=S.retAge+(t-1)+frac; } w=bal; }
  wdNom.push(w); wdReal.push(w/Math.pow(1+g,t-1));
  bal=(bal-w)*(1+ret[t-1]); if(bal<0)bal=0; bals.push(bal); }
 return {bals:bals, wdNom:wdNom, wdReal:wdReal, deplAge:deplAge, endBal:bal};
}
/* constant percent of remaining balance: never depletes */
function simPct(p0,N,g,rate,ret){
 var bal=p0, bals=[p0], wdNom=[], wdReal=[];
 for(var t=1;t<=N;t++){ var w=rate*bal; if(w>bal)w=bal;
  wdNom.push(w); wdReal.push(w/Math.pow(1+g,t-1));
  bal=(bal-w)*(1+ret[t-1]); if(bal<0)bal=0; bals.push(bal); }
 return {bals:bals, wdNom:wdNom, wdReal:wdReal, deplAge:null, endBal:bal};
}
/* Guyton-Klinger guardrails: inflation-bump then cut/raise 10% if rate drifts beyond band */
function simGuard(p0,N,g,rate,band,ret){
 var bal=p0, Wn=rate*p0, bals=[p0], wdNom=[], wdReal=[], deplAge=null;
 var cuts=0, raises=0, cutYears=[], raiseYears=[]; var initRate=rate;
 for(var t=1;t<=N;t++){
  if(t>1){ Wn=Wn*(1+g);
   var cr = bal>0 ? Wn/bal : 1e9;
   if(cr > initRate*(1+band)){ Wn=Wn*0.9; cuts++; cutYears.push(S.retAge+(t-1)); }
   else if(cr < initRate*(1-band)){ Wn=Wn*1.1; raises++; raiseYears.push(S.retAge+(t-1)); }
  }
  var w=Wn;
  if(bal<w){ if(deplAge===null){ var frac=(w>0?bal/w:0); deplAge=S.retAge+(t-1)+frac; } w=bal; }
  wdNom.push(w); wdReal.push(w/Math.pow(1+g,t-1));
  bal=(bal-w)*(1+ret[t-1]); if(bal<0)bal=0; bals.push(bal);
 }
 return {bals:bals, wdNom:wdNom, wdReal:wdReal, deplAge:deplAge, endBal:bal, cuts:cuts, raises:raises, cutYears:cutYears, raiseYears:raiseYears};
}

/* ---------- balance chart ---------- */
function drawBal(rA,rG,rB){
 var W=720,H=320,padL=58,padR=18,padT=18,padB=40;
 var svg=$("balChart"); if(!svg) return;
 var N=S.life-S.retAge; if(N<1)N=1;
 var ymax=S.p0;
 [rA,rG,rB].forEach(function(R){ R.bals.forEach(function(b){ if(b>ymax)ymax=b; }); });
 ymax=ymax*1.06; if(ymax<=0)ymax=1;
 function X(age){ return padL+(age-S.retAge)/(N||1)*(W-padL-padR); }
 function Y(v){ return padT+(1-v/ymax)*(H-padT-padB); }
 var g="", steps=4;
 for(var s=0;s<=steps;s++){ var val=ymax*s/steps, yy=Y(val);
  g+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="'+(s===0?"#C9B7B1":"#EFE3DF")+'" stroke-width="'+(s===0?1.3:1)+'"/>';
  g+='<text x="'+(padL-8)+'" y="'+(yy+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="#8A7B72" font-weight="700">'+fmtEokMan(val)+'</text>'; }
 var xticks=[S.retAge, Math.round((S.retAge+S.life)/2), S.life];
 xticks.forEach(function(a){ g+='<text x="'+X(a).toFixed(1)+'" y="'+(H-padB+22)+'" text-anchor="middle" font-size="11" fill="#8A7B72" font-weight="700">'+a+'세</text>'; });
 svg.innerHTML=g;
 var ns="http://www.w3.org/2000/svg";
 var pg=document.createElementNS(ns,"g"); pg.setAttribute("fill","none");
 var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
 function addPath(R,color,wd,dash){ var d="", started=false;
  for(var i=0;i<R.bals.length;i++){ var px=X(S.retAge+i), py=Y(R.bals[i]); d+=(started?"L":"M")+px.toFixed(1)+","+py.toFixed(1)+" "; started=true; }
  var p=document.createElementNS(ns,"path"); p.setAttribute("d",d.trim()); p.setAttribute("stroke",color); p.setAttribute("stroke-width",wd);
  p.setAttribute("stroke-linecap","round"); p.setAttribute("stroke-linejoin","round"); if(dash)p.setAttribute("stroke-dasharray",dash); pg.appendChild(p);
  if(!dash){ var L=p.getTotalLength(); p.style.strokeDasharray=L; p.style.strokeDashoffset=reduce?0:L;
   if(!reduce){ requestAnimationFrame(function(){ requestAnimationFrame(function(){ p.style.strokeDashoffset=0; }); }); } } return p; }
 addPath(rB,"#9C6BA8",2.4,"5 5");
 addPath(rA,"#B85060",2.6,null);
 addPath(rG,"#C9A84C",3.2,null);
 svg.appendChild(pg);
 function dot(R){ if(R.deplAge!==null && R.deplAge<=S.life){ var c=document.createElementNS(ns,"circle");
  c.setAttribute("cx",X(R.deplAge).toFixed(1)); c.setAttribute("cy",Y(0).toFixed(1)); c.setAttribute("r","5.5");
  c.setAttribute("fill","#D8584E"); c.setAttribute("stroke","#fff"); c.setAttribute("stroke-width","2"); svg.appendChild(c); } }
 dot(rA); dot(rG);
 svg.setAttribute("aria-label","은퇴 "+S.retAge+"세부터 "+S.life+"세까지 세 인출방식의 잔액 곡선. 가드레일(금색) 끝 잔액 약 "+fmtEokMan(rG.endBal)+", 4%룰(분홍) "+(rA.deplAge!==null&&rA.deplAge<=S.life?("약 "+fmtAge(rA.deplAge)+"에 바닥"):("약 "+fmtEokMan(rA.endBal)+" 남음"))+", 정률(보라)은 평생 마르지 않아요. 빨간 점=자금 바닥 시점.");
}

/* ---------- spending chart (real monthly) ---------- */
function drawSp(rG,rB,rA){
 var W=720,H=300,padL=58,padR=18,padT=18,padB=38;
 var svg=$("spChart"); if(!svg) return;
 var N=S.life-S.retAge; if(N<1)N=1;
 var ymax=0; [rG,rB,rA].forEach(function(R){ R.wdReal.forEach(function(v){ if(v>ymax)ymax=v; }); });
 ymax=ymax*1.12; if(ymax<=0)ymax=1;
 function X(i){ return padL+i/((N-1)||1)*(W-padL-padR); }
 function Y(v){ return padT+(1-v/ymax)*(H-padT-padB); }
 var g="", steps=4;
 for(var s=0;s<=steps;s++){ var val=ymax*s/steps, yy=Y(val);
  g+='<line x1="'+padL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+yy.toFixed(1)+'" stroke="'+(s===0?"#C9B7B1":"#EFE3DF")+'" stroke-width="'+(s===0?1.3:1)+'"/>';
  g+='<text x="'+(padL-8)+'" y="'+(yy+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="#8A7B72" font-weight="700">'+fmtMonMan(val)+'</text>'; }
 var xt=[0, Math.floor((N-1)/2), N-1];
 xt.forEach(function(i){ g+='<text x="'+X(i).toFixed(1)+'" y="'+(H-padB+20)+'" text-anchor="middle" font-size="11" fill="#8A7B72" font-weight="700">'+(S.retAge+i)+'세</text>'; });
 svg.innerHTML=g;
 var ns="http://www.w3.org/2000/svg";
 function line(R,color,wd,dash){ var d="", started=false;
  for(var i=0;i<R.wdReal.length;i++){ var px=X(i), py=Y(R.wdReal[i]); d+=(started?"L":"M")+px.toFixed(1)+","+py.toFixed(1)+" "; started=true; }
  var p=document.createElementNS(ns,"path"); p.setAttribute("d",d.trim()); p.setAttribute("fill","none"); p.setAttribute("stroke",color); p.setAttribute("stroke-width",wd);
  p.setAttribute("stroke-linecap","round"); p.setAttribute("stroke-linejoin","round"); if(dash)p.setAttribute("stroke-dasharray",dash); svg.appendChild(p); }
 line(rA,"#C9B7B1",2,"5 5");
 line(rB,"#9C6BA8",2.2,null);
 line(rG,"#C9A84C",3,null);
 function mark(years,color){ years.forEach(function(yr){ var i=yr-S.retAge; if(i<0||i>=rG.wdReal.length)return;
  var c=document.createElementNS(ns,"circle"); c.setAttribute("cx",X(i).toFixed(1)); c.setAttribute("cy",Y(rG.wdReal[i]).toFixed(1)); c.setAttribute("r","4.5");
  c.setAttribute("fill",color); c.setAttribute("stroke","#fff"); c.setAttribute("stroke-width","1.8"); svg.appendChild(c); }); }
 mark(rG.cutYears,"#D8584E"); mark(rG.raiseYears,"#5E8C7F");
 svg.setAttribute("aria-label","가드레일과 정률의 월 인출액 추이(오늘 물가 기준). 가드레일은 ✂️허리띠 "+rG.cuts+"회·🎉여유 "+rG.raises+"회 조절했어요. 4%룰은 회색 점선(평탄 기준선).");
 /* event strip */
 var evs=[]; rG.cutYears.forEach(function(y){evs.push({y:y,t:"✂️ "+y+"세 허리띠",c:"up"});}); rG.raiseYears.forEach(function(y){evs.push({y:y,t:"🎉 "+y+"세 여유",c:"sage"});});
 evs.sort(function(a,b){return a.y-b.y;});
 var es=$("evStrip");
 if(es){ if(!evs.length){ es.innerHTML='<span class="evchip" style="background:#F3EAE6;color:#8A7B72">이 시장에선 조절 없이 평탄하게 지나갔어요</span>'; }
  else{ es.innerHTML=evs.slice(0,8).map(function(e){ var col=e.c==="up"?"#D8584E":"#5E8C7F"; return '<span class="evchip" style="border:1px solid '+col+'33;color:'+col+';background:'+col+'12;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;margin:0 6px 6px 0;display:inline-block">'+e.t+'</span>'; }).join("")+(evs.length>8?'<span class="evchip" style="color:#8A7B72;font-size:12px;font-weight:700">+'+(evs.length-8)+'회 더</span>':''); } }
 var sn=$("spNote");
 if(sn){ if(rG.cuts+rG.raises===0){ sn.innerHTML="이 시장 경로에서는 가드레일이 한 번도 발동하지 않았어요 — 첫 인출률이 밴드 안에서 평탄하게 유지됐다는 뜻이에요. 변동성(⑥)을 키우거나 인출률(⑧)을 높이면 조절이 나타나요."; }
  else{ sn.innerHTML="가드레일이 <b>✂️ 허리띠 "+rG.cuts+"회</b>, <b>🎉 여유 "+rG.raises+"회</b> 발동했어요. 자산이 많이 줄어든 해엔 덜 쓰며 바닥을 늦추고, 많이 불어난 해엔 조금 더 썼어요. 그래서 정률(보라)보다 받는 돈이 덜 출렁여요."; } }
}

/* ---------- main compute ---------- */
function compute(){
 var N=S.life-S.retAge; if(N<1)N=1;
 var ret=genPath(N,S.r,S.vol);
 var rA=simReal(S.p0,N,S.g,S.rate,ret);
 var rB=simPct(S.p0,N,S.g,S.rate,ret);
 var rG=simGuard(S.p0,N,S.g,S.rate,S.band,ret);

 function bigText(R){ return (R.deplAge!==null&&R.deplAge<=S.life)? fmtAge(R.deplAge)+" 소진" : S.life+"세까지 ✓"; }
 function setBadge(R,el,cls){ var e=$(el); if(!e)return;
  if(R.deplAge===null||R.deplAge>S.life){ e.className="sbadge "+(cls||"ok"); e.textContent="✓ "+S.life+"세까지 버텨요"; }
  else{ e.className="sbadge no"; e.textContent="⚠ "+fmtAge(R.deplAge)+"에 바닥"; } }

 /* card A: 4%rule */
 $("aBig").textContent=bigText(rA); setBadge(rA,"aBadge","ok");
 $("aWd1").textContent=fmtMonMan(rA.wdNom[0]);
 $("aEnd").textContent=fmtEokMan(rA.endBal);
 /* card G: guardrail */
 $("gBig").textContent=bigText(rG); setBadge(rG,"gBadge","gold");
 $("gWd1").textContent=fmtMonMan(rG.wdNom[0]);
 $("gAdj").textContent="✂️ "+rG.cuts+"회 · 🎉 "+rG.raises+"회";
 /* card B: constant percent */
 $("bBig").textContent="평생 안 바닥 ✓"; var bb=$("bBadge"); if(bb){ bb.className="sbadge ok"; bb.textContent="✓ 평생 마르지 않아요"; }
 $("bWd1").textContent=fmtMonMan(rB.wdNom[0]);
 var bMin=Infinity,bMax=0; rB.wdReal.forEach(function(v){ if(v<bMin)bMin=v; if(v>bMax)bMax=v; });
 $("bRange").textContent=fmtMonMan(bMin*12)+" ~ "+fmtMonMan(bMax*12);

 /* recoband verdict */
 var rb=$("recoBand"), aSurv=(rA.deplAge===null||rA.deplAge>S.life), gSurv=(rG.deplAge===null||rG.deplAge>S.life);
 $("recoCrown").textContent="🚦"; $("recoK").textContent="이 시장·이 인출률이면";
 if(aSurv && gSurv){ rb.className="recoband good";
  $("recoG").innerHTML="가드레일·4%룰 모두 <b>"+S.life+"세까지</b> 버텼어요";
  $("recoP").innerHTML="여유가 있네요. 가드레일은 같은 출발에서 <b>나쁜 해에 덜 쓰는</b> 안전판을 더해, 더 험한 시장이 와도 견딜 힘을 키워 둬요. 변동성(⑥)을 키워 스트레스 테스트도 해 보세요."; }
 else if(gSurv && !aSurv){ var ext=Math.round((S.life-rA.deplAge)*10)/10; rb.className="recoband good";
  $("recoG").innerHTML="4%룰은 <b>"+fmtAge(rA.deplAge)+"</b>에 바닥나지만, 가드레일은 <b>"+S.life+"세까지</b> 버텼어요";
  $("recoP").innerHTML="나쁜 해에 <b>"+rG.cuts+"번</b> 허리띠를 졸라맨 덕분에 약 <b>"+ext+"년</b>을 더 벌었어요. 대신 가장 빠듯했던 해엔 생활비가 줄었어요(아래 '맞바꿈' 참고)."; }
 else if(!gSurv && !aSurv){ var d=Math.round((rG.deplAge-rA.deplAge)*10)/10; rb.className="recoband";
  $("recoG").innerHTML="이 인출률은 좀 높아요 — 가드레일도 <b>"+fmtAge(rG.deplAge)+"</b>에 바닥";
  $("recoP").innerHTML="그래도 4%룰("+fmtAge(rA.deplAge)+")보다 약 <b>"+(d>0?d:0)+"년</b> 더 버텼어요. 첫 인출률(⑧)을 낮추거나 밴드(⑦)를 좁혀 더 일찍 조절하면 바닥을 피할 수 있어요."; }
 else { rb.className="recoband good";
  $("recoG").innerHTML="가드레일이 <b>"+S.life+"세까지</b> 버텼어요";
  $("recoP").innerHTML="나쁜 해에 덜 쓰는 안전판 덕분이에요. 대신 그런 해엔 생활비가 줄어드니, 아래 '맞바꿈'과 '현금 버킷'을 함께 보세요."; }

 drawBal(rA,rG,rB);
 drawSp(rG,rB,rA);

 /* tradeoff cards */
 var gMin=Infinity,gMax=0; rG.wdReal.forEach(function(v){ if(v<gMin)gMin=v; if(v>gMax)gMax=v; });
 var dip=rG.wdReal[0]-gMin;
 $("tDip").textContent = dip>1000 ? ("월 −"+fmtMonMan(dip*12)) : "거의 안 줄음";
 if(dip<=1000){ $("tDipP").textContent="이 시장에선 허리띠를 거의 안 졸라매도 됐어요 — 첫 해 생활비가 끝까지 비슷하게 유지됐어요."; }
 else { $("tDipP").innerHTML="허리띠를 졸라맨 해엔 첫 해보다 월 생활비가 <b>"+fmtMonMan(dip*12)+"</b>까지 줄었어요(오늘 물가 기준). 나쁜 시장을 견디기 위한 대가예요."; }
 /* tSurv: guardrail vs 4%rule survival */
 var aSurv2=(rA.deplAge===null||rA.deplAge>S.life), gSurv2=(rG.deplAge===null||rG.deplAge>S.life);
 if(aSurv2&&gSurv2){ $("tSurv").textContent="둘 다 평생 ✓"; $("tSurvP").textContent="이 시장에선 4%룰도 가드레일도 기대수명까지 버텼어요. 더 험한 시장(변동성↑)에서 차이가 드러나요."; }
 else if(gSurv2&&!aSurv2){ var ex=Math.round((S.life-rA.deplAge)*10)/10; $("tSurv").textContent="+"+ex+"년"; $("tSurvP").innerHTML="같은 시장에서 가드레일은 4%룰보다 약 <b>"+ex+"년</b> 더 버텼어요(나쁜 해에 덜 쓴 덕분)."; }
 else if(!gSurv2&&!aSurv2){ var ex2=Math.round((rG.deplAge-rA.deplAge)*10)/10; $("tSurv").textContent="+"+(ex2>0?ex2:0)+"년"; $("tSurvP").innerHTML="둘 다 바닥났지만, 가드레일이 4%룰보다 약 <b>"+(ex2>0?ex2:0)+"년</b> 더 버텼어요."; }
 else { $("tSurv").textContent="—"; $("tSurvP").textContent="비교할 수 없는 조합이에요."; }
 /* tSteady: range narrower than 정률 */
 var gRange=gMax-gMin, bRange=bMax-bMin; var nar=bRange-gRange;
 $("tSteady").textContent = nar>1000 ? ("월 "+fmtMonMan(nar*12)+" 좁음") : "비슷";
 if(nar>1000){ $("tSteadyP").innerHTML="받는 돈의 최고~최저 격차가 정률보다 월 <b>"+fmtMonMan(nar*12)+"</b> 좁았어요 — 생활이 더 예측 가능했다는 뜻이에요."; }
 else { $("tSteadyP").textContent="이 시장에선 가드레일과 정률의 출렁임이 비슷했어요. 변동성(⑥)을 키우면 정률이 더 크게 흔들려요."; }
 /* captions */
 var bc=$("balCap"); if(bc) bc.textContent=S.retAge+"세 은퇴 → "+S.life+"세";
}

/* ---------- inputs ---------- */
function parseP0(){ var v=parseFloat(($("p0").value||"").replace(/[^0-9.]/g,"")); if(isNaN(v)||v<=0)v=0.01; if(v>100)v=100; S.p0=v*1e8; }
function setSeg(id,val){ var seg=$(id); if(!seg)return; Array.prototype.forEach.call(seg.children,function(b){ b.classList.toggle("on", parseFloat(b.getAttribute("data-v"))===val); }); }
function syncFirstWd(){ $("firstWd").textContent="월 "+fmtMonMan(S.rate*S.p0); }

$("p0").addEventListener("input",function(){ parseP0(); Array.prototype.forEach.call($("chP0").children,function(b){ b.classList.remove("on"); }); syncFirstWd(); compute(); });
Array.prototype.forEach.call($("chP0").children,function(b){ b.addEventListener("click",function(){ $("p0").value=b.getAttribute("data-v"); parseP0(); Array.prototype.forEach.call($("chP0").children,function(x){x.classList.toggle("on",x===b);}); syncFirstWd(); compute(); }); });

Array.prototype.forEach.call($("segRet").children,function(b){ b.addEventListener("click",function(){ S.retAge=parseInt(b.getAttribute("data-v"),10); setSeg("segRet",S.retAge);
 if(S.life<=S.retAge+1){ S.life=S.retAge+10; $("life").value=S.life; $("lifeV").textContent=S.life+"세"; }
 $("nYears").textContent=(S.life-S.retAge)+"년"; compute(); }); });

$("life").addEventListener("input",function(){ S.life=parseInt(this.value,10); $("lifeV").textContent=S.life+"세"; $("nYears").textContent=(S.life-S.retAge)+"년"; compute(); });

Array.prototype.forEach.call($("segR").children,function(b){ b.addEventListener("click",function(){ S.r=parseFloat(b.getAttribute("data-v"))/100; setSeg("segR",S.r*100); compute(); }); });
Array.prototype.forEach.call($("segG").children,function(b){ b.addEventListener("click",function(){ S.g=parseFloat(b.getAttribute("data-v"))/100; setSeg("segG",S.g*100); compute(); }); });
Array.prototype.forEach.call($("segVol").children,function(b){ b.addEventListener("click",function(){ S.vol=parseFloat(b.getAttribute("data-v"))/100; setSeg("segVol",S.vol*100); compute(); }); });
Array.prototype.forEach.call($("segBand").children,function(b){ b.addEventListener("click",function(){ S.band=parseFloat(b.getAttribute("data-v"))/100; setSeg("segBand",S.band*100); compute(); }); });

$("rate").addEventListener("input",function(){ S.rate=parseFloat(this.value)/100; $("rateV").textContent=(S.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+"%"; Array.prototype.forEach.call($("chRate").children,function(b){ b.classList.toggle("on", Math.abs(parseFloat(b.getAttribute("data-v"))-S.rate*100)<0.01); }); syncFirstWd(); compute(); });
Array.prototype.forEach.call($("chRate").children,function(b){ b.addEventListener("click",function(){ S.rate=parseFloat(b.getAttribute("data-v"))/100; $("rate").value=(S.rate*100); $("rateV").textContent=(S.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+"%"; Array.prototype.forEach.call($("chRate").children,function(x){x.classList.toggle("on",x===b);}); syncFirstWd(); compute(); }); });

/* ---------- localStorage ---------- */
var LSKEY="bbGuardrailPro_v1";
function loadStore(){ try{var r=localStorage.getItem(LSKEY); return r?JSON.parse(r):[];}catch(e){return [];} }
function saveStore(a){ try{localStorage.setItem(LSKEY,JSON.stringify(a.slice(0,8)));}catch(e){} }
function applyState(it){
 S.p0=it.p0; S.retAge=it.retAge; S.life=it.life; S.r=it.r; S.g=it.g; S.vol=it.vol; S.band=it.band; S.rate=it.rate;
 $("p0").value=(it.p0/1e8); setSeg("segRet",it.retAge); $("life").value=it.life; $("lifeV").textContent=it.life+"세"; $("nYears").textContent=(it.life-it.retAge)+"년";
 setSeg("segR",it.r*100); setSeg("segG",it.g*100); setSeg("segVol",it.vol*100); setSeg("segBand",it.band*100);
 $("rate").value=(it.rate*100); $("rateV").textContent=(it.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+"%";
 Array.prototype.forEach.call($("chP0").children,function(x){x.classList.toggle("on",parseFloat(x.getAttribute("data-v"))===it.p0/1e8);});
 Array.prototype.forEach.call($("chRate").children,function(x){x.classList.toggle("on",Math.abs(parseFloat(x.getAttribute("data-v"))-it.rate*100)<0.01);});
 syncFirstWd();
}
function renderSaves(){
 var arr=loadStore(), box=$("saveList"); if(!box)return;
 if(!arr.length){ box.innerHTML='<div style="font-size:12.5px;color:var(--mut);font-weight:600">아직 저장한 시나리오가 없어요.</div>'; return; }
 box.innerHTML="";
 arr.forEach(function(it,idx){ var d=document.createElement("div"); d.className="saveitem";
  d.innerHTML='<span class="si-n">'+(it.name||"시나리오")+'</span><span class="si-m">'+it.retAge+'세 은퇴·'+(it.p0/1e8)+'억<br>인출 '+(it.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+'% / 밴드 ±'+(it.band*100)+'%</span><span class="si-x" data-i="'+idx+'">✕ 삭제</span>';
  d.addEventListener("click",function(e){ if(e.target.classList.contains("si-x"))return; applyState(it); compute(); var rs=$("result"); if(rs) window.scrollTo({top:rs.offsetTop-60,behavior:"smooth"}); });
  box.appendChild(d); });
 Array.prototype.forEach.call(box.querySelectorAll(".si-x"),function(x){ x.addEventListener("click",function(){ var a2=loadStore(); a2.splice(parseInt(this.getAttribute("data-i"),10),1); saveStore(a2); renderSaves(); }); });
}
var sb=$("saveBtn"); if(sb) sb.addEventListener("click",function(){ var arr=loadStore();
 var nm=($("saveName").value||"").trim()||((S.retAge)+"세·"+(S.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+"% / ±"+(S.band*100)+"%");
 arr.unshift({name:nm,p0:S.p0,retAge:S.retAge,life:S.life,r:S.r,g:S.g,vol:S.vol,band:S.band,rate:S.rate});
 saveStore(arr); $("saveName").value=""; renderSaves(); });

/* ---------- header scroll ---------- */
window.addEventListener("scroll",function(){ var h=$("hdr"); if(h) h.classList.toggle("scrolled",window.scrollY>10); },{passive:true});

/* ---------- init ---------- */
parseP0(); setSeg("segRet",S.retAge); setSeg("segR",S.r*100); setSeg("segG",S.g*100); setSeg("segVol",S.vol*100); setSeg("segBand",S.band*100);
$("lifeV").textContent=S.life+"세"; $("nYears").textContent=(S.life-S.retAge)+"년"; $("rateV").textContent=(S.rate*100).toFixed(2).replace(/0$/,"").replace(/\.$/,"")+"%";
syncFirstWd(); renderSaves(); compute();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274 \uc5f4\uae30');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*revealfix*/
(function(){var d=document;d.documentElement.classList.add('js');
var els=[].slice.call(d.querySelectorAll('.reveal,.scene,.stag'));if(!els.length)return;
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in');});},{threshold:.12});
els.forEach(function(e){io.observe(e);});
setTimeout(function(){els.forEach(function(e){var r=e.getBoundingClientRect();if(r.top<innerHeight*1.1&&r.bottom>-50)e.classList.add('in');});},1000);}
else els.forEach(function(e){e.classList.add('in');});})();
</script>
