<!-- [콘텐츠_부동산_전세사기위험체크_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
/* reveal */
(function(){
 var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
 document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
})();
/* (개선38) 죽은 크롬 제거: 허브 rehdr 주입으로 자체 header/readbar/toTop 미사용 — 진행바·맨위로는 pagedynjs가 생성 */
/* checker */
(function(){
 var TOTAL=116, CT={A:40,B:36,C:16,D:24};
 var arc=document.getElementById('gArc'), LEN=377;
 var gScore=document.getElementById('gScore'), gVerdict=document.getElementById('gVerdict');
 var gCount=document.getElementById('gCount'), gCrit=document.getElementById('gCrit'), verBox=document.getElementById('verBox');
 var actList=document.getElementById('actList');
 var cards=Array.prototype.slice.call(document.querySelectorAll('.qc'));

 function recompute(){
  var sum=0,n=0,crit=0,cat={A:0,B:0,C:0,D:0},acts=[];
  cards.forEach(function(b){
   if(b.getAttribute('aria-pressed')==='true'){
    var w=parseInt(b.dataset.w,10);
    sum+=w; n++; cat[b.dataset.cat]+=w;
    var isC=b.dataset.crit==='1'; if(isC) crit++;
    acts.push({crit:isC, fix:b.dataset.fix});
   }
  });
  var score=Math.round(sum/TOTAL*100);
  // gauge
  arc.style.strokeDashoffset=(LEN*(1-score/100)).toFixed(1);
  gScore.textContent=score;
  gCount.textContent=n; gCrit.textContent=crit;
  // verdict
  var color,vt,msg,cls;
  if(n===0){
   color='#8A7B72'; vt='아직 체크 안 함'; cls='';
   msg='내 상황에 해당하는 신호를 눌러 보세요. 체크할수록 점수가 오릅니다.';
  } else if(crit>=1 || score>=50){
   color='#D8584E'; vt='고위험'; cls='high';
   msg='<b>치명적 신호가 켜졌어요.</b> 계약을 서두르지 말고, 아래 조치를 먼저 확인한 뒤 공인중개사·법률 전문가와 상담하세요.';
  } else if(score>=25){
   color='#C9912E'; vt='주의'; cls='warn';
   msg='<b>점검할 부분이 남았어요.</b> 아래 ‘지금 할 일’을 하나씩 처리하면 위험을 크게 줄일 수 있어요.';
  } else {
   color='#5E8C7F'; vt='낮은 위험'; cls='low';
   msg='<b>비교적 양호하지만</b> 0점이라도 안전을 보장하진 않아요. 등기부·시세·보증가입은 계약 전 반드시 직접 확인하세요.';
  }
  arc.setAttribute('stroke',color);
  gVerdict.textContent=vt; gVerdict.style.color=color;
  verBox.className='verbox'+(cls?' '+cls:''); verBox.innerHTML=msg;
  // category bars
  ['A','B','C','D'].forEach(function(k){
   var pct=Math.round(cat[k]/CT[k]*100);
   document.getElementById('cat'+k).style.width=pct+'%';
   document.getElementById('cv'+k).textContent=pct+'%';
  });
  // actions
  if(acts.length===0){
   actList.innerHTML='<li class="ai-empty">위험 신호를 체크하면, 신호마다 ‘지금 해야 할 일’이 여기에 정리돼요.</li>';
  } else {
   acts.sort(function(a,b){return (b.crit?1:0)-(a.crit?1:0);});
   actList.innerHTML=acts.map(function(a){return '<li class="'+(a.crit?'crit':'')+'">'+a.fix+'</li>';}).join('');
  }
 }
 cards.forEach(function(b){
  b.addEventListener('click',function(){
   b.setAttribute('aria-pressed', b.getAttribute('aria-pressed')==='true'?'false':'true');
   recompute();
  });
 });
 document.getElementById('resetBtn').addEventListener('click',function(){
  cards.forEach(function(b){b.setAttribute('aria-pressed','false');});
  recompute();
  document.getElementById('check').scrollIntoView({behavior:'smooth',block:'start'});
 });
 recompute();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','메뉴 열기');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
