<!-- [구독레포트_주간시장_2026-06-02] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});

// reveal + count-up observer
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');var cs=e.target.querySelectorAll?e.target.querySelectorAll('.cf'):[];cs.forEach(runCF);if(e.target.classList&&e.target.classList.contains('cf'))runCF(e.target);if(e.target.id==='kospiChart')drawKospi();}});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});
d.querySelectorAll('.cf').forEach(function(el){io.observe(el);});
var kc=d.getElementById('kospiChart');if(kc)io.observe(kc);
}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});d.querySelectorAll('.cf').forEach(runCF);drawKospi();}

d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});

// count-up (int & decimal), keeps thousands separators
function runCF(el){if(el.dataset.done)return;el.dataset.done=1;var to=parseFloat(el.dataset.to),dec=parseInt(el.dataset.dec||'0'),t0=null,dur=1150;
function fmt(n){return n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(s);else el.textContent=fmt(to);}requestAnimationFrame(s);}

// KOSPI sparkline (real closes, ~1 month, ending at 8,788.38)
function drawKospi(){var line=d.getElementById('kline');if(!line||line.dataset.done)return;line.dataset.done=1;
var data=[6936.99,7384.56,7490.05,7498.00,7822.24,7643.15,7844.01,7981.41,7493.18,7516.04,7271.66,7208.95,7815.59,7847.71,8047.51,8228.70,8185.29,8476.15,8788.38];
var X0=60,X1=700,Y0=30,Y1=200,vMin=7000,vMax=8900,n=data.length;
var pts=data.map(function(v,i){var x=X0+(X1-X0)*i/(n-1);var y=Y1-(v-vMin)/(vMax-vMin)*(Y1-Y0);return [x,y];});
line.setAttribute('points',pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' '));
var area=d.getElementById('karea');var ad='M'+X0+','+Y1+' '+pts.map(function(p){return 'L'+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')+' L'+X1+','+Y1+' Z';area.setAttribute('d',ad);
var last=pts[n-1];var dot=d.getElementById('kdot');dot.setAttribute('cx',last[0]);dot.setAttribute('cy',last[1]);
var tag=d.getElementById('ktag');tag.setAttribute('x',last[0]-8);tag.setAttribute('y',last[1]-9);
var st=d.getElementById('kstart');st.setAttribute('y',pts[0][1]+16);
// draw animation
var len=line.getTotalLength?line.getTotalLength():1600;line.style.strokeDasharray=len;line.style.strokeDashoffset=len;area.style.opacity=0;dot.style.opacity=0;tag.style.opacity=0;
var reduce=matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches;
if(reduce){line.style.strokeDashoffset=0;area.style.opacity=.9;dot.style.opacity=1;tag.style.opacity=1;return;}
line.style.transition='stroke-dashoffset 1.6s cubic-bezier(.16,1,.3,1)';requestAnimationFrame(function(){line.style.strokeDashoffset=0;});
area.style.transition='opacity .9s ease .7s';dot.style.transition='opacity .4s ease 1.5s';tag.style.transition='opacity .4s ease 1.6s';
requestAnimationFrame(function(){area.style.opacity=.9;dot.style.opacity=1;tag.style.opacity=1;});}
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
