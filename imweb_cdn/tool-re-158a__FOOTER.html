<script>
/* ===== reveal on scroll ===== */
(function(){
 var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
 document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
 var hd=document.getElementById('hd');
 addEventListener('scroll',function(){hd.classList.toggle('scrolled',scrollY>8);},{passive:true});
})();

/* ===== timeline chart ===== */
(function(){
 // --- real data (만원 단위는 억으로 변환해 보관) ---
 var M   =['25.12','26.01','26.02','26.03','26.04','26.05'];
 var avg =[23.19,16.94,16.72,16.17,14.29,20.79];           // 표본 평균(억)
 var med =[24.70,17.60,16.90,13.20,11.68,17.20];           // 표본 중위가(억)
 var hel =[29.10,null,null,27.00,28.20,28.00];             // 헬리오시티 84㎡ 고정(억)
 var cnt =[10,10,10,10,10,10];                             // 표본 거래건수(캡)
 var pmin=[11.9,3.9,6.5,3.5,6.0,8.0];                      // 표본 최저(억)
 var pmax=[35.4,41.5,29.75,29.0,28.2,35.6];                // 표본 최고(억)
 var N=M.length;

 // --- geometry ---
 var L=58,Rr=694,T=24,B=252;        // price panel
 var VT=300,VB=372;                 // volume panel
 var DMIN=0,DMAX=42;                // price domain (억)
 function X(i){return L+(Rr-L)*i/(N-1);}
 function Y(v){return B-(v-DMIN)/(DMAX-DMIN)*(B-T);}
 function VY(c){return VB-(c/12)*(VB-VT);} // volume scale, max 12

 var on={band:true,avg:true,med:true,helio:true};

 function esc(n){return (Math.round(n*100)/100);}
 function poly(arr,color,w,dash){
  var pts=[],d='';
  for(var i=0;i<N;i++){ if(arr[i]==null) continue; pts.push([X(i),Y(arr[i])]); }
  for(var j=0;j<pts.length;j++){ d+=(j?'L':'M')+pts[j][0].toFixed(1)+' '+pts[j][1].toFixed(1)+' '; }
  return '<path d="'+d.trim()+'" fill="none" stroke="'+color+'" stroke-width="'+w+'" '+(dash?'stroke-dasharray="'+dash+'" ':'')+'stroke-linejoin="round" stroke-linecap="round"/>';
 }
 function dots(arr,color){
  var s='';
  for(var i=0;i<N;i++){ if(arr[i]==null) continue;
   s+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(arr[i]).toFixed(1)+'" r="4" fill="#fff" stroke="'+color+'" stroke-width="2.5"><title>'+M[i]+' · '+esc(arr[i])+'억</title></circle>';
  }
  return s;
 }

 function draw(){
  var s='';
  // y gridlines + labels (0,10,20,30,40)
  for(var g=0;g<=40;g+=10){
   var gy=Y(g).toFixed(1);
   s+='<line class="gridln" x1="'+L+'" y1="'+gy+'" x2="'+Rr+'" y2="'+gy+'"/>';
   s+='<text class="axislb" x="'+(L-8)+'" y="'+(Y(g)+4).toFixed(1)+'" text-anchor="end">'+g+'억</text>';
  }
  // month labels (price panel)
  for(var i=0;i<N;i++){
   s+='<text class="mlabel" x="'+X(i).toFixed(1)+'" y="'+(B+20)+'" text-anchor="middle">'+M[i]+'</text>';
  }
  // spread band (min~max whisker)
  if(on.band){
   for(var k=0;k<N;k++){
    var xx=X(k).toFixed(1);
    s+='<line x1="'+xx+'" y1="'+Y(pmin[k]).toFixed(1)+'" x2="'+xx+'" y2="'+Y(pmax[k]).toFixed(1)+'" stroke="#F3D9DD" stroke-width="9" stroke-linecap="round"><title>'+M[k]+' 표본 최저~최고: '+pmin[k]+'~'+pmax[k]+'억</title></line>';
   }
  }
  // lines
  if(on.avg){ s+=poly(avg,'#C9A84C',2.5,''); s+=dots(avg,'#C9A84C'); }
  if(on.med){ s+=poly(med,'#B85060',2.5,''); s+=dots(med,'#B85060'); }
  if(on.helio){
   s+=poly(hel,'#5E8C7F',3,'2 6');          // dashed across the Jan/Feb gap
   s+=dots(hel,'#5E8C7F');
   // 결측 marks for Jan, Feb
   for(var m=0;m<N;m++){ if(hel[m]==null){
    s+='<text x="'+X(m).toFixed(1)+'" y="'+(Y(28)).toFixed(1)+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="#b5443c">결측</text>';
   }}
  }
  // volume panel
  s+='<text class="axislb" x="'+L+'" y="'+(VT-8)+'" text-anchor="start">표본 거래건수 (월 상한 10 · 전수 아님)</text>';
  s+='<line x1="'+L+'" y1="'+VY(10).toFixed(1)+'" x2="'+Rr+'" y2="'+VY(10).toFixed(1)+'" stroke="#b5443c" stroke-width="1" stroke-dasharray="4 4"/>';
  s+='<text x="'+(Rr)+'" y="'+(VY(10)-5).toFixed(1)+'" text-anchor="end" font-size="10" font-weight="800" fill="#b5443c">캡 10</text>';
  var bw=26;
  for(var b=0;b<N;b++){
   var bx=(X(b)-bw/2).toFixed(1), by=VY(cnt[b]).toFixed(1), bh=(VB-VY(cnt[b])).toFixed(1);
   s+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="4" fill="#F0DED8" stroke="#EAD7D3"><title>'+M[b]+' 표본 '+cnt[b]+'건(상한)</title></rect>';
   s+='<text x="'+X(b).toFixed(1)+'" y="'+(VB+16)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8A7B72">'+cnt[b]+'</text>';
  }
  document.getElementById('plot').innerHTML=s;
 }

 // legend toggles
 document.getElementById('legend').addEventListener('click',function(e){
  var btn=e.target.closest('button'); if(!btn) return;
  var k=btn.getAttribute('data-k');
  on[k]=!on[k];
  btn.setAttribute('aria-pressed',on[k]?'true':'false');
  draw();
 });
 draw();
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','메뉴 열기');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>부부연구소</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
