<!-- [도구_결혼자금역산_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.12});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.fmtMan=function(won){var man=Math.round(won/10000);return man.toLocaleString('ko-KR')+'만';};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||850;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(i){return document.getElementById(i);};
var LS='bbWeddingFund_v1';
var ITEMS=[['i_hall','예식홀·식대','#B85060'],['i_sdm','스드메','#D67A89'],['i_yemul','예물·예단','#C9A84C'],['i_honsu','혼수','#5E8C7F'],['i_honey','신혼여행','#9C6BA8'],['i_etc','기타','#8A7B72'],['i_house','신혼집','#6D8FB8']];
var PRE={
 lite:{m:12,rate:3,vals:{i_hall:400,i_sdm:250,i_yemul:0,i_honsu:1000,i_honey:400,i_etc:200,i_house:0},seed:0,support:0},
 std:{m:18,rate:3,vals:{i_hall:1460,i_sdm:471,i_yemul:900,i_honsu:1445,i_honey:600,i_etc:1036,i_house:0},seed:0,support:0},
 rich:{m:24,rate:3,vals:{i_hall:2200,i_sdm:700,i_yemul:1200,i_honsu:2000,i_honey:1100,i_etc:800,i_house:0},seed:0,support:0}
};
function num(i){var el=$(i);if(!el)return 0;return Math.max(0,+(el.value.replace(/[^0-9]/g,''))||0);}
// monthly compounding sim: seed/pmt in WON, returns final & monthly balances
function sim(seed,pmt,months,annual){var rm=annual/100/12,bal=seed,mb=[seed];for(var m=1;m<=months;m++){bal=bal*(1+rm)+pmt;mb.push(bal);}return {final:bal,mb:mb};}
function solve(seed,target,months,annual){if(sim(seed,0,months,annual).final>=target)return 0;var lo=0,hi=Math.max(target,1);for(var k=0;k<64;k++){var mid=(lo+hi)/2;if(sim(seed,mid,months,annual).final<target)lo=mid;else hi=mid;}return (lo+hi)/2;}
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=18,y1=214;if(N<=0)N=1;return arr.map(function(v,i){return (i?'L':'M')+(x0+(x1-x0)*i/N).toFixed(1)+','+(y1-(y1-y0)*Math.min(v/maxV,1)).toFixed(1);}).join(' ');}

function syncChips(){var m=+$('months').value;[].forEach.call(document.querySelectorAll('#mChips .chip'),function(c){c.classList.toggle('on',+c.getAttribute('data-m')===m);});}

function calc(animate){
 // normalize comma display for amount fields
 ITEMS.forEach(function(it){var el=$(it[0]);if(el){var v=num(it[0]);el.value=v?v.toLocaleString('ko-KR'):'0';}});
 ['seed','support'].forEach(function(i){var el=$(i);if(el){var v=num(i);el.value=v?v.toLocaleString('ko-KR'):'0';}});
 var months=+$('months').value, rate=+$('rate').value;
 $('monthsv').textContent= months>=24&&months%12===0 ? (months/12)+'년' : months+'개월';
 $('ratev').textContent=rate.toFixed(1)+'%';
 syncChips();

 var goalMan=0; ITEMS.forEach(function(it){goalMan+=num(it[0]);});
 var seedWon=num('seed')*10000, supportWon=num('support')*10000, goalWon=goalMan*10000;
 var selfWon=Math.max(0, goalWon - supportWon);
 var pmt=solve(seedWon, selfWon, months, rate);
 var perp=pmt/2;

 if(animate){window.countUp($('pmt'),pmt,820);window.countUp($('perp'),perp,820);}else{$('pmt').textContent=window.fmtWon(pmt);$('perp').textContent=window.fmtWon(perp);}
 $('goalSum').textContent=goalMan.toLocaleString('ko-KR')+'만';

 // diagnosis
 var dt;
 if(selfWon<=0){dt='🎉 지원·축의금과 이미 모은 돈만으로 목표를 채웠어요. 추가 저축 없이도 닿는 계획이에요. 남는 여유는 신혼 초 비상금으로 두면 든든해요.';}
 else{
   var label= months>=24&&months%12===0 ? (months/12)+'년' : months+'개월';
   dt='결혼까지 <b>'+label+'</b>, 목표 <b>'+window.fmtMan(selfWon)+'원</b>을 채우려면 둘이 합쳐 매달 <b>'+window.fmtWon(pmt)+'원</b> — 한 사람당 약 <b style="color:var(--rose)">'+window.fmtWon(perp)+'원</b>이에요. ';
   if(supportWon>0)dt+='예상 지원·축의금 <b>'+window.fmtMan(supportWon)+'원</b>이 목표를 그만큼 덜어줬어요. ';
   if(perp>=1500000)dt+='한 사람 월 150만원이 넘으면 빠듯할 수 있어요 — 기간을 늘리거나 항목을 줄여보세요.';
   else if(perp<=400000)dt+='비교적 여유 있는 페이스예요. 무리 없이 시작해볼 만해요.';
   else dt+='현실적인 페이스예요. 자동이체로 걸어두면 마음이 편해져요.';
 }
 $('diagTxt').innerHTML=dt;

 // breakdown bars
 var bd=$('bdItems');bd.innerHTML='';
 ITEMS.forEach(function(it){var v=num(it[0]);if(v<=0)return;var pct=goalMan>0?(v/goalMan*100):0;
  var row=document.createElement('div');row.className='bditem';
  row.innerHTML='<div class="row"><span>'+it[1]+'</span><b>'+v.toLocaleString('ko-KR')+'만 · '+pct.toFixed(0)+'%</b></div><div class="bdtrack"><div class="bdfill" style="background:'+it[2]+'"></div></div>';
  bd.appendChild(row);
  var fill=row.querySelector('.bdfill');requestAnimationFrame(function(){requestAnimationFrame(function(){fill.style.width=pct.toFixed(1)+'%';});});
 });
 if(goalMan<=0){bd.innerHTML='<div style="font-size:12.5px;color:var(--mut)">항목 금액을 입력하면 어디에 얼마나 드는지 보여드려요.</div>';}

 // chart
 var s=sim(seedWon, pmt, months, rate);
 var prinArr=[];var pp=seedWon;prinArr.push(pp);for(var m=1;m<=months;m++){pp+=pmt;prinArr.push(pp);}
 var maxV=Math.max(selfWon, s.final, 1)*1.06;var N=months;
 $('vpath').setAttribute('d',buildPath(s.mb,maxV,N));
 $('ppath').setAttribute('d',buildPath(prinArr,maxV,N));
 $('area').setAttribute('d',buildPath(s.mb,maxV,N)+' L606,214 L46,214 Z');
 var gy=(214-(214-18)*Math.min(selfWon/maxV,1));
 $('goalline').setAttribute('x1','46');$('goalline').setAttribute('x2','606');$('goalline').setAttribute('y1',gy.toFixed(1));$('goalline').setAttribute('y2',gy.toFixed(1));
 var ex=606, ey=(214-(214-18)*Math.min(s.final/maxV,1));$('enddot').setAttribute('cx',ex);$('enddot').setAttribute('cy',ey.toFixed(1));
 var gr=$('grid');gr.innerHTML='';for(var k=0;k<=4;k++){var yy=18+(214-18)*k/4;gr.innerHTML+='<line x1="46" y1="'+yy+'" x2="606" y2="'+yy+'" stroke="#EAD7D3" stroke-width="1"/>';}

 var totalPrin=prinArr[prinArr.length-1];
 $('sSelf').textContent=window.fmtMan(selfWon)+'원';
 var intPre=s.final-totalPrin;
 $('sInt').textContent='+'+window.fmtWon(intPre)+'원';
 $('sPrin').textContent=window.fmtWon(totalPrin)+'원';
 var atEl=$('atNote');
 if(atEl){ if((+$('rate').value)>0&&intPre>=1){ atEl.innerHTML='💡 \'이자로 보탬\'은 <b style="color:var(--ink2)">세전</b>이에요. 예·적금 이자엔 <b style="color:var(--ink2)">이자소득세 15.4%</b>가 붙어, 실제로 손에 들어오는 이자는 약 <b>+'+window.fmtWon(intPre*0.846)+'원</b>이에요.'; } else { atEl.textContent=''; } }

 var lbl= months>=24&&months%12===0 ? (months/12)+'년' : months+'개월';
 $('ddayTxt').innerHTML='결혼까지 <b>'+lbl+'</b> · 매달 <b>'+window.fmtWon(pmt)+'원</b>씩 모으면 만기 잔액 <b>'+window.fmtMan(s.final)+'원</b> (목표 '+window.fmtMan(selfWon)+'원).';

 if(animate){var vp=$('vpath');vp.style.transition='none';vp.style.strokeDasharray='1';vp.style.strokeDashoffset='1';vp.getBoundingClientRect();vp.style.transition='stroke-dashoffset 1.15s var(--ease)';vp.style.strokeDashoffset='0';
   var dot=$('enddot');dot.style.transition='none';dot.style.opacity='0';setTimeout(function(){dot.style.transition='opacity .4s';dot.style.opacity='1';},950);}
}

// preset
[].forEach.call(document.querySelectorAll('.preset'),function(b){b.addEventListener('click',function(){var p=PRE[b.getAttribute('data-p')];if(!p)return;$('months').value=p.m;$('rate').value=p.rate;Object.keys(p.vals).forEach(function(k){if($(k))$(k).value=p.vals[k].toLocaleString('ko-KR');});$('seed').value=p.seed.toLocaleString('ko-KR');$('support').value=p.support.toLocaleString('ko-KR');calc(true);});});
// month chips
[].forEach.call(document.querySelectorAll('#mChips .chip'),function(c){c.addEventListener('click',function(){$('months').value=c.getAttribute('data-m');calc(true);});});

// localStorage plans
function loadStore(){try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch(e){return [];}}
function saveStore(a){try{localStorage.setItem(LS,JSON.stringify(a.slice(0,8)));}catch(e){}}
function renderSaves(){var a=loadStore();var box=$('saveList');box.innerHTML='';if(!a.length){box.innerHTML='<div class="savenote" style="margin-top:0">아직 저장한 계획이 없어요. 항목을 맞춘 뒤 「＋ 이 계획 저장」을 눌러보세요.</div>';return;}
 a.forEach(function(p,idx){var row=document.createElement('div');row.className='saveitem';
  row.innerHTML='<span class="si">'+p.name+'</span><span class="ld" data-i="'+idx+'">불러오기</span><span class="rm" data-r="'+idx+'">✕</span>';
  box.appendChild(row);});
 [].forEach.call(box.querySelectorAll('.ld'),function(b){b.addEventListener('click',function(){var p=loadStore()[+b.getAttribute('data-i')];if(!p)return;$('months').value=p.months;$('rate').value=p.rate;ITEMS.forEach(function(it){if($(it[0]))$(it[0]).value=(p.vals[it[0]]||0).toLocaleString('ko-KR');});$('seed').value=(p.seed||0).toLocaleString('ko-KR');$('support').value=(p.support||0).toLocaleString('ko-KR');calc(true);});});
 [].forEach.call(box.querySelectorAll('.rm'),function(b){b.addEventListener('click',function(){var a=loadStore();a.splice(+b.getAttribute('data-r'),1);saveStore(a);renderSaves();});});
}
$('saveBtn').addEventListener('click',function(){var a=loadStore();var goalMan=0;ITEMS.forEach(function(it){goalMan+=num(it[0]);});var vals={};ITEMS.forEach(function(it){vals[it[0]]=num(it[0]);});
 var lbl=(+$('months').value)+'개월';var nm='💍 '+goalMan.toLocaleString('ko-KR')+'만 · '+lbl+' · '+(+$('rate').value).toFixed(1)+'%';
 a.unshift({name:nm,months:+$('months').value,rate:+$('rate').value,vals:vals,seed:num('seed'),support:num('support')});saveStore(a);renderSaves();});
$('clearBtn').addEventListener('click',function(){if(confirm('저장한 계획을 모두 비울까요?')){saveStore([]);renderSaves();}});

// bindings
ITEMS.forEach(function(it){var el=$(it[0]);if(el){el.addEventListener('input',function(){calc(false);});el.addEventListener('change',function(){calc(true);});}});
['seed','support'].forEach(function(i){var el=$(i);if(el){el.addEventListener('input',function(){calc(false);});el.addEventListener('change',function(){calc(true);});}});
['months','rate'].forEach(function(i){var el=$(i);if(el){el.addEventListener('input',function(){calc(false);});el.addEventListener('change',function(){calc(true);});}});

// today chip
(function(){var t=new Date();$('today').textContent=t.getFullYear()+'.'+(t.getMonth()+1)+'.'+t.getDate();})();
renderSaves();
calc(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
