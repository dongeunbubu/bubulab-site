<!-- [도구_목표플래너시나리오Pro_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.fmtMan=function(n){n=Math.round(n/10000);if(n>=10000){var eok=Math.floor(n/10000),man=n%10000;return eok+'억'+(man?' '+man.toLocaleString('ko-KR')+'만':'');}return n.toLocaleString('ko-KR')+'만';};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||850;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

(function(){
var $=function(i){return document.getElementById(i);};
function num(i){return Math.max(0,+(($(i).value+'').replace(/[^0-9]/g,''))||0);}
// monthly-compounding annuity sim
function sim(seed,pmt,years,annual){var rm=annual/100/12,bal=seed,prin=seed,yb=[seed];
 for(var m=1;m<=years*12;m++){bal=bal*(1+rm)+pmt;prin+=pmt;if(m%12===0)yb.push(bal);}
 return {final:bal,prin:prin,yb:yb};}
function solve(seed,target,years,annual){if(target<=seed)return 0;var lo=0,hi=Math.max(target,1);
 for(var k=0;k<64;k++){var mid=(lo+hi)/2;if(sim(seed,mid,years,annual).final<target)lo=mid;else hi=mid;}return (lo+hi)/2;}
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=22,y1=232;return arr.map(function(v,i){return (i?'L':'M')+(x0+(x1-x0)*i/N).toFixed(1)+','+(y1-(y1-y0)*Math.max(0,Math.min(1,v/maxV))).toFixed(1);}).join(' ');}

var KEY='bbPlannerScenario_v1';

function calc(animate){
 ['target','cur'].forEach(function(i){var v=num(i);$(i).value=v?v.toLocaleString('ko-KR'):'';});
 var target0=num('target'),seed=num('cur'),years=+$('yrs').value;
 var real=$('real').checked, infl=+$('infl').value;
 var rC=+$('rCon').value,rB=+$('rBase').value,rA=+$('rAgg').value;
 $('yrsv').textContent=years+'년';
 $('inflv').textContent=infl.toFixed(1)+'%';
 $('rConv').textContent=rC.toFixed(1)+'%';$('rBasev').textContent=rB.toFixed(1)+'%';$('rAggv').textContent=rA.toFixed(1)+'%';
 $('cRt').textContent='연 '+rC.toFixed(1)+'%';$('bRt').textContent='연 '+rB.toFixed(1)+'%';$('aRt').textContent='연 '+rA.toFixed(1)+'%';
 $('wCon').textContent='연 '+rC.toFixed(1)+'%';$('wBase').textContent='연 '+rB.toFixed(1)+'%';$('wAgg').textContent='연 '+rA.toFixed(1)+'%';
 $('inflFld').style.display=real?'block':'none';

 var effTarget= real? target0*Math.pow(1+infl/100,years): target0;

 var pC=solve(seed,effTarget,years,rC),pB=solve(seed,effTarget,years,rB),pA=solve(seed,effTarget,years,rA);
 var sC=sim(seed,pC,years,rC),sB=sim(seed,pB,years,rB),sA=sim(seed,pA,years,rA);

 if(animate){window.countUp($('cPmt'),pC);window.countUp($('bPmt'),pB);window.countUp($('aPmt'),pA);}
 else{$('cPmt').textContent=window.fmtWon(pC);$('bPmt').textContent=window.fmtWon(pB);$('aPmt').textContent=window.fmtWon(pA);}
 $('cPrin').textContent=window.fmtMan(sC.prin)+'원';$('bPrin').textContent=window.fmtMan(sB.prin)+'원';$('aPrin').textContent=window.fmtMan(sA.prin)+'원';

 var spread=pC-pA;
 $('spreadV').textContent=window.fmtWon(Math.abs(spread));
 var yearGap=Math.abs(spread)*12;
 $('spreadP').innerHTML='공격적으로 굴리면 매달 <b>'+window.fmtWon(Math.abs(spread))+'원</b>(연 '+window.fmtMan(yearGap)+'원) 덜 모아도 같은 목표에 닿아요. 단, 그건 <b>시장이 가정대로 따라줄 때</b> 얘기예요.';

 // real box
 if(real){$('realBox').classList.remove('off');
  var gap=effTarget-target0;
  $('realP').innerHTML='오늘의 <b>'+window.fmtMan(target0)+'원</b>은 '+years+'년 뒤 물가 '+infl.toFixed(1)+'%면 사실상 <b>'+window.fmtMan(effTarget)+'원</b>이 있어야 같은 걸 살 수 있어요. 그래서 목표를 <b style="color:var(--lav)">+'+window.fmtMan(gap)+'원</b> 올려 세 갈래를 다시 계산했어요.';
 } else {$('realBox').classList.add('off');}

 // chart: 3 curves to effTarget
 var N=years, maxV=effTarget*1.06;
 $('cvCon').setAttribute('d',buildPath(sC.yb,maxV,N));
 $('cvBase').setAttribute('d',buildPath(sB.yb,maxV,N));
 $('cvAgg').setAttribute('d',buildPath(sA.yb,maxV,N));
 var gy=232-(232-22)*Math.min(1,effTarget/maxV);
 $('goalLine').setAttribute('y1',gy.toFixed(1));$('goalLine').setAttribute('y2',gy.toFixed(1));
 $('dotEnd').setAttribute('cx','606');$('dotEnd').setAttribute('cy',gy.toFixed(1));
 var gr=$('grid');gr.innerHTML='';for(var k=0;k<=4;k++){var yy=22+(232-22)*k/4;gr.innerHTML+='<line class="gd" x1="46" y1="'+yy+'" x2="606" y2="'+yy+'"/>';}
 $('sumGoal').textContent=window.fmtMan(effTarget)+'원';
 $('sumCon').textContent=window.fmtMan(sC.prin)+'원';
 $('sumAgg').textContent=window.fmtMan(sA.prin)+'원';
 var chSvg=$('chart');if(chSvg)chSvg.setAttribute('aria-label','보수 연 '+rC.toFixed(1)+'%, 기본 연 '+rB.toFixed(1)+'%, 공격 연 '+rA.toFixed(1)+'%로 '+years+'년 동안 같은 목표 '+window.fmtMan(effTarget)+'원에 닿는 세 곡선 차트예요. 필요한 매달 저축액은 보수 '+window.fmtWon(pC)+'원, 기본 '+window.fmtWon(pB)+'원, 공격 '+window.fmtWon(pA)+'원'+(real?' — 물가 '+infl.toFixed(1)+'%를 반영한 실질 목표 기준이에요.':'이에요.'));

 // principal vs interest bars (relative to effTarget=100%)
 function setbar(p,i,res){var pr=Math.max(0,Math.min(100,res.prin/effTarget*100));var it=Math.max(0,100-pr);
  setTimeout(function(){$(p).style.width=pr+'%';$(i).style.width=it+'%';},animate?60:0);return pr;}
 var prC=setbar('segConP','segConI',sC),prB=setbar('segBaseP','segBaseI',sB),prA=setbar('segAggP','segAggI',sA);
 $('pbCon').textContent='원금 '+Math.round(prC)+'% · 수익 '+Math.round(100-prC)+'%';
 $('pbBase').textContent='원금 '+Math.round(prB)+'% · 수익 '+Math.round(100-prB)+'%';
 $('pbAgg').textContent='원금 '+Math.round(prA)+'% · 수익 '+Math.round(100-prA)+'%';

 if(animate){['cvCon','cvBase','cvAgg'].forEach(function(id,ix){var vp=$(id);vp.style.transition='none';vp.style.strokeDasharray='1';vp.style.strokeDashoffset='1';vp.getBoundingClientRect();vp.style.transition='stroke-dashoffset 1.1s var(--ease) '+(ix*.12)+'s';vp.style.strokeDashoffset='0';});}

 window._cur={target:target0,years:years,seed:seed,real:real,infl:infl,rC:rC,rB:rB,rA:rA,pC:pC,pB:pB,pA:pA};
}

// inputs wiring
['target','cur'].forEach(function(i){var el=$(i);el.addEventListener('input',function(){calc(false);});el.addEventListener('change',function(){calc(true);});});
['yrs','infl','rCon','rBase','rAgg'].forEach(function(i){var el=$(i);el.addEventListener('input',function(){calc(false);});el.addEventListener('change',function(){calc(true);});});
$('real').addEventListener('change',function(){calc(true);});
document.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){
 document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});c.classList.add('on');
 $('target').value=(+c.dataset.t).toLocaleString('ko-KR');$('yrs').value=c.dataset.y;calc(true);
});});

// ===== saved plans (localStorage, device-only) =====
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return [];}}
function store(a){try{localStorage.setItem(KEY,JSON.stringify(a));}catch(e){}}
function render(){var a=load(),box=$('saveList');
 if(!a.length){box.innerHTML='<div class="empty">아직 저장한 계획이 없어요. 위에서 목표를 맞춘 뒤 <b>＋ 지금 계획 저장</b>을 눌러보세요.</div>';return;}
 box.innerHTML=a.map(function(p,ix){
  var title=window.fmtMan(p.target)+'원 · '+p.years+'년'+(p.real?' · 물가반영':'');
  return '<div class="srow"><div class="si"><div class="st">'+title+'</div><div class="sd">'+p.date+' 저장</div>'+
   '<div class="smini"><span class="mc">보수 '+window.fmtWon(p.pC)+'</span><span class="mb">기본 '+window.fmtWon(p.pB)+'</span><span class="ma">공격 '+window.fmtWon(p.pA)+'</span></div></div>'+
   '<div class="sbtns"><button class="iconbtn" data-load="'+ix+'" title="불러오기" aria-label="불러오기"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg></button>'+
   '<button class="iconbtn" data-del="'+ix+'" title="삭제" aria-label="삭제"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div></div>';
 }).join('');
 box.querySelectorAll('[data-load]').forEach(function(b){b.addEventListener('click',function(){
  var p=load()[+b.dataset.load];if(!p)return;
  $('target').value=p.target.toLocaleString('ko-KR');$('yrs').value=p.years;$('cur').value=p.seed?p.seed.toLocaleString('ko-KR'):'';
  $('real').checked=!!p.real;$('infl').value=p.infl;$('rCon').value=p.rC;$('rBase').value=p.rB;$('rAgg').value=p.rA;
  calc(true);window.scrollTo({top:0,behavior:'smooth'});
 });});
 box.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){
  var a=load();a.splice(+b.dataset.del,1);store(a);render();
 });});
}
$('saveBtn').addEventListener('click',function(){
 var c=window._cur;if(!c)return;var a=load();
 var dt=new Date();var ds=dt.getFullYear()+'.'+(dt.getMonth()+1)+'.'+dt.getDate();
 a.unshift({date:ds,target:c.target,years:c.years,seed:c.seed,real:c.real,infl:c.infl,rC:c.rC,rB:c.rB,rA:c.rA,pC:Math.round(c.pC),pB:Math.round(c.pB),pA:Math.round(c.pA)});
 a=a.slice(0,12);store(a);render();
});
$('clearBtn').addEventListener('click',function(){if(load().length&&confirm('저장한 계획을 모두 지울까요? (이 기기에서만 삭제돼요)')){store([]);render();}});

calc(true);render();
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*fxkrw*//*fxkrw-v2*/
(function(){
  if(document.documentElement.getAttribute('data-fxk'))return;
  document.documentElement.setAttribute('data-fxk','1');
  var FALLBACK=1525, rate=FALLBACK, live=false;
  try{var _c=JSON.parse(sessionStorage.getItem('bblfx')||'0');if(_c&&_c.r&&(Date.now()-_c.t)<43200000){rate=_c.r;live=true;}}catch(e){}
  function f(x){return x>=100?Math.round(x).toLocaleString('ko-KR'):(Math.round(x*10)/10).toLocaleString('ko-KR');}
  function fmt(won){
    if(won>=1e12)return f(won/1e12)+'조원';
    if(won>=1e8)return f(won/1e8)+'억원';
    if(won>=1e4)return f(won/1e4)+'만원';
    return Math.round(won).toLocaleString('ko-KR')+'원';
  }
  var MU={'십억':1e9,'백만':1e6,'조':1e12,'억':1e8,'만':1e4,'bn':1e9,'mn':1e6,'B':1e9,'M':1e6,'T':1e12};
  var RE=/\$([0-9][0-9,]*(?:\.[0-9]+)?)(십억|백만|조|억|만|bn|mn|B|M|T)?/;
  function mag(str,suf){var n=parseFloat(str.replace(/,/g,''));return n*(suf&&MU[suf]?MU[suf]:1);}
  function wrap(){
    var sk={SCRIPT:1,STYLE:1,NOSCRIPT:1,TEXTAREA:1};
    var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:function(node){
      if(!node.nodeValue||node.nodeValue.indexOf('$')<0)return 2;
      var p=node.parentNode;
      while(p&&p!==document.body){
        if(sk[p.nodeName])return 2;
        var c=p.className?(''+p.className):'';
        if(c.indexOf('fxk')>=0||c.indexOf('fxbadge')>=0)return 2;
        p=p.parentNode;
      }
      return RE.test(node.nodeValue)?1:2;
    }});
    var nodes=[],n;while(n=w.nextNode())nodes.push(n);
    var G=new RegExp(RE.source,'g');
    nodes.forEach(function(node){
      var txt=node.nodeValue, frag=document.createDocumentFragment(), last=0, m; G.lastIndex=0;
      while(m=G.exec(txt)){
        frag.appendChild(document.createTextNode(txt.slice(last,m.index+m[0].length)));
        var usd=mag(m[1],m[2]);
        var sp=document.createElement('span'); sp.className='fxk'; sp.setAttribute('data-usd',usd);
        sp.textContent='(약 '+fmt(usd*rate)+')';
        frag.appendChild(sp);
        last=m.index+m[0].length;
      }
      frag.appendChild(document.createTextNode(txt.slice(last)));
      node.parentNode.replaceChild(frag,node);
    });
  }
  function apply(){
    var els=document.querySelectorAll('.fxk[data-usd]');
    for(var i=0;i<els.length;i++){var u=parseFloat(els[i].getAttribute('data-usd'));els[i].textContent='(약 '+fmt(u*rate)+')';}
    var b=document.getElementById('fxbadge');
    if(b){b.querySelector('.rt').textContent='$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원';
          b.querySelector('.lb').textContent=live?'실시간':'기준';}
  }
  function badge(){
    var d=document.createElement('div'); d.id='fxbadge'; d.className='fxbadge';
    d.innerHTML='<span class="dot"></span><span class="rt">$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원</span><span class="lb">기준</span>';
    document.body.appendChild(d);
  }
  function start(){
    wrap(); badge();
    try{fetch('https://api.frankfurter.dev/v1/latest?from=USD&to=KRW')
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.rates&&j.rates.KRW){rate=j.rates.KRW;live=true;apply();try{sessionStorage.setItem('bblfx',JSON.stringify({r:rate,t:Date.now()}))}catch(e){}}})
      .catch(function(){});}catch(e){}
  }
  if(document.readyState!=='loading')start();else document.addEventListener('DOMContentLoaded',start);
})();
</script>
