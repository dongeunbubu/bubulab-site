<!-- [도구_저축률진단_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countNum=function(el,to,dur,dec,suf){if(!el)return;to=+to;dur=dur||900;dec=dec||0;suf=suf||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);var v=to*e;el.textContent=(dec?v.toFixed(dec):Math.round(v).toLocaleString('ko-KR'))+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
function num(el){return Math.max(0,+(el.value.replace(/[^0-9]/g,''))||0);}
var AVG=28.5; // 2026 1Q 전국 가구 평균 흑자율 (국가데이터처 2026-05-28 발표)

function gradeOf(sr){
 if(sr<0)    return {t:'적자 위험',c:'#fff',neg:true,msg:'지금은 쓰는 돈이 버는 돈보다 많아요. 굴리기보다 <b>새는 고정비부터</b> 한 칸 줄이는 게 먼저예요.'};
 if(sr<15)   return {t:'시작 단계',c:'#fff',neg:false,msg:'첫걸음을 뗐어요. 평균(28.5%)까지는 거리가 있지만, <b>월급날 먼저 떼두기</b>부터 시작하면 충분히 따라잡아요.'};
 if(sr<AVG)  return {t:'평균 접근',c:'#fff',neg:false,msg:'또래 평균이 코앞이에요. 고정비 한두 개만 정리하면 <b>평균 위로</b> 올라설 수 있어요.'};
 if(sr<50)   return {t:'평균 이상 · 든든',c:'#fff',neg:false,msg:'전국 평균을 넘어선 든든한 저축 습관이에요. 이제 모은 돈을 <b>어떻게 굴릴지</b>가 다음 숙제예요.'};
 return {t:'최상위 저축러',c:'#fff',neg:false,msg:'상위권 저축률이에요. 과도한 절약으로 삶이 빡빡하진 않은지, <b>균형</b>도 같이 살펴보세요.'};
}

// 결과해석 verdict — 평균(28.5%)까지/이상 '얼마'인지 구체 금액으로 환산
function renderVerdict(inc,save,sr,annual,diff){
 var el=$('verdict'),ic=$('vIcon'),tx=$('vText'); if(!el)return;
 var needAvg=inc*AVG/100; // 평균 흑자율 달성에 필요한 월 저축액
 if(inc<=0){el.className='verdict lv1';ic.textContent='✍️';tx.innerHTML='월 소득을 넣으면 <b>전국 평균(28.5%)</b>까지 얼마가 남았는지 콕 집어 알려드려요.';return;}
 if(save<0){el.className='verdict lv0';ic.textContent='🚨';tx.innerHTML='지금은 매달 <b>'+window.fmtWon(Math.abs(save))+'원</b> 적자예요. 평균만큼 남기려면 월 <b>'+window.fmtWon(needAvg)+'원</b>이 목표지만, 먼저 적자를 0으로 되돌리는 게 1순위예요.';return;}
 if(diff<-0.05){var gapWon=needAvg-save;el.className='verdict lv1';ic.textContent='📈';tx.innerHTML='평균까지 <b>'+(-diff).toFixed(1)+'%p</b> 남았어요. 매달 <b>'+window.fmtWon(gapWon)+'원</b>만 더 남기면 <b>전국 평균(28.5%)</b>을 넘어서요 — 1년이면 <b>'+window.fmtWon(gapWon*12)+'원</b> 차이예요.';return;}
 if(diff<=0.05){el.className='verdict lv2';ic.textContent='🎯';tx.innerHTML='딱 <b>전국 평균(28.5%)</b> 수준이에요. 고정비 하나만 더 줄여도 평균을 넘는 상위권이 돼요.';return;}
 var overYear=(save-needAvg)*12;el.className='verdict '+(sr>=50?'lv3':'lv2');ic.textContent=(sr>=50?'🏆':'✅');tx.innerHTML='평균보다 <b>+'+diff.toFixed(1)+'%p</b> 앞서 있어요. 평균 가구보다 <b>1년에 약 '+window.fmtWon(overYear)+'원</b>을 더 모으는 속도예요.';
}

function series(per,N){var arr=[];for(var t=0;t<=N;t++){arr.push(per*t);}return arr;} // per=연저축액
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=22,y1=232;var pts=[];for(var k=0;k<arr.length;k++){var x=x0+(x1-x0)*(N>0?k/N:0);var y=y1-(y1-y0)*(maxV>0?arr[k]/maxV:0);pts.push([x,y]);}return pts;}
function toD(pts){return pts.map(function(p,j){return (j?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}

function draw(animate){
 var inc=num($('inc')),exp=num($('exp')),N=+$('yrs').value;
 var save=inc-exp;
 var sr=inc>0?(save/inc*100):0;
 var annual=save*12;
 var diff=sr-AVG;
 $('yrsv').textContent=N+'년';$('sumNk').textContent=N+'년';

 // 매달 남기는 돈 (입력 패널 즉시 반영)
 var sq=$('saveq');sq.textContent=window.fmtWon(save)+' 원';sq.classList.toggle('neg',save<0);

 // headline
 var g=gradeOf(sr);
 $('big').classList.toggle('neg',g.neg);
 $('grade').textContent=g.t;
 $('gmsg').innerHTML=g.msg;
 var cum=Math.max(0,annual*N); // 적자면 누적 원금 0
 if(animate){window.countNum($('sr'),sr,900,1);
   window.countNum($('needv'),save,900,0,' 원');window.countNum($('nyear'),annual,900,0);
   window.countNum($('sumYear'),annual,900);window.countNum($('sumCum'),cum,900);}
 else{$('sr').textContent=sr.toFixed(1);
   $('needv').textContent=window.fmtWon(save)+' 원';$('nyear').textContent=window.fmtWon(annual);
   $('sumYear').textContent=window.fmtWon(annual);$('sumCum').textContent=window.fmtWon(cum);}
 $('needv').classList.toggle('neg',save<0);
 $('sumYear').style.color=annual>=0?'var(--rose)':'var(--up)';
 $('sumDiff').textContent=(diff>=0?'+':'')+diff.toFixed(1)+'%p';
 $('sumDiff').style.color=diff>=0?'var(--sage)':'var(--up)';
 $('bighint').innerHTML = save>=0
   ? '버는 돈 100만 원 중 약 <b>'+(sr/10).toFixed(1)+'</b>만 원을 남기고 있어요.'
   : '버는 돈보다 매달 <b>'+window.fmtWon(Math.abs(save))+'원</b>을 더 쓰고 있어요.';

 // gauge pointer
 var ptr=$('gptr');var posPct=Math.max(0,Math.min(60,sr))/60*100;
 ptr.style.left=posPct+'%';ptr.classList.toggle('neg',sr<0);
 $('gptrv').textContent='나 '+sr.toFixed(1)+'%';

 // chart: 누적 저축 원금
 var s=series(annual>0?annual:0,N);
 var maxV=(annual>0?annual*N:1)*1.06;
 var vp=buildPath(s,maxV,N);
 $('vpath').setAttribute('d',toD(vp));
 var x0=46;
 $('area').setAttribute('d','M'+x0+',232 '+toD(vp).replace(/^M/,'L')+' L606,232 Z');
 var last=vp[vp.length-1];$('dot').setAttribute('cx',last[0]);$('dot').setAttribute('cy',last[1]);
 var gr=$('grid');gr.innerHTML='';for(var q=0;q<=4;q++){var y=22+(232-22)*q/4;gr.innerHTML+='<line x1="46" y1="'+y+'" x2="606" y2="'+y+'" stroke="#EAD7D3" stroke-width="1"/>';}
 if(animate){var vpath=$('vpath');vpath.style.transition='none';vpath.style.strokeDasharray='1';vpath.style.strokeDashoffset='1';vpath.getBoundingClientRect();vpath.style.transition='stroke-dashoffset 1.1s var(--ease)';vpath.style.strokeDashoffset='0';
   $('dot').style.transition='none';$('dot').style.opacity='0';setTimeout(function(){$('dot').style.transition='opacity .4s';$('dot').style.opacity='1';},900);
   var ar=$('area');ar.style.transition='none';ar.style.opacity='0';ar.getBoundingClientRect();ar.style.transition='opacity .9s var(--ease) .25s';ar.style.opacity='.9';}

 $('feel').innerHTML = annual>0
   ? '💡 굴리지 않고 <b>모으기만</b> 해도 '+N+'년이면 <b>'+window.fmtWon(annual*N)+'원</b>이에요. 여기에 꾸준한 굴리기가 더해지면 속도는 훨씬 빨라져요.'
   : '💡 지금은 모이는 돈이 없어요. 먼저 <b>매달 남기는 돈을 0원 위로</b> 만드는 게 첫 목표예요.';

 // 결과해석 verdict + 접근성 라벨 + 입력검증
 renderVerdict(inc,save,sr,annual,diff);
 var chartEl=$('chart'); if(chartEl){chartEl.setAttribute('aria-label', annual>0?(N+'년 동안 매년 '+window.fmtWon(annual)+'원씩 모아 누적 '+window.fmtWon(annual*N)+'원이 되는 누적 저축 그래프'):'아직 모이는 돈이 없어 그래프가 평평한 상태예요');}
 $('yrs').setAttribute('aria-valuetext',N+'년');
 var im=$('invalMsg');
 if(im){ if(inc<=0){im.textContent='월 소득을 입력해 주세요 — 소득이 있어야 저축률을 계산할 수 있어요.';im.classList.add('on');}
   else if(exp>inc){im.textContent='지출이 소득보다 많아 적자예요. 진단은 ‘적자 위험’ 기준으로 보여드릴게요.';im.classList.add('on');}
   else{im.classList.remove('on');} }
}

function syncChip(wrapId,el){var v=num(el);document.querySelectorAll('#'+wrapId+' button').forEach(function(b){b.classList.toggle('on',+b.dataset.v===v);});}
['inc','exp'].forEach(function(id){
 $(id).addEventListener('input',function(){var v=num($(id));$(id).value=v?v.toLocaleString('ko-KR'):'';syncChip(id==='inc'?'icchips':'exchips',$(id));draw(false);});
 $(id).addEventListener('change',function(){draw(true);});
});
document.querySelectorAll('#icchips button').forEach(function(b){b.addEventListener('click',function(){$('inc').value=(+b.dataset.v).toLocaleString('ko-KR');syncChip('icchips',$('inc'));draw(true);});});
document.querySelectorAll('#exchips button').forEach(function(b){b.addEventListener('click',function(){$('exp').value=(+b.dataset.v).toLocaleString('ko-KR');syncChip('exchips',$('exp'));draw(true);});});
$('yrs').addEventListener('input',function(){draw(false);});$('yrs').addEventListener('change',function(){draw(true);});

draw(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
