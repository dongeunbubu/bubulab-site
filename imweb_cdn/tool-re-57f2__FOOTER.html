<!-- [도구_부동산_학군교통카드_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
/* ===== 예시(가상) 데이터 — 동네 유형별 ===== */
var DZ = {
 A:{ emoji:'🏙️', label:'도심 역세권형', station:'예시역', lines:['예시 2호선','예시 5호선'], dist:180, radStations:3,
     acad:84, field:[46,24,18,12], schools:[2,1] },
 B:{ emoji:'📚', label:'학원가 인접형', station:'예시역', lines:['예시 3호선'], dist:620, radStations:1,
     acad:213, field:[62,20,11,7], schools:[3,2] },
 C:{ emoji:'🌳', label:'신도시 외곽형', station:'예시역', lines:['예시 광역철도'], dist:1340, radStations:0,
     acad:37, field:[34,22,30,14], schools:[1,1] }
};

function fmt(n){ return n.toLocaleString('ko-KR'); }
function walkMin(m){ return Math.max(1, Math.round(m/80)); } /* 직선거리 ÷ 80m/분 (관행 어림값) */

function pick(key){
 var d = DZ[key]; if(!d) return;
 /* 탭 상태 */
 document.querySelectorAll('.pchip').forEach(function(b){
   b.setAttribute('aria-pressed', b.dataset.key===key ? 'true':'false');
 });
 /* 교통 카드 */
 document.getElementById('t-dist').textContent = fmt(d.dist);
 document.getElementById('t-name').textContent = d.station;
 document.getElementById('t-walk').textContent = '약 ' + walkMin(d.dist) + '분';
 document.getElementById('t-rad').textContent = d.radStations;
 document.getElementById('t-tr').textContent = Math.max(0, d.lines.length - 1);
 document.getElementById('t-type').textContent = d.label;
 var lines = document.getElementById('t-lines'); lines.innerHTML = '';
 d.lines.forEach(function(ln){
   var s = document.createElement('span'); s.className='lpill'; s.textContent = ln; lines.appendChild(s);
 });
 var zone = document.getElementById('t-zone');
 if(d.dist <= 500){ zone.className='zone in'; zone.textContent='✓ 직선 500m 이내'; }
 else { zone.className='zone out'; zone.textContent='직선 500m 밖 ('+fmt(d.dist)+'m)'; }
 /* 학원 카드 */
 document.getElementById('a-cnt').textContent = fmt(d.acad);
 document.getElementById('a-elem').textContent = d.schools[0];
 document.getElementById('a-mid').textContent = d.schools[1];
 var bars = document.querySelectorAll('#a-bars .fbar');
 bars.forEach(function(bar, i){
   bar.querySelector('.fv').textContent = d.field[i];
   var fill = bar.querySelector('i');
   fill.style.width = '0%';
   /* 다음 프레임에 목표 너비 → 트랜지션 재생 */
   requestAnimationFrame(function(){ requestAnimationFrame(function(){ fill.style.width = d.field[i] + '%'; }); });
 });
}

/* 초기 렌더 */
pick('A');

/* ===== 스크롤 인터랙션 (no-IO 폴백) ===== */
(function(){
 var hdr = document.getElementById('hdr');
 window.addEventListener('scroll', function(){
   if(hdr) hdr.classList.toggle('scrolled', window.scrollY > 8);
 }, {passive:true});

 var els = document.querySelectorAll('.reveal');
 if('IntersectionObserver' in window){
   var io = new IntersectionObserver(function(ents){
     ents.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
   }, {threshold:.12, rootMargin:'0px 0px -8% 0px'});
   els.forEach(function(el){ io.observe(el); });
 } else {
   els.forEach(function(el){ el.classList.add('in'); });
 }
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
