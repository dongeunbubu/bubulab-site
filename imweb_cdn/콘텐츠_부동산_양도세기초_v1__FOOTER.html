<!-- [콘텐츠_부동산_양도세기초_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){
 "use strict";
 /* progress bar + header */
 var bar=document.getElementById('readbar'),hdr=document.getElementById('hdr');
 function onScroll(){
  var h=document.documentElement;
  var sc=h.scrollTop||document.body.scrollTop;
  var max=(h.scrollHeight-h.clientHeight)||1;
  bar.style.width=Math.min(100,(sc/max)*100)+'%';
  if(sc>8){hdr.classList.add('scrolled');}else{hdr.classList.remove('scrolled');}
 }
 document.addEventListener('scroll',onScroll,{passive:true});onScroll();

 /* reveal */
 var io=new IntersectionObserver(function(es){
  es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
 },{threshold:.12});
 document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});

 /* checklist toggle (tip + gate checkboxes) */
 document.querySelectorAll('.ck').forEach(function(ck){
  var ip=ck.querySelector('input[type=checkbox]');
  if(!ip) return;
  ip.addEventListener('change',function(){ck.classList.toggle('on',ip.checked);});
 });

 /* ===== Tool A: 비과세 셀프 진단 ===== */
 var adj='no', price='under';
 var ckHouse=document.getElementById('ckHouse');
 var ckHold=document.getElementById('ckHold');
 var ckLive=document.getElementById('ckLive');
 var ckLiveRow=document.getElementById('ckLiveRow');
 var gv=document.getElementById('gateVerdict'),gvH=document.getElementById('gvH'),gvP=document.getElementById('gvP');

 function gateCalc(){
  var house=ckHouse.checked, hold=ckHold.checked, live=ckLive.checked;
  var liveNeeded=(adj==='yes');
  var liveOK = liveNeeded ? live : true;
  var base = house && hold && liveOK;
  var miss=[];
  if(!house) miss.push('1세대 1주택');
  if(!hold) miss.push('2년 보유');
  if(liveNeeded && !live) miss.push('2년 거주');

  if(!base){
   gv.className='verdict no';
   gvH.textContent='⚠️ 과세 대상 — 요건 미충족';
   gvP.innerHTML='아직 충족하지 못한 관문: <b>'+miss.join(', ')+'</b>. 이 상태로 양도하면 원칙적으로 과세됩니다(예외 특례는 별도 확인).';
  }else if(price==='under'){
   gv.className='verdict ok';
   gvH.textContent='✅ 비과세 요건 충족 가능';
   gvP.innerHTML='1세대 1주택 비과세 요건을 갖춘 것으로 보이고 양도가액도 12억 이하예요. 현재 입력 기준 <b>전액 비과세</b> 가능성이 높습니다.';
  }else{
   gv.className='verdict cond';
   gvH.textContent='🟡 조건부 비과세 — 고가주택';
   gvP.innerHTML='비과세 요건은 갖췄지만 양도가액이 <b>12억 초과(고가주택)</b>예요. <b>12억까지는 비과세</b>, 초과분에 해당하는 차익만 과세됩니다(아래 §2 가늠기 참고).';
  }
 }
 document.querySelectorAll('#adjSeg button').forEach(function(b){
  b.addEventListener('click',function(){
   document.querySelectorAll('#adjSeg button').forEach(function(x){x.classList.remove('on');});
   b.classList.add('on'); adj=b.getAttribute('data-adj');
   if(adj==='yes'){ ckLiveRow.classList.remove('dim'); }
   else { ckLiveRow.classList.add('dim'); ckLive.checked=false; ckLiveRow.classList.remove('on'); }
   gateCalc();
  });
 });
 document.querySelectorAll('#priceSeg button').forEach(function(b){
  b.addEventListener('click',function(){
   document.querySelectorAll('#priceSeg button').forEach(function(x){x.classList.remove('on');});
   b.classList.add('on'); price=b.getAttribute('data-price'); gateCalc();
  });
 });
 [ckHouse,ckHold,ckLive].forEach(function(c){ c.addEventListener('change',gateCalc); });
 gateCalc();

 /* ===== Tool B: 고가주택 과세분 가늠기 ===== */
 var inYang=document.getElementById('inYang'), inChwi=document.getElementById('inChwi');
 var taxArc=document.getElementById('taxArc'), taxPct=document.getElementById('taxPct');
 var mTotal=document.getElementById('mTotal'), mFree=document.getElementById('mFree'), mTax=document.getElementById('mTax');
 var spFree=document.getElementById('spFree'), spTax=document.getElementById('spTax'), bExplain=document.getElementById('bExplain');
 var CIRC=2*Math.PI*50; /* ≈314.16 */
 var CAP=12; /* 비과세 한도 12억 */

 function won(v){
  if(v>=1){ return (Math.round(v*100)/100).toLocaleString('ko-KR')+'억'; }
  var man=Math.round(v*10000);
  return man.toLocaleString('ko-KR')+'만';
 }
 function calcB(){
  var yang=parseFloat(inYang.value); if(isNaN(yang)||yang<0){yang=0;}
  var chwi=parseFloat(inChwi.value); if(isNaN(chwi)||chwi<0){chwi=0;}
  var gain=Math.max(0,yang-chwi);
  var taxGain, ratio;
  if(yang<=CAP || gain<=0){ taxGain=0; ratio=0; }
  else { ratio=(yang-CAP)/yang; taxGain=gain*ratio; }
  var freeGain=Math.max(0,gain-taxGain);
  var taxShare = gain>0 ? (taxGain/gain) : 0;

  /* donut */
  var off=CIRC*(1-Math.min(1,taxShare));
  taxArc.style.strokeDashoffset=off.toFixed(2);
  taxPct.textContent=Math.round(taxShare*100)+'%';
  mTotal.textContent=won(gain);
  mFree.textContent=won(freeGain);
  mTax.textContent=won(taxGain);

  /* split bar: 양도가액 기준 12억 분기 */
  var freeW, taxW;
  if(yang<=0){ freeW=100; taxW=0; }
  else if(yang<=CAP){ freeW=100; taxW=0; }
  else { freeW=Math.round(CAP/yang*100); taxW=100-freeW; }
  spFree.style.width=freeW+'%';
  spTax.style.width=taxW+'%';
  spFree.textContent = freeW>=22 ? '12억↓ 비과세' : '';
  spTax.textContent = taxW>=18 ? '12억↑ 과세' : '';

  /* explain */
  if(gain<=0){
   bExplain.innerHTML='취득가액이 양도가액보다 크거나 같아 <b>양도차익이 없습니다</b>(손실 시 양도세 없음).';
  }else if(yang<=CAP){
   bExplain.innerHTML='양도가액이 12억 이하라서 비과세 요건만 갖추면 <b>차익 전액이 비과세</b>예요. 과세 대상 차익 0원.';
  }else{
   bExplain.innerHTML='양도가액 <b>'+won(yang)+'</b> 중 12억까지는 비과세, 초과분 비율('+Math.round(ratio*100)+'%)만큼인 <b>'+won(taxGain)+'</b>이 과세 대상 차익입니다. 여기에 장특공·기본공제·세율이 이어서 적용돼요.';
  }
 }
 inYang.addEventListener('input',calcB);
 inChwi.addEventListener('input',calcB);
 calcB();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274 \uc5f4\uae30');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
