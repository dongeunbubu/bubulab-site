<!-- [도구_학령기교육비Pro_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.fmtMan=function(n){return Math.round(n/10000).toLocaleString('ko-KR')+'만';};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
var LS='bubulab_eduPro_v1';
var RATE=0.03;                 /* 대학 적립 연이율 */
var ELEM_Y=6,MID_Y=3,HIGH_Y=3,UNI_Y=4;  /* 단계별 연수 */
var TOTAL_Y=ELEM_Y+MID_Y+HIGH_Y+UNI_Y;   /* =16 */

var STAGE=['sElem','sMid','sHigh'];
var DEF={sElem:43,sMid:46,sHigh:49};
var PRESETS={
 thrifty:{sElem:20,sMid:30,sHigh:40},
 standard:{sElem:43,sMid:46,sHigh:49},
 active:{sElem:51,sMid:63,sHigh:79}
};
var uni=700;   /* 대학 등록금 연액 (만원) */
var living=0;  /* 대학 생활비 월 (만원) */
var gap=0;     /* 둘째 터울 (0=1명) */

function parseNum(el){return Math.max(0,+(String(el.value).replace(/[^0-9]/g,''))||0);}
function clampR(r,v){return Math.min(Math.max(v,+r.min),+r.max);}
function manToWon(m){return m*10000;}
function V(){var o={};STAGE.forEach(function(k){o[k]=parseNum($(k));});return o;}

/* 한 아이의 schoolYear(1..16) 비용 (만원/년) */
function yearCost(v,sy){
 if(sy<=ELEM_Y)return v.sElem*12;
 if(sy<=ELEM_Y+MID_Y)return v.sMid*12;
 if(sy<=ELEM_Y+MID_Y+HIGH_Y)return v.sHigh*12;
 return uni+living*12; /* 대학 */
}
/* schoolYear → 단계 라벨 */
function yearLabel(sy){
 if(sy<=ELEM_Y)return '초'+sy;
 if(sy<=ELEM_Y+MID_Y)return '중'+(sy-ELEM_Y);
 if(sy<=ELEM_Y+MID_Y+HIGH_Y)return '고'+(sy-ELEM_Y-MID_Y);
 return '대'+(sy-ELEM_Y-MID_Y-HIGH_Y);
}

function stageTotals(v){
 return [
  {n:'초등학교',sub:ELEM_Y+'년 · 월 '+v.sElem+'만',cost:v.sElem*12*ELEM_Y,cls:'s1'},
  {n:'중학교',sub:MID_Y+'년 · 월 '+v.sMid+'만',cost:v.sMid*12*MID_Y,cls:'s2'},
  {n:'고등학교',sub:HIGH_Y+'년 · 월 '+v.sHigh+'만',cost:v.sHigh*12*HIGH_Y,cls:'s3'},
  {n:'대학',sub:UNI_Y+'년 · 연 '+uni+'만'+(living>0?'+생활'+living:''),cost:(uni+living*12)*UNI_Y,cls:'s4'}
 ];
}

function compute(animate){
 var v=V();
 var k12=(v.sElem*12*ELEM_Y)+(v.sMid*12*MID_Y)+(v.sHigh*12*HIGH_Y);
 var univ=(uni+living*12)*UNI_Y;
 var one=k12+univ;
 var n=gap>0?2:1;
 var H=gap>0?(TOTAL_Y+gap):TOTAL_Y;      /* 합산 horizon (년) */
 var total=one*n;                          /* 둘 다 동일단가 → 합산=2배 */
 var months=H*12;
 var avgMo=total/months;

 /* hero */
 $('heroCap').textContent=gap>0?('아이 둘, 초등 입학부터 대학 졸업까지 교육비만'):('한 아이, 초등 입학부터 대학 졸업까지 교육비만');
 var bg=$('bigTotal');var won=manToWon(total);
 if(animate){bg.innerHTML='<span></span><small>원</small>';window.countUp(bg.firstChild,won,1000);}
 else{bg.innerHTML=window.fmtWon(won)+'<small>원</small>';}
 $('subK12').textContent=window.fmtWon(manToWon(k12*n))+'원';
 $('subUni').textContent=window.fmtWon(manToWon(univ*n))+'원';

 var bn=$('banner'),bt=$('bannerTxt'),em=bn.querySelector('.em');
 bn.className='banner warn';em.textContent='📚';
 if(gap>0){
   bt.innerHTML='아이 둘 키우는 교육비만 약 <b>'+window.fmtWon(won)+'원</b> · 월평균 <b>'+window.fmtWon(manToWon(avgMo))+'원</b>. 겹치는 시기가 가장 빠듯하니 미리 나눠 모으는 게 답이에요.';
 }else{
   bt.innerHTML='한 아이 16년 교육비 약 <b>'+window.fmtWon(won)+'원</b> · 월평균 <b>'+window.fmtWon(manToWon(avgMo))+'원</b>. 지원이 끊긴 학령기, 미리 적립할수록 가벼워져요.';
 }

 if(animate){window.countUp($('mK12'),manToWon(k12*n),900);window.countUp($('mUni'),manToWon(univ*n),900);window.countUp($('mAvg'),manToWon(avgMo),900);}
 else{$('mK12').textContent=window.fmtWon(manToWon(k12*n));$('mUni').textContent=window.fmtWon(manToWon(univ*n));$('mAvg').textContent=window.fmtWon(manToWon(avgMo));}

 /* 연도별 누적 (1..H) */
 var perBoth=[0],cumBoth=[0],cumFirst=[0];   /* index 0 = 시작점 */
 var accB=0,accF=0,peakV=0,peakY=0;
 for(var y=1;y<=H;y++){
   var first=(y<=TOTAL_Y)?yearCost(v,y):0;
   var second=(gap>0&&y>gap&&(y-gap)<=TOTAL_Y)?yearCost(v,y-gap,true):0;
   var yn=first+second;
   accB+=yn;accF+=first;
   perBoth.push(yn);cumBoth.push(accB);cumFirst.push(accF);
   if(yn>peakV){peakV=yn;peakY=y;}
 }

 /* 둘째 합산 stat */
 var ts=$('twoStat'),tt=$('twoTxt');
 if(gap>0){
   ts.classList.add('on');
   tt.innerHTML='둘째까지 '+gap+'년 터울로 더하면 '+H+'년에 걸쳐 합산 <b>'+window.fmtWon(manToWon(total))+'원</b> (둘째 몫 +'+window.fmtWon(manToWon(one))+'원). 두 아이의 비싼 시기가 겹치는 해가 고비예요.';
 }else{ts.classList.remove('on');}

 renderCurve(cumBoth,cumFirst,H,gap>0,animate);
 renderBands(v,animate);
 renderBalance(v,peakY,peakV,gap>0);
}

function renderCurve(cumBoth,cumFirst,H,gapOn,animate){
 var grid=$('curveGrid'),paths=$('curvePaths'),dots=$('curveDots'),axis=$('curveAxis'),area=$('curveArea'),uband=$('uniBand');
 grid.innerHTML='';paths.innerHTML='';dots.innerHTML='';axis.innerHTML='';area.setAttribute('d','');
 var N=H,X0=66,X1=694,Y0=22,Y1=250;
 var hi=0;cumBoth.forEach(function(x){hi=Math.max(hi,x);});if(hi<=0)hi=1;
 hi*=1.08;
 function px(t){return X0+(N>0?t/N:0)*(X1-X0);}
 function py(x){return Y1-(x/hi)*(Y1-Y0);}
 /* 대학 구간 음영 (첫째 대학 13~16년) */
 var ub0=px(ELEM_Y+MID_Y+HIGH_Y),ub1=px(TOTAL_Y);
 uband.setAttribute('x',ub0.toFixed(1));uband.setAttribute('y',Y0);uband.setAttribute('width',(ub1-ub0).toFixed(1));uband.setAttribute('height',(Y1-Y0).toFixed(1));
 /* y 그리드 */
 [hi/1.08,hi/2,0].forEach(function(x){
   var y=py(x),zero=Math.abs(x)<1;
   grid.innerHTML+='<line x1="'+X0+'" y1="'+y.toFixed(1)+'" x2="'+X1+'" y2="'+y.toFixed(1)+'" stroke="'+(zero?'#D9A6A0':'#EEE0DB')+'" stroke-width="'+(zero?'1.4':'1')+'" stroke-dasharray="'+(zero?'1 0':'2 4')+'"/>';
   axis.innerHTML+='<text x="'+(X0-9)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="11" fill="#8A7B72" font-weight="700">'+(zero?'0':window.fmtMan(manToWon(x)))+'</text>';
 });
 /* x 라벨: 주요 분기점 */
 var marks=[{y:1,t:'초1'},{y:ELEM_Y+1,t:'중1'},{y:ELEM_Y+MID_Y+1,t:'고1'},{y:ELEM_Y+MID_Y+HIGH_Y+1,t:'대1'}];
 if(N>=TOTAL_Y)marks.push({y:TOTAL_Y,t:'대4'});
 marks.forEach(function(m){if(m.y>N)return;axis.innerHTML+='<text x="'+px(m.y).toFixed(1)+'" y="'+(Y1+22)+'" text-anchor="middle" font-size="11" fill="#8A7B72" font-weight="700">'+m.t+'</text>';});
 /* area (합산) */
 var yb=py(0);
 var areaD='M'+px(0).toFixed(1)+' '+yb.toFixed(1);
 for(var i=0;i<=N;i++)areaD+=' L'+px(i).toFixed(1)+' '+py(cumBoth[i]).toFixed(1);
 areaD+=' L'+px(N).toFixed(1)+' '+yb.toFixed(1)+' Z';
 area.setAttribute('d',areaD);
 /* 첫째만 점선 (둘째 시) */
 if(gapOn){
   var ddF=cumFirst.map(function(x,i){return (i?'L':'M')+px(i).toFixed(1)+' '+py(x).toFixed(1);}).join(' ');
   var pf=document.createElementNS('http://www.w3.org/2000/svg','path');
   pf.setAttribute('d',ddF);pf.setAttribute('fill','none');pf.setAttribute('stroke','#C99AA0');pf.setAttribute('stroke-width','2');pf.setAttribute('stroke-dasharray','5 5');pf.setAttribute('stroke-linecap','round');
   paths.appendChild(pf);
 }
 /* 합산 실선 */
 var dd=cumBoth.map(function(x,i){return (i?'L':'M')+px(i).toFixed(1)+' '+py(x).toFixed(1);}).join(' ');
 var p=document.createElementNS('http://www.w3.org/2000/svg','path');
 p.setAttribute('d',dd);p.setAttribute('fill','none');p.setAttribute('stroke','#B85060');p.setAttribute('stroke-width','2.8');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
 paths.appendChild(p);
 var len=p.getTotalLength?p.getTotalLength():1800;
 if(animate){p.style.strokeDasharray=len;p.style.strokeDashoffset=len;requestAnimationFrame(function(){p.style.strokeDashoffset=0;});}
 else{p.style.strokeDasharray='none';p.style.strokeDashoffset=0;}
 /* 대학 시작점 dot (첫째) */
 var uy=ELEM_Y+MID_Y+HIGH_Y;
 if(uy<=N){var ux=px(uy),uyy=py(cumBoth[uy]);
   dots.innerHTML+='<circle cx="'+ux.toFixed(1)+'" cy="'+uyy.toFixed(1)+'" r="5" fill="#fff" stroke="#C9A84C" stroke-width="2.5"/>';
   dots.innerHTML+='<text x="'+ux.toFixed(1)+'" y="'+(uyy-12).toFixed(1)+'" text-anchor="middle" font-size="11" font-weight="800" fill="#B8922F">대학 시작</text>';
 }
 /* 끝 dot */
 var ex=px(N),ey=py(cumBoth[N]);
 dots.innerHTML+='<circle cx="'+ex.toFixed(1)+'" cy="'+ey.toFixed(1)+'" r="4.5" fill="#B85060"/>';
 dots.innerHTML+='<text x="'+(ex-6).toFixed(1)+'" y="'+(ey-10).toFixed(1)+'" text-anchor="end" font-size="11.5" font-weight="800" fill="#B85060">누적 '+window.fmtMan(manToWon(cumBoth[N]))+'</text>';
 /* 범례 */
 $('curveLegend').innerHTML=gapOn
   ? '<span><i style="background:#B85060"></i>누적(합산)</span><span><i style="background:#C99AA0"></i>첫째만</span><span><i style="background:#C9A84C;opacity:.5"></i>대학 구간</span>'
   : '<span><i style="background:#B85060"></i>누적 교육비</span><span><i style="background:#C9A84C;opacity:.5"></i>대학 구간</span>';
}

function renderBands(v,animate){
 var rows=stageTotals(v);
 var max=1;rows.forEach(function(r){max=Math.max(max,r.cost);});
 var html='';
 rows.forEach(function(r){
   var w=r.cost/max*100;
   html+='<div class="bbrow"><span class="bn">'+r.n+'<small>'+r.sub+'</small></span>'
     +'<div class="bbtrack"><b class="'+r.cls+'" data-w="'+w.toFixed(2)+'"></b></div>'
     +'<span class="bv">'+window.fmtMan(manToWon(r.cost))+'<small>'+(r.cost>=10000?'약 '+(r.cost/10000).toFixed(1)+'억':'')+'</small></span></div>';
 });
 $('bandRows').innerHTML=html;
 requestAnimationFrame(function(){$('bandRows').querySelectorAll('.bbtrack b').forEach(function(b){b.style.width=b.getAttribute('data-w')+'%';});});
}

function renderBalance(v,peakY,peakV,gapOn){
 var lbl=yearLabel(peakY);
 var stageNm=peakY<=ELEM_Y?'초등':(peakY<=ELEM_Y+MID_Y?'중학교':(peakY<=ELEM_Y+MID_Y+HIGH_Y?'고등학교':'대학'));
 var txt;
 if(gapOn){
   txt='가장 빠듯한 해는 <b>'+lbl+' 무렵</b>이에요. 두 아이의 비싼 단계가 겹치면서 그 해 교육비가 한 번에 몰려요.';
 }else{
   txt='가장 빠듯한 해는 <b>'+stageNm+' 시기('+lbl+')</b>예요. 단가가 가장 높은 구간이라 그 해 교육비가 정점을 찍어요.';
 }
 $('peakTxt').innerHTML=txt;
 $('peakVal').textContent=window.fmtMan(manToWon(peakV));
 $('balMsg').innerHTML='이 정점은 보통 부모가 <b>40~50대</b>일 때 찾아와요 — 노후 준비의 골든타임과 겹치죠. 교육비 때문에 노후 적립을 멈추면 그 공백이 나중에 자녀에게 돌아갈 수 있어요. <b>노후 적립을 멈추지 않는 선</b>에서 교육비를 설계하고, 큰 비용은 미리 나눠 모으는 게 균형의 핵심이에요.';
}

function computeEdu(animate){
 var goal=Math.max(0,parseNum($('eduGoal')));   /* 만원 */
 var years=Math.max(1,parseNum($('eduYears')));
 var seed=Math.max(0,parseNum($('eduSeed')));   /* 만원 */
 var n=years*12;var r=RATE/12;
 var grow=Math.pow(1+r,n);
 var fvSeed=seed*grow;
 var pmt;
 if(goal<=fvSeed){pmt=0;}
 else{pmt=(goal-fvSeed)/((grow-1)/r);}
 var contributed=seed+pmt*n;
 var interest=Math.max(0,goal-contributed);
 var noInt=(goal-seed)/n;

 if(animate){window.countUp($('eduPmt'),manToWon(pmt),850,'원');}
 else{$('eduPmt').textContent=window.fmtWon(manToWon(pmt))+'원';}
 $('eduPmtSub').textContent=goal<=fvSeed?'시드만으로 충분해요':'연 3.0% 예금 가정';
 if(animate){window.countUp($('eduInt'),manToWon(interest),850,'원');}
 else{$('eduInt').textContent=window.fmtWon(manToWon(interest))+'원';}

 var dt=new Date();dt.setMonth(dt.getMonth()+n);
 $('eduDday').textContent=dt.getFullYear()+'.'+('0'+(dt.getMonth()+1)).slice(-2);
 $('eduDdaySub').textContent='D-'+n+'개월 ('+years+'년)';

 var saved=Math.max(0,noInt-pmt);
 $('eduNote').innerHTML=goal<=fvSeed
   ? '이미 모은 시드가 이자만으로 목표에 닿아요. 더 큰 목표로 바꿔보거나, 기간을 줄여도 돼요.'
   : '매달 <b>'+window.fmtWon(manToWon(pmt))+'원</b>씩 '+years+'년 모으면 대학 비용 '+window.fmtWon(manToWon(goal))+'원에 닿아요. 이자가 없다면 월 '+window.fmtWon(manToWon(noInt))+'원이 필요하니, 복리가 매달 <b>'+window.fmtWon(manToWon(saved))+'원</b>을 대신 모아주는 셈이에요.';
}

/* inputs */
function bindStage(k){
 var inp=$(k),rng=$(k+'R');
 inp.addEventListener('input',function(){var x=parseNum(inp);inp.value=x?x.toLocaleString('ko-KR'):'';rng.value=clampR(rng,x);clearPreset();compute(false);});
 inp.addEventListener('blur',function(){compute(true);});
 rng.addEventListener('input',function(){inp.value=(+rng.value).toLocaleString('ko-KR');clearPreset();compute(false);});
}
STAGE.forEach(bindStage);

/* edu fields */
['eduGoal','eduYears','eduSeed'].forEach(function(k){
 var inp=$(k),rng=$(k+'R');
 inp.addEventListener('input',function(){var x=parseNum(inp);inp.value=x?x.toLocaleString('ko-KR'):'';rng.value=clampR(rng,x);clearGoalQuick();computeEdu(false);});
 inp.addEventListener('blur',function(){computeEdu(true);});
 rng.addEventListener('input',function(){inp.value=(+rng.value).toLocaleString('ko-KR');clearGoalQuick();computeEdu(false);});
});

/* presets */
function clearPreset(){document.querySelectorAll('#presetRow .preset').forEach(function(p){p.classList.remove('on');});}
function applyPreset(name){var pr=PRESETS[name];if(!pr)return;STAGE.forEach(function(k){$(k).value=pr[k].toLocaleString('ko-KR');$(k+'R').value=clampR($(k+'R'),pr[k]);});
 document.querySelectorAll('#presetRow .preset').forEach(function(p){p.classList.toggle('on',p.dataset.p===name);});compute(true);}
document.querySelectorAll('#presetRow .preset').forEach(function(p){p.addEventListener('click',function(){applyPreset(p.dataset.p);});});

/* 대학 등록금 seg → uni + 목표 자동 채움 */
document.querySelectorAll('#uniSeg button').forEach(function(b){b.addEventListener('click',function(){uni=+b.dataset.uni;document.querySelectorAll('#uniSeg button').forEach(function(x){x.classList.toggle('on',x===b);});
 var g=uni*4;$('eduGoal').value=g.toLocaleString('ko-KR');$('eduGoalR').value=clampR($('eduGoalR'),g);syncGoalQuick(g);computeEdu(true);compute(true);});});
/* 생활비 seg */
document.querySelectorAll('#liveSeg button').forEach(function(b){b.addEventListener('click',function(){living=+b.dataset.live;document.querySelectorAll('#liveSeg button').forEach(function(x){x.classList.toggle('on',x===b);});compute(true);});});
/* 둘째 터울 */
document.querySelectorAll('#gapSeg button').forEach(function(b){b.addEventListener('click',function(){gap=+b.dataset.gap;document.querySelectorAll('#gapSeg button').forEach(function(x){x.classList.toggle('on',x===b);});compute(true);});});
/* 대학 목표 퀵칩 */
function clearGoalQuick(){document.querySelectorAll('#goalQuick button').forEach(function(p){p.classList.remove('on');});}
function syncGoalQuick(g){document.querySelectorAll('#goalQuick button').forEach(function(p){p.classList.toggle('on',+p.dataset.goal===g);});}
document.querySelectorAll('#goalQuick button').forEach(function(b){b.addEventListener('click',function(){var g=+b.dataset.goal;$('eduGoal').value=g.toLocaleString('ko-KR');$('eduGoalR').value=clampR($('eduGoalR'),g);syncGoalQuick(g);computeEdu(true);});});

/* save / reset */
function saveLS(){try{var o={};STAGE.forEach(function(k){o[k]=parseNum($(k));});o.uni=uni;o.living=living;o.gap=gap;o.eduGoal=parseNum($('eduGoal'));o.eduYears=parseNum($('eduYears'));o.eduSeed=parseNum($('eduSeed'));localStorage.setItem(LS,JSON.stringify(o));var m=$('saveMsg');m.classList.remove('hidden');setTimeout(function(){m.classList.add('hidden');},2200);}catch(e){}}
function loadLS(){try{var r=localStorage.getItem(LS);if(!r)return false;var o=JSON.parse(r);if(!o||typeof o!=='object')return false;
 STAGE.forEach(function(k){if(o[k]!=null){$(k).value=(+o[k]).toLocaleString('ko-KR');$(k+'R').value=clampR($(k+'R'),+o[k]);}});
 if(o.uni!=null){uni=+o.uni;document.querySelectorAll('#uniSeg button').forEach(function(x){x.classList.toggle('on',+x.dataset.uni===uni);});}
 if(o.living!=null){living=+o.living;document.querySelectorAll('#liveSeg button').forEach(function(x){x.classList.toggle('on',+x.dataset.live===living);});}
 if(o.gap!=null){gap=+o.gap;document.querySelectorAll('#gapSeg button').forEach(function(x){x.classList.toggle('on',+x.dataset.gap===gap);});}
 ['eduGoal','eduYears','eduSeed'].forEach(function(k){if(o[k]!=null){$(k).value=(+o[k]).toLocaleString('ko-KR');$(k+'R').value=clampR($(k+'R'),+o[k]);}});
 syncGoalQuick(parseNum($('eduGoal')));clearPreset();return true;}catch(e){return false;}}

<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
