<!-- [콘텐츠_경제공부_ETF완전정복_2026-06] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
var io;
if('IntersectionObserver'in window){io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');
  // 카운트업
  e.target.querySelectorAll('[data-cf]').forEach(function(el){if(el._done)return;el._done=1;runCF(el,parseFloat(el.getAttribute('data-cf')),900,el.getAttribute('data-suf')||'',el.getAttribute('data-pre')||'');});
  // 차트 draw
  if(e.target.querySelector&&e.target.querySelector('#lnT')){var lq=e.target.querySelector('#lnQ'),lt=e.target.querySelector('#lnT');if(lq)setTimeout(function(){lq.classList.add('go');},120);if(lt)setTimeout(function(){lt.classList.add('go');},120);}
}});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}
else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});d.querySelectorAll('[data-cf]').forEach(function(el){el.textContent=(el.getAttribute('data-pre')||'')+parseFloat(el.getAttribute('data-cf'))+(el.getAttribute('data-suf')||'');});var a=d.getElementById('lnQ'),b=d.getElementById('lnT');if(a)a.classList.add('go');if(b)b.classList.add('go');}

d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});

// 소수 카운트업
window.runCF=function(el,to,dur,suf,pre){dur=dur||900;suf=suf||'';pre=pre||'';var neg=to<0;var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);var v=(to*e);el.textContent=pre+v.toFixed(1)+suf;if(p<1)requestAnimationFrame(s);else el.textContent=pre+to.toFixed(1)+suf;}requestAnimationFrame(s);};

/* ===== 변동성 끌림 시뮬레이터 ===== */
(function(){
 var mode='chop', amp=5;
 var segs=document.getElementById('segs');
 var ampEl=document.getElementById('amp'), ampv=document.getElementById('ampv');
 if(!segs||!ampEl)return;
 function moves(){ // 20거래일 일일 등락 배열 생성 (시드 고정 — 결정적)
   var a=amp/100, arr=[], i;
   if(mode==='chop'){ for(i=0;i<20;i++) arr.push(i%2===0? a : -a); }
   else if(mode==='weak'){ var pat=[1,-0.6,0.9,-0.5,0.8,-0.7,1,-0.4]; for(i=0;i<20;i++) arr.push(a*pat[i%pat.length]); }
   else if(mode==='trend'){ for(i=0;i<20;i++) arr.push(a*0.45); } // 매일 꾸준히 ↑
   else { var pc=[1.4,-1.3,1.1,-1.5,1.6,-1.2,0.9,-1.4,1.3,-1.1]; for(i=0;i<20;i++) arr.push(a*pc[i%pc.length]); }
   return arr;
 }
 function run(lev,arr){ var v=1; for(var i=0;i<arr.length;i++){ v*=(1+lev*arr[i]); if(v<0)v=0; } return v-1; }
 function fmt(x){ var p=(x*100); return (p>=0?'+':'')+p.toFixed(1)+'%'; }
 function paint(){
   var arr=moves();
   var rs=[run(1,arr),run(2,arr),run(3,arr)];
   var maxAbs=Math.max(0.12, Math.abs(rs[0]),Math.abs(rs[1]),Math.abs(rs[2]));
   for(var k=0;k<3;k++){
     var f=document.getElementById('f'+(k+1)), r=document.getElementById('r'+(k+1));
     var val=rs[k], w=Math.min(50, Math.abs(val)/maxAbs*50);
     var col=val>=0?'var(--up)':'var(--down)';
     f.style.background=col;
     if(val>=0){ f.style.left='50%'; f.style.width=w+'%'; } else { f.style.left=(50-w)+'%'; f.style.width=w+'%'; }
     r.textContent=fmt(val); r.style.color=col;
   }
   var note=document.getElementById('simnote');
   var idx1=fmt(rs[0]);
   if(mode==='trend'){ note.innerHTML='강한 추세장에선 <b>3배가 단순 3배보다 더</b> 벌어요(양의 복리). 레버리지가 빛나는 거의 유일한 구간이에요.'; }
   else if(mode==='chop'){ note.innerHTML='지수(1배)는 거의 제자리('+idx1+')인데, 배수가 커질수록 손실이 눈덩이처럼 커져요. 이게 <b>변동성 끌림</b>이에요.'; }
   else if(mode==='weak'){ note.innerHTML='조금씩 오르내리는 약상승장에선 3배가 기대만큼 안 따라줄 때가 많아요. 출렁임이 수익을 갉아먹거든요.'; }
   else { note.innerHTML='급등락이 반복되면 1배는 버텨도 <b>3배는 크게 무너질 수</b> 있어요. 등락폭을 키워 보면 격차가 더 벌어져요.'; }
 }
 segs.addEventListener('click',function(e){ var b=e.target.closest('.seg'); if(!b)return; mode=b.getAttribute('data-mode');
   segs.querySelectorAll('.seg').forEach(function(s){s.classList.toggle('on',s===b);}); paint(); });
 ampEl.addEventListener('input',function(){ amp=parseFloat(ampEl.value); ampv.textContent='±'+amp.toFixed(1)+'%'; paint(); });
 paint();
})();
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
