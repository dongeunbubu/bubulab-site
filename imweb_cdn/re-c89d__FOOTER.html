<!-- [콘텐츠_부동산_전세보증금반환보증3사_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){
 "use strict";
 /* progress bar + header */
 var bar=document.getElementById('readbar'),hdr=document.getElementById('hdr');
 function onScroll(){
  var h=document.documentElement;
  var sc=h.scrollTop||document.body.scrollTop;
  var max=(h.scrollHeight-h.clientHeight)||1;
  bar.style.width=Math.min(100,(sc/max)*100)+'%';
  if(sc>8){hdr.classList.add('scrolled');}else{hdr.classList.remove('scrolled');}
 }
 document.addEventListener('scroll',onScroll,{passive:true});onScroll();

 /* reveal */
 var io=new IntersectionObserver(function(es){
  es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
 },{threshold:.12});
 document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});

 /* checklist toggle */
 document.querySelectorAll('.ck').forEach(function(ck){
  var ip=ck.querySelector('input[type=checkbox]');
  if(!ip) return;
  ip.addEventListener('change',function(){ck.classList.toggle('on',ip.checked);});
 });

 /* ===== 보증료 가늠기 ===== */
 // 대표 요율(%) — 공개자료 기준 어림. [대표, 최저, 최고]
 var RATE={
  HF :{apt:[0.04,0.02,0.18], etc:[0.04,0.02,0.18]},   // LTV/우대로 변동
  HUG:{apt:[0.115,0.115,0.154], etc:[0.139,0.122,0.154]},
  SGI:{apt:[0.192,0.128,0.229], etc:[0.208,0.150,0.260]}
 };
 var dep=30000, htype='apt', term=2;
 var inDep=document.getElementById('inDep'), depKor=document.getElementById('depKor');
 var segType=document.getElementById('segType'), segTerm=document.getElementById('segTerm');
 var vHF=document.getElementById('vHF'), vHUG=document.getElementById('vHUG'), vSGI=document.getElementById('vSGI');
 var fHF=document.getElementById('fHF'), fHUG=document.getElementById('fHUG'), fSGI=document.getElementById('fSGI');
 var rHF=document.getElementById('rHF'), rHUG=document.getElementById('rHUG'), rSGI=document.getElementById('rSGI');

 function won(man){ // 만원 -> 한글 어림
  if(!man||man<=0) return '0원';
  var eok=Math.floor(man/10000), rest=man%10000;
  var s='';
  if(eok>0) s+=eok+'억 ';
  if(rest>0) s+=rest.toLocaleString()+'만 ';
  return (s.trim()||'0')+'원';
 }
 function fee(depMan, ratePct, years){ // 보증료(만원) = 보증금 × 율 × (일수/365)
  var days=years*365;
  return depMan*(ratePct/100)*(days/365); // = depMan*rate/100*years
 }
 function fmt(man){ // 만원 표시(소수1자리, 콤마)
  return (Math.round(man*10)/10).toLocaleString(undefined,{maximumFractionDigits:1});
 }
 function render(){
  dep=Math.max(0, parseFloat(inDep.value)||0);
  depKor.textContent=won(dep);
  var set={
   HF :RATE.HF[htype], HUG:RATE.HUG[htype], SGI:RATE.SGI[htype]
  };
  var fHFv =fee(dep,set.HF[0], term);
  var fHUGv=fee(dep,set.HUG[0],term);
  var fSGIv=fee(dep,set.SGI[0],term);
  vHF.textContent=fmt(fHFv); vHUG.textContent=fmt(fHUGv); vSGI.textContent=fmt(fSGIv);
  var mx=Math.max(fHFv,fHUGv,fSGIv,1);
  fHF.style.width =(fHFv /mx*100)+'%';
  fHUG.style.width=(fHUGv/mx*100)+'%';
  fSGI.style.width=(fSGIv/mx*100)+'%';
  // 범위 텍스트(최저~최고 요율 기준)
  function rng(s){
   var lo=fee(dep,s[1],term), hi=fee(dep,s[2],term);
   return '요율 '+s[0]+'% 적용 · 범위 '+fmt(lo)+'~'+fmt(hi)+'만원(요율 '+s[1]+'~'+s[2]+'%)';
  }
  rHF.innerHTML ='<b>대표 '+fmt(fHFv)+'만원</b> · '+rng(set.HF);
  rHUG.innerHTML='<b>대표 '+fmt(fHUGv)+'만원</b> · '+rng(set.HUG);
  rSGI.innerHTML='<b>대표 '+fmt(fSGIv)+'만원</b> · '+rng(set.SGI);
 }
 inDep.addEventListener('input',render);
 segType.querySelectorAll('button').forEach(function(b){
  b.addEventListener('click',function(){
   segType.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
   b.classList.add('on'); htype=b.getAttribute('data-type'); render();
  });
 });
 segTerm.querySelectorAll('button').forEach(function(b){
  b.addEventListener('click',function(){
   segTerm.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
   b.classList.add('on'); term=parseInt(b.getAttribute('data-term'),10); render();
  });
 });
 render();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274 \uc5f4\uae30');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
