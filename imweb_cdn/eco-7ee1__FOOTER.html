<!-- [콘텐츠_경제공부_샤프지수_2026-06] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
function runBars(root){(root||d).querySelectorAll('.step .fill').forEach(function(f){if(f.dataset.done)return;f.dataset.done=1;f.style.width=parseFloat(f.dataset.w)+'%';});}
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');var cs=e.target.querySelectorAll?e.target.querySelectorAll('.cf'):[];cs.forEach(runCF);if(e.target.classList.contains('cf'))runCF(e.target);if(e.target.querySelector&&e.target.querySelector('.step'))runBars(e.target);}});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});
d.querySelectorAll('.cf').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});runBars(d);}

// count-up
function runCF(el){if(el.dataset.done)return;el.dataset.done=1;var to=parseFloat(el.dataset.to),dec=parseInt(el.dataset.dec||'0'),t0=null,dur=1100;
function fmt(v){return dec>0?v.toFixed(dec):Math.round(v).toLocaleString('en-US');}
function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(s);else el.textContent=fmt(to);}requestAnimationFrame(s);}

// 샤프지수 계산기
(function(){var r=d.getElementById('retIn'),v=d.getElementById('volIn');if(!r||!v)return;
var rOut=d.getElementById('retOut'),vOut=d.getElementById('volOut');
var eqRet=d.getElementById('eqRet'),eqVol=d.getElementById('eqVol'),eqSharpe=d.getElementById('eqSharpe'),eqExc=d.getElementById('eqExc'),eqPer=d.getElementById('eqPer'),vd=d.getElementById('verdict');
var RF=3.6;
function upd(){var ret=parseFloat(r.value),vol=parseFloat(v.value);
var exc=ret-RF;var sharpe=exc/vol;
rOut.textContent=(ret>=0?'+':'')+ret+'%';vOut.textContent=vol+'%';
eqRet.textContent=(ret>=0?'+':'')+ret;eqVol.textContent=vol;
eqSharpe.textContent=sharpe.toFixed(2);
eqExc.textContent=(exc>=0?'+':'')+exc.toFixed(1)+'%p';
eqPer.textContent=sharpe.toFixed(2);
var msg;
if(exc<0){msg='초과수익이 마이너스예요. 위험을 졌는데 그냥 둬도 받았을 국채 이자(3.6%)만도 못 번 셈이라, 샤프도 마이너스('+sharpe.toFixed(2)+')예요. 차라리 안 굴리는 게 나았던 구간이죠.';}
else if(sharpe<0.5){msg='멀미 대비 성적이 약한 구간이에요(샤프 '+sharpe.toFixed(2)+'). 많이 출렁인 것에 비해 손에 쥔 초과수익이 작아요. 테슬라·코카콜라가 여기 근처였죠.';}
else if(sharpe<1){msg='무난한 구간이에요(샤프 '+sharpe.toFixed(2)+'). 출렁임 1단위당 초과수익이 0.5~1배 정도. 나쁘지 않지만 더 욕심내볼 만해요.';}
else if(sharpe<2){msg='좋은 구간이에요(샤프 '+sharpe.toFixed(2)+'). 멀미 1단위당 초과수익이 1배를 넘어요. 시장 지수(약 1.99)·엔비디아(1.87)가 이 근처였어요.';}
else{msg='아주 우수한 구간이에요(샤프 '+sharpe.toFixed(2)+'). 적게 출렁이고도 많이 번 드문 경우죠. 다만 이런 숫자는 특정 기간에 반짝하기 쉬워서, 길게 보고 판단하는 게 좋아요.';}
vd.textContent=msg;}
r.addEventListener('input',upd);v.addEventListener('input',upd);upd();})();
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var dr=document.createElement('div'); dr.className='navDrawer';
 dr.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>부부연구소</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(dr);
 function op(){dr.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){dr.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){dr.classList.contains('on')?cl():op();});
 dr.addEventListener('click',function(e){var t=e.target;if(t===dr||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
