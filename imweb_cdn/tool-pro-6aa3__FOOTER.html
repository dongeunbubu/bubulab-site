<!-- [도구_건강검진Pro_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.12});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
function num(id){return Math.max(0,+($(id).value.replace(/[^0-9]/g,''))||0);}
var IDS=['p_inc','p_exp','p_sav','p_inv','p_eme','p_ast','p_deb'];
// area meta — order MUST match sc[] order below
var AREAS=[
 {k:'저축력',ax:'저축',ic:'🪙'},
 {k:'비상금',ax:'비상금',ic:'🛟'},
 {k:'부채 건전성',ax:'부채',ic:'⚖️'},
 {k:'자산 형성',ax:'자산',ic:'🌱'},
 {k:'투자 습관',ax:'투자',ic:'📈'},
 {k:'지출 관리',ax:'지출',ic:'🧾'}
];
var PRESETS=[
 {n:'신혼 맞벌이',v:[5000000,3000000,800000,400000,6000000,30000000,20000000]},
 {n:'외벌이 신혼',v:[3200000,2300000,500000,150000,3000000,12000000,25000000]},
 {n:'딩크 고소득',v:[7500000,4000000,1500000,1500000,15000000,80000000,10000000]},
 {n:'사회초년생',v:[2600000,1900000,400000,100000,2000000,6000000,8000000]}
];
function won(x){return Math.max(0,Math.round(x/10000));} // 원 -> 만원
function pct(r){return Math.round(r*100);}
var cx=150,cy=150,R=104,ANG=[-90,-30,30,90,150,210].map(function(d){return d*Math.PI/180;});
function pt(score,i){var r=R*Math.max(0,Math.min(100,score))/100;return [cx+r*Math.cos(ANG[i]),cy+r*Math.sin(ANG[i])];}
function polyStr(arr){return arr.map(function(s,i){var p=pt(s,i);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
function gradeOf(s){return s>=80?['A','튼튼','var(--sage)']:s>=60?['B','양호','var(--gold)']:s>=40?['C','보강','var(--rose)']:['D','주의','var(--up)'];}

function scores(v){
 var inc=v[0],exp=v[1],sav=v[2],inv=v[3],eme=v[4],ast=v[5],deb=v[6];
 var incY=inc*12||1;
 return [
   Math.min(100,(sav+inv)/(inc||1)/0.30*100),         // 저축력
   Math.min(100, eme/((exp*6)||1)*100),               // 비상금
   Math.max(0,100-Math.min(100, deb/incY*50)),        // 부채 건전성
   Math.min(100, Math.max(0,(ast-deb))/incY*50),      // 자산 형성
   Math.min(100, (inv/((sav+inv)||1))/0.40*100),      // 투자 습관
   Math.min(100,(1-exp/(inc||1))/0.40*100)            // 지출 관리
 ].map(function(x){return Math.round(Math.max(0,Math.min(100,x)));});
}

function detail(i,v){
 var inc=v[0],exp=v[1],sav=v[2],inv=v[3],eme=v[4],ast=v[5],deb=v[6];
 var incY=inc*12||1;
 if(i===0){var r=(sav+inv)/(inc||1),g=Math.max(0,inc*0.30-(sav+inv));
   return {now:'저축+투자가 소득의 <b>'+pct(r)+'%</b>',base:'권장 30% 이상',fix:g>0?('매달 <b>'+won(g)+'만원</b> 더 모으면 30% 도달'):'권장선 넘었어요 — 이 페이스 유지!'};}
 if(i===1){var mo=eme/(exp||1),g=Math.max(0,exp*6-eme);
   return {now:'지금 비상금은 지출 <b>'+mo.toFixed(1)+'개월치</b>',base:'권장 3~6개월치',fix:g>0?('6개월치까지 <b>'+won(g)+'만원</b> 부족'):'6개월치 확보 — 든든해요!'};}
 if(i===2){var x=deb/incY;
   return {now:'부채가 연소득의 <b>'+x.toFixed(2)+'배</b>',base:'낮을수록 좋아요(1배 미만 권장)',fix:deb>0?'고금리 대출부터 우선상환 계획을':'무부채 — 훌륭해요!'};}
 if(i===3){var x=(ast-deb)/incY;
   return {now:'순금융자산이 연소득의 <b>'+x.toFixed(2)+'배</b>',base:'해마다 두툼해질수록 좋아요',fix:'월 저축을 \'안 건드리는\' 통장으로 자동 적립'};}
 if(i===4){var r=inv/((sav+inv)||1),g=Math.max(0,0.40*(sav+inv)-inv);
   return {now:'적립 중 투자 비중 <b>'+pct(r)+'%</b>',base:'장기 목표라면 40% 안팎',fix:g>0?('월 <b>'+won(g)+'만원</b>을 적립식 투자로 옮겨보기'):'균형 좋아요 — 분산만 유지!'};}
 var s=1-exp/(inc||1),g=Math.max(0,exp-inc*0.70);
 return {now:'흑자율(소득−지출) <b>'+pct(s)+'%</b>',base:'전국 가구 평균 28.5% (\'26 1분기·국가데이터처)',fix:g>0?('고정비에서 월 <b>'+won(g)+'만원</b> 줄이면 30%대'):'흑자율 양호 — 잘 쓰고 있어요!'};
}

function actionLine(i,v){
 var inc=v[0],exp=v[1],sav=v[2],inv=v[3],eme=v[4],ast=v[5],deb=v[6];
 if(i===0){var g=Math.max(0,inc*0.30-(sav+inv));return '저축+투자를 소득의 30%까지 — 매달 <b>'+won(g)+'만원</b> 더 자동이체로 떼어두기.';}
 if(i===1){var g=Math.max(0,exp*6-eme),mth=g>0?Math.ceil(g/Math.max(sav,1)):0;return '비상금 목표(6개월치)까지 <b>'+won(g)+'만원</b> 남았어요. 매달 저축의 일부를 돌리면 약 <b>'+mth+'개월</b> 뒤 달성.';}
 if(i===2){return '대출 <b>금리·잔액·만기</b>를 한 장에 적고, 이자가 가장 비싼 것부터 우선상환 계획을 세워요.';}
 if(i===3){return '이미 저축 중인 월 <b>'+won(sav)+'만원</b>을 \'순자산 적립\' 통장으로 분리해 안 건드리기. 1년이면 <b>'+won(sav*12)+'만원</b>이 쌓여요.';}
 if(i===4){var g=Math.max(0,0.40*(sav+inv)-inv);return '저축의 일부 <b>'+won(g)+'만원</b>을 매달 적립식 인덱스로 — 소액부터, 자동으로.';}
 var g2=Math.max(0,exp-inc*0.70);return '고정비·구독에서 월 <b>'+won(g2)+'만원</b> 줄이기. 구독 누수 점검 도구로 시작해요.';
}

var gridDone={};
function drawGrid(gridEl,axisEl){
 if(gridDone[gridEl.id])return;
 var g='';[0.25,0.5,0.75,1].forEach(function(L){var p=[];for(var i=0;i<6;i++){var x=cx+R*L*Math.cos(ANG[i]),y=cy+R*L*Math.sin(ANG[i]);p.push(x.toFixed(1)+','+y.toFixed(1));}g+='<polygon points="'+p.join(' ')+'" fill="none" stroke="#EAD7D3" stroke-width="1"/>';});
 gridEl.innerHTML=g;
 var ax='';for(var i=0;i<6;i++){var x=cx+R*Math.cos(ANG[i]),y=cy+R*Math.sin(ANG[i]);ax+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="#EAD7D3" stroke-width="1"/>';var lx=cx+(R+22)*Math.cos(ANG[i]),ly=cy+(R+22)*Math.sin(ANG[i]);ax+='<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" font-size="12" font-weight="800" fill="var(--mut)" text-anchor="middle">'+AREAS[i].ax+'</text>';}
 axisEl.innerHTML=ax;gridDone[gridEl.id]=1;
}

function popPoly(el){el.style.transition='none';el.style.transform='scale(0)';el.style.opacity='0';el.getBoundingClientRect();el.style.transformOrigin='150px 150px';el.style.transition='transform .9s var(--ease),opacity .9s';el.style.transform='scale(1)';el.style.opacity='1';}

function compute(animate){
 var v=IDS.map(function(id){return num(id);});
 IDS.forEach(function(id){var x=num(id);$(id).value=x?x.toLocaleString('ko-KR'):'';});
 var sc=scores(v);
 var total=Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length);
 // gauge
 if(animate){window.countUp($('sNum'),total,1000);var a=$('sArc');a.style.transition='stroke-dashoffset 1.1s var(--ease)';a.style.strokeDashoffset=(100-total);}
 else{$('sNum').textContent=total;$('sArc').style.strokeDashoffset=(100-total);}
 var gr=total>=80?'아주 건강해요 🌳':total>=65?'대체로 괜찮아요 🌱':total>=45?'기초를 다질 때예요 🧩':'지금부터 시작해요 🔧';
 $('sGrade').textContent=gr;
 $('sMsg').textContent='부부 합산 기준 종합 '+total+'점이에요. 아래에서 영역별 처방과 30일 플랜을 확인하세요.';
 var pctile=Math.max(3,Math.min(97,Math.round(total*0.9+5)));
 $('sPct').style.width=pctile+'%';$('sPctc').textContent='또래 신혼부부 100쌍 중 상위 '+(100-pctile)+'% 수준 (추정)';
 // radar 1
 drawGrid($('radarGrid'),$('radarAxis'));
 $('radarG').setAttribute('points',polyStr(sc));
 if(animate)popPoly($('radarG'));
 // area cards
 $('areagrid').innerHTML=AREAS.map(function(a,i){var d=detail(i,v),gd=gradeOf(sc[i]);
   return '<div class="acard" style="--g:'+gd[2]+'"><div class="ah"><span class="ai">'+a.ic+'</span><span class="an">'+a.k+'</span><span class="ag">'+gd[0]+' · '+gd[1]+'</span></div>'
   +'<div class="asc"><span>점수</span><b>'+sc[i]+'</b></div><div class="at"><i style="width:'+(animate?0:sc[i])+'%" data-w="'+sc[i]+'"></i></div>'
   +'<div class="arow"><span class="lb">지금</span>'+d.now+'</div><div class="arow"><span class="lb">기준</span>'+d.base+'</div>'
   +'<div class="fix">→ '+d.fix+'</div></div>';
 }).join('');
 if(animate)setTimeout(function(){$('areagrid').querySelectorAll('.at i').forEach(function(el){el.style.width=el.dataset.w+'%';});},120);
 // weakest 2 (ascending)
 var order=sc.map(function(s,i){return [s,i];}).sort(function(a,b){return a[0]-b[0];});
 var w0=order[0][1],w1=order[1][1];
 // 30-day plan
 var weeks=[
   {n:'1',t:'구조 만들기',d:'급여 통장에서 <b>비상금·생활비·저축</b> 3개로 자동 분리. 통장 쪼개기 도구로 비율부터 잡아요.'},
   {n:'2',t:AREAS[w0].k,d:actionLine(w0,v)},
   {n:'3',t:AREAS[w1].k,d:actionLine(w1,v)},
   {n:'4',t:'자동화 + 재검진',d:'2~3주차 실행을 <b>자동이체</b>로 고정하고, 30일 뒤 오늘 점수와 다시 비교해요.'}
 ];
 $('plan').innerHTML=weeks.map(function(w){return '<div class="wk"><div class="num">'+w.n+'</div><div class="wt">'+w.n+'주차 · '+w.t+'</div><div class="wd">'+w.d+'</div></div>';}).join('');
 if($('plan').parentNode.classList.contains('in'))$('plan').classList.add('in');
 // projection — bring weak2 up to max(cur,70)
 var tsc=sc.slice();tsc[w0]=Math.max(sc[w0],70);tsc[w1]=Math.max(sc[w1],70);
 var after=Math.round(tsc.reduce(function(a,b){return a+b;},0)/tsc.length);
 var gain=after-total;
 if(animate){window.countUp($('pjBefore'),total,900);window.countUp($('pjAfter'),after,1100);}
 else{$('pjBefore').textContent=total;$('pjAfter').textContent=after;}
 $('pjGain').textContent='+'+gain+'점';
 $('pjMsg').innerHTML='약점 2영역(<b>'+AREAS[w0].k+'·'+AREAS[w1].k+'</b>)만 기준선까지 끌어올리면 종합 <b>'+total+'</b> → <b>'+after+'</b>점. 작은 자동이체 몇 개로 이만큼 달라져요.';
 drawGrid($('radar2Grid'),$('radar2Axis'));
 $('radar2C').setAttribute('points',polyStr(sc));
 $('radar2T').setAttribute('points',polyStr(tsc));
 if(animate){popPoly($('radar2C'));popPoly($('radar2T'));}
 window.__lastTotal=total;
}

/* ===== 재검진 추적 (localStorage) ===== */
var HKEY='bbHealthPro_history_v1';
function loadHist(){try{return JSON.parse(localStorage.getItem(HKEY)||'[]');}catch(e){return [];}}
function saveHist(h){try{localStorage.setItem(HKEY,JSON.stringify(h));}catch(e){}}
function todayStr(){var d=new Date();function z(n){return(n<10?'0':'')+n;}return d.getFullYear()+'.'+z(d.getMonth()+1)+'.'+z(d.getDate());}
function renderHist(animate){
 var h=loadHist();
 var spark=$('spark'),empty=$('emptyhist'),dm=$('deltamsg');
 if(!h.length){empty.style.display='';$('sparkLine').setAttribute('points','');$('sparkDots').innerHTML='';$('sparkGrid').innerHTML='';dm.innerHTML='아직 기록이 없어요. 오늘 점수를 저장해 첫 점을 찍어보세요.';return;}
 empty.style.display='none';
 var data=h.slice(-12);
 var W=260,H=90,pl=18,pr=14,pt2=12,pb=20;
 var xs=function(i){return data.length<2?(pl+(W-pl-pr)/2):pl+(W-pl-pr)*i/(data.length-1);};
 var ys=function(s){return pt2+(H-pt2-pb)*(1-Math.max(0,Math.min(100,s))/100);};
 // grid lines 50/100
 var g='';[0,50,100].forEach(function(L){var y=ys(L);g+='<line x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+y.toFixed(1)+'" stroke="#EAD7D3" stroke-width="1" stroke-dasharray="'+(L===0?'0':'3 3')+'"/>';g+='<text x="'+(W-pr+1)+'" y="'+(y+3).toFixed(1)+'" font-size="8" fill="var(--mut)" text-anchor="start">'+L+'</text>';});
 $('sparkGrid').innerHTML=g;
 var pts=data.map(function(e,i){return xs(i).toFixed(1)+','+ys(e.s).toFixed(1);}).join(' ');
 var ln=$('sparkLine');ln.setAttribute('points',pts);
 if(animate){var L=ln.getTotalLength?ln.getTotalLength():300;ln.style.transition='none';ln.style.strokeDasharray=L;ln.style.strokeDashoffset=L;ln.getBoundingClientRect();ln.style.transition='stroke-dashoffset 1s var(--ease)';ln.style.strokeDashoffset=0;}
 $('sparkDots').innerHTML=data.map(function(e,i){var last=i===data.length-1;return '<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(e.s).toFixed(1)+'" r="'+(last?4:2.6)+'" fill="'+(last?'var(--rose)':'#fff')+'" stroke="var(--rose)" stroke-width="2"/>';}).join('');
 if(h.length>=2){var prev=h[h.length-2].s,cur=h[h.length-1].s,dd=cur-prev;
   dm.innerHTML='지난번 <b>'+prev+'점</b> ('+h[h.length-2].d+') → 이번 <b>'+cur+'점</b> · '+(dd>=0?'<b class="up">▲ '+dd+'점</b>':'<b class="dn">▼ '+Math.abs(dd)+'점</b>');
 }else{dm.innerHTML='첫 기록을 저장했어요 — <b>'+h[h.length-1].s+'점</b> ('+h[h.length-1].d+'). 다음에 오면 변화가 보여요.';}
}

IDS.forEach(function(id){$(id).addEventListener('input',function(){compute(false);});$(id).addEventListener('change',function(){compute(true);});});
// presets
(function(){var box=$('presets');PRESETS.forEach(function(p,i){var b=document.createElement('button');b.type='button';b.className='preset'+(i===0?' on':'');b.textContent=p.n;b.addEventListener('click',function(){IDS.forEach(function(id,k){$(id).value=p.v[k].toLocaleString('ko-KR');});box.querySelectorAll('.preset').forEach(function(x){x.classList.remove('on');});b.classList.add('on');compute(true);});box.appendChild(b);});})();
// save / clear
$('saveBtn').addEventListener('click',function(){var t=window.__lastTotal;if(t==null)return;var h=loadHist();var ds=todayStr();if(h.length&&h[h.length-1].d===ds){h[h.length-1].s=t;}else{h.push({d:ds,s:t});}if(h.length>24)h=h.slice(-24);saveHist(h);renderHist(true);});
$('clearBtn').addEventListener('click',function(){saveHist([]);renderHist(false);});

compute(true);
renderHist(false);
// animate spark when its section scrolls in
if('IntersectionObserver'in window){var so=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){renderHist(true);so.disconnect();}});},{threshold:.3});var sec=$('spark');if(sec)so.observe(sec.closest('section'));}
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
