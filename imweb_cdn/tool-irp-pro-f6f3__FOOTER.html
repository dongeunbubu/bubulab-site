<!-- [도구_연금저축IRP세액공제Pro_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>
(function(){
"use strict";
var $=function(id){return document.getElementById(id);};
var KEY="bbPensionTaxPro_v1";

/* ---------- helpers ---------- */
function won(n){n=Math.round(n);return n.toLocaleString("ko-KR")+"원";}
function manStr(n){ // n in 만원 → "1,234만" or "1억 2,340만"
 n=Math.round(n);
 if(n>=10000){var eok=Math.floor(n/10000),man=n%10000;return eok+"억"+(man>0?(" "+man.toLocaleString("ko-KR")+"만"):"");}
 return n.toLocaleString("ko-KR")+"만";
}
function parseNum(s){var v=parseInt(String(s).replace(/[^0-9]/g,""),10);return isNaN(v)?0:v;}
function clampNum(v,a,b){return Math.max(a,Math.min(b,v));}

/* ---------- state ---------- */
var st={
 mode:"couple",
 A:{sal:5000,ps:600,irp:300,isa:0},
 B:{sal:6000,ps:400,irp:200,isa:0},
 ret:6, yrs:20
};

/* ---------- core math (airtight, closed form) ---------- */
function rateOf(sal){return sal<=5500?0.165:0.132;} // 만원 기준
function calcPerson(p){
 var rate=rateOf(p.sal);
 var psC=Math.min(p.ps,600);                 // 연금저축 단독 한도 600만
 var irpRoom=900-psC;                        // 합산 900까지 남은 칸
 var irpC=Math.min(p.irp,irpRoom);           // IRP 인정분
 var credited=psC+irpC;                      // = min(min(ps,600)+irp,900)
 var isaBonusBase=Math.min(p.isa*0.10,300);  // ISA 전환 추가 한도(최대 300)
 var totalBase=credited+isaBonusBase;        // 만원
 var refundMan=totalBase*rate;               // 만원
 var waste=(p.ps-psC)+(p.irp-irpC);          // 공제 못 받는 납입(만원)
 var room=900-credited;                      // 더 채울 수 있는 합산 한도
 var addRefundIfFull=room*rate;              // 한도 마저 채우면 추가 환급
 var paid=p.ps+p.irp;                        // 실제 연 납입(만원)
 return {rate:rate,psC:psC,irpC:irpC,credited:credited,isaBonusBase:isaBonusBase,
  totalBase:totalBase,refundMan:refundMan,refundWon:refundMan*10000,
  waste:waste,room:room,addRefundIfFull:addRefundIfFull,paid:paid};
}

/* annuity-due future value: contribute C at start of each year, grow r, for y years */
function fvDue(C,r,y){
 if(y<=0)return 0;
 if(Math.abs(r)<1e-9)return C*y;
 return C*(1+r)*(Math.pow(1+r,y)-1)/r;
}

/* ---------- countup ---------- */
function countUp(el,target,fmt,dur){
 dur=dur||900;var t0=null,from=0;
 function step(ts){if(!t0)t0=ts;var p=Math.min(1,(ts-t0)/dur);var e=1-Math.pow(1-p,3);
  el.textContent=fmt(from+(target-from)*e);if(p<1)requestAnimationFrame(step);}
 requestAnimationFrame(step);
}

/* ---------- render ---------- */
var firstRender=true;
function render(){
 var coupled=st.mode==="couple";
 var A=calcPerson(st.A), B=calcPerson(st.B);
 var sumRefundWon=A.refundWon+(coupled?B.refundWon:0);

 // rate badges
 $("rateA").textContent=(A.rate*100).toFixed(1)+"%";
 $("rateB").textContent=(B.rate*100).toFixed(1)+"%";

 // hero
 var bigLabel=coupled?"올해 우리 부부가 돌려받는 세금":"올해 내가 돌려받는 세금";
 $("bigLab").textContent=bigLabel;
 if(firstRender){countUp($("bigVal"),sumRefundWon,function(v){return Math.round(v).toLocaleString("ko-KR")+"";},1000);
  setTimeout(function(){$("bigVal").innerHTML=sumRefundWon.toLocaleString("ko-KR")+"<small>원</small>";},1010);}
 else $("bigVal").innerHTML=sumRefundWon.toLocaleString("ko-KR")+"<small>원</small>";

 // badge — show the leading person's rate as "확정 수익"
 var leadRate=coupled?Math.max(A.rate,B.rate):A.rate;
 $("fixBadge").innerHTML="🛡️ 납입액의 "+(leadRate*100).toFixed(1)+"% = 시장 안 거친 확정 환급";

 var totalPaid=A.paid+(coupled?B.paid:0);
 $("bigHint").textContent=totalPaid>0?("연 "+manStr(totalPaid)+"원 넣어 "+won(sumRefundWon)+"을 13월의 월급으로 받아요."):"연금저축·IRP 납입액을 넣어보세요.";

 // KPI
 $("kAlab").textContent=coupled?"나 환급":"내 환급";
 $("kA").textContent=won(A.refundWon);
 $("kB").textContent=won(B.refundWon);
 $("kSum").textContent=won(sumRefundWon);
 $("kBwrap").style.display=coupled?"":"none";

 // reco band
 var reco="";
 var maxBase=coupled?2400:1200; // 1200 per person (900+300)
 if(totalPaid<=0){reco="아직 납입이 없어요. <b>연금저축 600만원</b>부터 채우면 올해 바로 환급이 시작돼요.";}
 else{
  // who has the most room to fill?
  var cand=[{n:"나",r:A.room,add:A.addRefundIfFull}];
  if(coupled)cand.push({n:"배우자",r:B.room,add:B.addRefundIfFull});
  cand.sort(function(a,b){return b.add-a.add;});
  var top=cand[0];
  var bothMaxed=(A.room<=0)&&(!coupled||B.room<=0);
  var anyWaste=(A.waste>0)||(coupled&&B.waste>0);
  if(bothMaxed){reco="🎉 한도를 <b>꽉 채우셨어요</b>! 더 넣어도 공제는 안 늘어요. 굴리는 데 집중할 때예요.";}
  else if(top.r>0&&top.add>=1){reco=top.n+"님은 한도가 <b>"+manStr(top.r)+"원</b> 남았어요. 마저 채우면 <b>"+won(top.add*10000)+"</b>을 더 돌려받아요.";}
  else{reco="좋아요, 거의 다 채웠어요. 남은 한도를 IRP로 채우면 끝이에요.";}
  if(anyWaste)reco+=" <b>한도 초과분</b>은 올해 공제가 안 돼요(내년 이월 가능).";
 }
 $("reco").innerHTML=reco;

 // refund split bars
 var maxRefund=Math.max(A.refundWon,coupled?B.refundWon:0,1);
 $("bAamt").textContent=won(A.refundWon);
 $("bBamt").textContent=won(B.refundWon);
 $("bBrow").style.display=coupled?"":"none";
 $("cmpWrap").style.display=coupled?"":"none";
 setTimeout(function(){
  $("bA").style.width=(A.refundWon/maxRefund*100)+"%";
  if(coupled)$("bB").style.width=(B.refundWon/maxRefund*100)+"%";
 },60);

 // ===== gauges =====
 renderGauge("A",st.A,A,"rose");
 $("gaugeBwrap").style.display=coupled?"":"none";
 if(coupled)renderGauge("B",st.B,B,"lav");

 // ===== education cards =====
 var rateTxtA=(A.rate*100).toFixed(1);
 if(coupled){
  var sameRate=(A.rate===B.rate);
  $("eb1").textContent=sameRate?("두 분 모두 "+rateTxtA+"% 적용"):("나 "+rateTxtA+"% · 배우자 "+(B.rate*100).toFixed(1)+"%");
 } else $("eb1").textContent="나: "+rateTxtA+"% 적용";
 var full900A=900*A.rate*10000;
 $("eb2").textContent="900만 채우면 "+won(full900A)+" 환급"+(coupled?" (1인 기준)":"");
 var isaTotal=A.isaBonusBase+(coupled?B.isaBonusBase:0);
 if(isaTotal>0)$("eb3").textContent="지금 전환 보너스 "+won((A.isaBonusBase*A.rate+(coupled?B.isaBonusBase*B.rate:0))*10000);
 else $("eb3").textContent="ISA 전환 시 최대 "+won(300*A.rate*10000)+" 추가";

 // couple insight
 if(coupled){
  var bothFull=900*(A.rate+B.rate)*10000;
  $("coupleins").innerHTML="부부가 각자 900만원씩 채우면 공제 한도가 <b>합산 1,800만원</b> — 올해만 최대 <b>"+won(bothFull)+"</b>을 함께 돌려받을 수 있어요. 지금 두 분 합산 환급은 <b>"+won(sumRefundWon)+"</b>이에요.";
 } else {
  $("coupleins").innerHTML="배우자도 연금계좌를 만들면 공제 한도가 <b>합산 1,800만원</b>으로 두 배가 돼요. ‘부부 함께’로 바꿔 비교해 보세요.";
 }

 // ===== growth curve =====
 renderCurve(coupled,A,B);

 firstRender=false;
}

function renderGauge(tag,raw,c,color){
 var max=1200; // 900 + ISA 300
 var psW=c.psC/max*100, irpW=c.irpC/max*100, isaW=c.isaBonusBase/max*100;
 var wasteShown=Math.min(c.waste, max-(c.psC+c.irpC+c.isaBonusBase)); // visual cap
 var wasteW=Math.max(0,wasteShown)/max*100;
 $("g"+tag+"amt").textContent="공제 인정 "+manStr(c.credited)+(c.isaBonusBase>0?(" +ISA "+manStr(c.isaBonusBase)):"")+" / 900만";
 $("g"+tag+"sub").textContent="연금저축 "+manStr(raw.ps)+" · IRP "+manStr(raw.irp)+(raw.isa>0?(" · ISA전환 "+manStr(raw.isa)):"");
 setTimeout(function(){
  $("g"+tag+"psB").style.width=psW+"%";
  $("g"+tag+"irpB").style.width=irpW+"%";
  $("g"+tag+"isaB").style.width=isaW+"%";
  $("g"+tag+"wasteB").style.width=wasteW+"%";
 },80);
 var roomEl=$("g"+tag+"room");
 if(c.room>0)roomEl.innerHTML="합산 한도까지 <b>"+manStr(c.room)+"원</b> 더 넣을 수 있어요 (마저 채우면 +"+won(c.addRefundIfFull*10000)+").";
 else roomEl.innerHTML="합산 900만 한도를 <b>다 채웠어요</b> 🎉"+(c.isaBonusBase>0?" ISA 전환 보너스까지 더했어요.":"");
 var wEl=$("g"+tag+"waste");
 if(c.waste>0){wEl.classList.add("on");wEl.innerHTML="한도 초과 납입 <b>"+manStr(c.waste)+"원</b>은 올해 공제 대상이 아니에요. 내년 납입으로 이월하면 다시 공제받을 수 있어요.";}
 else wEl.classList.remove("on");
}

/* ---------- SVG curve ---------- */
function renderCurve(coupled,A,B){
 var C=A.paid+(coupled?B.paid:0);           // 연 납입 합계(만원, 실제)
 var r=st.ret/100, y=st.yrs;
 var refundPerYr=(A.refundMan+(coupled?B.refundMan:0)); // 만원/년
 // build series
 var prin=[], val=[];
 for(var t=0;t<=y;t++){prin.push(C*t); val.push(fvDue(C,r,t));}
 var maxV=Math.max(val[y],1);
 var W=720,H=300,padL=8,padR=12,padT=14,padB=26;
 var x0=padL,x1=W-padR,yb=H-padB,yt=padT;
 function X(t){return x0+(x1-x0)*(t/y);}
 function Y(v){return yb-(yb-yt)*(v/maxV);}
 function path(arr){var d="";for(var t=0;t<=y;t++){d+=(t===0?"M":"L")+X(t).toFixed(1)+" "+Y(arr[t]).toFixed(1);}return d;}
 var svg=$("chart");
 var gridH="";
 for(var g=0;g<=4;g++){var gy=yt+(yb-yt)*g/4;var gv=maxV*(1-g/4);
  gridH+='<line x1="'+x0+'" y1="'+gy.toFixed(1)+'" x2="'+x1+'" y2="'+gy.toFixed(1)+'" stroke="#EAD7D3" stroke-width="1"/>';
  gridH+='<text x="'+x1+'" y="'+(gy-4).toFixed(1)+'" text-anchor="end" font-size="10" fill="#8A7B72" font-weight="700">'+manStr(gv)+'</text>';
 }
 // area between prin and val
 var area="M"+X(0)+" "+Y(prin[0]);
 for(var t1=0;t1<=y;t1++)area+="L"+X(t1).toFixed(1)+" "+Y(val[t1]).toFixed(1);
 for(var t2=y;t2>=0;t2--)area+="L"+X(t2).toFixed(1)+" "+Y(prin[t2]).toFixed(1);
 area+="Z";
 var dP=path(prin), dV=path(val);
 var xticks="";
 [0,Math.round(y/2),y].forEach(function(tt){xticks+='<text x="'+X(tt).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#8A7B72" font-weight="700">'+tt+'년</text>';});
 svg.innerHTML=gridH
  +'<path class="gap" d="'+area+'"/>'
  +'<path class="pline" d="'+dP+'"/>'
  +'<path class="valline" id="vpath" d="'+dV+'" pathLength="1" style="stroke-dasharray:1;stroke-dashoffset:1"/>'
  +'<circle class="dotP" cx="'+X(y).toFixed(1)+'" cy="'+Y(prin[y]).toFixed(1)+'" r="4.5"/>'
  +'<circle class="dotV" cx="'+X(y).toFixed(1)+'" cy="'+Y(val[y]).toFixed(1)+'" r="5"/>'
  +xticks;
 // draw animation
 var vp=$("vpath");
 if(vp){vp.style.transition="none";vp.style.strokeDashoffset="1";
  requestAnimationFrame(function(){requestAnimationFrame(function(){vp.style.transition="stroke-dashoffset 1.3s var(--ease)";vp.style.strokeDashoffset="0";});});}
 // summary
 $("chTitle").textContent="연금계좌 평가액 — "+y+"년";
 $("sPrin").textContent=manStr(prin[y]).replace("만","만원");
 var gain=val[y]-prin[y];
 $("sGain").textContent=manStr(gain).replace("만","만원");
 $("sRefund").textContent=manStr(refundPerYr*y).replace("만","만원");
 var note="매년 "+manStr(C)+"원을 넣고 연 "+st.ret+"%로 굴리면 "+y+"년 뒤 평가액은 약 <b>"+manStr(val[y])+"원</b>이에요. ";
 note+="그동안 세금으로만 누적 <b>"+manStr(refundPerYr*y)+"원</b>을 돌려받고요. ";
 if(C>(coupled?1800:900))note+="(공제 한도를 넘는 납입도 굴리는 데는 들어가지만, 세액공제는 한도까지만이에요.)";
 else note+="납입은 모두 공제 한도 안이라 한 푼도 버려지지 않아요.";
 $("growNote").innerHTML=note;
}

/* ---------- wire inputs ---------- */
function setSeg(box,attr,cb){
 var btns=box.querySelectorAll("button");
 btns.forEach(function(b){b.addEventListener("click",function(){
  btns.forEach(function(x){x.classList.remove("on");});b.classList.add("on");cb(b.getAttribute(attr));render();});});
}
// mode
setSeg($("modeseg"),"data-mode",function(v){st.mode=v;});
// salary chips + input
function wireSalary(tag){
 var inp=$("sal"+tag), chips=$("chSal"+tag);
 function commit(v){v=clampNum(v,0,100000);st[tag].sal=v;inp.value=v.toLocaleString("ko-KR");
  chips.querySelectorAll("button").forEach(function(b){b.classList.toggle("on",parseNum(b.getAttribute("data-v"))===v);});}
 inp.addEventListener("input",function(){st[tag].sal=parseNum(inp.value);
  chips.querySelectorAll("button").forEach(function(b){b.classList.toggle("on",parseNum(b.getAttribute("data-v"))===st[tag].sal);});render();});
 inp.addEventListener("blur",function(){commit(st[tag].sal);});
 chips.querySelectorAll("button").forEach(function(b){b.addEventListener("click",function(){commit(parseNum(b.getAttribute("data-v")));render();});});
}
wireSalary("A");wireSalary("B");
// range sliders
function wireRange(id,tag,field,suffix,fmt){
 var el=$(id),out=$(id+"v");
 el.addEventListener("input",function(){var v=parseInt(el.value,10);st[tag][field]=v;out.textContent=(fmt?fmt(v):manStr(v))+(suffix||"");checkWarn(tag);render();});
}
wireRange("psA","A","ps","");wireRange("irpA","A","irp","");
wireRange("psB","B","ps","");wireRange("irpB","B","irp","");
wireRange("isaA","A","isa","");wireRange("isaB","B","isa","");
function checkWarn(tag){var paid=st[tag].ps+st[tag].irp;$("warn"+tag).classList.toggle("on",paid>1800);}
// ret seg
setSeg($("segRet"),"data-r",function(v){st.ret=parseFloat(v);});
// yrs
$("yrs").addEventListener("input",function(){st.yrs=parseInt($("yrs").value,10);$("yrsv").textContent=st.yrs+"년";render();});

/* ---------- save / load (localStorage, device only) ---------- */
function loadSaves(){try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch(e){return [];}}
function writeSaves(a){try{localStorage.setItem(KEY,JSON.stringify(a.slice(0,8)));}catch(e){}}
function renderSaves(){
 var arr=loadSaves(),box=$("saveList");
 if(!arr.length){box.innerHTML='<div class="emptysave">아직 저장한 시나리오가 없어요.</div>';return;}
 box.innerHTML="";
 arr.forEach(function(it,i){
  var div=document.createElement("div");div.className="saveitem";
  div.innerHTML='<div class="si"><b>'+escapeHtml(it.name)+'</b> <span>'+escapeHtml(it.sub)+'</span></div>'
   +'<button data-act="load" data-i="'+i+'">불러오기</button><button data-act="del" data-i="'+i+'">삭제</button>';
  box.appendChild(div);
 });
 box.querySelectorAll("button").forEach(function(b){b.addEventListener("click",function(){
  var i=parseInt(b.getAttribute("data-i"),10),act=b.getAttribute("data-act"),arr=loadSaves();
  if(act==="del"){arr.splice(i,1);writeSaves(arr);renderSaves();}
  else{applyState(arr[i].st);renderSaves();}
 });});
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function applyState(s){
 st.mode=s.mode;st.A=Object.assign({},s.A);st.B=Object.assign({},s.B);st.ret=s.ret;st.yrs=s.yrs;
 // reflect UI
 $("modeseg").querySelectorAll("button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-mode")===st.mode);});
 ["A","B"].forEach(function(tag){
  $("sal"+tag).value=st[tag].sal.toLocaleString("ko-KR");
  $("chSal"+tag).querySelectorAll("button").forEach(function(b){b.classList.toggle("on",parseNum(b.getAttribute("data-v"))===st[tag].sal);});
  $("ps"+tag).value=st[tag].ps;$("ps"+tag+"v").textContent=manStr(st[tag].ps);
  $("irp"+tag).value=st[tag].irp;$("irp"+tag+"v").textContent=manStr(st[tag].irp);
  $("isa"+tag).value=st[tag].isa;$("isa"+tag+"v").textContent=manStr(st[tag].isa);
  checkWarn(tag);
 });
 $("yrs").value=st.yrs;$("yrsv").textContent=st.yrs+"년";
 $("segRet").querySelectorAll("button").forEach(function(b){b.classList.toggle("on",parseFloat(b.getAttribute("data-r"))===st.ret);});
 firstRender=true;render();
}
$("saveBtn").addEventListener("click",function(){
 var nm=$("saveName").value.trim()||"시나리오";
 var A=calcPerson(st.A),B=calcPerson(st.B);
 var sum=A.refundWon+(st.mode==="couple"?B.refundWon:0);
 var sub=(st.mode==="couple"?"부부":"나")+" · 올해 "+won(sum);
 var arr=loadSaves();arr.unshift({name:nm,sub:sub,st:JSON.parse(JSON.stringify(st))});writeSaves(arr);
 $("saveName").value="";renderSaves();
});

/* ---------- header / scroll / reveal ---------- */
var hdr=$("hdr"),sp=$("sp"),toTop=$("toTop");
function onScroll(){
 var y=window.scrollY||document.documentElement.scrollTop;
 hdr.classList.toggle("scrolled",y>8);
 var h=document.documentElement.scrollHeight-window.innerHeight;
 sp.style.width=(h>0?(y/h*100):0)+"%";
 toTop.classList.toggle("on",y>500);
}
window.addEventListener("scroll",onScroll,{passive:true});onScroll();
toTop.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});
var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{threshold:.12});
document.querySelectorAll(".reveal").forEach(function(el){io.observe(el);});

/* ---------- init ---------- */
renderSaves();
render();
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274 \uc5f4\uae30');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}

<script>/*fxkrw*//*fxkrw-v2*/
(function(){
  if(document.documentElement.getAttribute('data-fxk'))return;
  document.documentElement.setAttribute('data-fxk','1');
  var FALLBACK=1525, rate=FALLBACK, live=false;
  try{var _c=JSON.parse(sessionStorage.getItem('bblfx')||'0');if(_c&&_c.r&&(Date.now()-_c.t)<43200000){rate=_c.r;live=true;}}catch(e){}
  function f(x){return x>=100?Math.round(x).toLocaleString('ko-KR'):(Math.round(x*10)/10).toLocaleString('ko-KR');}
  function fmt(won){
    if(won>=1e12)return f(won/1e12)+'조원';
    if(won>=1e8)return f(won/1e8)+'억원';
    if(won>=1e4)return f(won/1e4)+'만원';
    return Math.round(won).toLocaleString('ko-KR')+'원';
  }
  var MU={'십억':1e9,'백만':1e6,'조':1e12,'억':1e8,'만':1e4,'bn':1e9,'mn':1e6,'B':1e9,'M':1e6,'T':1e12};
  var RE=/\$([0-9][0-9,]*(?:\.[0-9]+)?)(십억|백만|조|억|만|bn|mn|B|M|T)?/;
  function mag(str,suf){var n=parseFloat(str.replace(/,/g,''));return n*(suf&&MU[suf]?MU[suf]:1);}
  function wrap(){
    var sk={SCRIPT:1,STYLE:1,NOSCRIPT:1,TEXTAREA:1};
    var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:function(node){
      if(!node.nodeValue||node.nodeValue.indexOf('$')<0)return 2;
      var p=node.parentNode;
      while(p&&p!==document.body){
        if(sk[p.nodeName])return 2;
        var c=p.className?(''+p.className):'';
        if(c.indexOf('fxk')>=0||c.indexOf('fxbadge')>=0)return 2;
        p=p.parentNode;
      }
      return RE.test(node.nodeValue)?1:2;
    }});
    var nodes=[],n;while(n=w.nextNode())nodes.push(n);
    var G=new RegExp(RE.source,'g');
    nodes.forEach(function(node){
      var txt=node.nodeValue, frag=document.createDocumentFragment(), last=0, m; G.lastIndex=0;
      while(m=G.exec(txt)){
        frag.appendChild(document.createTextNode(txt.slice(last,m.index+m[0].length)));
        var usd=mag(m[1],m[2]);
        var sp=document.createElement('span'); sp.className='fxk'; sp.setAttribute('data-usd',usd);
        sp.textContent='(약 '+fmt(usd*rate)+')';
        frag.appendChild(sp);
        last=m.index+m[0].length;
      }
      frag.appendChild(document.createTextNode(txt.slice(last)));
      node.parentNode.replaceChild(frag,node);
    });
  }
  function apply(){
    var els=document.querySelectorAll('.fxk[data-usd]');
    for(var i=0;i<els.length;i++){var u=parseFloat(els[i].getAttribute('data-usd'));els[i].textContent='(약 '+fmt(u*rate)+')';}
    var b=document.getElementById('fxbadge');
    if(b){b.querySelector('.rt').textContent='$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원';
          b.querySelector('.lb').textContent=live?'실시간':'기준';}
  }
  function badge(){
    var d=document.createElement('div'); d.id='fxbadge'; d.className='fxbadge';
    d.innerHTML='<span class="dot"></span><span class="rt">$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원</span><span class="lb">기준</span>';
    document.body.appendChild(d);
  }
  function start(){
    wrap(); badge();
    try{fetch('https://api.frankfurter.dev/v1/latest?from=USD&to=KRW')
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.rates&&j.rates.KRW){rate=j.rates.KRW;live=true;apply();try{sessionStorage.setItem('bblfx',JSON.stringify({r:rate,t:Date.now()}))}catch(e){}}})
      .catch(function(){});}catch(e){}
  }
  if(document.readyState!=='loading')start();else document.addEventListener('DOMContentLoaded',start);
})();
</script>
