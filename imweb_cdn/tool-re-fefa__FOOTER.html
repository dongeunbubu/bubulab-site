<!-- [도구_부동산_평형변환_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){
 "use strict";
 var doc=document;
 var M2P=400/121;            // 1평 = 400/121 ㎡ = 3.305785…(정확값)
 function m2ToP(m){return m/M2P;}
 function pToM2(p){return p*M2P;}
 function r1(x){return Math.round(x*10)/10;}
 function r2(x){return Math.round(x*100)/100;}
 function $(id){return doc.getElementById(id);}
 function setText(id,v){var el=$(id); if(el) el.textContent=v;}

 /* ---------- ① 메인 변환기 ---------- */
 var inJeon=$('inJeon'), inRate=$('inRate'), TBL_TERMS=[39,49,59,74,84,101,114,134];

 function paintSlider(){
  var min=+inRate.min, max=+inRate.max, val=+inRate.value;
  var pct=((val-min)/(max-min))*100;
  inRate.style.setProperty('--fill', pct+'%');
 }

 function calc(){
  var jeon=parseFloat(inJeon.value); if(!isFinite(jeon)||jeon<0) jeon=0;
  var rate=parseFloat(inRate.value)/100; if(!isFinite(rate)||rate<=0) rate=0.01;
  var supply=jeon/rate;
  var jeonP=m2ToP(jeon), supplyP=m2ToP(supply);
  var pyeong=Math.round(supplyP);
  // outputs
  setText('rateVal', inRate.value);
  setText('outJeonP', r1(jeonP));
  setText('outSupplyM2', r1(supply));
  setText('outSupplyP', r1(supplyP));
  setText('outPyeong', pyeong);
  // bar
  var jeonPctTxt=Math.round(rate*100), commPctTxt=100-jeonPctTxt;
  $('segJeon').style.width=jeonPctTxt+'%';
  $('segComm').style.width=commPctTxt+'%';
  setText('segJeonTxt', jeonPctTxt+'%');
  setText('segCommTxt', commPctTxt+'%');
  setText('barTotal', '공급 '+r1(supply)+'㎡');
  // live sentence
  setText('liveJeon', r2(jeon)+'㎡('+r1(jeonP)+'평)');
  setText('liveRate', jeonPctTxt+'%');
  setText('liveSupply', r1(supply)+'㎡('+r1(supplyP)+'평)');
  setText('livePyeong', pyeong+'평형');
  var supply80=jeon/0.80, py80=Math.round(m2ToP(supply80));
  setText('livePyeong80', py80+'평형');
  // table
  setText('tblRate', inRate.value);
  renderTable(rate);
  paintSlider();
 }

 function renderTable(rate){
  var body=$('tblBody'); if(!body) return;
  var nick={39:'17평형',49:'21평형',59:'25평형',74:'30평형',84:'34평형',101:'40평형',114:'46평형',134:'50평형대'};
  var html='';
  for(var i=0;i<TBL_TERMS.length;i++){
   var j=TBL_TERMS[i];
   var jp=m2ToP(j);
   var sup=j/rate, supPy=m2ToP(sup), py=Math.round(supPy);
   var hl=(j===84)?' style="background:var(--pinkSoft2)"':'';
   html+='<tr'+hl+'><td>'+(nick[j]||'-')+'</td><td>'+j+'</td><td>'+r1(jp)+'</td><td>'+r1(sup)+'</td><td class="pyeong-cell"><b>'+py+'</b>평형</td></tr>';
  }
  body.innerHTML=html;
 }

 // presets
 var presets=$('presets');
 if(presets){
  presets.addEventListener('click',function(e){
   var b=e.target.closest('.pchip'); if(!b) return;
   inRate.value=b.getAttribute('data-rate');
   var chips=presets.querySelectorAll('.pchip');
   for(var i=0;i<chips.length;i++) chips[i].classList.toggle('cur',chips[i]===b);
   calc();
  });
 }
 function syncPresetActive(){
  if(!presets) return;
  var chips=presets.querySelectorAll('.pchip');
  for(var i=0;i<chips.length;i++) chips[i].classList.toggle('cur',chips[i].getAttribute('data-rate')===inRate.value);
 }
 inJeon.addEventListener('input',calc);
 inRate.addEventListener('input',function(){ syncPresetActive(); calc(); });

 /* ---------- ② ㎡ ⇄ 평 ---------- */
 var dM2=$('dM2'), dPy=$('dPy'), lock=false;
 if(dM2&&dPy){
  dM2.addEventListener('input',function(){
   if(lock) return; lock=true;
   var v=Math.max(0,parseFloat(dM2.value)); dPy.value = isFinite(v)? r2(m2ToP(v)) : '';
   lock=false;
  });
  dPy.addEventListener('input',function(){
   if(lock) return; lock=true;
   var v=Math.max(0,parseFloat(dPy.value)); dM2.value = isFinite(v)? r2(pToM2(v)) : '';
   lock=false;
  });
 }

 // init
 syncPresetActive(); calc();

 /* 죽은 크롬 onScroll 제거(개선36): #hd 더미·숨김 readbar 갱신뿐이었음 — 진행바·toTop은 하단 pagedynjs 단독 생성 */

 var rev=doc.querySelectorAll('.reveal');
 if('IntersectionObserver' in window){
  var io=new IntersectionObserver(function(es){
   es.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
  },{threshold:.12});
  rev.forEach(function(el){ io.observe(el); });
 } else { rev.forEach(function(el){ el.classList.add('in'); }); }

 /* toTop 중복 생성 블록 제거(개선35) — 하단 pagedynjs가 scrollprog+toTop 단독 생성 */
})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
