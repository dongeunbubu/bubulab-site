<!-- [도구_통장쪼개기_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};


var ACC=['life','fixed','save','invest'];
var inc=document.getElementById('inc'),incR=document.getElementById('incR');
function parseInc(){return Math.max(0,+(inc.value.replace(/[^0-9]/g,''))||0);}
function ratios(){var o={};document.querySelectorAll('.rs').forEach(function(s){o[s.dataset.k]=+s.value;});return o;}
function compute(animate){
 var income=parseInc(); var r=ratios(); var sum=ACC.reduce(function(a,k){return a+r[k];},0)||1;
 document.getElementById('sumv').textContent=Math.round(ACC.reduce(function(a,k){return a+r[k];},0))+'%';
 ACC.forEach(function(k){
   var amt=income*r[k]/sum; var pct=r[k]/sum*100;
   document.getElementById('rv-'+k).textContent=Math.round(r[k])+'%';
   var lg=document.getElementById('lg-'+k); if(lg)lg.textContent=Math.round(pct)+'%';
   document.getElementById('ap-'+k).textContent=Math.round(pct)+'% · 원';
   var av=document.getElementById('av-'+k);
   if(animate){window.countUp(av,amt,700);} else {av.textContent=window.fmtWon(amt);}
 });
 renderDeep(income,r,sum); renderDonut(income,r,sum);
}
inc.addEventListener('input',function(){var v=parseInc();inc.value=v?v.toLocaleString('ko-KR'):'';if(v>=1000000&&v<=10000000)incR.value=v;compute(false);});
inc.addEventListener('blur',function(){compute(true);});
incR.addEventListener('input',function(){inc.value=(+incR.value).toLocaleString('ko-KR');compute(false);});
document.querySelectorAll('.rs').forEach(function(s){s.addEventListener('input',function(){compute(false);});});
document.getElementById('reset').addEventListener('click',function(){var d={life:45,fixed:25,save:18,invest:12};document.querySelectorAll('.rs').forEach(function(s){s.value=d[s.dataset.k];});inc.value='3,000,000';incR.value=3000000;compute(true);});
compute(true);

function renderDonut(income,r,sum){
 var C=2*Math.PI*60,off=0;
 ACC.forEach(function(k){var pct=(r[k]||0)/sum; var len=Math.max(0,pct*C);
  var seg=document.querySelector('.donut-seg[data-k="'+k+'"]');
  if(seg){seg.style.strokeDasharray=len.toFixed(2)+' '+(C-len).toFixed(2);seg.style.strokeDashoffset=(-off).toFixed(2);}
  off+=len;});
 var di=document.getElementById('donutInc'); if(di)di.textContent=window.fmtWon(income);
 var dn=document.querySelector('svg.donut');
 if(dn){var LAB={life:'생활비',fixed:'고정비',save:'저축',invest:'투자'};
  var parts=ACC.map(function(k){var p=Math.round((r[k]||0)/sum*100);return LAB[k]+' '+p+'%(약 '+window.fmtWon(income*(r[k]||0)/sum)+'원)';});
  dn.setAttribute('aria-label','월 실수령 '+window.fmtWon(income)+'원을 네 통장으로 나눈 비율 — '+parts.join(', ')+'.');}
}
function fvMonthly(M,annual,years){var i=annual/12,n=years*12;if(i===0)return M*n;return M*((Math.pow(1+i,n)-1)/i);}
function fmtKor(n){n=Math.round(n);if(n<10000)return n.toLocaleString('ko-KR');var eok=Math.floor(n/100000000),man=Math.round((n%100000000)/10000);var s='';if(eok>0)s+=eok+'\uc5b5';if(man>0)s+=(s?' ':'')+man.toLocaleString('ko-KR')+'\ub9cc';return s||'0';}
function renderDeep(income,r,sum){
 var saveAmt=income*r.save/sum, investAmt=income*r.invest/sum, monthly=saveAmt+investAmt;
 var siPct=(r.save+r.invest)/sum*100, fixedPct=r.fixed/sum*100;
 var vs=document.getElementById('vscore'),vn=document.getElementById('vscoreN'),vh=document.getElementById('vh'),vp=document.getElementById('vp');
 if(vn){vn.textContent=Math.round(siPct)+'%';vs.style.setProperty('--p',Math.min(siPct,100)+'%');
  var h,p;
  if(siPct>=30){h='\ud6cc\ub96d\ud574\uc694 \u2014 \ubbf8\ub798\ub85c \uac00\ub294 \ub3c8\uc774 \ub9ce\uc544\uc694';p='\uc800\ucd95+\ud22c\uc790\uac00 <b>'+Math.round(siPct)+'%</b>. \uad8c\uc7a5\uc120(20%)\uc744 \ud06c\uac8c \ub118\uaca8\uc5b4\uc694. \uc774 \ud398\uc774\uc2a4\uba74 \ubaa9\ub3c8\uc774 \ube68\ub9ac \uc313\uc5ec\uc694.';}
  else if(siPct>=20){h='\uc88b\uc544\uc694 \u2014 \uad8c\uc7a5\uc120\uc744 \ub118\uaca8\uc5b4\uc694';p='\uc800\ucd95+\ud22c\uc790 <b>'+Math.round(siPct)+'%</b>\ub85c \uc77c\ubc18 \uad8c\uc7a5\uc120 20%\ub97c \ub118\uaca8\uc5b4\uc694. \uc870\uae08\ub9cc \ub354 \uc62c\ub9ac\uba74 \uac00\uc18d\uc774 \ubd99\uc5b4\uc694.';}
  else if(siPct>=10){h='\uc870\uae08 \uc544\uc26c\uc6cc\uc694';p='\uc800\ucd95+\ud22c\uc790\uac00 <b>'+Math.round(siPct)+'%</b>. \uace0\uc815\ube44\ub97c \uc904\uc5ec 20%\uae4c\uc9c0 \uc62c\ub9ac\uba74 \ubbf8\ub798\uac00 \ub2ec\ub77c\uc838\uc694.';}
  else{h='\uc9c0\uae08\uc740 \uc800\ucd95 \uc5ec\ub825\uc774 \ube61\ube61\ud574\uc694';p='\uc800\ucd95+\ud22c\uc790 <b>'+Math.round(siPct)+'%</b>. \uba3c\uc800 \uace0\uc815\ube44\ubd80\ud130 \uc810\uac80\ud574\ubcfc\uae4c\uc694?';}
  if(fixedPct>42){p+=' \uace0\uc815\ube44\uac00 <b>'+Math.round(fixedPct)+'%</b>\ub85c \ub192\uc740 \ud3b8 \u2014 \ud1b5\uc2e0\u00b7\uad6c\ub3c5\u00b7\ubcf4\ud5d8\ubd80\ud130 \uc810\uac80\ud574\ubcf4\uc138\uc694.';}
  vh.innerHTML=h;vp.innerHTML=p;}
 var pm=document.getElementById('projM'); if(pm){pm.textContent=window.fmtWon(monthly)+'\uc6d0';}
 var blend=monthly>0?(saveAmt*0.035+investAmt*0.07)/monthly:0.05;
 var years=[5,10,20], fvs=years.map(function(y){return fvMonthly(monthly,blend,y);});
 var maxFv=Math.max(fvs[2],1);
 years.forEach(function(y,idx){
  var fv=fvs[idx],principal=monthly*y*12;var col=document.querySelector('.col[data-y="'+y+'"]');
  if(col){col.style.height=(fv/maxFv*100)+'%';col.querySelector('.pp').style.height=(fv>0?principal/fv*100:0)+'%';}
  var el=document.getElementById('pa'+y); if(el)el.textContent=fmtKor(fv);
 });
 var pt=document.getElementById('prinT'),tt=document.getElementById('totT');
 if(pt)pt.textContent=fmtKor(monthly*20*12)+'\uc6d0'; if(tt)tt.textContent=fmtKor(fvs[2])+'\uc6d0';
 var dl=document.getElementById('dailyLife'); if(dl){dl.textContent=window.fmtWon(income*r.life/sum/30.4)+'원';}
 var pl=document.getElementById('peerline'); if(pl){var avg=20;var rel=siPct>=avg+5?'높은':(siPct<=avg-5?'낮은':'비슷한');pl.innerHTML='💑 신혼부부 평균 저축+투자 비중은 대략 <b>20%</b> 안팎이에요 — 우리 집은 <b>'+Math.round(siPct)+'%</b>로 '+rel+' 편이에요.';}
}
var PRESETS={newlywed:{life:40,fixed:22,save:23,invest:15},dual:{life:35,fixed:20,save:23,invest:22},single:{life:50,fixed:25,save:15,invest:10},loan:{life:38,fixed:40,save:14,invest:8}};
document.querySelectorAll('.preset').forEach(function(btn){btn.addEventListener('click',function(){
 var p=PRESETS[btn.dataset.p];if(!p)return;
 document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
 document.querySelectorAll('.rs').forEach(function(sl){sl.value=p[sl.dataset.k];});compute(true);
});});

</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*splittilt*/
(function(){if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
 [].slice.call(document.querySelectorAll('.acct,.whyc')).forEach(function(c){
  c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();var px=(e.clientX-r.left)/r.width-0.5,py=(e.clientY-r.top)/r.height-0.5;
   c.style.transform='perspective(700px) rotateY('+(px*4).toFixed(2)+'deg) rotateX('+(-py*4).toFixed(2)+'deg) translateY(-3px)';},{passive:true});
  c.addEventListener('mouseleave',function(){c.style.transform='';});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
