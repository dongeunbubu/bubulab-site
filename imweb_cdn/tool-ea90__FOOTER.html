<!-- [도구_인플레이션목표_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.fmtEok=function(n){n=Math.round(n);if(n>=100000000){var e=n/100000000;return (e>=10?e.toFixed(0):e.toFixed(e===Math.floor(e)?0:1))+'억';}if(n>=10000)return Math.round(n/10000).toLocaleString('ko-KR')+'만';return n.toLocaleString('ko-KR');};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
function num(el){return Math.max(0,+(el.value.replace(/[^0-9]/g,''))||0);}

function series(target,i,N){var arr=[];for(var t=0;t<=N;t++){arr.push(target/Math.pow(1+i,t));}return arr;}
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=22,y1=232;var pts=[];for(var k=0;k<arr.length;k++){var x=x0+(x1-x0)*(k/N);var y=y1-(y1-y0)*(arr[k]/maxV);pts.push([x,y]);}return pts;}
function toD(pts){return pts.map(function(p,j){return (j?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}

function draw(animate){
 var target=num($('target')),N=+$('yrs').value,i=(+$('infl').value)/100;
 $('yrsv').textContent=$('yrs').value+'년';$('inflv').textContent=(+$('infl').value).toFixed(1)+'%';
 var factor=Math.pow(1+i,N);
 var real=target/factor, need=target*factor, lost=target-real, pct=target>0?(1-1/factor)*100:0;
 var feelV=10000/factor;
 // headline texts
 $('hY').textContent=N;$('nY').textContent=N;$('fY').textContent=N;
 $('nT').textContent=window.fmtEok(target);
 $('realhint').textContent='오늘 기준 구매력이에요 · 연 '+(+$('infl').value).toFixed(1)+'% 물가 가정';
 if(animate){window.countUp($('real'),real,900);window.countUp($('need'),need,900);window.countUp($('sumLost'),lost,900);window.countUp($('fV'),feelV,900);}
 else{$('real').textContent=window.fmtWon(real);$('need').textContent=window.fmtWon(need);$('sumLost').textContent=window.fmtWon(lost);$('fV').textContent=window.fmtWon(feelV);}
 $('sumPct').textContent=pct.toFixed(1)+'%';
 $('sumNeed').textContent=window.fmtWon(need);
 // 결과 해석(verdict): 잠식 심각도 + 목표 상향 처방
 var _lv,_emo,_head;
 if(pct<20){_lv=1;_emo='🟢';_head='물가 영향이 비교적 작은 편이에요';}
 else if(pct<35){_lv=2;_emo='🟡';_head='구매력이 눈에 띄게 줄어드는 구간이에요';}
 else if(pct<50){_lv=3;_emo='🟠';_head='절반 가까이 녹아요 · 목표 상향을 권해요';}
 else{_lv=4;_emo='🔴';_head='절반 이상 증발 · 목표를 꼭 올려야 해요';}
 $('verdict').className='verdict lv'+_lv;
 $('vbadge').textContent=_emo;
 $('vhead').textContent=_head;
 $('vsub').innerHTML=N+'년 뒤 구매력 <em>'+pct.toFixed(0)+'%</em>가 사라져요. 오늘의 목표를 지키려면 <em>'+window.fmtEok(need)+'원</em>으로 올리거나, 모은 돈을 <em>연 '+(+$('infl').value).toFixed(1)+'%</em>(물가) 이상으로 굴려 물가를 이겨야 해요.';
 var chSvg=$('chart');if(chSvg)chSvg.setAttribute('aria-label','연 '+(+$('infl').value).toFixed(1)+'% 물가 가정으로 '+N+'년 동안 구매력이 줄어드는 곡선 차트예요. 오늘 목표 '+window.fmtEok(target)+'원의 값어치는 약 '+window.fmtWon(real)+'원이 되고, 구매력 '+pct.toFixed(0)+'%가 사라져요. 같은 삶을 살려면 약 '+window.fmtEok(need)+'원이 필요해요.');
 // chart
 var s=series(target,i,N);var maxV=(target||1)*1.06;
 var vp=buildPath(s,maxV,N);
 var x0=46,x1=606;var yT=232-(232-22)*(target/maxV);
 $('vpath').setAttribute('d',toD(vp));
 $('nline').setAttribute('d','M'+x0+','+yT.toFixed(1)+' L'+x1+','+yT.toFixed(1));
 // lost-purchasing-power area: between nominal flat line and real curve
 var rev=vp.slice().reverse().map(function(p,j){return 'L'+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
 $('area').setAttribute('d','M'+x0+','+yT.toFixed(1)+' L'+x1+','+yT.toFixed(1)+' '+rev+' Z');
 var last=vp[vp.length-1];$('dot').setAttribute('cx',last[0]);$('dot').setAttribute('cy',last[1]);
 var g=$('grid');g.innerHTML='';for(var q=0;q<=4;q++){var y=22+(232-22)*q/4;g.innerHTML+='<line x1="46" y1="'+y+'" x2="606" y2="'+y+'" stroke="#EAD7D3" stroke-width="1"/>';}
 if(animate){var vpath=$('vpath');vpath.style.transition='none';vpath.style.strokeDasharray='1';vpath.style.strokeDashoffset='1';vpath.getBoundingClientRect();vpath.style.transition='stroke-dashoffset 1.1s var(--ease)';vpath.style.strokeDashoffset='0';
   $('dot').style.transition='none';$('dot').style.opacity='0';setTimeout(function(){$('dot').style.transition='opacity .4s';$('dot').style.opacity='1';},900);
   var ar=$('area');ar.style.transition='none';ar.style.opacity='0';ar.getBoundingClientRect();ar.style.transition='opacity .9s var(--ease) .25s';ar.style.opacity='.9';}
}

$('target').addEventListener('input',function(){var v=num($('target'));$('target').value=v?v.toLocaleString('ko-KR'):'';syncChip('tchips','t',v);draw(false);});
$('target').addEventListener('change',function(){draw(true);});
$('yrs').addEventListener('input',function(){draw(false);});$('yrs').addEventListener('change',function(){draw(true);});
$('infl').addEventListener('input',function(){syncChip('ichips','i',+$('infl').value);draw(false);});
$('infl').addEventListener('change',function(){draw(true);});

function syncChip(wrapId,attr,val){document.querySelectorAll('#'+wrapId+' button').forEach(function(b){b.classList.toggle('on',Math.abs(+b.dataset[attr]-val)<1e-6);});}
document.querySelectorAll('#tchips button').forEach(function(b){b.addEventListener('click',function(){var v=+b.dataset.t;$('target').value=v.toLocaleString('ko-KR');syncChip('tchips','t',v);draw(true);});});
document.querySelectorAll('#ichips button').forEach(function(b){b.addEventListener('click',function(){var v=+b.dataset.i;$('infl').value=v;$('inflv').textContent=v.toFixed(1)+'%';syncChip('ichips','i',v);draw(true);});});

draw(true);
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','메뉴 열기');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
