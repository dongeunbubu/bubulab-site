<!-- [도구_건강검진_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 4개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};


var $=function(id){return document.getElementById(id);};
function num(id){return Math.max(0,+($(id).value.replace(/[^0-9]/g,''))||0);}
var IDS=['f_inc','f_exp','f_sav','f_inv','f_eme','f_ast','f_deb'];
var AREAS=[['저축','저축력'],['비상금','비상금'],['부채','부채 건전성'],['자산','자산 형성'],['투자','투자 습관'],['지출','지출 관리']];
var TIPS={'저축력':"월급의 일부를 '먼저' 떼두는 자동저축부터. 통장 쪼개기 도구를 써보세요.",
 '비상금':"소득이 끊겨도 버틸 3~6개월치를 별도 통장에 모아두세요.",
 '부채 건전성':"고금리 대출부터 우선 상환. 금리·만기를 한 장에 정리해보세요.",
 '자산 형성':"순자산이 아직 얇아요. 작게라도 매달 쌓는 적립을 자동화하세요.",
 '투자 습관':"저축만으론 물가를 못 이겨요. 인덱스 적립식으로 소액부터 시작.",
 '지출 관리':"고정비·구독 누수를 점검해 '새는 돈'부터 막아보세요."};
 var LINKS={'저축력':['통장 쪼개기로 구조 잡기','도구_통장쪼개기_v1.html'],'비상금':['비상금 적정액 계산','도구_비상금계산기_v1.html'],'부채 건전성':['상환 vs 투자 비교','도구_대출상환vs투자_v1.html'],'자산 형성':['1억 복리 시뮬레이터','도구_1억복리_v1.html'],'투자 습관':['자산배분 가이드','도구_자산배분가이드_v1.html'],'지출 관리':['구독 누수 점검','도구_구독누수점검_v1.html']};
var cx=150,cy=150,R=108,ANG=[-90,-30,30,90,150,210].map(function(d){return d*Math.PI/180;});
function pt(score,i){var r=R*Math.max(0,Math.min(100,score))/100;return [cx+r*Math.cos(ANG[i]),cy+r*Math.sin(ANG[i])];}
function compute(animate){
 var inc=num('f_inc'),exp=num('f_exp'),sav=num('f_sav'),inv=num('f_inv'),eme=num('f_eme'),ast=num('f_ast'),deb=num('f_deb');
 IDS.forEach(function(id){var v=num(id);$(id).value=v?v.toLocaleString('ko-KR'):'';});
 var incY=inc*12||1;
 var sc=[
   Math.min(100,(sav+inv)/(inc||1)/0.30*100),               // 저축력
   Math.min(100, eme/((exp*6)||1)*100),                     // 비상금
   Math.max(0,100-Math.min(100, deb/incY*50)),              // 부채
   Math.min(100, Math.max(0,(ast-deb))/incY*50),            // 자산형성
   Math.min(100, (inv/((sav+inv)||1))/0.40*100),            // 투자습관
   Math.min(100,(1-exp/(inc||1))/0.40*100)                  // 지출관리
 ].map(function(x){return Math.round(Math.max(0,Math.min(100,x)));});
 var total=Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length);
 // gauge
 if(animate){window.countUp($('sNum'),total,1000);var a=$('sArc');a.style.transition='stroke-dashoffset 1.1s var(--ease)';a.style.strokeDashoffset=(100-total);}
 else{$('sNum').textContent=total;$('sArc').style.strokeDashoffset=(100-total);}
 var gr=total>=80?'아주 건강해요 🌳':total>=65?'대체로 괜찮아요 🌱':total>=45?'기초를 다질 때예요 🧩':'지금부터 시작해요 🔧';
 $('sGrade').textContent=gr;
 $('sMsg').textContent='부부 합산 기준 종합 '+total+'점이에요. 아래 약점부터 하나씩 채우면 점수가 올라가요.';
 var pctile=Math.max(3,Math.min(97,Math.round(total*0.9+5)));
 $('sPct').style.width=pctile+'%';$('sPctc').textContent='또래 신혼부부 100쌍 중 상위 '+(100-pctile)+'% 수준 (추정)';
 // radar
 var poly=sc.map(function(s,i){var p=pt(s,i);return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
 $('radarG').setAttribute('points',poly);
 var dots=sc.map(function(s,i){var pp=pt(s,i);var c=s>=70?'#5E8C7F':s>=45?'#C9A84C':'#D8584E';return '<circle cx="'+pp[0].toFixed(1)+'" cy="'+pp[1].toFixed(1)+'" r="4.6" fill="'+c+'" stroke="#fff" stroke-width="1.6"/>';}).join(''); if($('radarDots'))$('radarDots').innerHTML=dots;
 if(animate){var g=$('radarG');g.style.transition='none';g.style.transform='scale(0)';g.style.opacity='0';g.getBoundingClientRect();g.style.transition='transform .9s var(--ease),opacity .9s';g.style.transform='scale(1)';g.style.opacity='1';}
 // area bars
 $('areabars').innerHTML=AREAS.map(function(a,i){var s=sc[i];var c=s>=70?'var(--sage)':s>=45?'var(--gold)':'var(--up)';return '<div class="ab"><div class="k"><span>'+a[1]+'</span><b style="color:'+c+'">'+s+'</b></div><div class="t"><i style="width:'+(animate?0:s)+'%;background:'+c+'" data-w="'+s+'"></i></div></div>';}).join('');
 if(animate)setTimeout(function(){$('areabars').querySelectorAll('i').forEach(function(el){el.style.width=el.dataset.w+'%';});},100);
 // weak top3
 var idx=sc.map(function(s,i){return [s,i];}).sort(function(a,b){return a[0]-b[0];}).slice(0,3);
 $('weak').innerHTML=idx.map(function(x,r){var nm=AREAS[x[1]][1];var lk=LINKS[nm];return '<div class="w"><div class="rk">'+(r+1)+'</div><div style="flex:1"><div class="wt">'+nm+' · '+x[0]+'점</div><div class="wd">'+TIPS[nm]+'</div>'+(lk?'<a class="wlink" href="'+lk[1]+'">'+lk[0]+' →</a>':'')+'</div></div>';}).join('');
 // radar grid/axis once
 if(!$('radarGrid').dataset.done){
   var gr2='';[0.25,0.5,0.75,1].forEach(function(L){var p=[];for(var i=0;i<6;i++){var x=cx+R*L*Math.cos(ANG[i]),y=cy+R*L*Math.sin(ANG[i]);p.push(x.toFixed(1)+','+y.toFixed(1));}gr2+='<polygon points="'+p.join(' ')+'" fill="none" stroke="#EAD7D3" stroke-width="1"/>';});
   $('radarGrid').innerHTML=gr2;
   var ax='';for(var i=0;i<6;i++){var x=cx+R*Math.cos(ANG[i]),y=cy+R*Math.sin(ANG[i]);ax+='<line x1="'+cx+'" y1="'+cy+'" x2="'+x.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="#EAD7D3" stroke-width="1"/>';var lx=cx+(R+20)*Math.cos(ANG[i]),ly=cy+(R+20)*Math.sin(ANG[i]);ax+='<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" font-size="12" font-weight="800" fill="var(--mut)" text-anchor="middle">'+AREAS[i][0]+'</text>';}
   $('radarAxis').innerHTML=ax;$('radarGrid').dataset.done='1';
 }
}
IDS.forEach(function(id){$(id).addEventListener('input',function(){compute(false);});$(id).addEventListener('change',function(){compute(true);});});
compute(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*hctilt*/
(function(){if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
 [].slice.call(document.querySelectorAll('.weak .w,.areabars .ab')).forEach(function(c){
  c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();var px=(e.clientX-r.left)/r.width-0.5,py=(e.clientY-r.top)/r.height-0.5;
   c.style.transform='perspective(700px) rotateY('+(px*4).toFixed(2)+'deg) rotateX('+(-py*4).toFixed(2)+'deg) translateY(-3px)';},{passive:true});
  c.addEventListener('mouseleave',function(){c.style.transform='';});});})();
</script>
