<!-- [키트_상세_v3] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 5개) -->
<script>
/* 아임웹: 이 블록을 FOOTER에. 결제 버튼 href는 실제 상품 URL로 교체 */
(function(){
  document.documentElement.classList.add('js');
  var rm=matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!rm && ('IntersectionObserver' in window)){
    var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in', e.isIntersecting);});},{threshold:.12});
    document.querySelectorAll('.reveal,.scene,.preview,.revtop,.hvis').forEach(function(el){io.observe(el);});
  } else { document.querySelectorAll('.reveal,.scene,.preview,.revtop,.hvis').forEach(function(el){el.classList.add('in');}); }
  /* 미리보기 탭 */
  document.querySelectorAll('.ptab').forEach(function(t){
    t.addEventListener('click',function(){
      var box=t.closest('.preview');
      box.querySelectorAll('.ptab').forEach(function(x){x.classList.remove('on');});
      box.querySelectorAll('.ppanel').forEach(function(x){x.classList.remove('on');});
      t.classList.add('on');var p=box.querySelector('#'+t.dataset.p);if(p)p.classList.add('on');
    });
  });
  /* 스티키 구매바 — 히어로 지나면 표시 */
  var bar=document.getElementById('buybar'),hero=document.querySelector('.hero');
  if(bar&&hero&&('IntersectionObserver' in window)){var ho=new IntersectionObserver(function(es){es.forEach(function(e){bar.classList.toggle('show',!e.isIntersecting);});},{threshold:0});ho.observe(hero);}
  if(rm)return;
  document.querySelectorAll('.magnet').forEach(function(b){
    b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();var x=e.clientX-r.left-r.width/2;var y=e.clientY-r.top-r.height/2;b.style.transform='translate('+(x*0.18)+'px,'+(y*0.26)+'px)';});
    b.addEventListener('mouseleave',function(){b.style.transform='';});
  });
})();
</script>
<script>/*dvizjs*/
(function(){var R=[0.45,0.25,0.18,0.12];var inc=document.getElementById('dinc');if(!inc)return;
var C=2*Math.PI*78;var fired=false;
function won(n){return Math.round(n).toLocaleString('ko-KR')+'\uc6d0';}
function man(n){n=Math.round(n);if(n<10000)return n.toLocaleString('ko-KR');var e=Math.floor(n/100000000),m=Math.round((n%100000000)/10000);var s='';if(e>0)s+=e+'\uc5b5';if(m>0)s+=(s?' ':'')+m.toLocaleString('ko-KR')+'\ub9cc';return s||'0';}
var cur=[0,0,0,0];
function num(el,to,t0){var from=parseFloat((el.textContent||'0').replace(/[^0-9.]/g,''))||0;var st=null;function s(ts){if(!st)st=ts;var p=Math.min((ts-st)/600,1);var e=1-Math.pow(1-p,3);el.textContent=won(from+(to-from)*e);if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);}
function draw(){var off=0;R.forEach(function(r,i){var seg=document.querySelector('.dseg.s'+(i+1));var len=r*C;seg.style.strokeDasharray=len+' '+C;seg.style.strokeDashoffset=(-off);off+=len;});}
function upd(anim){var v=+inc.value;document.getElementById('dincl').textContent=won(v);document.getElementById('dtot').textContent=man(v);R.forEach(function(r,i){var el=document.getElementById('da'+(i+1));var amt=v*r;if(anim)num(el,amt);else el.textContent=won(amt);});}
inc.addEventListener('input',function(){upd(true);});
var sec=document.getElementById('dviz');
if('IntersectionObserver'in window){var o=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting&&!fired){fired=true;draw();upd(true);}});},{threshold:.3});o.observe(sec);}else{draw();upd(false);}
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*wowkit*/
(function(){
  if(window.__bblWow)return;window.__bblWow=1;
  var d=document;d.documentElement.classList.add('js');
  var mm=function(q){return window.matchMedia?matchMedia(q).matches:false;};
  var rm=mm('(prefers-reduced-motion: reduce)');
  /* 스태거 딜레이 자동 부여(최대 560ms 캡) */
  [].slice.call(d.querySelectorAll('.wstag')).forEach(function(g){
    [].slice.call(g.children).forEach(function(c,i){c.style.transitionDelay=Math.min(i*70,560)+'ms';});
  });
  var els=[].slice.call(d.querySelectorAll('.wv,.wstag,.whl,.wline'));
  function onin(e){e.classList.add('in');}
  if(rm||!('IntersectionObserver' in window)){els.forEach(onin);}
  else{
    var io=new IntersectionObserver(function(es){es.forEach(function(en){
      if(en.isIntersecting){onin(en.target);io.unobserve(en.target);}});},
      {threshold:.14,rootMargin:'0px 0px -8% 0px'});
    els.forEach(function(e){io.observe(e);});
  }
  if(!rm&&mm('(pointer:fine)')){
    /* 마그네틱 CTA */
    [].slice.call(d.querySelectorAll('.wmag')).forEach(function(b){
      b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();
        b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.14).toFixed(1)+'px,'+((e.clientY-r.top-r.height/2)*.18).toFixed(1)+'px)';},{passive:true});
      b.addEventListener('mouseleave',function(){b.style.transform='';});
    });
    /* 3D 틸트(이미지·대표 카드, PC만) */
    [].slice.call(d.querySelectorAll('.wtilt')).forEach(function(c){
      c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect(),
        px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;
        c.style.transform='perspective(840px) rotateY('+(px*5).toFixed(2)+'deg) rotateX('+(-py*5).toFixed(2)+'deg) translateY(-4px)';},{passive:true});
      c.addEventListener('mouseleave',function(){c.style.transform='';});
    });
    /* 라이트 패럴랙스: data-wplx="0.08" (히어로 장식·이미지, PC만) */
    var plx=[].slice.call(d.querySelectorAll('[data-wplx]'));
    if(plx.length&&mm('(min-width:861px)')){
      var tick=false;
      function upd(){tick=false;var vh=innerHeight;
        plx.forEach(function(el){var r=el.getBoundingClientRect();
          var sp=parseFloat(el.getAttribute('data-wplx'))||.08;
          el.style.transform='translateY('+(((r.top+r.height/2-vh/2)*sp*-1)).toFixed(1)+'px)';});}
      addEventListener('scroll',function(){if(!tick){tick=true;requestAnimationFrame(upd);}},{passive:true});
      upd();
    }
  }
})();
</script>
