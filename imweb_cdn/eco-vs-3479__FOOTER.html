<!-- [콘텐츠_경제공부_환헤지vs언헤지_2026-06] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
// header shadow
const hdr=document.getElementById('hdr');
addEventListener('scroll',()=>{hdr.classList.toggle('scrolled',scrollY>8)},{passive:true});
// reveal + count-up + chart
const io=new IntersectionObserver((es)=>{es.forEach(e=>{
  if(!e.isIntersecting)return;
  e.target.classList.add('in');
  if(e.target.classList.contains('hstats')){e.target.querySelectorAll('[data-count]').forEach(animVal);}
  if(e.target.querySelector&&e.target.querySelector('#krwline')){const l=e.target.querySelector('#krwline');requestAnimationFrame(()=>l.classList.add('go'));}
  io.unobserve(e.target);
});
},{threshold:.18});
document.querySelectorAll('.reveal,.stag').forEach(el=>io.observe(el));
function animVal(el){
  const to=parseFloat(el.dataset.count), dec=parseInt(el.dataset.dec||"0");
  const pre=el.dataset.pre||"", suf=el.dataset.suf||"", dur=1100, t0=performance.now();
  function fr(t){let p=Math.min((t-t0)/dur,1);p=1-Math.pow(1-p,3);const v=to*p;
    el.textContent=pre+v.toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
    if(p<1)requestAnimationFrame(fr);}
  requestAnimationFrame(fr);
}
// calculator
const HEDGE=1.1, SCALE=60;
const eR=document.getElementById('eR'),fR=document.getElementById('fR');
const eV=document.getElementById('eV'),fV=document.getElementById('fV');
const rUn=document.getElementById('rUn'),rHe=document.getElementById('rHe');
const bUn=document.getElementById('bUn'),bHe=document.getElementById('bHe');
const note=document.getElementById('simNote');
function sgn(x){return (x>=0?'+':'')+x.toFixed(1)+'%';}
function setBar(el,res){
  let w=Math.min(Math.abs(res)/SCALE*50,50);
  if(res>=0){el.style.left='50%';el.style.width=w+'%';el.style.background='var(--up)';}
  else{el.style.left=(50-w)+'%';el.style.width=w+'%';el.style.background='var(--down)';}
}
function calc(){
  const etf=parseFloat(eR.value),fx=parseFloat(fR.value);
  const un=((1+etf/100)*(1+fx/100)-1)*100, he=etf-HEDGE, gap=un-he;
  eV.textContent=sgn(etf); fV.textContent=sgn(fx);
  rUn.textContent=sgn(un); rHe.textContent=sgn(he);
  rUn.style.color=un>=0?'var(--up)':'var(--down)';
  rHe.style.color=he>=0?'var(--up)':'var(--down)';
  setBar(bUn,un); setBar(bHe,he);
  let msg;
  if(fx>0.4){msg='원화가 약해진 시나리오라 <b>언헤지가 '+gap.toFixed(1)+'%포인트 앞서요</b>. 환율이 수익을 밀어올린 거예요.';}
  else if(fx<-0.4){msg='원화가 강해진 시나리오라 <b>환헤지가 '+(-gap).toFixed(1)+'%포인트 앞서요</b>. 환율 손실을 막아준 거예요.';}
  else{msg='환율이 거의 안 움직이면, <b>헤지비용(연 1.1%p)만큼 환헤지가 살짝 불리</b>해요.';}
  note.innerHTML=msg+' &nbsp;<span style="color:var(--mut)">— 환율 방향은 못 맞히니, 결과도 미리 알 수 없어요.</span>';
}
eR.addEventListener('input',calc); fR.addEventListener('input',calc);
calc();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><a class="dlogo" href="/" aria-label="홈으로"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</a><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});

<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
