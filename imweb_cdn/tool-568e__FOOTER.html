<!-- [도구_정책자금대출비교_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){
"use strict";
var $=function(id){return document.getElementById(id);};

/* ---------- state ---------- */
var S={income:8500, networth:3.37, price:6, wish:4, first:1, baby:1, term:30, mkt:0.043};
var LSKEY="bbPolicyLoanCompare_v1";

/* ---------- program config (2026-06, 신혼/생애최초 추정) ---------- */
var PROG=[
 {id:"didim", cls:"didim", name:"디딤돌 대출", emoji:"🏠", rate:0.028, rateLbl:"연 2.4~3.3%", incomeCap:8500, nwCap:4.69, priceCap:6, maxLoan:4.0, maxTerm:30, needBaby:false},
 {id:"sin", cls:"sin", name:"신생아 특례", emoji:"👶", rate:0.025, rateLbl:"연 1.6~3.3%", incomeCap:25000, nwCap:4.69, priceCap:9, maxLoan:5.0, maxTerm:30, needBaby:true},
 {id:"bog", cls:"bog", name:"보금자리론", emoji:"🏦", rate:0.040, rateLbl:"약 연 4%(고정)", incomeCap:8500, nwCap:99, priceCap:6, maxLoan:3.6, maxTerm:50, needBaby:false}
];

/* ---------- helpers ---------- */
function fmtEokMan(won){
 won=Math.round(won);
 if(won<=0) return "0원";
 var eok=Math.floor(won/1e8);
 var man=Math.round((won-eok*1e8)/1e4);
 if(eok>0){ return eok+"억"+(man>0?(" "+man.toLocaleString()+"만"):""); }
 return man.toLocaleString()+"만원";
}
function fmtMan(won){ return Math.round(won/1e4).toLocaleString()+"만원"; }
function fmtMon(won){ var m=Math.round(won/1e4*10)/10; return m.toLocaleString()+"만원"; }
function fmtEok1(won){ return (Math.round(won/1e7)/10).toLocaleString()+"억"; }

/* ---------- core loan math (monthly amortization) ---------- */
function monthPay(P,iA,n){ if(P<=0||n<=0) return 0; if(iA<=0) return P/n; var g=Math.pow(1+iA,n); return P*iA*g/(g-1); }
function totInterest(P,iA,n){ return monthPay(P,iA,n)*n - P; }
/* cumulative interest paid, sampled at each year (length = years) */
function cumInterestByYear(P,iA,n){
 var pay=monthPay(P,iA,n), bal=P, cum=0, out=[];
 for(var m=1;m<=n;m++){ var intr=bal*iA; cum+=intr; bal=bal-(pay-intr); if(m%12===0) out.push(cum); }
 return out;
}

/* ---------- evaluate one program ---------- */
function evalProg(p){
 var r={p:p, elig:true, reasons:[]};
 var incCap=p.incomeCap;
 if(p.id==="bog" && S.baby) incCap=13000; /* 보금자리: 신생아 가구 소득 1.3억 */
 if(!S.first){ r.elig=false; r.reasons.push("무주택·생애최초 가구가 아니에요"); }
 if(p.needBaby && !S.baby){ r.elig=false; r.reasons.push("2년 내 출산 가구만 가능"); }
 if(S.income>incCap){ r.elig=false; r.reasons.push("소득 "+fmtMan(incCap*1e4)+" 초과"); }
 if(S.networth>p.nwCap){ r.elig=false; r.reasons.push("순자산 "+p.nwCap+"억 초과"); }
 if(S.price>p.priceCap){ r.elig=false; r.reasons.push("집값 "+p.priceCap+"억 초과"); }
 var ltv=S.first?0.80:0.70;
 var byLtv=ltv*S.price;
 var loanEok=Math.min(p.maxLoan, byLtv, S.wish);
 if(loanEok<0) loanEok=0;
 var term=Math.min(S.term, p.maxTerm);
 var n=term*12, i=p.rate/12, iM=S.mkt/12;
 r.incCap=incCap; r.ltv=ltv; r.loan=loanEok*1e8; r.term=term;
 r.pay=monthPay(r.loan, i, n);
 r.interest=totInterest(r.loan, i, n);
 r.mktPay=monthPay(r.loan, iM, n);
 r.mktInterest=totInterest(r.loan, iM, n);
 r.save=r.mktInterest - r.interest;
 return r;
}

/* ---------- countUp ---------- */
function countUp(el,target,fmt,dur){
 if(!el) return;
 var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
 var from=el._cv||0, start=null; dur=reduce?0:(dur||850);
 if(el._raf) cancelAnimationFrame(el._raf);
 function step(ts){ if(start===null) start=ts; var p=dur?Math.min((ts-start)/dur,1):1; var e=1-Math.pow(1-p,3);
  var cur=from+(target-from)*e; el.textContent=fmt(cur); if(p<1){el._raf=requestAnimationFrame(step);}else{el._cv=target;el.textContent=fmt(target);} }
 el._raf=requestAnimationFrame(step);
}

/* ---------- render program card ---------- */
function renderCard(r, isBest){
 var p=r.p, id=p.id;
 var card=$("pc_"+id);
 var bd=$("bd_"+id);
 $("crown_"+id).style.display = isBest ? "block" : "none";
 card.classList.toggle("best", !!isBest);
 if(r.elig && r.loan>0){
  card.classList.remove("dim");
  bd.className="pcbadge ok"; bd.textContent="자격 ○";
  $("rt_"+id).textContent="적용 금리 "+p.rateLbl+" · 예시 "+(p.rate*100).toFixed(1)+"%";
  $("lo_"+id).innerHTML=fmtEokMan(r.loan)+"<small>최대</small>";
  $("sv_"+id).innerHTML="시중보다 이자 <b>"+fmtEokMan(r.save)+"</b> 절감";
  $("pay_"+id).textContent=fmtMon(r.pay)+" / 월";
  $("int_"+id).textContent=fmtEokMan(r.interest);
  $("cap_"+id).textContent="소득≤"+fmtMan(r.incCap*1e4)+" · 집값≤"+p.priceCap+"억 · 한도≤"+p.maxLoan+"억 · 최장 "+p.maxTerm+"년";
  $("no_"+id).style.display="none";
 } else {
  card.classList.add("dim");
  bd.className="pcbadge no"; bd.textContent="자격 ✕";
  $("rt_"+id).textContent="적용 금리 "+p.rateLbl;
  $("lo_"+id).innerHTML="—";
  $("sv_"+id).innerHTML="조건 충족 시 비교돼요";
  $("pay_"+id).textContent="—";
  $("int_"+id).textContent="—";
  $("cap_"+id).textContent="소득≤"+fmtMan(r.incCap*1e4)+" · 집값≤"+p.priceCap+"억 · 한도≤"+p.maxLoan+"억 · 최장 "+p.maxTerm+"년";
  var no=$("no_"+id); no.style.display="block";
  no.textContent="✕ "+(r.reasons.length?r.reasons.join(" · "):"조건 미충족");
 }
}

/* ---------- cumulative interest chart ---------- */
var PX={x0:74, x1:688, y0:262, y1:26};
function buildPath(arr, ymax, xmax){
 var d="", n=arr.length;
 for(var k=0;k<n;k++){
  var yr=k+1;
  var x=PX.x0+(PX.x1-PX.x0)*(yr/xmax);
  var y=PX.y0-(PX.y0-PX.y1)*(arr[k]/ymax);
  d+=(k===0?("M "+PX.x0+" "+PX.y0+" L "):"")+x.toFixed(1)+" "+y.toFixed(1)+(k<n-1?" L ":"");
 }
 return d;
}
function renderChart(best){
 var grid=$("ivGrid"), xlab=$("ivXlab");
 grid.innerHTML=""; xlab.innerHTML="";
 var area=$("ivArea"), pMkt=$("ivMkt"), pPol=$("ivPol");
 var dotM=$("ivMktDot"), dotP=$("ivPolDot");
 if(!best || best.loan<=0){
  area.setAttribute("d",""); pMkt.setAttribute("d",""); pPol.setAttribute("d","");
  dotM.style.opacity=0; dotP.style.opacity=0;
  $("chProg").textContent="—";
  $("chNote").innerHTML="자격이 되는 정책대출이 없어요. 위 조건(소득·집값·순자산·출산)을 조정해 보세요.";
  return;
 }
 var p=best.p, n=best.term*12, yrs=best.term;
 var polC=cumInterestByYear(best.loan, p.rate/12, n);
 var mktC=cumInterestByYear(best.loan, S.mkt/12, n);
 var ymax=Math.max(mktC[mktC.length-1], 1);
 /* y grid (4 lines) */
 for(var g=1;g<=4;g++){
  var gv=ymax*g/4;
  var gy=PX.y0-(PX.y0-PX.y1)*(g/4);
  var ln=document.createElementNS("http://www.w3.org/2000/svg","line");
  ln.setAttribute("x1",PX.x0); ln.setAttribute("y1",gy.toFixed(1)); ln.setAttribute("x2",PX.x1); ln.setAttribute("y2",gy.toFixed(1));
  ln.setAttribute("stroke","#F0DED8"); ln.setAttribute("stroke-width","1"); ln.setAttribute("stroke-dasharray","3 5");
  grid.appendChild(ln);
  var tx=document.createElementNS("http://www.w3.org/2000/svg","text");
  tx.setAttribute("x",PX.x0-8); tx.setAttribute("y",(gy+4).toFixed(1)); tx.setAttribute("text-anchor","end");
  tx.setAttribute("font-size","11"); tx.setAttribute("font-weight","700"); tx.setAttribute("fill","#8A7B72");
  tx.textContent=fmtEok1(gv);
  grid.appendChild(tx);
 }
 /* x labels (start, mid, end years) */
 var marks=[Math.round(yrs/3), Math.round(yrs*2/3), yrs];
 marks.forEach(function(yr){
  if(yr<1) return;
  var x=PX.x0+(PX.x1-PX.x0)*(yr/yrs);
  var tx=document.createElementNS("http://www.w3.org/2000/svg","text");
  tx.setAttribute("x",x.toFixed(1)); tx.setAttribute("y",PX.y0+18); tx.setAttribute("text-anchor","middle");
  tx.setAttribute("font-size","11"); tx.setAttribute("font-weight","700"); tx.setAttribute("fill","#8A7B72");
  tx.textContent=yr+"년";
  xlab.appendChild(tx);
 });
 /* lines */
 var dMkt=buildPath(mktC, ymax, yrs);
 var dPol=buildPath(polC, ymax, yrs);
 pMkt.setAttribute("d",dMkt); pPol.setAttribute("d",dPol);
 /* area between (mkt above pol) */
 var areaD=dMkt;
 for(var k=polC.length-1;k>=0;k--){
  var yr=k+1, x=PX.x0+(PX.x1-PX.x0)*(yr/yrs), y=PX.y0-(PX.y0-PX.y1)*(polC[k]/ymax);
  areaD+=" L "+x.toFixed(1)+" "+y.toFixed(1);
 }
 areaD+=" Z";
 area.setAttribute("d",areaD);
 /* draw animation */
 [pMkt,pPol].forEach(function(pp){
  var len=pp.getTotalLength?pp.getTotalLength():1400;
  pp.style.transition="none"; pp.style.strokeDasharray=len; pp.style.strokeDashoffset=len;
  void pp.getBoundingClientRect();
  pp.style.transition=""; pp.style.strokeDashoffset=0;
 });
 /* end dots */
 var ex=PX.x1;
 var eyM=PX.y0-(PX.y0-PX.y1)*(mktC[mktC.length-1]/ymax);
 var eyP=PX.y0-(PX.y0-PX.y1)*(polC[polC.length-1]/ymax);
 dotM.setAttribute("cx",ex); dotM.setAttribute("cy",eyM.toFixed(1));
 dotP.setAttribute("cx",ex); dotP.setAttribute("cy",eyP.toFixed(1));
 setTimeout(function(){ dotM.style.opacity=1; dotP.style.opacity=1; },600);
 $("chProg").textContent=p.name;
 $("chNote").innerHTML=p.name+"으로 "+fmtEokMan(best.loan)+"을 "+best.term+"년 빌리면 누적 이자는 <b>"+fmtEokMan(best.interest)+"</b>예요. 시중("+(S.mkt*100).toFixed(1)+"%)이었다면 <b>"+fmtEokMan(best.mktInterest)+"</b> — 만기까지 <b>"+fmtEokMan(best.save)+"</b>를 아끼는 셈이에요(분홍 영역).";
}

/* ---------- main compute ---------- */
function compute(){
 var results=PROG.map(evalProg);
 var elig=results.filter(function(r){return r.elig && r.loan>0;});
 var best=null;
 elig.forEach(function(r){ if(!best || r.save>best.save) best=r; });

 /* hero */
 if(best){
  countUp($("heroSave"), best.save, fmtEokMan);
  countUp($("kLoan"), best.loan, fmtEokMan);
  countUp($("kPay"), best.pay, fmtMon);
  countUp($("kSave"), best.save, fmtEokMan);
  var rb=$("recoBand"); rb.classList.remove("warn"); rb.classList.add("good");
  $("rbCrown").textContent=best.p.emoji;
  $("rbK").textContent="추천 상품 (예상)";
  $("rbG").textContent=best.p.name+" · "+fmtEokMan(best.loan)+" / "+best.term+"년";
  var others=elig.length-1;
  $("rbP").innerHTML="우리 부부 조건이면 <b>"+best.p.name+"</b>이(가) 가장 유리해요(예시 금리 "+(best.p.rate*100).toFixed(1)+"%). 최대 <b>"+fmtEokMan(best.loan)+"</b>까지, 월 <b>"+fmtMon(best.pay)+"</b>로 갚고, 시중("+(S.mkt*100).toFixed(1)+"%) 대비 만기까지 <b>"+fmtEokMan(best.save)+"</b>를 아껴요."+(others>0?(" 자격이 되는 상품이 "+elig.length+"개라 아래에서 나란히 비교해 보세요."):"");
 } else {
  $("heroSave").textContent="—";
  $("kLoan").textContent="—"; $("kPay").textContent="—"; $("kSave").textContent="—";
  $("heroSave")._cv=0; $("kLoan")._cv=0; $("kPay")._cv=0; $("kSave")._cv=0;
  var rb2=$("recoBand"); rb2.classList.remove("good"); rb2.classList.add("warn");
  $("rbCrown").textContent="⚠️";
  $("rbK").textContent="자격이 되는 정책대출이 없어요";
  $("rbG").textContent="조건을 조정해 보세요";
  $("rbP").innerHTML="현재 조건으로는 세 상품 모두 자격에 걸려요. 아래 카드의 '✕ 사유'를 보고 소득·집값·순자산·출산 여부를 바꿔 보세요. 정책대출이 안 되면 시중 주담대(스트레스 DSR 한도)도 함께 보세요.";
 }

 /* cards */
 results.forEach(function(r){ renderCard(r, best && r.p.id===best.p.id); });
 var eligNames=elig.map(function(r){return r.p.name;});
 $("cardNote").innerHTML = elig.length? ("자격 예상 상품: <b>"+eligNames.join(" · ")+"</b>. 같은 집을 사도 어떤 상품을 쓰느냐로 월 상환·총이자가 달라져요. 금리가 가장 낮은 신생아 특례가 보통 유리하지만, 한도·만기·집값 상한이 달라 늘 1등은 아니에요.") : "지금 조건으로는 자격이 되는 상품이 없어요. 위 입력을 조정하면 카드가 켜져요.";

 /* monthly payment bars: same loan(best.loan or wish-derived) & term, rate effect only */
 var baseLoan = best? best.loan : Math.min(0.7*S.price, S.wish)*1e8;
 var baseTerm = best? best.term : S.term;
 if(baseLoan<=0) baseLoan=Math.min(0.7*S.price,S.wish)*1e8;
 var nB=baseTerm*12;
 var payMkt=monthPay(baseLoan, S.mkt/12, nB);
 var rows=[
  {id:"mkt", rate:S.mkt, pay:payMkt, lbl:(S.mkt*100).toFixed(1)+"%"},
  {id:"didim", rate:0.028, pay:monthPay(baseLoan,0.028/12,nB), lbl:"예시 2.8%"},
  {id:"sin", rate:0.025, pay:monthPay(baseLoan,0.025/12,nB), lbl:"예시 2.5%"},
  {id:"bog", rate:0.040, pay:monthPay(baseLoan,0.040/12,nB), lbl:"예시 4.0%"}
 ];
 var mxPay=Math.max(rows[0].pay,rows[1].pay,rows[2].pay,rows[3].pay,1);
 rows.forEach(function(rw){
  $("bar_"+rw.id).style.width=(Math.max(6,rw.pay/mxPay*100))+"%";
  $("barv_"+rw.id).innerHTML=fmtMon(rw.pay)+"<small>/월</small>";
  $("barR"+rw.id).textContent=rw.lbl;
 });
 $("barLoan").textContent=fmtEokMan(baseLoan);
 $("barTerm").textContent=baseTerm+"년";
 var diffSin=payMkt-rows[2].pay;
 $("barNote").innerHTML="같은 "+fmtEokMan(baseLoan)+"이라도 시중 "+(S.mkt*100).toFixed(1)+"%(월 "+fmtMon(payMkt)+")와 신생아 특례 예시 2.5%(월 "+fmtMon(rows[2].pay)+")는 매달 <b>"+fmtMon(diffSin)+"</b> 차이예요. 그 돈이면 아이 한 명 보육비·우리 부부 비상금이 돼요.";

 /* chart */
 renderChart(best);
}

/* ---------- input wiring ---------- */
function parseNum(el,fallback){ var v=parseFloat((el.value||"").toString().replace(/[, ]/g,"")); return isNaN(v)?fallback:v; }
function setSeg(id,val){ Array.prototype.forEach.call($(id).children,function(b){ b.classList.toggle("on", Math.abs(parseFloat(b.getAttribute("data-v"))-val)<1e-9); }); }
function syncChips(boxId,val){ Array.prototype.forEach.call($(boxId).children,function(b){ b.classList.toggle("on", Math.abs(parseFloat(b.getAttribute("data-v"))-val)<1e-9); }); }

$("income").addEventListener("input",function(){ S.income=Math.max(0,parseNum(this,0)); syncChips("chInc",S.income); compute(); });
Array.prototype.forEach.call($("chInc").children,function(b){ b.addEventListener("click",function(){ S.income=parseFloat(b.getAttribute("data-v")); $("income").value=S.income; syncChips("chInc",S.income); compute(); }); });

$("networth").addEventListener("input",function(){ S.networth=Math.max(0,parseNum(this,0)); syncChips("chNw",S.networth); compute(); });
Array.prototype.forEach.call($("chNw").children,function(b){ b.addEventListener("click",function(){ S.networth=parseFloat(b.getAttribute("data-v")); $("networth").value=S.networth; syncChips("chNw",S.networth); compute(); }); });

$("price").addEventListener("input",function(){ S.price=Math.max(0,parseNum(this,0)); syncChips("chPrice",S.price); compute(); });
Array.prototype.forEach.call($("chPrice").children,function(b){ b.addEventListener("click",function(){ S.price=parseFloat(b.getAttribute("data-v")); $("price").value=S.price; syncChips("chPrice",S.price); compute(); }); });

$("wish").addEventListener("input",function(){ S.wish=parseFloat(this.value); $("wishV").textContent=S.wish.toFixed(1)+"억"; syncChips("chWish",S.wish); compute(); });
Array.prototype.forEach.call($("chWish").children,function(b){ b.addEventListener("click",function(){ S.wish=parseFloat(b.getAttribute("data-v")); $("wish").value=S.wish; $("wishV").textContent=S.wish.toFixed(1)+"억"; syncChips("chWish",S.wish); compute(); }); });

Array.prototype.forEach.call($("segFirst").children,function(b){ b.addEventListener("click",function(){ S.first=parseInt(b.getAttribute("data-v"),10); setSeg("segFirst",S.first); compute(); }); });
Array.prototype.forEach.call($("segBaby").children,function(b){ b.addEventListener("click",function(){ S.baby=parseInt(b.getAttribute("data-v"),10); setSeg("segBaby",S.baby); compute(); }); });
Array.prototype.forEach.call($("segTerm").children,function(b){ b.addEventListener("click",function(){ S.term=parseInt(b.getAttribute("data-v"),10); setSeg("segTerm",S.term); compute(); }); });

$("mkt").addEventListener("input",function(){ S.mkt=parseFloat(this.value)/100; $("mktV").textContent=(S.mkt*100).toFixed(1)+"%"; compute(); });

/* ---------- localStorage ---------- */
function loadStore(){ try{var r=localStorage.getItem(LSKEY); return r?JSON.parse(r):[];}catch(e){return [];} }
function saveStore(a){ try{localStorage.setItem(LSKEY,JSON.stringify(a.slice(0,8)));}catch(e){} }
function applyState(it){
 S.income=it.income; S.networth=it.networth; S.price=it.price; S.wish=it.wish; S.first=it.first; S.baby=it.baby; S.term=it.term; S.mkt=it.mkt;
 $("income").value=S.income; $("networth").value=S.networth; $("price").value=S.price;
 $("wish").value=S.wish; $("wishV").textContent=S.wish.toFixed(1)+"억";
 $("mkt").value=S.mkt*100; $("mktV").textContent=(S.mkt*100).toFixed(1)+"%";
 syncChips("chInc",S.income); syncChips("chNw",S.networth); syncChips("chPrice",S.price); syncChips("chWish",S.wish);
 setSeg("segFirst",S.first); setSeg("segBaby",S.baby); setSeg("segTerm",S.term);
}
function renderSaves(){
 var box=$("saveList"); var arr=loadStore(); box.innerHTML="";
 arr.forEach(function(it,i){
  var d=document.createElement("div"); d.className="saveitem";
  d.innerHTML='<span class="si-n">'+(it.name||"시나리오").replace(/</g,"&lt;")+'</span><span class="si-m">'+it.meta+'</span><span class="si-x" data-i="'+i+'">✕</span>';
  d.addEventListener("click",function(e){ if(e.target.classList.contains("si-x")) return;
   applyState(it); compute(); window.scrollTo({top:0,behavior:"smooth"});
  });
  box.appendChild(d);
 });
 Array.prototype.forEach.call(box.querySelectorAll(".si-x"),function(x){ x.addEventListener("click",function(){ var arr2=loadStore(); arr2.splice(parseInt(this.getAttribute("data-i"),10),1); saveStore(arr2); renderSaves(); }); });
}
$("saveBtn").addEventListener("click",function(){
 var results=PROG.map(evalProg);
 var elig=results.filter(function(r){return r.elig && r.loan>0;});
 var best=null; elig.forEach(function(r){ if(!best||r.save>best.save) best=r; });
 var nm=($("saveName").value||"").trim() || (fmtMan(S.income*1e4)+"·"+S.price+"억"+(S.baby?"·출산":"")+"·"+S.term+"년");
 var meta= best? (best.p.name+" "+fmtEokMan(best.loan)+" · 절감 "+fmtEokMan(best.save)) : "자격 상품 없음";
