<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

/* 12문항 · 각 보기 [텍스트, 저축력Δ, 투자성향Δ, 소통Δ] + tip(대화 처방 한 줄) */
var Q=[
 {q:"월급날, 두 분은 보통?",tip:"월급날 ‘먼저 떼는 저축’ 비율을 둘이 한 번 정해볼까?",o:[["저축부터 자동이체로 떼둬요",3,0,1],["카드값·고정비부터 내요",1,0,0],["일단 쓰고 남으면 저축해요",-2,0,0],["그때그때 달라요",-1,0,-1]]},
 {q:"비상금(소득 끊겨도 버틸 돈)은?",tip:"우리 비상금 목표(몇 개월치)부터 같이 합의해보자.",o:[["6개월치 이상 있어요",3,-1,0],["3개월치쯤 있어요",1,0,0],["1~2개월치 정도",-1,0,0],["거의 없어요",-2,1,0]]},
 {q:"여윳돈 100만원이 생기면?",tip:"여윳돈이 생기면 ‘저축:투자:즐기기’ 비율을 미리 정해두자.",o:[["예적금·파킹통장에",2,-2,0],["인덱스·ETF 적립",1,1,1],["개별주식·코인 도전",-1,3,0],["여행·쇼핑으로 보상",-2,0,0]]},
 {q:"둘이 돈 얘기, 얼마나 자주 해요?",tip:"한 달에 한 번, 부담 없는 ‘머니 데이트’ 시간을 잡아볼까?",o:[["매주 정기적으로",0,0,3],["가끔 필요할 때",0,0,1],["거의 안 해요",0,0,-2],["얘기하면 다퉈요",0,0,-3]]},
 {q:"큰 지출(가전·여행) 결정은?",tip:"얼마 이상 지출은 같이 상의하기로 ‘기준선’을 정하자.",o:[["둘이 상의해서 함께",0,0,3],["각자 알아서",0,0,-1],["주로 한 사람이",0,0,-1],["충동적으로 질러요",-2,1,0]]},
 {q:"투자에서 -20% 손실이 나면?",tip:"투자가 흔들릴 때 어떻게 행동할지 미리 약속해두자.",o:[["계획대로 버티거나 더 사요",0,2,0],["불안해서 일부 정리",0,-1,0],["전부 팔고 쉬어요",0,-2,0],["투자를 안 해서 몰라요",1,-1,0]]},
 {q:"가계부·지출 기록은?",tip:"기록은 한 사람이 도맡기보다 ‘공동 가계부’ 한 줄로 시작해볼까?",o:[["부부 공동으로 꾸준히",2,0,2],["가끔 점검해요",1,0,0],["거의 안 써요",-1,0,0],["앱이 해주는 정도",0,0,0]]},
 {q:"노후·연금 준비는?",tip:"노후 준비, 연금저축·IRP부터 작게라도 같이 시작해보자.",o:[["연금저축·IRP 굴리는 중",2,1,0],["청약·예적금 위주",1,-1,0],["아직 시작 못 했어요",-1,0,0],["생각 안 해봤어요",-2,0,-1]]},
 {q:"돈에 대한 두 사람 성향은?",tip:"서로의 소비 성향을 ‘틀림’이 아니라 ‘다름’으로 인정하는 것부터.",o:[["둘 다 아끼는 편",2,0,0],["한 명은 아끼고 한 명은 쓰는 편",0,0,1],["둘 다 쓰는 편",-2,0,0],["잘 모르겠어요",0,0,-1]]},
 {q:"5년 뒤 목표(내집·1억 등)는?",tip:"5년 뒤 우리 목표 금액·시점을 종이에 같이 적어보자.",o:[["금액·시점까지 합의됐어요",1,0,3],["대략 방향만 있어요",0,0,1],["자주 바뀌어요",-1,0,0],["아직 없어요",-1,0,-1]]},
 {q:"빚(대출)에 대한 생각은?",tip:"대출을 ‘빨리 갚을 빚 / 활용할 빚’으로 나눠 생각을 맞춰보자.",o:[["최대한 빨리 갚자",1,-1,0],["좋은 빚은 활용한다",0,2,0],["무서워서 안 만들어요",0,-2,0],["잘 모르겠어요",0,0,-1]]},
 {q:"돈 공부는 어떻게?",tip:"한 달에 콘텐츠 하나, 같이 보고 한 줄 나누기부터.",o:[["둘이 같이 배우고 적용해요",1,0,2],["한 명이 주로 해요",0,0,0],["가끔 영상·뉴스 정도",0,0,0],["거의 안 해요",-1,0,-1]]}
];
var TYPES={
 "HL":{emo:"🧱",name:"안정 다지는 돌다리"},
 "HH":{emo:"🚀",name:"공격적으로 불리는 야망"},
 "LL":{emo:"🌿",name:"오늘을 즐기는 욜로"},
 "LH":{emo:"🎲",name:"한 방을 노리는 모험"}
};
var AX={
 S:{name:"저축력",low:"쓰며 즐기는",high:"모으는",talk:["매달 월급의 ○○%는 ‘먼저 떼는 저축’으로 자동이체—이 비율만 둘이 합의해볼까?","‘아끼기’와 ‘즐기기’ 예산을 따로 떼서, 서로 간섭 없는 자유돈을 정하자."]},
 R:{name:"투자 적극성",low:"안정적인",high:"적극적인",talk:["‘잃어도 되는 돈’의 상한을 %로 정해두면 둘 다 마음이 편해져요.","공격적 투자 vs 안전자산 비율을 6:4처럼 숫자로 합의해보자."]},
 K:{name:"소통",low:"각자 챙기는",high:"함께 챙기는",talk:["한 달에 한 번, 15분 ‘머니 데이트’로 숫자 말고 마음부터 나눠볼까?","큰 지출 기준선(예: ○○만원 이상은 상의)을 정하면 다툼이 확 줄어요."]}
};

var $=function(id){return document.getElementById(id);};
var taker='A',i=0;
var accA={s:0,r:0,k:0},accB={s:0,r:0,k:0},ansA=[],ansB=[];
var nameA='나',nameB='배우자';
function show(id){['intro','quiz','handoff','result'].forEach(function(x){$(x).classList.toggle('on',x===id);});}
function renderQ(){
 var q=Q[i];$('qnum').textContent=(i+1);$('qfill').style.width=(i/Q.length*100)+'%';
 var chip=$('whoChip');chip.className='whoChip '+(taker==='A'?'a':'b');chip.textContent=(taker==='A'?nameA:nameB);
 $('qq').textContent=q.q;var op=$('opts');op.innerHTML='';
 q.o.forEach(function(o,idx){var b=document.createElement('button');b.className='opt';b.innerHTML='<span class="ol">'+'ABCD'[idx]+'</span><span>'+o[0]+'</span>';
   b.addEventListener('click',function(){pick(idx,o);});op.appendChild(b);});
}
function pick(idx,o){
 if(taker==='A'){accA.s+=o[1];accA.r+=o[2];accA.k+=o[3];ansA[i]=idx;}
 else{accB.s+=o[1];accB.r+=o[2];accB.k+=o[3];ansB[i]=idx;}
 var c=$('qcard');c.classList.add('out');
 setTimeout(function(){
   i++;
   if(i>=Q.length){
     $('qfill').style.width='100%';
     if(taker==='A'){toHandoff();}else{finish();}
     return;
   }
   renderQ();c.classList.remove('out');c.classList.add('inr');c.getBoundingClientRect();c.classList.remove('inr');
 },340);
}
function toHandoff(){$('hDoneName').textContent=nameA;$('hNextName').textContent=nameB;show('handoff');}
function pct(v){return Math.max(2,Math.min(98,Math.round(50+v*2)));}
function typeKey(a){return (pct(a.s)>=50?'H':'L')+(pct(a.r)>=50?'H':'L');}

function finish(){
 var SA=pct(accA.s),RA=pct(accA.r),KA=pct(accA.k);
 var SB=pct(accB.s),RB=pct(accB.r),KB=pct(accB.k);
 var gS=Math.abs(SA-SB),gR=Math.abs(RA-RB),gK=Math.abs(KA-KB);
 var axisAlign=Math.round(((100-gS)+(100-gR)+(100-gK))/3);
 var agSum=0;for(var n=0;n<Q.length;n++){agSum+=(1-Math.abs((ansA[n]||0)-(ansB[n]||0))/3);}
 var answerAgree=Math.round(agSum/Q.length*100);
 var match=Math.max(30,Math.min(99,Math.round(0.6*axisAlign+0.4*answerAgree)));
 var tA=TYPES[typeKey(accA)],tB=TYPES[typeKey(accB)];

 show('result');
 // profiles
 $('peA').textContent=tA.emo;$('pnA').textContent=tA.name+' 타입';$('whoA').textContent=nameA;
 $('peB').textContent=tB.emo;$('pnB').textContent=tB.name+' 타입';$('whoB').textContent=nameB;
 // combo
 $('rCombo').textContent=(typeKey(accA)===typeKey(accB))?('🪞 '+tA.name+' × '+tB.name+' — 닮은 듯 같은 팀'):('🧩 '+tA.name+' × '+tB.name+' — 서로를 채워주는 조합');
 // grade
 var grade=match>=90?'환상의 팀이에요 🎉':match>=75?'호흡이 좋은 편이에요 👍':match>=62?'조금만 더 맞춰가면 좋아요 🌱':'대화가 가장 필요한 지금 🤝';
 $('rGrade').textContent=grade;
 // compare names
 $('cnSA').textContent=$('cnRA').textContent=$('cnKA').textContent=nameA;
 $('cnSB').textContent=$('cnRB').textContent=$('cnKB').textContent=nameB;
 // gap chips + hot row
 var gaps=[['S',gS],['R',gR],['K',gK]];
 var maxAxis=gaps.slice().sort(function(a,b){return b[1]-a[1];})[0][0];
 var minAxis=gaps.slice().sort(function(a,b){return a[1]-b[1];})[0][0];
 function gapLabel(g){return g<=10?'거의 같아요':g<=25?'조금 달라요':g<=45?'꽤 달라요':'많이 달라요';}
 $('gpS').textContent='차이 '+gS+' · '+gapLabel(gS);
 $('gpR').textContent='차이 '+gR+' · '+gapLabel(gR);
 $('gpK').textContent='차이 '+gK+' · '+gapLabel(gK);
 $('cmp'+maxAxis).classList.add('hot');
 // insight: strength(minAxis) + prescription(maxAxis)
 $('rGood').textContent='두 분은 '+AX[minAxis].name+'에서 가장 가깝게 답했어요. 이게 우리 팀의 단단한 기둥이니, 여기서 생기는 안정감을 다른 영역으로 넓혀가면 돼요.';
 var hi=(maxAxis==='S'?(SA>=SB?nameA:nameB):maxAxis==='R'?(RA>=RB?nameA:nameB):(KA>=KB?nameA:nameB));
 var lo=(hi===nameA?nameB:nameA);
 $('rTalkLead').innerHTML='가장 큰 차이는 <b>'+AX[maxAxis].name+'</b>이에요. <b>'+hi+'</b>님이 더 '+AX[maxAxis].high+' 쪽, <b>'+lo+'</b>님이 더 '+AX[maxAxis].low+' 쪽이네요. 이렇게 운을 떼보세요 👇';
 $('rTalk').innerHTML=AX[maxAxis].talk.map(function(x){return '<div class="qc">“'+x+'”</div>';}).join('');
 // hotspots
 var diffs=[];for(var m=0;m<Q.length;m++){diffs.push({i:m,d:Math.abs((ansA[m]||0)-(ansB[m]||0))});}
 diffs.sort(function(a,b){return b.d-a.d;});
 var hot=diffs.filter(function(x){return x.d>=1;}).slice(0,3);
 var hl=$('hotList');hl.innerHTML='';
 if(hot.length===0){
   hl.innerHTML='<div class="hotc"><div class="hq">🎯 12문항을 거의 똑같이 답했어요!</div><div class="tip">생각이 잘 맞는 편이에요. 그래도 1년에 한 번은 같이 점검하며 ‘여전히 같은 방향인지’ 확인해보세요.</div></div>';
 } else {
   hot.forEach(function(x){
     var q=Q[x.i];
     var c=document.createElement('div');c.className='hotc';
     c.innerHTML='<div class="hq">'+q.q+'</div>'+
       '<div class="ans">'+
       '<div class="l a"><span class="tag">'+nameA+'</span><span>'+q.o[ansA[x.i]][0]+'</span></div>'+
       '<div class="l b"><span class="tag">'+nameB+'</span><span>'+q.o[ansB[x.i]][0]+'</span></div>'+
       '</div>'+
       '<div class="tip">💬 '+q.tip+'</div>';
     hl.appendChild(c);
   });
 }
 // animate numbers & bars
 setTimeout(function(){
   window.countUp($('rScore'),match,1100,'점');
   window.countUp($('bAlign'),axisAlign,900,'%');
   window.countUp($('bAgree'),answerAgree,900,'%');
   var arc=$('ringArc');arc.style.transition='stroke-dashoffset 1.1s var(--ease)';arc.style.strokeDashoffset=(100-match);
   // mini profile bars + values
   $('mAS').style.width=SA+'%';$('mAR').style.width=RA+'%';$('mAK').style.width=KA+'%';
   $('mBS').style.width=SB+'%';$('mBR').style.width=RB+'%';$('mBK').style.width=KB+'%';
   $('mASv').textContent=SA;$('mARv').textContent=RA;$('mAKv').textContent=KA;
   $('mBSv').textContent=SB;$('mBRv').textContent=RB;$('mBKv').textContent=KB;
   // compare bars + values
   $('iSA').style.width=SA+'%';$('iSB').style.width=SB+'%';$('vSA').textContent=SA;$('vSB').textContent=SB;
   $('iRA').style.width=RA+'%';$('iRB').style.width=RB+'%';$('vRA').textContent=RA;$('vRB').textContent=RB;
   $('iKA').style.width=KA+'%';$('iKB').style.width=KB+'%';$('vKA').textContent=KA;$('vKB').textContent=KB;
 },140);
 window._res={nameA:nameA,nameB:nameB,match:match,align:axisAlign,agree:answerAgree,tA:tA.name,tB:tB.name};
}

function startAll(){
 nameA=($('nA').value||'나').trim()||'나';nameB=($('nB').value||'배우자').trim()||'배우자';
 taker='A';i=0;accA={s:0,r:0,k:0};accB={s:0,r:0,k:0};ansA=[];ansB=[];
 show('quiz');renderQ();
}
$('start').addEventListener('click',startAll);
$('toB').addEventListener('click',function(){taker='B';i=0;show('quiz');renderQ();});
$('again').addEventListener('click',function(){show('intro');});
$('copy').addEventListener('click',function(){var r=window._res;if(!r)return;var txt='우리 부부 머니 궁합 '+r.match+'점 (성향정렬 '+r.align+'% · 답변일치 '+r.agree+'%) — '+r.nameA+': '+r.tA+' / '+r.nameB+': '+r.tB+' · 부부연구소 자료실';if(navigator.clipboard)navigator.clipboard.writeText(txt);var b=$('copy');var o=b.textContent;b.textContent='복사됐어요!';setTimeout(function(){b.textContent=o;},1500);});
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
