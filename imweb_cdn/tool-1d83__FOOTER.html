<!-- [도구_구독누수점검_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countUp=function(el,to,dur){to=+to;dur=dur||850;var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=Math.round(to*e).toLocaleString('ko-KR');if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};
var CATS=['구독','통신','보험','기타'];
var CATCOLOR={'구독':'var(--rose)','통신':'var(--lav)','보험':'var(--sage)','기타':'var(--gold)'};
var PRESETS=[
 {n:'넷플릭스',c:'구독',v:13500},{n:'유튜브 프리미엄',c:'구독',v:14900},
 {n:'쿠팡 와우',c:'구독',v:7890},{n:'디즈니+',c:'구독',v:9900},
 {n:'통신요금',c:'통신',v:55000},{n:'보험료',c:'보험',v:120000},
 {n:'헬스장',c:'기타',v:60000},{n:'기타 멤버십',c:'기타',v:10000}
];
var DEFAULTS=[
 {n:'넷플릭스',c:'구독',v:13500,use:true},
 {n:'유튜브 프리미엄',c:'구독',v:14900,use:true},
 {n:'안 보는 OTT 하나',c:'구독',v:9900,use:false},
 {n:'통신요금(둘 합산)',c:'통신',v:90000,use:true},
 {n:'보장성 보험(둘 합산)',c:'보험',v:150000,use:true},
 {n:'안 가는 헬스장',c:'기타',v:19900,use:false}
];
var SKEY='bbl_subleak_v1';

function commaInt(v){v=(''+v).replace(/[^0-9]/g,'');return v?(+v).toLocaleString('ko-KR'):'';}
function makeRow(n,c,v,use){
 var row=document.createElement('div');row.className='row'+(use?'':' off');
 var sel='<select class="rcat" aria-label="분류">'+CATS.map(function(x){return '<option'+(x===c?' selected':'')+'>'+x+'</option>';}).join('')+'</select>';
 row.innerHTML='<span class="cdot" style="background:'+CATCOLOR[c]+'"></span>'+sel+
  '<input class="rname" type="text" value="'+(n||'').replace(/"/g,'&quot;')+'" aria-label="항목 이름">'+
  '<div class="rcost"><input class="rval" type="text" inputmode="numeric" value="'+(v?(+v).toLocaleString('ko-KR'):'')+'" aria-label="월 금액"><span>원</span></div>'+
  '<button class="tg'+(use?'':' cut')+'" aria-pressed="'+(use?'true':'false')+'">'+(use?'쓰는 중':'안 씀')+'</button>'+
  '<button class="del" aria-label="이 항목 삭제">×</button>';
 return row;
}
function addRow(n,c,v,use){$('rows').appendChild(makeRow(n,c,v,use===undefined?true:use));}
function readRows(){
 return [].map.call($('rows').querySelectorAll('.row'),function(r){
  return {c:r.querySelector('.rcat').value,
   v:Math.max(0,+(r.querySelector('.rval').value.replace(/[^0-9]/g,''))||0),
   use:r.querySelector('.tg').getAttribute('aria-pressed')==='true'};
 });
}
function save(){try{var data=[].map.call($('rows').querySelectorAll('.row'),function(r){
 return {n:r.querySelector('.rname').value,c:r.querySelector('.rcat').value,
  v:+(r.querySelector('.rval').value.replace(/[^0-9]/g,''))||0,use:r.querySelector('.tg').getAttribute('aria-pressed')==='true'};});
 localStorage.setItem(SKEY,JSON.stringify({rows:data,yrs:$('yrs').value,ret:$('ret').value}));}catch(e){}}
function load(){try{var s=localStorage.getItem(SKEY);if(!s)return null;return JSON.parse(s);}catch(e){return null;}}

// chart helpers
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=22,y1=232,pts=[];for(var k=0;k<arr.length;k++){var x=x0+(x1-x0)*(N?k/N:0);var y=y1-(y1-y0)*(arr[k]/maxV);pts.push([x,y]);}return pts;}
function toD(pts){return pts.map(function(p,j){return (j?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}

// result interpretation: leak ratio -> verdict band (color-blind safe: border+emoji+pill+text)
function renderVerdict(total,leak,leakCnt,leakYr,fv,yrs,rowCnt){
 var vb=$('verdict');if(!vb)return;
 if(total<=0){
  vb.className='verdict inval show';
  vb.innerHTML='<div class="vrow"><span class="vemo" aria-hidden="true">✍️</span><div class="vtx"><span class="vhead">먼저 우리 집 고정비를 넣어 주세요.</span><span class="vsub">위 칩이나 ‘＋ 직접 추가’로 항목과 금액을 채우면, 어디서 새는지 짚어 드릴게요.</span></div></div>';
  return;
 }
 var ratio=leak/total*100, r1=ratio.toFixed(ratio<10?1:0);
 if(leak<=0){
  vb.className='verdict lv0 show';
  vb.innerHTML='<div class="vrow"><span class="vemo" aria-hidden="true">🏆</span><div class="vtx"><span class="vhead">고정비가 깔끔해요 — 지금은 새는 곳이 없어요.</span><span class="vsub">등록한 '+rowCnt+'개 항목이 모두 ‘쓰는 중’이에요. 가끔 ‘이거 진짜 쓰나?’만 점검하면 이 상태가 유지돼요. 항목을 ‘안 씀’으로 바꿔보면 그 돈을 굴렸을 때의 미래가치도 미리 볼 수 있어요.</span><span class="vpill">누수율 0%</span></div></div>';
  return;
 }
 var actChips='<div class="vact"><span class="vchip">매달 <b>+'+window.fmtWon(leak)+'원</b></span><span class="vchip">1년 <b>+'+window.fmtWon(leakYr)+'원</b></span><span class="vchip">'+yrs+'년 굴리면 <b>+'+window.fmtWon(fv)+'원</b></span></div>';
 var cls,emo,head,sub;
 if(ratio<10){cls='lv1';emo='🌱';head='거의 깔끔해요. 살짝만 더 다듬으면 끝!';sub='고정비 중 안 쓰는 비중이 <b>'+r1+'%</b>로 낮아요. 안 쓰는 '+leakCnt+'개만 정리하면 군더더기 없는 고정비 구조가 돼요.';}
 else if(ratio<25){cls='lv2';emo='📈';head='정리하면 꽤 남아요 — 고정비의 '+r1+'%가 잠자고 있어요.';sub='안 쓰는 '+leakCnt+'개(월 '+window.fmtWon(leak)+'원)가 ‘자동이체’라 안 아프게 빠져나가요. 한 번만 해지하면 매달 통장에 남아요.';}
 else{cls='lv3';emo='🚨';head='고정비의 '+r1+'%가 새고 있어요 — 가장 큰 기회예요.';sub='안 쓰는 비중이 커요. 바꿔 말하면 <b>손볼수록 가장 많이 남는다</b>는 뜻이에요. '+leakCnt+'개 중 1~2개만 먼저 정리해도 체감이 커요.';}
 vb.className='verdict '+cls+' show';
 vb.innerHTML='<div class="vrow"><span class="vemo" aria-hidden="true">'+emo+'</span><div class="vtx"><span class="vhead">'+head+'</span><span class="vsub">'+sub+'</span><span class="vpill">누수율 '+r1+'%</span>'+actChips+'</div></div>';
}

function render(animate){
 var yrs=+$('yrs').value, r=(+$('ret').value)/100, im=r/12;
 $('yrsv').textContent=yrs+'년';$('retv').textContent=(+$('ret').value).toFixed(1)+'%';$('fvY').textContent=yrs;
 var rows=readRows();
 var total=0,leak=0,leakCnt=0,cat={'구독':0,'통신':0,'보험':0,'기타':0};
 rows.forEach(function(o){total+=o.v;cat[o.c]+=o.v;if(!o.use){leak+=o.v;leakCnt++;}});
 var annual=total*12, leakYr=leak*12;
 // headline
 if(animate)window.countUp($('annual'),annual);else $('annual').textContent=window.fmtWon(annual);
 $('annualHint').textContent='월 '+window.fmtWon(total)+'원 × 12개월 · 항목 '+rows.length+'개';
 $('sMonthly').textContent=window.fmtWon(total);
 $('sLeakCnt').textContent=leakCnt+'개';
 $('sLeakYr').textContent=window.fmtWon(leakYr);
 $('leakN').textContent=leakCnt;$('leakYr2').textContent=window.fmtWon(leakYr);
 // category bar + legend
 var bar=$('catbar'),leg=$('catleg');leg.innerHTML='';
 CATS.forEach(function(x){
  var seg=bar.querySelector('i[data-c="'+x+'"]');
  var w=total>0?(cat[x]/total*100):0;
  if(animate){seg.style.width='0';requestAnimationFrame(function(){seg.style.width=w+'%';});}else seg.style.width=w+'%';
  if(cat[x]>0)leg.innerHTML+='<span><b style="background:'+CATCOLOR[x]+'"></b>'+x+' '+window.fmtWon(cat[x])+'원</span>';
 });
 if(total===0)leg.innerHTML='<span style="color:var(--mut)">항목을 추가해 보세요.</span>';
 // invest projection of monthly leak amount
 var S=leak, fvArr=[],pArr=[];
 for(var y=0;y<=yrs;y++){var m=12*y; pArr.push(S*m); fvArr.push(im>0?S*((Math.pow(1+im,m)-1)/im):S*m);}
 var fv=fvArr[fvArr.length-1], prin=pArr[pArr.length-1], gain=fv-prin;
 if(animate){window.countUp($('sFv'),fv);window.countUp($('sGain'),gain);window.countUp($('sPrin'),prin);}
 else{$('sFv').textContent=window.fmtWon(fv);$('sGain').textContent=window.fmtWon(gain);$('sPrin').textContent=window.fmtWon(prin);}
 // chart paths
 var maxV=Math.max(fv,1)*1.06;
 var vp=buildPath(fvArr,maxV,yrs), pp=buildPath(pArr,maxV,yrs);
 $('vpath').setAttribute('d',toD(vp));
 $('pline').setAttribute('d',toD(pp));
 var rev=pp.slice().reverse().map(function(p){return 'L'+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
 $('area').setAttribute('d',toD(vp)+' '+rev+' Z');
 var last=vp[vp.length-1];$('dot').setAttribute('cx',last[0]);$('dot').setAttribute('cy',last[1]);
 var g=$('grid');g.innerHTML='';for(var q=0;q<=4;q++){var gy=22+(232-22)*q/4;g.innerHTML+='<line x1="46" y1="'+gy+'" x2="606" y2="'+gy+'" stroke="#EAD7D3" stroke-width="1"/>';}
 // feel note
 if(total<=0){$('feel').innerHTML='✍️ 위에서 <b>고정비 항목과 금액</b>을 넣으면, 안 쓰는 돈을 굴렸을 때의 미래가치를 여기서 보여드릴게요.';}
 else if(leak<=0){$('feel').innerHTML='✨ 지금은 <b>새는 돈이 없네요!</b> 훌륭해요. 항목을 \'안 씀\'으로 바꿔보면, 그 돈을 굴렸을 때의 미래가치를 확인할 수 있어요.';}
 else{$('feel').innerHTML='💡 안 쓰는 항목 <b>'+leakCnt+'개</b>(월 <b>'+window.fmtWon(leak)+'원</b>)만 정리해 꾸준히 굴리면, <b>'+yrs+'년</b> 뒤 약 <b>'+window.fmtWon(fv)+'원</b>이 돼요. 작은 자동이체 하나가 목돈의 씨앗이에요.';}
 // result interpretation band
 renderVerdict(total,leak,leakCnt,leakYr,fv,yrs,rows.length);
 // chart draw animation
 if(animate){
  var vpath=$('vpath');vpath.style.transition='none';vpath.style.strokeDasharray='1';vpath.style.strokeDashoffset='1';vpath.getBoundingClientRect();vpath.style.transition='stroke-dashoffset 1.1s var(--ease)';vpath.style.strokeDashoffset='0';
  var ar=$('area');ar.style.transition='none';ar.style.opacity='0';ar.getBoundingClientRect();ar.style.transition='opacity .9s var(--ease) .25s';ar.style.opacity='.9';
  var dt=$('dot');dt.style.transition='none';dt.style.opacity='0';setTimeout(function(){dt.style.transition='opacity .4s';dt.style.opacity='1';},900);
 }
 save();
}

// events (delegation)
$('rows').addEventListener('input',function(e){
 if(e.target.classList.contains('rval')){var p=e.target.selectionStart,old=e.target.value;e.target.value=commaInt(e.target.value);}
 render(false);
});
$('rows').addEventListener('change',function(e){
 if(e.target.classList.contains('rcat')){var row=e.target.closest('.row');row.querySelector('.cdot').style.background=CATCOLOR[e.target.value];render(true);}
});
$('rows').addEventListener('click',function(e){
 var t=e.target;
 if(t.classList.contains('tg')){var on=t.getAttribute('aria-pressed')==='true';t.setAttribute('aria-pressed',on?'false':'true');t.textContent=on?'안 씀':'쓰는 중';t.classList.toggle('cut',on);t.closest('.row').classList.toggle('off',on);render(true);}
 else if(t.classList.contains('del')){t.closest('.row').remove();render(true);}
});
$('addRow').addEventListener('click',function(){addRow('새 항목','기타',0,true);render(false);var rows=$('rows').querySelectorAll('.row');rows[rows.length-1].querySelector('.rname').focus();});

// preset chips
PRESETS.forEach(function(p){var b=document.createElement('button');b.textContent=p.n;b.addEventListener('click',function(){addRow(p.n,p.c,p.v,true);render(true);});$('presetChips').appendChild(b);});

// invest controls
function syncRchip(v){document.querySelectorAll('#rchips button').forEach(function(b){b.classList.toggle('on',Math.abs(+b.dataset.r-v)<1e-6);});}
$('yrs').addEventListener('input',function(){render(false);});$('yrs').addEventListener('change',function(){render(true);});
$('ret').addEventListener('input',function(){syncRchip(+$('ret').value);render(false);});
$('ret').addEventListener('change',function(){render(true);});
document.querySelectorAll('#rchips button').forEach(function(b){b.addEventListener('click',function(){var v=+b.dataset.r;$('ret').value=v;$('retv').textContent=v.toFixed(1)+'%';syncRchip(v);render(true);});});

// init
(function(){var saved=load();
 if(saved&&saved.rows&&saved.rows.length){saved.rows.forEach(function(o){addRow(o.n,o.c,o.v,o.use);});if(saved.yrs){$('yrs').value=saved.yrs;}if(saved.ret){$('ret').value=saved.ret;$('retv').textContent=(+saved.ret).toFixed(1)+'%';syncRchip(+saved.ret);}}
 else{DEFAULTS.forEach(function(o){addRow(o.n,o.c,o.v,o.use);});}
 render(true);
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*bb-hdrsync*/(function(){var r=document.documentElement,tb=document.querySelector(".topbar"),hd=document.getElementById("hdr")||document.getElementById("jmhdr");if(!hd)return;function s(){var th=tb?tb.offsetHeight:0,hh=hd.offsetHeight||0;if(tb){hd.style.top=th+"px";}r.style.setProperty("--bbhdrH",(th+hh)+"px");}s();addEventListener("resize",s);addEventListener("load",s);if(document.readyState!=="loading")s();else document.addEventListener("DOMContentLoaded",s);})();</script>
