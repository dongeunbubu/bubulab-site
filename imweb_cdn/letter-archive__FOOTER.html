<!-- [letter-archive] FOOTER = 페이지별 푸터 · 아카이브 로더 v7(G5) · 아침/저녁 머니레터 · 오늘 2판 동시 · 월별 아코디언+점진로드(더보기)+연도셀렉터 · 리치 모션(RM 존중) · index.json 라이브(cb+no-store+10s 타임아웃, 실패 시 인라인 스냅샷 폴백) · 딥링크 · 스케일 샤딩 훅 · 2026-07-11 -->
<script>
(function(){
 var W=document.getElementById('bblArc');if(!W)return;
 if(window.__bblArcV7)return;window.__bblArcV7=1;
 var d=document;W.classList.add('js');
 var rm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
 var MON=['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
 var RAW='https://raw.githubusercontent.com/dongeunbubu/bubulab-site/main/letters/';
 var INITIAL_DAYS=14,PAGE_MONTHS=6;
 var STATE={all:[],months:[],years:[],year:'',page:1},MODEL=null;

 /* ── 스케일 계약 ──────────────────────────────────────────────────────
  index.json 단일 파일로 최신 전량을 받아 클라이언트에서 그룹·페이지네이션한다.
  파일이 수십 KB이라 경험칙상 ~수백 건(1~2년치)까지 단일 fetch로 충분하다.
  [200건 초과 전환 계획] 초기 fetch를 최근 N개월로 제한하고, 과거 월 아코디언을
  펼칠 때 fetchMonth('YYYY-MM')로 월별 샤드(letters/index-YYYY-MM.json)를 온디맨드
  로드한다. cover()/monthSection()/renderMonths() 렌더 계층은 그대로라 데이터 소스만
  교체되고 구조 변경은 없다(아래 fetchMonth 스텁이 그 전환 진입점). */
 function fetchMonth(ym){ // 미래 샤딩 훅(현재는 로드된 인덱스에서 해당 월 반환)
  return Promise.resolve((STATE.all||[]).filter(function(L){return (L.date||'').slice(0,7)===ym;}));
 }

 function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
 function pad(n){return (n<10?'0':'')+n;}
 function ymd(s){return String(s).replace(/-/g,'');}
 function edRank(e){return e==='pm'?1:0;}
 function deeplink(L){var p=L.edition==='am'?'letter-morning':'letter-evening';return '/'+p+'?d='+ymd(L.date)+'&e='+L.edition;}
 function edLabel(e){return e==='am'?'🌅 아침 머니레터':'🌙 저녁 머니레터';}
 function arrow(dr){return dr==='up'?'▲':(dr==='down'?'▼':'—');}
 function shortD(s){var p=String(s).split('-');return (+p[1])+'.'+(+p[2]);}
 function kchips(kpis,big){var o='';(kpis||[]).forEach(function(k){o+='<span class="kchip '+(k.d||'flat')+'"><span class="ka" aria-hidden="true">'+arrow(k.d)+'</span>'+esc(k.k)+' <b class="tnum">'+esc(k.v)+'</b></span>';});return '<div class="cv-kpis'+(big?' big':'')+'">'+o+'</div>';}

 function cover(L,variant){
  var big=variant==='today'||variant==='big';
  var p=String(L.date).split('-'),mm=+p[1],dd=+p[2];
  var dirc=(L.kpi&&L.kpi[0]&&L.kpi[0].d)||'flat';
  var HT=big?'h3':'div';
  var flag=variant==='today'?('<span class="cv-flag">'+(L.edition==='am'?'오늘 아침 · 미국장 마감':'오늘 저녁 · 한국장 마감')+'</span>'):'';
  return '<a class="cover '+(variant==='today'?'today ':variant==='big'?'big ':'')+dirc+' reveal" href="'+esc(deeplink(L))+'" data-dir="'+dirc+'">'+
   '<span class="cv-spine" aria-hidden="true"></span>'+flag+
   '<div class="cv-top"><time class="cv-date'+(big?' big':'')+' tnum" datetime="'+esc(L.date)+'">'+mm+'.'+pad(dd)+'</time>'+
   '<span class="cv-ed '+L.edition+'">'+edLabel(L.edition)+'</span></div>'+
   '<'+HT+' class="cv-hook'+(big?' big':'')+'">'+esc(L.title)+'</'+HT+'>'+
   '<div class="cv-teaser'+(big?' big':'')+'">'+esc(L.teaser||'')+'</div>'+
   kchips(L.kpi,big)+
   '<span class="cv-go'+(big?' big':'')+'">펼쳐 읽기 <i aria-hidden="true">→</i></span></a>';
 }
 function waitCard(){
  return '<div class="cover today wait reveal"><span class="cv-spine" aria-hidden="true"></span>'+
   '<div class="cv-top"><span class="cv-ed pm">🌙 저녁 머니레터</span></div>'+
   '<div class="cv-hook big wait-h">오늘 저녁, 이 자리에서 만나요</div>'+
   '<div class="cv-teaser big">한국 증시가 마감하면 저녁 브리핑이 도착해요.</div>'+
   '<span class="cv-go big wait-go">저녁에 다시 열어보기</span></div>';
 }

 function buildModel(letters){
  var all=letters.slice().sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:(edRank(b.edition)-edRank(a.edition));});
  var latest=all.length?all[0].date:null;
  var today={am:null,pm:null};
  all.forEach(function(L){if(L.date===latest){if(L.edition==='am')today.am=L;else if(L.edition==='pm')today.pm=L;}});
  var rest=all.filter(function(L){return L.date!==latest;});
  var bym={},order=[];
  rest.forEach(function(L){var k=L.date.slice(0,7);if(!bym[k]){bym[k]=[];order.push(k);}bym[k].push(L);});
  var cutoff=null;
  if(latest){var dt=new Date(latest+'T00:00:00');dt.setDate(dt.getDate()-INITIAL_DAYS);cutoff=dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
  var months=order.map(function(k){var pm=k.split('-'),ls=bym[k];
   var recent=cutoff?ls.some(function(L){return L.date>=cutoff;}):true;
   return {key:k,year:pm[0],mNum:+pm[1],label:pm[0]+'년 '+MON[+pm[1]],count:ls.length,letters:ls,recent:recent};});
  var yset={},years=[];all.forEach(function(L){var y=L.date.slice(0,4);if(!yset[y]){yset[y]=1;years.push(y);}});years.sort().reverse();
  return {all:all,latest:latest,today:today,months:months,years:years,cutoff:cutoff};
 }

 function renderToday(m){
  var hi=d.getElementById('highlight');if(!hi)return;
  var lead=hi.querySelector('.sec-lead');hi.innerHTML='';if(lead)hi.appendChild(lead);
  var t=m.today,parts=[];
  if(t.am)parts.push(cover(t.am,'today'));
  if(t.pm)parts.push(cover(t.pm,'today'));
  else if(t.am)parts.push(waitCard());
  if(!parts.length&&m.all[0])parts.push(cover(m.all[0],'today'));
  hi.insertAdjacentHTML('beforeend','<div class="today-grid'+(parts.length<2?' one':'')+'">'+parts.join('')+'</div>');
 }
 function monthSection(mo,idx,open){
  var cards=mo.letters.map(function(L){return cover(L,'');}).join('');
  return '<section class="month'+(open?' op':'')+'" data-key="'+mo.key+'">'+
   '<button class="month-h" type="button" aria-expanded="'+(open?'true':'false')+'" aria-controls="mg-'+idx+'">'+
    '<span class="mh-title">'+esc(mo.label)+'</span><span class="mh-count tnum">'+mo.count+'통</span>'+
    '<span class="mh-chev" aria-hidden="true">⌄</span></button>'+
   '<div class="month-body" id="mg-'+idx+'"><div class="mbi"><div class="cover-grid">'+cards+'</div></div></div></section>';
 }
 function currentMonths(){return STATE.year?STATE.months.filter(function(x){return x.year===STATE.year;}):STATE.months;}
 function mountMonths(list,from,to,host){
  for(var i=from;i<to;i++){var mo=list[i],open=mo.recent||(!!STATE.year&&i===0);
   host.insertAdjacentHTML('beforeend',monthSection(mo,i,open));}
 }
 function renderMonths(reset){
  var arc=d.getElementById('archive');if(!arc)return;
  var host=d.getElementById('bblArcMonths'),more=d.getElementById('bblArcMore');
  if(!host){host=d.createElement('div');host.id='bblArcMonths';arc.appendChild(host);}
  if(!more){more=d.createElement('div');more.id='bblArcMore';more.className='morewrap';arc.appendChild(more);}
  var list=currentMonths();
  if(reset){host.innerHTML='';STATE.page=1;}
  var start=reset?0:host.children.length,end=STATE.page*PAGE_MONTHS;if(end>list.length)end=list.length;
  mountMonths(list,start,end,host);
  var remain=list.length-end;
  more.innerHTML=remain>0?'<button class="morebtn" type="button">지난 기록 더 보기 <b>'+remain+'개월</b> <i aria-hidden="true">↓</i></button>':'';
  bindAccordion(host);initReveal(host);
 }
 function renderYears(m){
  var host=d.getElementById('bblArcYears');if(!host)return;
  if(!m.years||m.years.length<2){host.innerHTML='';host.style.display='none';return;}
  host.style.display='';
  var chips='<button class="ychip'+(STATE.year===''?' on':'')+'" type="button" data-y="">전체</button>';
  m.years.forEach(function(y){chips+='<button class="ychip'+(STATE.year===y?' on':'')+'" type="button" data-y="'+y+'">'+y+'</button>';});
  host.innerHTML=chips;
 }
 function bindAccordion(scope){[].slice.call((scope||d).querySelectorAll('.month.op .mbi')).forEach(function(x){x.style.overflow='visible';});}
 function toggleMonth(sec,btn){
  var body=sec.querySelector('.month-body'),inner=sec.querySelector('.mbi');
  if(sec.classList.contains('op')){if(inner)inner.style.overflow='hidden';sec.classList.remove('op');if(btn)btn.setAttribute('aria-expanded','false');}
  else{sec.classList.add('op');if(btn)btn.setAttribute('aria-expanded','true');
   if(rm){if(inner)inner.style.overflow='visible';}
   else if(inner&&body){var done=function(){inner.style.overflow='visible';body.removeEventListener('transitionend',done);};body.addEventListener('transitionend',done);}}
 }
 function odo(scope){
  [].slice.call((scope||d).querySelectorAll('.cnt')).forEach(function(c){
   if(c.__od)return;c.__od=1;
   var raw=c.getAttribute('data-to'),num=parseFloat(raw);if(!isFinite(num))return;
   var small=c.querySelector('small'),suf=small?small.outerHTML:'',sufTxt=small?small.textContent:'';
   var dec=(String(raw).split('.')[1]||'').length;
   var txt=num.toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
   var sr=d.createElement('span');sr.className='sr-only';sr.setAttribute('aria-live','polite');sr.textContent=txt+sufTxt;
   var out='',i,k;
   for(i=0;i<txt.length;i++){var ch=txt.charAt(i);
    if(ch>='0'&&ch<='9'){var col='';for(k=0;k<10;k++)col+='<span>'+k+'</span>';
     out+='<span class="od-col"><span class="od-reel" data-d="'+ch+'">'+col+'</span></span>';}
    else{out+='<span class="od-sep">'+ch+'</span>';}}
   c.setAttribute('aria-hidden','true');c.classList.add('odo');c.innerHTML=out+suf;
   if(c.nextSibling)c.parentNode.insertBefore(sr,c.nextSibling);else c.parentNode.appendChild(sr);
   [].slice.call(c.querySelectorAll('.od-reel')).forEach(function(r,idx){var dd=+r.getAttribute('data-d');
    if(rm){r.style.transform='translateY(-'+dd+'em)';return;}
    r.style.transform='translateY(0)';void r.getBoundingClientRect();
    r.style.transition='transform var(--dur-2) var(--ease-enter)';r.style.transitionDelay=(idx*55)+'ms';
    r.style.transform='translateY(-'+dd+'em)';});
  });
 }
 function initReveal(scope){
  var root=scope||W;
  var els=[].slice.call(root.querySelectorAll('.reveal')).filter(function(e){return !e.__rv;});
  if(!els.length)return;
  if(rm||!('IntersectionObserver'in window)){els.forEach(function(e){e.__rv=1;e.classList.add('in');});return;}
  var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{threshold:.12,rootMargin:'0px 0px -6% 0px'});
  els.forEach(function(e){e.__rv=1;io.observe(e);});
 }
 function initFx(){odo(W);initReveal(W);}
 function showError(){
  var hi=d.getElementById('highlight');
  if(hi){var lead=hi.querySelector('.sec-lead');hi.innerHTML='';if(lead)hi.appendChild(lead);
   hi.insertAdjacentHTML('beforeend','<div class="bbl-err"><div class="ei">🌥️</div><div class="et">아카이브를 불러오지 못했어요</div><div class="ed">잠깐 사이 연결이 고르지 못했나 봐요. 잠시 후 새로고침해 주세요.</div><a class="ebtn" href="/letter-evening">오늘 레터 보기 →</a></div>');}
  var sk=d.getElementById('bblArcSk');if(sk)sk.remove();
  var per=d.getElementById('bblArcPeriod');if(per)per.textContent='—';
 }
 function renderAll(idx){
  var letters=(idx&&idx.letters)||[];if(!letters.length)return false;
  MODEL=buildModel(letters);STATE.all=MODEL.all;STATE.months=MODEL.months;STATE.years=MODEL.years;STATE.year='';STATE.page=1;
  var n=MODEL.all.length,as=d.getElementById('bblArcN');
  if(as){var nx=as.nextSibling;if(nx&&nx.className&&/(^|\s)sr-only(\s|$)/.test(nx.className))nx.parentNode.removeChild(nx);
   as.setAttribute('data-to',n);as.__od=0;as.classList.remove('odo');as.innerHTML=n+'<small>통</small>';}
  var per=d.getElementById('bblArcPeriod');
  if(per)per.textContent=shortD(MODEL.all[MODEL.all.length-1].date)+' ~ '+shortD(MODEL.all[0].date);
  var arc=d.getElementById('archive'),lead=arc?arc.querySelector('.sec-lead'):null;
  if(arc){arc.innerHTML='';if(lead)arc.appendChild(lead);
   var yw=d.createElement('div');yw.id='bblArcYears';yw.className='yearsel';arc.appendChild(yw);}
  renderToday(MODEL);renderYears(MODEL);renderMonths(true);
  return true;
 }

 var snap=null;try{var sn=d.getElementById('bblArcSnap');if(sn)snap=JSON.parse(sn.textContent);}catch(e){snap=null;}
 function useFallback(){if(snap&&snap.letters&&snap.letters.length){if(renderAll(snap)){initFx();return;}}showError();}
 function boot(){
  initFx();bindAccordion(W); // 정적 스냅샷 애니메이션(오도미터·리빌)
  if(!window.fetch){return;} // no-fetch → 정적 유지
  var done=false,ctrl=('AbortController'in window)?new AbortController():null;
  var to=setTimeout(function(){if(done)return;done=true;if(ctrl){try{ctrl.abort();}catch(e){}}useFallback();},10000);
  fetch(RAW+'index.json?cb='+Date.now(),{cache:'no-store',signal:ctrl?ctrl.signal:undefined})
   .then(function(r){if(!r.ok)throw 0;return r.json();})
   .then(function(j){if(done)return;done=true;clearTimeout(to);if(j&&j.letters&&j.letters.length){if(renderAll(j))initFx();else useFallback();}else useFallback();})
   .catch(function(){if(done)return;done=true;clearTimeout(to);useFallback();});
 }
 W.addEventListener('click',function(e){
  var t=e.target;if(!t||!t.closest)return;
  var mh=t.closest('.month-h');if(mh&&W.contains(mh)){toggleMonth(mh.parentNode,mh);return;}
  var mb=t.closest('.morebtn');if(mb){STATE.page++;renderMonths(false);return;}
  var yc=t.closest('.ychip');if(yc){var y=yc.getAttribute('data-y')||'';if(y===STATE.year)return;STATE.year=y;renderYears(MODEL);renderMonths(true);return;}
 });
 boot();
 var tp=d.getElementById('bblTop');
 addEventListener('scroll',function(){if(tp)tp.classList.toggle('on',(d.documentElement.scrollTop||d.body.scrollTop||0)>620);},{passive:true});
 if(tp)tp.addEventListener('click',function(){scrollTo({top:0,behavior:rm?'auto':'smooth'});});
})();
</script>
