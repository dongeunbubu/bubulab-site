<!-- [letter-archive] FOOTER = 페이지별 푸터 · 아카이브 로더 v6(index.json 라이브 렌더 · 커버카드 · 오도미터 · 딥링크 규약) · 2026-07-10 -->
<script>
(function(){
 var W=document.getElementById('bblArc');if(!W)return;
 if(window.__bblArcV6)return;window.__bblArcV6=1;
 var d=document;W.classList.add('js');
 var rm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
 var MON=['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
 var RAW='https://raw.githubusercontent.com/dongeunbubu/bubulab-site/main/letters/';
 function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
 function pad(n){return (n<10?'0':'')+n;}
 function ymd(dt){return dt.replace(/-/g,'');}
 function deeplink(L){var p=L.edition==='am'?'letter-morning':'letter-evening';return '/'+p+'?d='+ymd(L.date)+'&e='+L.edition;}
 function edLabel(e){return e==='am'?'🌅 아침판':'🌙 저녁판';}
 function arrow(dr){return dr==='up'?'▲':(dr==='down'?'▼':'—');}
 function shortD(s){var p=s.split('-');return (+p[1])+'.'+(+p[2]);}
 function kchips(kpis,big){var o='';(kpis||[]).forEach(function(k){o+='<span class="kchip '+(k.d||'flat')+'"><span class="ka">'+arrow(k.d)+'</span>'+esc(k.k)+' <b class="tnum">'+esc(k.v)+'</b></span>';});return '<div class="cv-kpis'+(big?' big':'')+'">'+o+'</div>';}
 function cover(L,i,big){
  var p=L.date.split('-'),mm=+p[1],dd=+p[2];
  var dirc=(L.kpi&&L.kpi[0]&&L.kpi[0].d)||'flat';
  var flag=big?'<div class="cv-flag">오늘의 레터 · 가장 최근 발행</div>':'';
  var HT=big?'h2':'div';
  return '<a class="cover '+(big?'big ':'')+dirc+' reveal" href="'+esc(deeplink(L))+'" data-dir="'+dirc+'">'+
   '<span class="cv-spine"></span>'+flag+
   '<div class="cv-top"><time class="cv-date'+(big?' big':'')+' tnum" datetime="'+esc(L.date)+'">'+mm+'.'+pad(dd)+'</time>'+
   '<span class="cv-ed '+L.edition+'">'+edLabel(L.edition)+'</span></div>'+
   '<'+HT+' class="cv-hook'+(big?' big':'')+'">'+esc(L.title)+'</'+HT+'>'+
   '<div class="cv-teaser'+(big?' big':'')+'">'+esc(L.teaser||'')+'</div>'+
   kchips(L.kpi,big)+
   '<span class="cv-go'+(big?' big':'')+'">펼쳐 읽기 <i>→</i></span></a>';
 }
 function renderAll(idx){
  var letters=(idx&&idx.letters)||[];if(!letters.length)return false;
  var hi=d.getElementById('highlight'),arc=d.getElementById('archive');
  var lead1=hi.querySelector('.sec-lead');hi.innerHTML='';if(lead1)hi.appendChild(lead1);
  hi.insertAdjacentHTML('beforeend',cover(letters[0],0,true));
  var lead2=arc.querySelector('.sec-lead');arc.innerHTML='';if(lead2)arc.appendChild(lead2);
  var order=[],bym={};
  letters.forEach(function(L,i){var key=L.date.slice(0,7);if(!bym[key]){bym[key]=[];order.push(key);}bym[key].push([i,L]);});
  order.forEach(function(key){var pm=key.split('-'),cnt=bym[key].length;
   var cards=bym[key].map(function(pair){return cover(pair[1],pair[0],false);}).join('');
   arc.insertAdjacentHTML('beforeend','<section class="month"><div class="month-h"><span class="mh-title">'+esc(pm[0])+'년 '+MON[+pm[1]]+'</span><span class="mh-count tnum">'+cnt+'통</span></div><div class="cover-grid">'+cards+'</div></section>');
  });
  var n=letters.length,as=d.getElementById('bblArcN');
  if(as){as.setAttribute('data-to',n);as.__od=0;as.classList.remove('odo');as.innerHTML=n+'<small>통</small>';}
  var per=d.getElementById('bblArcPeriod');
  if(per){per.textContent=shortD(letters[letters.length-1].date)+' ~ '+shortD(letters[0].date);}
  return true;
 }
 function odo(scope){
  [].slice.call((scope||d).querySelectorAll('.cnt')).forEach(function(c){
   if(c.__od)return;c.__od=1;
   var raw=c.getAttribute('data-to'),num=parseFloat(raw);if(!isFinite(num))return;
   var small=c.querySelector('small'),suf=small?small.outerHTML:'',sufTxt=small?small.textContent:'';
   var dec=(String(raw).split('.')[1]||'').length;
   var txt=num.toLocaleString('ko-KR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
   var sr=d.createElement('span');sr.className='sr-only';sr.setAttribute('aria-live','polite');sr.textContent=txt+sufTxt;
   var out='',i,k;
   for(i=0;i<txt.length;i++){var ch=txt.charAt(i);
    if(ch>='0'&&ch<='9'){var col='';for(k=0;k<10;k++)col+='<span>'+k+'</span>';
     out+='<span class="od-col"><span class="od-reel" data-d="'+ch+'">'+col+'</span></span>';}
    else{out+='<span class="od-sep">'+ch+'</span>';}}
   c.setAttribute('aria-hidden','true');c.classList.add('odo');c.innerHTML=out+suf;
   if(c.nextSibling)c.parentNode.insertBefore(sr,c.nextSibling);else c.parentNode.appendChild(sr);
   [].slice.call(c.querySelectorAll('.od-reel')).forEach(function(r,idx){var dd=+r.getAttribute('data-d');
    if(rm){r.style.transform='translateY(-'+dd+'em)';return;}
    r.style.transform='translateY(0)';void r.getBoundingClientRect();
    r.style.transition='transform var(--dur-2) var(--ease-enter)';r.style.transitionDelay=(idx*55)+'ms';
    r.style.transform='translateY(-'+dd+'em)';});
  });
 }
 function initReveal(){
  var els=[].slice.call(W.querySelectorAll('.reveal'));
  if(rm||!('IntersectionObserver'in window)){els.forEach(function(e){e.classList.add('in');});return;}
  var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{threshold:.12,rootMargin:'0px 0px -6% 0px'});
  els.forEach(function(e){io.observe(e);});
 }
 function initFx(){odo(W);initReveal();}
 function showError(){
  var hi=d.getElementById('highlight');
  if(hi){var lead=hi.querySelector('.sec-lead');hi.innerHTML='';if(lead)hi.appendChild(lead);
   hi.insertAdjacentHTML('beforeend','<div class="bbl-err"><div class="ei">🌥️</div><div class="et">아카이브를 불러오지 못했어요</div><div class="ed">잠깐 사이 연결이 고르지 못했나 봐요. 잠시 후 새로고침해 주세요.</div><a class="ebtn" href="/letter-evening">오늘 레터 보기 →</a></div>');}
  var arc=d.getElementById('archive'),sk=d.getElementById('bblArcSk');if(sk)sk.remove();
  var per=d.getElementById('bblArcPeriod');if(per)per.textContent='—';
 }
 function boot(){
  if(!window.fetch){showError();return;}
  fetch(RAW+'index.json?_t='+Date.now(),{cache:'no-store'})
   .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
   .then(function(j){if(j&&j.letters&&j.letters.length){if(renderAll(j)){initFx();}}else{showError();}})
   .catch(function(){showError();});
 }
 boot();
 var tp=d.getElementById('bblTop');
 addEventListener('scroll',function(){if(tp)tp.classList.toggle('on',(d.documentElement.scrollTop||d.body.scrollTop||0)>620);},{passive:true});
 if(tp)tp.addEventListener('click',function(){scrollTo({top:0,behavior:rm?'auto':'smooth'});});
})();
</script>
