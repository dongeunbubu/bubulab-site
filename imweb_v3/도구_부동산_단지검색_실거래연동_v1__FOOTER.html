var ORDER = ["개포자이프레지던스","헬리오시티","개포래미안포레스트","래미안블레스티지","래미안대치팰리스","도곡렉슬"];

/* ===== 유틸 ===== */
function eok(man){ return (man/10000); }                 // 만원 → 억
function fmtEok(man){ var v=eok(man); return (Math.round(v*10)/10).toFixed(1); }
function perPyeong(man,pyeong){ return (eok(man)/pyeong); } // 억/평
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ===== 카드 렌더 ===== */
function renderCard(key){
 var d = APTS[key]; if(!d) return;
 var host = document.getElementById('cardHost');
 document.getElementById('cardTitle').textContent = key + ' · 단지 카드';

 var html = '<div class="aptcard reveal in">';
 // top
 html += '<div class="apttop"><div><h2>'+esc(key)+'</h2><div class="sub">'+esc(d.region)+' · LAWD '+esc(d.lawd)+(d.kapt?(' · 단지코드 '+esc(d.kapt)):'')+'</div>';
 if(d.full && d.tags){ html += '<div class="apttags">'+d.tags.map(function(t){return '<span>'+esc(t)+'</span>';}).join('')+'</div>'; }
 html += '</div>';
 if(d.full){ html += '<div class="scorepill" title="공공데이터 기반 생활편의성 종합점수"><div class="n">'+d.score+'<small>/10</small></div><div class="l">생활편의 ‘'+esc(d.grade)+'’</div></div>'; }
 html += '</div>';

 if(d.full){
  // key metrics
  html += '<div class="kgrid">'
    + '<div class="kbox"><div class="lab">총 세대수</div><b>'+d.households.toLocaleString()+'<small> 세대</small></b></div>'
    + '<div class="kbox"><div class="lab">세대당 주차</div><b>'+d.parkingPerHh+'<small> 대</small></b></div>'
    + '<div class="kbox"><div class="lab">승강기</div><b>'+d.elevator.toLocaleString()+'<small> 대</small></b></div>'
    + '<div class="kbox"><div class="lab">CCTV</div><b>'+d.cctv.toLocaleString()+'<small> 대</small></b></div>'
    + '</div>';
  // area bars
  var a=d.area, tot=a.u60+a.m6085+a.m85135+a.o135;
  var mx=Math.max(a.u60,a.m6085,a.m85135,a.o135);
  function row(lab,sub,n){
   var pctTot = tot? (n/tot*100):0;
   var rel = mx? (n/mx*100):0; if(n>0 && rel<0.6) rel=0.6;
   var pctTxt = pctTot<0.1 && n>0 ? '<0.1' : (Math.round(pctTot*10)/10);
   return '<div class="comprow"><div class="nm">'+lab+'<small>'+sub+'</small></div><div class="track"><i class="fill" data-w="'+rel.toFixed(1)+'"></i></div><div class="vv">'+n.toLocaleString()+'<small> · '+pctTxt+'%</small></div></div>';
  }
  html += '<div class="subh">전용면적별 세대 구성 <span class="tag">합계 '+tot.toLocaleString()+'세대 · 검증 일치</span></div>';
  html += '<div class="compbars">'
    + row('60㎡ 이하','소형',a.u60)
    + row('60~85㎡','중소형',a.m6085)
    + row('85~135㎡','중대형',a.m85135)
    + row('135㎡ 초과','대형',a.o135)
    + '</div>';
  html += '<p class="disc" style="margin-top:12px">막대 길이는 가장 많은 구간을 100%로 둔 <b>상대 비율</b>이에요(괄호는 전체 대비 %). '+esc(d.note)+'</p>';
 } else {
  html += '<div class="litebox">📋 <b>이 단지는 ‘실거래 표본’만 포착된 상태예요.</b> '+esc(d.liteNote)+'</div>';
 }

 // deals
 html += '<div class="subh" style="margin-top:22px">실거래 표본 ('+d.deals.length+'건 포착) <span class="tag">국토부 실거래가</span></div>';
 html += '<div class="dealgrid">';
 d.deals.forEach(function(x){
  var pp = perPyeong(x.priceMan,x.pyeong);
  html += '<div class="dealcard"><div class="dm">'+esc(x.ym)+' 계약</div>'
    + '<div class="price">'+fmtEok(x.priceMan)+'<small>억원</small></div>'
    + '<div class="dealrows">'
    + '<div><span>전용면적</span><b>'+x.area+'㎡<small style="font-weight:700;color:var(--mut)"> ('+x.pyeong+'평)</small></b></div>'
    + '<div><span>층</span><b>'+x.floor+'층</b></div>'
    + '<div><span>전용 평단가</span><b>약 '+(Math.round(pp*100)/100).toFixed(2)+'<small style="font-weight:700;color:var(--mut)">억/평</small></b></div>'
    + '<div><span>계약일</span><b>'+esc(x.date)+'</b></div>'
    + '</div></div>';
 });
 html += '</div>';
 if(d.full && d.dealNote){ html += '<div class="nodata">📭 '+esc(d.dealNote)+'</div>'; }
 html += '<div class="warnline info"><svg viewBox="0 0 24 24" fill="none" stroke="#B85060" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg><span>각 카드는 <b>추세가 아니라 개별 실거래 점(point)</b>입니다. 평단가는 <b>전용면적 기준</b>(공급면적 아님). 층·향·동에 따라 같은 평형도 가격이 크게 다릅니다.</span></div>';
 html += '</div>';

 host.innerHTML = html;
 // animate bars
 setTimeout(function(){ host.querySelectorAll('.fill').forEach(function(el){ var w=el.getAttribute('data-w'); if(w!=null) el.style.width=w+'%'; }); }, 60);
}

/* ===== 트레이스 갱신 ===== */
function renderTrace(key){
 var d=APTS[key]; if(!d) return;
 document.getElementById('tr1').innerHTML = esc(key);
 document.getElementById('tr2').innerHTML = esc(d.lawdName)+' <small>· '+esc(d.lawd)+'</small>';
 document.getElementById('tr3').innerHTML = esc(d.kapt);
 document.getElementById('tr4').innerHTML = (d.full?'기본정보 ✓':'기본정보 (보강 가능)')+' <small>· 실거래 '+d.deals.length+'건</small>';
 var steps=document.querySelectorAll('#trace .tstep');
 steps.forEach(function(s,i){ s.classList.remove('lit'); setTimeout(function(){ s.classList.add('lit'); }, 90*i); });
}

/* ===== 검색/선택 ===== */
function select(key, fromChip){
 if(!APTS[key]) return;
 renderTrace(key); renderCard(key);
 var chips=document.querySelectorAll('#sugg button');
 chips.forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-k')===key); });
 if(!fromChip){ document.getElementById('q').value=key; }
}
function buildChips(filter){
 var host=document.getElementById('sugg'); host.innerHTML='';
 var f=(filter||'').trim().toLowerCase();
 var shown=0;
 ORDER.forEach(function(key){
  if(f && key.toLowerCase().indexOf(f)<0) return;
  var d=APTS[key]; shown++;
  var b=document.createElement('button'); b.type='button'; b.setAttribute('data-k',key);
  b.innerHTML=esc(key)+'<span class="dn">'+esc(d.lawdName)+'</span>';
  b.addEventListener('click',function(){ select(key,true); document.getElementById('q').value=key; });
  host.appendChild(b);
 });
 if(shown===0){ host.innerHTML='<div class="noresult">검색 결과가 없어요. 데모 단지: '+ORDER.join(' · ')+'</div>'; }
 var cur=document.getElementById('q').value;
 var active=document.querySelector('.aptcard h2');
 host.querySelectorAll('button').forEach(function(b){ if(active && b.getAttribute('data-k')===active.textContent) b.classList.add('on'); });
}
function runSearch(){
 var v=document.getElementById('q').value.trim();
 if(APTS[v]){ select(v,false); return; }
 // 부분일치 첫 후보
 var hit=ORDER.filter(function(k){ return k.toLowerCase().indexOf(v.toLowerCase())>=0; });
 if(v && hit.length){ select(hit[0],false); document.getElementById('q').value=hit[0]; }
}

/* ===== init ===== */
(function(){
 buildChips('');
 select("개포자이프레지던스", true);
 var q=document.getElementById('q');
 q.addEventListener('input', function(){ buildChips(q.value); });
 q.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); runSearch(); } });
 document.getElementById('goBtn').addEventListener('click', runSearch);
})();
</script>
<script>
/* reveal on scroll */
(function(){
 var hdr=document.getElementById('hdr');
 var onScroll=function(){ if(hdr){ hdr.classList.toggle('scrolled', window.scrollY>8); } };
 window.addEventListener('scroll', onScroll, {passive:true}); onScroll();
 var els=document.querySelectorAll('.reveal');
 if('IntersectionObserver' in window){
  var io=new IntersectionObserver(function(ents){
   ents.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);
    e.target.querySelectorAll&&e.target.querySelectorAll('.fill').forEach(function(el){var w=el.getAttribute('data-w');if(w!=null)el.style.width=w+'%';}); } });
  },{threshold:.12,rootMargin:'0px 0px -8% 0px'});
  els.forEach(function(el){ io.observe(el); });
 } else { els.forEach(function(el){ el.classList.add('in'); }); }
})();
</script>
<script>
/* scroll progress + to-top */
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*navmobjs*/
(function(){var hdr=document.getElementById('hdr');if(!hdr||hdr.querySelector('.navMobBtn'))return;
var as=[].slice.call(hdr.querySelectorAll('.menu a'));
var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
var cta=hdr.querySelector('.cta');var ch=cta?cta.getAttribute('href'):'#';var ct=cta?(cta.textContent||'\uad6c\ub3c5\ud558\uae30').trim():'\uad6c\ub3c5\ud558\uae30';
var btn=document.createElement('button');btn.type='button';btn.className='navMobBtn';btn.setAttribute('aria-label','\uba54\ub274 \uc5f4\uae30');btn.innerHTML='<span></span><span></span><span></span>';
(hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
var d=document.createElement('div');d.className='navDrawer';
d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="\ub2eb\uae30">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
document.body.appendChild(d);
function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}

btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});

document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});})();
</script>
