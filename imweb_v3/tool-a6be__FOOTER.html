<!-- [도구_청약가점계산기_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 3개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.countUp=function(el,to,dur,suf){to=+to;dur=dur||900;suf=suf||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=Math.round(to*e)+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};

var $=function(id){return document.getElementById(id);};

/* ---- 배점 로직 (주택공급규칙 가점제 배점표) ---- */
// 무주택 기간: 슬라이더 0~15 → 0:"1년 미만"(2점) ... 15:"15년 이상"(32점). 해당없음(na) → 0점.
function homeLabel(i){return i===0?'1년 미만':i>=15?'15년 이상':i+'~'+(i+1)+'년';}
function homePts(i,na){return na?0:Math.min(32,(i+1)*2);}
// 부양가족: 0~6 → 0명(5점) ... 6명이상(35점), 1명당 5점.
function famLabel(i){return i>=6?'6명 이상':i+'명';}
function famPts(i){return Math.min(35,(i+1)*5);}
// 청약통장: 0~16 → 0:"6개월 미만"(1점),1:"6개월~1년"(2점),2:"1~2년"(3점)...16:"15년 이상"(17점).
function jangLabel(i){return i===0?'6개월 미만':i===1?'6개월~1년':i>=16?'15년 이상':(i-1)+'~'+i+'년';}
function jangPts(i){return Math.min(17,i+1);}

function compute(animate){
  var na=$('f_na').getAttribute('aria-pressed')==='true';
  var hi=+$('f_home').value, fi=+$('f_fam').value, ji=+$('f_jang').value;
  var spOn=$('f_sp').getAttribute('aria-pressed')==='true';
  var spi=+$('f_spj').value;

  var hp=homePts(hi,na), fp=famPts(fi), jpOwn=jangPts(ji);
  var spBonus=spOn?Math.min(3,Math.floor(jangPts(spi)*0.5)):0;
  var jp=Math.min(17,jpOwn+spBonus);
  var total=hp+fp+jp; // max 84

  // 입력 라벨
  $('f_home').disabled=na;
  $('v_home').textContent=na?'해당 없음 · 0점':homeLabel(hi)+' · '+hp+'점';
  $('v_fam').textContent=famLabel(fi)+' · '+fp+'점';
  $('v_jang').textContent=jangLabel(ji)+' · '+jpOwn+'점';
  $('v_spj').textContent=jangLabel(spi)+' · +'+spBonus+'점';
  $('spwrap').classList.toggle('on',spOn);

  // 게이지
  var pctOf=total/84*100;
  if(animate){window.countUp($('sNum'),total,1000);var a=$('sArc');a.style.transition='stroke-dashoffset 1.1s var(--ease)';a.style.strokeDashoffset=(100-pctOf);}
  else{$('sNum').textContent=total;$('sArc').style.strokeDashoffset=(100-pctOf);}

  // 등급 메시지 (실제 당첨선 맥락 반영)
  var gr,msg;
  if(total>=70){gr='최상위권이에요 🌳';msg='84점 만점에 가까워요. 수도권 인기 단지까지 도전해 볼 만한 점수예요.';}
  else if(total>=60){gr='꽤 높은 편이에요 🌱';msg='지역·단지에 따라 당첨권에 들어가요. 참고로 4인 가구가 받을 수 있는 최고점이 69점이에요.';}
  else if(total>=45){gr='평균 안팎이에요 🧩';msg='인기 단지는 아직 빠듯하지만, 무주택·통장 기간이 쌓이면 매년 점수가 올라가요.';}
  else{gr='차곡차곡 쌓는 단계예요 🔧';msg='청약은 시간이 가장 큰 무기예요. 통장 유지하고 무주택 기간을 채워가면 돼요.';}
  $('sGrade').textContent=gr;$('sMsg').textContent=msg;

  // 당첨선 벤치마크 바 (수도권 인기 단지 추정대 55~69)
  $('bmZone').style.left='65.5%';$('bmZone').style.right=(100-82.1)+'%'; // 55/84 ~ 65.5%, 69/84 ~ 82.1%
  var lp=Math.max(0,Math.min(100,pctOf));
  $('bmPtr').style.left=lp+'%';
  $('bmCap').innerHTML='<b>나의 점수 '+total+'점</b> · 수도권 인기 단지 당첨선은 보통 <b>60점대 중후반~만점</b>까지 올라가요(단지·시기마다 천차만별). 4인 가구 최고점은 69점.';

  // 항목 바
  var comp=[[hp,32,'ci0','cs0','ce0'],[fp,35,'ci1','cs1','ce1'],[jp,17,'ci2','cs2','ce2']];
  comp.forEach(function(c){
    var w=c[0]/c[1]*100;
    $(c[2]).dataset.w=w; if(!animate)$(c[2]).style.width=w+'%';
    $(c[3]).innerHTML=c[0]+'<s>/'+c[1]+'</s>';
  });
  $('ce0').innerHTML=na?'만 30세·혼인 시점부터 점수가 붙어요':(hp>=32?'만점이에요 🎉':'1년 더 채우면 <b>+2점</b>');
  $('ce1').innerHTML=(fp>=35?'만점이에요 🎉':'실제 부양·세대 요건 충족 시 1명당 <b>+5점</b>');
  $('ce2').innerHTML=(spBonus>0?'배우자 합산 <b>+'+spBonus+'점</b> 포함':(jp>=17?'만점이에요 🎉':'1년 더 유지하면 <b>+1점</b>'));
  if(animate)setTimeout(function(){comp.forEach(function(c){$(c[2]).style.width=$(c[2]).dataset.w+'%';});},90);

  // 가점 올리는 길 (부족분 큰 항목 우선 + 부부 팁)
  var tips=[];
  if(!na && hp<32)tips.push(['⏳','무주택 기간을 채워요','집 없이 보내는 1년마다 +2점. 만 30세(혹은 결혼)부터 15년이면 32점 만점이에요.']);
  if(jp<17)tips.push(['🏦','청약통장은 오래 묵힐수록 +1점','지금 쓰지 않아도 절대 해지하지 마세요. 해지하면 가입기간이 0부터 다시 시작돼요.']);
  if(spOn===false)tips.push(['👫','배우자 청약통장을 만들면 합산돼요','2024년부터 배우자 가입기간의 50%(최대 3점)를 더해줘요. 부부라서 챙길 수 있는 점수예요.']);
  else if(spBonus<3)tips.push(['👫','배우자 통장도 오래 유지하면 합산이 커져요','배우자 가입기간이 길수록 합산 보너스가 최대 3점까지 올라가요.']);
  if(fp<35)tips.push(['👪','부양가족 점수는 배점이 가장 커요','1명당 5점이라 영향이 커요. 다만 실제 부양·세대 등재 요건을 꼭 갖춰야 해요(위장전입은 불법이에요).']);
  if(total>=70)tips.unshift(['🎯','이미 고가점이에요','점수 욕심보다 청약할 단지·시기 전략이 더 중요한 구간이에요. 분양 일정을 챙겨보세요.']);
  tips=tips.slice(0,3);
  $('tips').innerHTML=tips.map(function(t){return '<div class="tp"><div class="ic">'+t[0]+'</div><div><div class="tt">'+t[1]+'</div><div class="td">'+t[2]+'</div></div></div>';}).join('');
}

/* 토글 (체크박스형 버튼) */
function bindToggle(id){var el=$(id);function t(){el.setAttribute('aria-pressed',el.getAttribute('aria-pressed')==='true'?'false':'true');compute(true);}
 el.addEventListener('click',t);el.addEventListener('keydown',function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();t();}});}
bindToggle('f_na');bindToggle('f_sp');

['f_home','f_fam','f_jang','f_spj'].forEach(function(id){
  $(id).addEventListener('input',function(){compute(false);});
  $(id).addEventListener('change',function(){compute(true);});
});
compute(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
