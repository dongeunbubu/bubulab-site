<!-- [머니레터_시각화_라이브러리_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 1개) -->
<script>
(function(){
  if(window.__vizlib)return;window.__vizlib=1;
  var d=document;d.documentElement.classList.add('js');
  var mm=function(q){return window.matchMedia?matchMedia(q).matches:false;};
  var rm=mm('(prefers-reduced-motion: reduce)');
  function fmt(n,dec){return dec?n.toFixed(dec):Math.floor(n).toLocaleString('ko-KR');}
  function runCount(el){var to=parseFloat(el.dataset.to),dec=+(el.dataset.dec||0),t0=null,dur=1100;
    function step(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=fmt(to*e,dec);if(p<1)requestAnimationFrame(step);else el.textContent=fmt(to,dec);}
    requestAnimationFrame(step);}
  function fire(demo){
    demo.classList.add('in');
    if(!rm)[].slice.call(demo.querySelectorAll('.count')).forEach(runCount);
    else [].slice.call(demo.querySelectorAll('.count')).forEach(function(el){el.textContent=fmt(parseFloat(el.dataset.to),+(el.dataset.dec||0));});
  }
  var demos=[].slice.call(d.querySelectorAll('.demo'));
  if(rm||!('IntersectionObserver' in window)){demos.forEach(fire);}
  else{var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){fire(e.target);io.unobserve(e.target);}});},{threshold:.35});
    demos.forEach(function(x){io.observe(x);});}
  /* 리플레이 */
  [].slice.call(d.querySelectorAll('.replay')).forEach(function(btn){
    btn.addEventListener('click',function(){
      var mod=btn.closest('.mod');var demo=mod&&mod.querySelector('.demo');if(!demo)return;
      demo.classList.remove('in');
      void demo.offsetWidth;
      requestAnimationFrame(function(){requestAnimationFrame(function(){fire(demo);});});
    });
  });
})();
</script>
