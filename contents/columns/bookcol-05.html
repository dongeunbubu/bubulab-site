  <section class="cx-sc">
    <p class="cx-quote">"몰빵." 짧고 강렬한 그 말에, 한 번쯤 마음이 흔들려 보셨죠.</p>
    <p>한 곳에 다 걸어 크게 먹는 상상은, 언제나 짜릿하니까요.</p>
  </section>
  <section class="cx-sc">
    <p>그런데 그 상상 끝에는, 크게 잃는 그림도 똑같이 붙어 있어요.</p>
    <p>그래서 오래 살아남는 부부는, 늘 반대편 단어를 먼저 배우더라고요.</p>
  </section>
  <section class="cx-sc">
    <p>몰빵의 반대말은 <span class="cx-hl">분산</span>이에요.</p>
    <p>핵심은 두 재료예요 — <span class="cx-term" tabindex="0" data-tip="한 곳에 몰아넣지 않고 여러 자산에 나눠 담는 방법이에요. 하나가 흔들려도 전체가 함께 무너지지 않게 해줘요.">분산투자</span>와 <span class="cx-term" tabindex="0" data-tip="두 자산이 같은 방향으로 움직이는 정도예요. 상관관계가 낮은 것끼리 담으면 전체 출렁임이 줄어요.">상관관계</span>.</p>
    <p>덜 잃는 구조가 결국 더 버는 구조라는 걸, 오늘 숫자로 함께 확인해봐요.</p>
