<!-- [도구_1억복리_v1] FOOTER = 페이지별 푸터 HTML에 붙여넣기 (스크립트 6개) -->
<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){e.target.classList.toggle('in',e.isIntersecting);});},{threshold:.14});
d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.scene,.stag').forEach(function(el){el.classList.add('in');});}
d.querySelectorAll('.magnet').forEach(function(b){b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.15)+'px,'+((e.clientY-r.top-r.height/2)*.22)+'px)';});b.addEventListener('mouseleave',function(){b.style.transform='';});});
})();
window.fmtWon=function(n){return Math.round(n).toLocaleString('ko-KR');};
window.countUp=function(el,to,dur,suf,pre){to=+to;dur=dur||900;suf=suf||'';pre=pre||'';var t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=pre+Math.round(to*e).toLocaleString('ko-KR')+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);};


var $=function(id){return document.getElementById(id);};
function num(el){return Math.max(0,+(el.value.replace(/[^0-9]/g,''))||0);}
function reqPmt(target,cur,annual,N){var rm=annual/100/12;if(rm===0)return Math.max(0,(target-cur)/N);var f=Math.pow(1+rm,N);var p=(target-cur*f)/((f-1)/rm);return Math.max(0,p);}
var chosen=5;
function series(cur,pmt,annual,N){var rm=annual/100/12,v=[],pr=[];for(var t=0;t<=N;t++){var val=cur*Math.pow(1+rm,t)+(rm===0?pmt*t:pmt*((Math.pow(1+rm,t)-1)/rm));v.push(val);pr.push(cur+pmt*t);}return{v:v,pr:pr};}
function buildPath(arr,maxV,N){var x0=46,x1=606,y0=22,y1=232;var pts=[];for(var i=0;i<arr.length;i++){var x=x0+(x1-x0)*(i/N);var y=y1-(y1-y0)*(arr[i]/maxV);pts.push([x,y]);}return pts;}
function toD(pts){return pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');}
function draw(animate){
 var target=num($('target')),cur=num($('cur')),N=+$('yrs').value*12,annual=+$('rate').value;
 $('yrsv').textContent=$('yrs').value+'년';$('ratev').textContent=(+$('rate').value).toFixed(1)+'%';
 var pmt=reqPmt(target,cur,annual,N);
 if(animate)window.countUp($('pmt'),pmt,800);else $('pmt').textContent=window.fmtWon(pmt);
 $('pmthint').textContent='연 '+annual.toFixed(1)+'% 가정 · '+$('yrs').value+'년 동안';
 [3,5,8].forEach(function(r){$('sm'+r).textContent=window.fmtWon(reqPmt(target,cur,r,N));});
 var s=series(cur,pmt,annual,N);var maxV=Math.max(target,s.v[s.v.length-1])*1.06;
 var vp=buildPath(s.v,maxV,N),pp=buildPath(s.pr,maxV,N);
 $('vpath').setAttribute('d',toD(vp));
 $('ppath').setAttribute('d',toD(pp));
 $('area').setAttribute('d',toD(vp)+' L606,232 L46,232 Z');
 var last=vp[vp.length-1];$('dot').setAttribute('cx',last[0]);$('dot').setAttribute('cy',last[1]);
 // grid lines
 var g=$('grid');g.innerHTML='';for(var k=0;k<=4;k++){var y=22+(232-22)*k/4;g.innerHTML+='<line x1="46" y1="'+y+'" x2="606" y2="'+y+'" stroke="#EAD7D3" stroke-width="1"/>';}
 // summary
 var P=cur+pmt*N,V=s.v[s.v.length-1];
 $('sumP').textContent=window.fmtWon(P);$('sumI').textContent='+'+window.fmtWon(V-P);$('sumV').textContent=window.fmtWon(V);
 var ch=$('chart');if(ch)ch.setAttribute('aria-label','연 '+annual.toFixed(1)+'% 가정, '+$('yrs').value+'년 동안 매달 '+window.fmtWon(pmt)+'원씩 모으는 곡선 차트예요. 총 납입 원금 '+window.fmtWon(P)+'원, 굴린 수익 +'+window.fmtWon(V-P)+'원, 만기 평가액 약 '+window.fmtWon(V)+'원.');
 if(animate){var vpath=$('vpath');vpath.style.transition='none';vpath.style.strokeDasharray='1';vpath.style.strokeDashoffset='1';vpath.getBoundingClientRect();vpath.style.transition='stroke-dashoffset 1.1s var(--ease)';vpath.style.strokeDashoffset='0';
   $('dot').style.transition='none';$('dot').style.opacity='0';setTimeout(function(){$('dot').style.transition='opacity .4s';$('dot').style.opacity='1';},900);}
}
['target','cur'].forEach(function(id){$(id).addEventListener('input',function(){var v=num($(id));$(id).value=v?v.toLocaleString('ko-KR'):'';draw(false);});$(id).addEventListener('change',function(){draw(true);});});
$('yrs').addEventListener('input',function(){draw(false);});$('yrs').addEventListener('change',function(){draw(true);});
$('rate').addEventListener('input',function(){draw(false);});$('rate').addEventListener('change',function(){draw(true);});
document.querySelectorAll('#scn button').forEach(function(b){b.addEventListener('click',function(){chosen=+b.dataset.r;document.querySelectorAll('#scn button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');$('rate').value=chosen;draw(true);});});
draw(true);
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">\u00d7</button><div class="dlogo"><i></i>\ubd80\ubd80\uc5f0\uad6c\uc18c</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','\ub9e8 \uc704\ub85c');btn.innerHTML='<svg viewBox=\"0 0 24 24\"><path d=\"M12 19V5M5 12l7-7 7 7\"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*alanejs — 계산 실행 CTA 와이어링(추가 전용, 기존 엔진 무접촉)*/
(function(){var b=document.getElementById('calcGo');if(!b)return;
b.addEventListener('click',function(){
 if(typeof draw==='function')draw(true);
 var r=document.querySelector('.bigout');
 if(r&&matchMedia('(max-width:840px)').matches){var rm=matchMedia('(prefers-reduced-motion:reduce)').matches;r.scrollIntoView({behavior:rm?'auto':'smooth',block:'center'});}
});
})();
</script>
<script>/*wowkit*/
(function(){
  if(window.__bblWow)return;window.__bblWow=1;
  var d=document;d.documentElement.classList.add('js');
  var mm=function(q){return window.matchMedia?matchMedia(q).matches:false;};
  var rm=mm('(prefers-reduced-motion: reduce)');
  /* 스태거 딜레이 자동 부여(최대 560ms 캡) */
  [].slice.call(d.querySelectorAll('.wstag')).forEach(function(g){
    [].slice.call(g.children).forEach(function(c,i){c.style.transitionDelay=Math.min(i*70,560)+'ms';});
  });
  var els=[].slice.call(d.querySelectorAll('.wv,.wstag,.whl,.wline'));
  function onin(e){e.classList.add('in');}
  if(rm||!('IntersectionObserver' in window)){els.forEach(onin);}
  else{
    var io=new IntersectionObserver(function(es){es.forEach(function(en){
      if(en.isIntersecting){onin(en.target);io.unobserve(en.target);}});},
      {threshold:.14,rootMargin:'0px 0px -8% 0px'});
    els.forEach(function(e){io.observe(e);});
  }
  if(!rm&&mm('(pointer:fine)')){
    /* 마그네틱 CTA */
    [].slice.call(d.querySelectorAll('.wmag')).forEach(function(b){
      b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();
        b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.14).toFixed(1)+'px,'+((e.clientY-r.top-r.height/2)*.18).toFixed(1)+'px)';},{passive:true});
      b.addEventListener('mouseleave',function(){b.style.transform='';});
    });
    /* 3D 틸트(이미지·대표 카드, PC만) */
    [].slice.call(d.querySelectorAll('.wtilt')).forEach(function(c){
      c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect(),
        px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;
        c.style.transform='perspective(840px) rotateY('+(px*5).toFixed(2)+'deg) rotateX('+(-py*5).toFixed(2)+'deg) translateY(-4px)';},{passive:true});
      c.addEventListener('mouseleave',function(){c.style.transform='';});
    });
    /* 라이트 패럴랙스: data-wplx="0.08" (히어로 장식·이미지, PC만) */
    var plx=[].slice.call(d.querySelectorAll('[data-wplx]'));
    if(plx.length&&mm('(min-width:861px)')){
      var tick=false;
      function upd(){tick=false;var vh=innerHeight;
        plx.forEach(function(el){var r=el.getBoundingClientRect();
          var sp=parseFloat(el.getAttribute('data-wplx'))||.08;
          el.style.transform='translateY('+(((r.top+r.height/2-vh/2)*sp*-1)).toFixed(1)+'px)';});}
      addEventListener('scroll',function(){if(!tick){tick=true;requestAnimationFrame(upd);}},{passive:true});
      upd();
    }
  }
})();
</script>
<script>/*blane-a11y — 수익률 시나리오 버튼 aria-pressed 동기화(B레인, 추가 전용·기존 엔진 무접촉)*/
(function(){var g=document.getElementById('scn');if(!g)return;
var bs=[].slice.call(g.querySelectorAll('button'));
function sync(){bs.forEach(function(b){b.setAttribute('aria-pressed',b.classList.contains('on')?'true':'false');});}
bs.forEach(function(b){b.addEventListener('click',function(){setTimeout(sync,0);});});
sync();
})();
</script>
