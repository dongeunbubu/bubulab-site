<script>
(function(){var d=document;d.documentElement.classList.add('js');
var h=d.getElementById('hdr');if(h)addEventListener('scroll',function(){h.classList.toggle('scrolled',scrollY>8);},{passive:true});
function runBars(root){(root||d).querySelectorAll('.step .fill').forEach(function(f){if(f.dataset.done)return;f.dataset.done=1;f.style.width=parseFloat(f.dataset.w)+'%';});}
if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');var cs=e.target.querySelectorAll?e.target.querySelectorAll('.cf'):[];cs.forEach(runCF);if(e.target.classList.contains('cf'))runCF(e.target);if(e.target.querySelector&&e.target.querySelector('.step'))runBars(e.target);}});},{threshold:.14});
d.querySelectorAll('.reveal,.stag').forEach(function(el){io.observe(el);});
d.querySelectorAll('.cf').forEach(function(el){io.observe(el);});}else{d.querySelectorAll('.reveal,.stag').forEach(function(el){el.classList.add('in');});runBars(d);}

// count-up
function runCF(el){if(el.dataset.done)return;el.dataset.done=1;var to=parseFloat(el.dataset.to),dec=parseInt(el.dataset.dec||'0'),t0=null,dur=1100;
function fmt(v){return dec>0?v.toFixed(dec):Math.round(v).toLocaleString('en-US');}
function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1);var e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(s);else el.textContent=fmt(to);}requestAnimationFrame(s);}

// 적정 PER 감각 계산기
(function(){var g=d.getElementById('gIn'),r=d.getElementById('rIn');if(!g||!r)return;
var gOut=d.getElementById('gOut'),rOut=d.getElementById('rOut');
var eqR=d.getElementById('eqR'),eqG=d.getElementById('eqG'),eqGap=d.getElementById('eqGap'),eqPer=d.getElementById('eqPer'),recPer=d.getElementById('recPer'),recGap=d.getElementById('recGap'),vd=d.getElementById('perVerdict');
function upd(){var gv=parseFloat(g.value),rv=parseFloat(r.value);var gap=rv-gv;
gOut.textContent=gv+'%';rOut.textContent=rv+'%';
eqG.textContent=gv+'%';eqR.textContent=rv+'%';eqGap.textContent=gap.toFixed(1)+'%p';
var per=null,perTxt,recTxt;
if(gap<=0){perTxt='∞';recTxt='∞ (모델 붕괴)';}
else{per=100/gap;if(per>200){perTxt='200배+';recTxt='약 200배+';}else{perTxt=per.toFixed(1)+'배';recTxt='약 '+per.toFixed(0)+'배';}}
eqPer.textContent='PER '+perTxt;recPer.textContent=recTxt;recGap.textContent=gap.toFixed(1)+'%p';
var msg;
if(gap<=0){msg='이익성장률이 요구수익률보다 높아요. 이론상 적정 PER이 무한대로 발산해 모델이 깨져요. 현실에선 이런 고성장이 영원할 수 없어, 분석가들은 성장 구간을 여러 단계로 나눠 계산해요.';}
else if(gap<=1){msg='격차가 1%p 안으로 좁아지면 적정 PER이 100배를 넘어요. 고성장주의 밸류가 작은 기대 변화에도 크게 출렁이는 이유예요 — 성장률 가정이 0.5%p만 바뀌어도 PER이 휘청이죠.';}
else if(per>=30){msg='성장 기대가 클수록(격차가 좁을수록) 시장은 높은 PER을 정당화해요. 엔비디아처럼요. 단, 그 성장이 흔들리면 PER도 빠르게 식어 주가에 큰 충격이 와요.';}
else if(per>=15){msg='성장과 요구수익률이 균형을 이룬 구간이에요. 코카콜라 같은 우량주의 PER 감각이죠. 무난하지만, 성장 대비 값(PEG)도 함께 봐야 해요.';}
else{msg='성장 기대가 낮으면(격차가 넓으면) 시장은 낮은 PER만 줘요. 버라이즌 같은 저성장·고배당주가 여기예요. 대신 기대가 낮아 덜 실망하고, 배당이 수익의 한 축을 채워주죠.';}
vd.textContent=msg;}
g.addEventListener('input',upd);r.addEventListener('input',upd);upd();})();
})();
</script>
<script>/*navmobjs*/
(function(){
 var hdr=document.getElementById('hdr'); if(!hdr||hdr.querySelector('.navMobBtn'))return;
 var as=[].slice.call(hdr.querySelectorAll('.menu a'));
 var links=as.map(function(a){return '<a href="'+a.getAttribute('href')+'"'+(a.classList.contains('cur')?' class="cur"':'')+'>'+(a.textContent||'').trim()+'</a>';}).join('');
 var cta=hdr.querySelector('.cta'); var ch=cta?cta.getAttribute('href'):'#'; var ct=cta?(cta.textContent||'구독하기').trim():'구독하기';
 var btn=document.createElement('button'); btn.type='button'; btn.className='navMobBtn'; btn.setAttribute('aria-label','메뉴 열기'); btn.innerHTML='<span></span><span></span><span></span>';
 (hdr.querySelector('.navright')||hdr.querySelector('.nav')||hdr).appendChild(btn);
 var d=document.createElement('div'); d.className='navDrawer';
 d.innerHTML='<div class="pnl"><button class="cl" type="button" aria-label="닫기">×</button><div class="dlogo"><i></i>부부연구소</div><nav class="dn">'+links+'</nav><a class="dcta" href="'+ch+'">'+ct+'</a></div>';
 document.body.appendChild(d);
 function op(){d.classList.add('on');btn.classList.add('on');document.body.style.overflow='hidden';}
 function cl(){d.classList.remove('on');btn.classList.remove('on');document.body.style.overflow='';}
 btn.addEventListener('click',function(){d.classList.contains('on')?cl():op();});
 d.addEventListener('click',function(e){var t=e.target;if(t===d||t.classList.contains('cl')||t.tagName==='A')cl();});
 document.addEventListener('keydown',function(e){if(e.key==='Escape')cl();});
})();
</script>
<script>/*pagedynjs*/
(function(){var d=document;if(d.querySelector('.scrollprog'))return;
var bar=d.createElement('div');bar.className='scrollprog';d.body.appendChild(bar);
var btn=d.createElement('button');btn.type='button';btn.className='toTop';btn.setAttribute('aria-label','맨 위로');btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';d.body.appendChild(btn);
function upd(){var h=d.documentElement;var sc=h.scrollTop||d.body.scrollTop||0;var mx=(h.scrollHeight-h.clientHeight)||1;bar.style.width=(Math.min(sc/mx,1)*100)+'%';btn.classList.toggle('on',sc>400);}
addEventListener('scroll',upd,{passive:true});addEventListener('resize',upd,{passive:true});upd();
btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
</script>
<script>/*fxkrw*//*fxkrw-v2*/
(function(){
  if(document.documentElement.getAttribute('data-fxk'))return;
  document.documentElement.setAttribute('data-fxk','1');
  var FALLBACK=1525, rate=FALLBACK, live=false;
  try{var _c=JSON.parse(sessionStorage.getItem('bblfx')||'0');if(_c&&_c.r&&(Date.now()-_c.t)<43200000){rate=_c.r;live=true;}}catch(e){}
  function f(x){return x>=100?Math.round(x).toLocaleString('ko-KR'):(Math.round(x*10)/10).toLocaleString('ko-KR');}
  function fmt(won){
    if(won>=1e12)return f(won/1e12)+'조원';
    if(won>=1e8)return f(won/1e8)+'억원';
    if(won>=1e4)return f(won/1e4)+'만원';
    return Math.round(won).toLocaleString('ko-KR')+'원';
  }
  var MU={'십억':1e9,'백만':1e6,'조':1e12,'억':1e8,'만':1e4,'bn':1e9,'mn':1e6,'B':1e9,'M':1e6,'T':1e12};
  var RE=/\$([0-9][0-9,]*(?:\.[0-9]+)?)(십억|백만|조|억|만|bn|mn|B|M|T)?/;
  function mag(str,suf){var n=parseFloat(str.replace(/,/g,''));return n*(suf&&MU[suf]?MU[suf]:1);}
  function wrap(){
    var sk={SCRIPT:1,STYLE:1,NOSCRIPT:1,TEXTAREA:1};
    var w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,{acceptNode:function(node){
      if(!node.nodeValue||node.nodeValue.indexOf('$')<0)return 2;
      var p=node.parentNode;
      while(p&&p!==document.body){
        if(sk[p.nodeName])return 2;
        var c=p.className?(''+p.className):'';
        if(c.indexOf('fxk')>=0||c.indexOf('fxbadge')>=0)return 2;
        p=p.parentNode;
      }
      return RE.test(node.nodeValue)?1:2;
    }});
    var nodes=[],n;while(n=w.nextNode())nodes.push(n);
    var G=new RegExp(RE.source,'g');
    nodes.forEach(function(node){
      var txt=node.nodeValue, frag=document.createDocumentFragment(), last=0, m; G.lastIndex=0;
      while(m=G.exec(txt)){
        frag.appendChild(document.createTextNode(txt.slice(last,m.index+m[0].length)));
        var usd=mag(m[1],m[2]);
        var sp=document.createElement('span'); sp.className='fxk'; sp.setAttribute('data-usd',usd);
        sp.textContent='(약 '+fmt(usd*rate)+')';
        frag.appendChild(sp);
        last=m.index+m[0].length;
      }
      frag.appendChild(document.createTextNode(txt.slice(last)));
      node.parentNode.replaceChild(frag,node);
    });
  }
  function apply(){
    var els=document.querySelectorAll('.fxk[data-usd]');
    for(var i=0;i<els.length;i++){var u=parseFloat(els[i].getAttribute('data-usd'));els[i].textContent='(약 '+fmt(u*rate)+')';}
    var b=document.getElementById('fxbadge');
    if(b){b.querySelector('.rt').textContent='$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원';
          b.querySelector('.lb').textContent=live?'실시간':'기준';}
  }
  function badge(){
    var d=document.createElement('div'); d.id='fxbadge'; d.className='fxbadge';
    d.innerHTML='<span class="dot"></span><span class="rt">$1 = '+Math.round(rate).toLocaleString('ko-KR')+'원</span><span class="lb">기준</span>';
    document.body.appendChild(d);
  }
  function start(){
    wrap(); badge();
    try{fetch('https://api.frankfurter.dev/v1/latest?from=USD&to=KRW')
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.rates&&j.rates.KRW){rate=j.rates.KRW;live=true;apply();try{sessionStorage.setItem('bblfx',JSON.stringify({r:rate,t:Date.now()}))}catch(e){}}})
      .catch(function(){});}catch(e){}
  }
  if(document.readyState!=='loading')start();else document.addEventListener('DOMContentLoaded',start);
})();
</script>
